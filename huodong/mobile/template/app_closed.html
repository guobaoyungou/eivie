
<style>
{literal}
body {
    margin: 0; padding: 0;
    min-height: 100vh;
    -webkit-user-select: none;
    overflow: hidden;
}
.closed-page {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 0 40px;
}
.closed-page::before {
    content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(180deg, rgba(10,10,10,0.5) 0%, rgba(10,10,10,0.4) 50%, rgba(10,10,10,0.6) 100%);
    z-index: 1;
}
.closed-page > * { position: relative; z-index: 2; }

.closed-indicator {
    width: 64px; height: 64px; border-radius: var(--r-full);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 28px;
}
.closed-indicator svg { width: 28px; height: 28px; }

.closed-title {
    font-size: 22px; font-weight: 600; color: #fff;
    text-align: center; margin-bottom: 12px;
    letter-spacing: 0.5px;
}
.closed-activity-img {
    max-width: 85%; border-radius: var(--r-lg);
    margin-bottom: 28px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
}
.closed-message {
    font-size: 15px; color: rgba(255,255,255,0.55);
    text-align: center; line-height: 1.7;
    font-weight: 300; margin-bottom: 8px;
}
.closed-contact {
    font-size: 12px; color: rgba(255,255,255,0.3);
    text-align: center; letter-spacing: 0.5px;
}
{/literal}
</style>
</head>
<body>
<div class="closed-page" style="background:url('{$mobile_bg}') center/cover no-repeat #111;">
    <div class="closed-indicator">
        <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </div>
    <div class="closed-title">{$activity_title}</div>
    {if $mobile_activity_image != ''}
    <img class="closed-activity-img" src="{$mobile_activity_image}" alt="">
    {/if}
    <div class="closed-message">签到已结束<br>您未能参加本次签到</div>
    <div class="closed-contact">如有疑问请联系活动主办方</div>
</div>
{if $mobile_bg==''}
<div style="position:fixed;z-index:-1;top:0;height:100%;width:100%;">
    <img style="width:100%;height:100%;object-fit:cover;filter:blur(40px) brightness(0.25);" src="{$user['avatar']}">
</div>
{/if}
<script>
{literal}
$(document).on("WeixinJSBridgeReady", function () {
    WeixinJSBridge.call('hideOptionMenu');
});
{/literal}
</script>
</body>
</html>
