version: '3.8'

services:
  xiaozhi-cloud:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: xiaozhi-cloud
    restart: unless-stopped
    ports:
      - "9502:9502"   # WebSocket 网关
      - "9503:9503"   # HTTP API
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - TONGYI_API_KEY=${TONGYI_API_KEY:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - DOUBAO_API_KEY=${DOUBAO_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - VOLCENGINE_TTS_APP_ID=${VOLCENGINE_TTS_APP_ID:-}
      - VOLCENGINE_TTS_ACCESS_TOKEN=${VOLCENGINE_TTS_ACCESS_TOKEN:-}
    volumes:
      - ../configs:/app/configs:ro
      - ./logs:/app/logs
      - ../scripts:/app/scripts:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - xiaozhi-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9503/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M

  # MySQL (开发环境使用外部数据库，生产环境可取消注释)
