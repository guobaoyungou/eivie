<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商家登录 - 艺为微信大屏互动</title>
    <link rel="stylesheet" href="/static/css/landing.css">
    <style>
        body { background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); min-height: 100vh; }
        .auth-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .auth-card {
            background: #fff; border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .auth-logo { text-align: center; margin-bottom: 36px; }
        .auth-logo .brand-icon { font-size: 36px; }
        .auth-logo h1 { font-size: 22px; color: #1e1b4b; margin-top: 8px; font-weight: 700; }
        .auth-logo p { font-size: 14px; color: #9ca3af; margin-top: 4px; }
        .form-group { margin-bottom: 22px; }
        .form-label { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        .form-input {
            width: 100%; padding: 13px 16px; border: 2px solid #e5e7eb; border-radius: 8px;
            font-size: 15px; color: #1f2937; outline: none; transition: border-color 0.3s; box-sizing: border-box;
        }
        .form-input:focus { border-color: #6366f1; }
        .form-input::placeholder { color: #d1d5db; }
        .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .form-check { display: flex; align-items: center; gap: 6px; }
        .form-check label { font-size: 13px; color: #6b7280; }
        .forgot-link { font-size: 13px; color: #6366f1; cursor: pointer; }
        .forgot-link:hover { text-decoration: underline; }
        .btn-submit {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff;
            border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer;
            transition: all 0.3s;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99,102,241,0.3); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-wx {
            width: 100%; padding: 14px; background: #07C160; color: #fff;
            border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer;
            transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-wx:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(7,193,96,0.3); }
        .btn-wx:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-wx svg { width: 22px; height: 22px; fill: #fff; }
        .auth-footer { text-align: center; margin-top: 28px; font-size: 14px; color: #6b7280; }
        .auth-footer a { color: #6366f1; font-weight: 600; }
        .auth-footer a:hover { text-decoration: underline; }
        .msg-tip { text-align: center; padding: 10px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; display: none; }
        .msg-tip.success { display: block; background: #ecfdf5; color: #059669; }
        .msg-tip.error { display: block; background: #fef2f2; color: #dc2626; }
        .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; color: #d1d5db; font-size: 13px; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
        .back-home { position: fixed; top: 20px; left: 20px; color: rgba(255,255,255,0.7); font-size: 14px; display: flex; align-items: center; gap: 6px; z-index: 10; }
        .back-home:hover { color: #fff; }
        .input-icon-wrap { position: relative; }
        .input-icon-wrap .form-input { padding-left: 42px; }
        .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 18px; color: #9ca3af; }
        .wx-user-info { text-align: center; margin-bottom: 24px; }
        .wx-user-info img { width: 64px; height: 64px; border-radius: 50%; border: 3px solid #07C160; }
        .wx-user-info p { font-size: 14px; color: #374151; margin-top: 8px; }
        .wx-hint { text-align: center; font-size: 13px; color: #9ca3af; margin-top: 16px; }
        .agreement-link { font-size: 12px; color: #9ca3af; text-align: center; margin-top: 16px; }
        .agreement-link a { color: #6366f1; }
        /* 密码重置表单 */
        .reset-form { display: none; }
        .reset-form.active { display: block; }
        .login-form.hidden { display: none; }
        .sms-group { display: flex; gap: 10px; }
        .sms-group .form-input { flex: 1; }
        .btn-sms {
            padding: 12px 16px; background: #eef2ff; color: #6366f1; border: none; border-radius: 8px;
            font-size: 14px; cursor: pointer; white-space: nowrap; font-weight: 600; transition: all 0.3s;
        }
        .btn-sms:hover { background: #e0e7ff; }
        .btn-sms:disabled { background: #f3f4f6; color: #9ca3af; cursor: not-allowed; }
        .back-to-login { text-align: center; margin-top: 16px; font-size: 13px; color: #6b7280; cursor: pointer; }
        .back-to-login:hover { color: #6366f1; }
    </style>
</head>
<body>
    <a href="/" class="back-home">← 返回首页</a>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <span class="brand-icon">🎬</span>
                <h1>商家登录</h1>
                <p>登录您的大屏互动管理后台</p>
            </div>

            <div class="msg-tip" id="msgTip"></div>

            <!-- 微信用户信息（OAuth回调后显示） -->
            <div class="wx-user-info" id="wxUserInfo" style="display:none">
                <img id="wxAvatar" src="" alt="微信头像">
                <p id="wxNickname"></p>
            </div>

            <!-- ========== 微信环境 ========== -->
            <div id="wxLoginSection" style="display:none">
                <button type="button" class="btn-wx" id="btnWxLogin" onclick="handleWxLogin()">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 01.213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 00.167-.054l1.903-1.114a.864.864 0 01.717-.098 10.16 10.16 0 002.837.403c.276 0 .543-.027.811-.05a6.53 6.53 0 01-.312-2.014c0-3.63 3.478-6.575 7.767-6.575.259 0 .514.013.768.035C16.758 4.59 13.065 2.188 8.691 2.188zm-2.6 4.408c.58 0 1.05.47 1.05 1.05s-.47 1.05-1.05 1.05-1.05-.47-1.05-1.05.47-1.05 1.05-1.05zm5.192 0c.58 0 1.05.47 1.05 1.05s-.47 1.05-1.05 1.05-1.05-.47-1.05-1.05.47-1.05 1.05-1.05zm4.676 4.222c-3.68 0-6.665 2.504-6.665 5.592 0 3.088 2.985 5.592 6.665 5.592a8.65 8.65 0 002.382-.339.726.726 0 01.6.082l1.63.954a.27.27 0 00.14.047c.134 0 .248-.113.248-.252 0-.06-.024-.12-.04-.178l-.332-1.27a.496.496 0 01.179-.56c1.554-1.145 2.543-2.839 2.543-4.715 0-3.088-2.985-5.592-6.665-5.592h-.685zm-2.092 3.188c.486 0 .88.394.88.88s-.394.88-.88.88-.88-.394-.88-.88.394-.88.88-.88zm4.196 0c.486 0 .88.394.88.88s-.394.88-.88.88-.88-.394-.88-.88.394-.88.88-.88z"/></svg>
                    微信授权登录
                </button>
                <div class="agreement-link">
                    登录即表示同意 <a href="javascript:;">《服务协议》</a> 和 <a href="javascript:;">《隐私政策》</a>
                </div>
            </div>

            <!-- ========== PC/非微信环境 ========== -->
            <div id="pcLoginSection" style="display:none">
                <!-- 登录表单 -->
                <form id="loginForm" class="login-form" onsubmit="return handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">用户名 / 手机号</label>
                        <div class="input-icon-wrap">
                            <span class="input-icon">👤</span>
                            <input type="text" class="form-input" id="username" placeholder="请输入用户名或手机号" required autocomplete="username">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <div class="input-icon-wrap">
                            <span class="input-icon">🔒</span>
                            <input type="password" class="form-input" id="password" placeholder="请输入密码" required autocomplete="current-password">
                        </div>
                    </div>

                    <div class="form-options">
                        <div class="form-check">
                            <input type="checkbox" id="remember" checked>
                            <label for="remember">记住登录</label>
                        </div>
                        <a href="javascript:;" class="forgot-link" onclick="showResetForm()">忘记密码？</a>
                    </div>

                    <button type="submit" class="btn-submit" id="btnSubmit">登 录</button>
                </form>

                <!-- 密码重置表单 -->
                <div id="resetForm" class="reset-form">
                    <div class="form-group">
                        <label class="form-label">手机号</label>
                        <div class="input-icon-wrap">
                            <span class="input-icon">📱</span>
                            <input type="tel" class="form-input" id="resetPhone" placeholder="请输入注册手机号" maxlength="11">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">验证码</label>
                        <div class="sms-group">
                            <input type="text" class="form-input" id="resetCode" placeholder="请输入验证码" maxlength="6">
                            <button type="button" class="btn-sms" id="btnSendCode" onclick="sendResetCode()">发送验证码</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">新密码</label>
                        <div class="input-icon-wrap">
                            <span class="input-icon">🔒</span>
                            <input type="password" class="form-input" id="resetPassword" placeholder="请输入新密码（至少6位）" minlength="6">
                        </div>
                    </div>
                    <button type="button" class="btn-submit" id="btnReset" onclick="handleResetPassword()">重置密码</button>
                    <div class="back-to-login" onclick="showLoginForm()">← 返回登录</div>
                </div>

                <div class="wx-hint">
                    💡 推荐使用微信扫码访问，一键授权登录更便捷
                </div>

                <div class="auth-footer">
                    还没有账号？<a href="/register">前往注册</a>
                </div>
            </div>

        </div>
    </div>

    <script>
    var isWechat = /micromessenger/i.test(navigator.userAgent);

    // ============================================================
    // 页面初始化
    // ============================================================
    (function init() {
        // 1. 已有 token → 直接跳后台
        if (localStorage.getItem('hd_token')) {
            window.location.href = '/admin';
            return;
        }

        // 2. URL 含 code → OAuth 回调处理
        var urlParams = new URLSearchParams(window.location.search);
        var code = urlParams.get('code');
        if (code) {
            handleWxCallback(code, urlParams.get('state') || '');
            return;
        }

        // 3. 根据环境显示对应登录方式
        if (isWechat) {
            document.getElementById('wxLoginSection').style.display = 'block';
        } else {
            document.getElementById('pcLoginSection').style.display = 'block';
        }
    })();

    // ============================================================
    // 通用函数
    // ============================================================
    function showMsg(text, type) {
        var tip = document.getElementById('msgTip');
        tip.textContent = text;
        tip.className = 'msg-tip ' + type;
    }

    function clearMsg() {
        var tip = document.getElementById('msgTip');
        tip.className = 'msg-tip';
        tip.textContent = '';
    }

    function saveLoginData(data) {
        if (data.token) localStorage.setItem('hd_token', data.token);
        if (data.bid) localStorage.setItem('hd_bid', data.bid);
        if (data.user_id) localStorage.setItem('hd_user_id', data.user_id);
        if (data.name) localStorage.setItem('hd_name', data.name);
    }

    // ============================================================
    // 微信授权登录
    // ============================================================
    function handleWxLogin() {
        var btn = document.getElementById('btnWxLogin');
        btn.disabled = true;
        btn.innerHTML = '跳转授权中...';

        fetch('/api/hd/auth/wx-oauth-url?redirect_uri=' + encodeURIComponent(window.location.origin + '/login'))
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (res.code === 0 && res.data && res.data.oauth_url) {
                window.location.href = res.data.oauth_url;
            } else {
                showMsg(res.msg || '获取授权地址失败', 'error');
                btn.disabled = false;
                btn.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 01.213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 00.167-.054l1.903-1.114a.864.864 0 01.717-.098 10.16 10.16 0 002.837.403c.276 0 .543-.027.811-.05a6.53 6.53 0 01-.312-2.014c0-3.63 3.478-6.575 7.767-6.575.259 0 .514.013.768.035C16.758 4.59 13.065 2.188 8.691 2.188z"/></svg> 微信授权登录';
            }
        })
        .catch(function() {
            showMsg('网络错误，请重试', 'error');
            btn.disabled = false;
            btn.innerHTML = '微信授权登录';
        });
    }

    // 处理微信 OAuth 回调
    function handleWxCallback(code, state) {
        // 显示微信区域
        document.getElementById('wxLoginSection').style.display = 'block';
        var btn = document.getElementById('btnWxLogin');
        btn.disabled = true;
        btn.textContent = '授权验证中...';
        showMsg('正在验证微信授权...', 'success');

        // 清理 URL 中的 code/state 参数
        var cleanUrl = window.location.origin + window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);

        fetch('/api/hd/auth/wx-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: code, state: state })
        })
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (res.code === 0 && res.data) {
                if (!res.data.need_bind) {
                    // 已绑定 → 直接登录
                    showMsg('登录成功！正在跳转...', 'success');
                    saveLoginData(res.data);
                    setTimeout(function() { window.location.href = '/admin'; }, 800);
                } else {
                    // 未绑定 → 跳转绑定页
                    showMsg('请完善公司信息以完成注册', 'success');
                    localStorage.setItem('hd_bind_token', res.data.bind_token);
                    if (res.data.wx_nickname) localStorage.setItem('hd_wx_nickname', res.data.wx_nickname);
                    if (res.data.wx_avatar) localStorage.setItem('hd_wx_avatar', res.data.wx_avatar);
                    setTimeout(function() { window.location.href = '/register'; }, 1500);
                }
            } else {
                showMsg(res.msg || '授权失败，请重试', 'error');
                btn.disabled = false;
                btn.textContent = '微信授权登录';
            }
        })
        .catch(function() {
            showMsg('网络错误，请重试', 'error');
            btn.disabled = false;
            btn.textContent = '微信授权登录';
        });
    }

    // ============================================================
    // PC端 账号密码登录
    // ============================================================
    function handleLogin(e) {
        e.preventDefault();
        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;

        if (!username) { showMsg('请输入用户名或手机号', 'error'); return false; }
        if (!password) { showMsg('请输入密码', 'error'); return false; }

        var btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.textContent = '登录中...';

        fetch('/api/hd/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username, password: password })
        })
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (res.code === 0) {
                showMsg('登录成功！正在跳转...', 'success');
                if (res.data) saveLoginData(res.data);
                setTimeout(function() { window.location.href = '/admin'; }, 800);
            } else {
                showMsg(res.msg || '登录失败', 'error');
                btn.disabled = false;
                btn.textContent = '登 录';
            }
        })
        .catch(function() {
            showMsg('网络错误，请重试', 'error');
            btn.disabled = false;
            btn.textContent = '登 录';
        });

        return false;
    }

    // ============================================================
    // 密码重置
    // ============================================================
    function showResetForm() {
        clearMsg();
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('resetForm').classList.add('active');
        document.querySelector('.form-options');
    }

    function showLoginForm() {
        clearMsg();
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('resetForm').classList.remove('active');
    }

    var smsCountdown = 0;
    function sendResetCode() {
        var phone = document.getElementById('resetPhone').value.trim();
        if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
            showMsg('请输入正确的手机号', 'error');
            return;
        }
        var btn = document.getElementById('btnSendCode');
        btn.disabled = true;

        fetch('/api/hd/password/send-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: phone })
        })
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (res.code === 0) {
                showMsg('验证码已发送', 'success');
                smsCountdown = 60;
                var timer = setInterval(function() {
                    smsCountdown--;
                    if (smsCountdown <= 0) {
                        clearInterval(timer);
                        btn.textContent = '发送验证码';
                        btn.disabled = false;
                    } else {
                        btn.textContent = smsCountdown + 's';
                    }
                }, 1000);
            } else {
                showMsg(res.msg || '发送失败', 'error');
                btn.disabled = false;
            }
        })
        .catch(function() {
            showMsg('网络错误', 'error');
            btn.disabled = false;
        });
    }

    function handleResetPassword() {
        var phone = document.getElementById('resetPhone').value.trim();
        var code = document.getElementById('resetCode').value.trim();
        var password = document.getElementById('resetPassword').value;

        if (!phone || !/^1[3-9]\d{9}$/.test(phone)) { showMsg('请输入正确的手机号', 'error'); return; }
        if (!code) { showMsg('请输入验证码', 'error'); return; }
        if (!password || password.length < 6) { showMsg('密码至少6位', 'error'); return; }

        var btn = document.getElementById('btnReset');
        btn.disabled = true;
        btn.textContent = '重置中...';

        fetch('/api/hd/password/reset', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: phone, code: code, password: password })
        })
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (res.code === 0) {
                showMsg('密码重置成功，请使用新密码登录', 'success');
                setTimeout(function() { showLoginForm(); }, 2000);
            } else {
                showMsg(res.msg || '重置失败', 'error');
            }
            btn.disabled = false;
            btn.textContent = '重置密码';
        })
        .catch(function() {
            showMsg('网络错误', 'error');
            btn.disabled = false;
            btn.textContent = '重置密码';
        });
    }
    </script>
</body>
</html>
