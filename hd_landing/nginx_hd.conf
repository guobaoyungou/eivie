# =========================================
# 艺为微信大屏互动 - Nginx 配置
# 部署域名: wxhd.eivie.cn
# =========================================

server {
    listen 80;
    server_name wxhd.eivie.cn;
    
    # HTTP 重定向到 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name wxhd.eivie.cn;

    # SSL 证书配置（根据实际路径修改）
    ssl_certificate     /etc/nginx/ssl/hd.eivie.cn.pem;
    ssl_certificate_key /etc/nginx/ssl/hd.eivie.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 根目录 - 官网落地页
    root /home/www/ai.eivie.cn/hd_landing;
    index index.html;

    # 日志
    access_log /var/log/nginx/hd.eivie.cn.access.log;
    error_log  /var/log/nginx/hd.eivie.cn.error.log;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # =============================================
    # 1. 官网静态资源
    # =============================================
    location /static/ {
        root /home/www/ai.eivie.cn/hd_landing;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # =============================================
    # 2. API 路由 - 转发到 ThinkPHP
    # =============================================
    location ~ ^/api/hd/ {
        root /home/www/ai.eivie.cn/public;
        
        try_files $uri $uri/ /index.php?s=$uri&$args;
        
        location ~ \.php$ {
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include        fastcgi_params;
            fastcgi_param  PATH_INFO $fastcgi_path_info;
        }
    }

    # =============================================
    # 3. 活动入口页路由 /s/{access_code}
    # =============================================
    location ~ ^/s/ {
        root /home/www/ai.eivie.cn/public;
        
        try_files $uri $uri/ /index.php?s=$uri&$args;
        
        location ~ \.php$ {
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include        fastcgi_params;
            fastcgi_param  PATH_INFO $fastcgi_path_info;
        }
    }

    # =============================================
    # 4. 商家登录/注册页面
    # =============================================
    location = /login {
        try_files /login.html /index.html =404;
    }
    
    location = /register {
        try_files /register.html /index.html =404;
    }

    # =============================================
    # 5. 商家管理后台
    # =============================================
    location /admin {
        try_files $uri $uri/ /admin/index.html;
    }

    # =============================================
    # 6. 上传文件（奖品图片等本地存储文件）
    # =============================================
    location /upload/ {
        root /home/www/ai.eivie.cn;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # =============================================
    # 7. 活动静态资源（手机端模板 CSS/JS/图片）
    # =============================================
    location /huodong/ {
        alias /home/www/ai.eivie.cn/huodong/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # =============================================
    # 7. 官网页面路由（前端 SPA 风格）
    # =============================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
