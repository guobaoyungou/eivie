<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AI短剧工作流 - 仪表盘</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
<style>
  .wf-dashboard { padding:20px; }
  .wf-dash-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .wf-dash-header h2 { font-size:22px; font-weight:bold; color:#333; }
  .wf-dash-header h2 i { margin-right:8px; color:#1890ff; }

  /* 统计卡片 */
  .stat-cards { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:16px; margin-bottom:24px; }
  .stat-card { background:#fff; border-radius:12px; padding:20px; box-shadow:0 2px 12px rgba(0,0,0,.06); display:flex; align-items:center; gap:16px; transition:transform .2s, box-shadow .2s; }
  .stat-card:hover { transform:translateY(-2px); box-shadow:0 4px 20px rgba(0,0,0,.1); }
  .stat-card .card-icon { width:52px; height:52px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
  .stat-card .card-info .card-value { font-size:28px; font-weight:bold; color:#333; line-height:1.2; }
  .stat-card .card-info .card-label { font-size:13px; color:#888; margin-top:2px; }
  .stat-card .card-info .card-detail { font-size:11px; color:#aaa; margin-top:4px; }
  .icon-projects { background:linear-gradient(135deg,#e6f7ff,#bae7ff); color:#1890ff; }
  .icon-nodes { background:linear-gradient(135deg,#f6ffed,#d9f7be); color:#52c41a; }
  .icon-templates { background:linear-gradient(135deg,#fff7e6,#ffe7ba); color:#fa8c16; }
  .icon-resources { background:linear-gradient(135deg,#f9f0ff,#efdbff); color:#722ed1; }
  .icon-characters { background:linear-gradient(135deg,#fff0f6,#ffd6e7); color:#eb2f96; }
  .icon-success { background:linear-gradient(135deg,#f6ffed,#b7eb8f); color:#389e0d; }

  /* 内容区 */
  .dash-content { display:grid; grid-template-columns:2fr 1fr; gap:20px; }
  @media (max-width:1200px) { .dash-content { grid-template-columns:1fr; } }

  .dash-panel { background:#fff; border-radius:12px; padding:20px; box-shadow:0 2px 12px rgba(0,0,0,.06); }
  .dash-panel .panel-title { font-size:15px; font-weight:bold; color:#333; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; }
  .dash-panel .panel-title span { font-size:12px; color:#888; font-weight:normal; }

  /* 柱状图 */
  .chart-bar-container { display:flex; align-items:flex-end; gap:8px; height:140px; padding:0 8px; }
  .chart-bar-item { flex:1; display:flex; flex-direction:column; align-items:center; }
  .chart-bar-item .bar { width:100%; min-width:24px; max-width:60px; border-radius:6px 6px 0 0; transition:height .5s ease; cursor:pointer; position:relative; }
  .chart-bar-item .bar:hover { opacity:.85; }
  .chart-bar-item .bar .bar-value { position:absolute; top:-18px; left:50%; transform:translateX(-50%); font-size:11px; color:#666; white-space:nowrap; }
  .chart-bar-item .bar-label { font-size:11px; color:#888; margin-top:6px; }

  /* 最近项目 */
  .recent-project-item { display:flex; align-items:center; padding:10px 0; border-bottom:1px solid #f0f0f0; }
  .recent-project-item:last-child { border-bottom:none; }
  .recent-project-item .rp-icon { font-size:20px; margin-right:10px; }
  .recent-project-item .rp-info { flex:1; }
  .recent-project-item .rp-title { font-size:14px; color:#333; font-weight:500; }
  .recent-project-item .rp-meta { font-size:12px; color:#999; margin-top:2px; }
  .recent-project-item .rp-status { font-size:12px; padding:2px 8px; border-radius:10px; }
  .rp-status.draft { background:#f5f5f5; color:#999; }
  .rp-status.running { background:#e6f7ff; color:#1890ff; }
  .rp-status.completed { background:#f6ffed; color:#52c41a; }
  .rp-status.failed { background:#fff2f0; color:#ff4d4f; }

  /* 节点类型分布 */
  .type-dist-list { display:flex; flex-direction:column; gap:8px; }
  .type-dist-item { display:flex; align-items:center; gap:10px; }
  .type-dist-item .td-icon { font-size:18px; }
  .type-dist-item .td-label { font-size:13px; color:#555; min-width:60px; }
  .type-dist-item .td-bar-wrap { flex:1; height:20px; background:#f5f5f5; border-radius:10px; overflow:hidden; }
  .type-dist-item .td-bar { height:100%; border-radius:10px; transition:width .5s ease; display:flex; align-items:center; justify-content:flex-end; padding-right:8px; font-size:11px; color:#fff; min-width:28px; }
  .td-bar.script { background:linear-gradient(90deg,#1890ff,#69c0ff); }
  .td-bar.character { background:linear-gradient(90deg,#722ed1,#b37feb); }
  .td-bar.storyboard { background:linear-gradient(90deg,#fa8c16,#ffc069); }
  .td-bar.video { background:linear-gradient(90deg,#52c41a,#95de64); }
  .td-bar.voice { background:linear-gradient(90deg,#eb2f96,#ff85c0); }
  .td-bar.compose { background:linear-gradient(90deg,#faad14,#ffd666); }

  /* 快速操作 */
  .quick-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .quick-action-btn { display:flex; align-items:center; gap:8px; padding:12px 16px; border-radius:8px; border:1px solid #f0f0f0; cursor:pointer; transition:all .2s; background:#fafafa; text-decoration:none; color:#333; font-size:13px; }
  .quick-action-btn:hover { background:#e6f7ff; border-color:#91d5ff; color:#1890ff; }
  .quick-action-btn .qa-icon { font-size:18px; }

  /* 环形图 */
  .donut-chart-wrap { display:flex; align-items:center; justify-content:center; gap:24px; padding:10px 0; }
  .donut-chart-wrap canvas { flex-shrink:0; }
  .donut-legend { display:flex; flex-direction:column; gap:8px; }
  .donut-legend-item { display:flex; align-items:center; gap:8px; font-size:13px; color:#555; }
  .donut-legend-item .dl-dot { width:12px; height:12px; border-radius:3px; flex-shrink:0; }
  .donut-legend-item .dl-val { font-weight:bold; color:#333; margin-left:auto; min-width:30px; text-align:right; }

  /* 项目时间线 */
  .project-timeline { position:relative; padding-left:24px; }
  .project-timeline::before { content:''; position:absolute; left:8px; top:0; bottom:0; width:2px; background:#f0f0f0; }
  .timeline-item { position:relative; padding:8px 0 16px 20px; }
  .timeline-item::before { content:''; position:absolute; left:-20px; top:12px; width:10px; height:10px; border-radius:50%; border:2px solid #d9d9d9; background:#fff; z-index:1; }
  .timeline-item.status-completed::before { border-color:#52c41a; background:#f6ffed; }
  .timeline-item.status-running::before { border-color:#1890ff; background:#e6f7ff; animation:pulse 1.5s infinite; }
  .timeline-item.status-failed::before { border-color:#ff4d4f; background:#fff2f0; }
  .timeline-item.status-draft::before { border-color:#d9d9d9; background:#fafafa; }
  .timeline-item .tl-title { font-size:14px; font-weight:500; color:#333; }
  .timeline-item .tl-title a { color:#333; text-decoration:none; }
  .timeline-item .tl-title a:hover { color:#1890ff; }
  .timeline-item .tl-meta { font-size:12px; color:#999; margin-top:2px; display:flex; gap:12px; }
  .timeline-item .tl-status { display:inline-block; padding:1px 8px; border-radius:10px; font-size:11px; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }
</style>
</head>
<body>
<div class="layui-fluid">
<div class="wf-dashboard">
  <div class="wf-dash-header">
    <h2><i class="layui-icon layui-icon-chart-screen"></i> AI短剧工作流仪表盘</h2>
    <div>
      <button class="layui-btn layui-btn-sm layui-btn-normal" onclick="location.href='{:url(\"project_list\")}'"><i class="layui-icon layui-icon-list"></i> 项目列表</button>
      <button class="layui-btn layui-btn-sm" onclick="loadDashboard()"><i class="layui-icon layui-icon-refresh"></i> 刷新</button>
    </div>
  </div>

  <!-- 统计卡片 -->
  <div class="stat-cards" id="statCards">
    <div class="stat-card"><div class="card-icon icon-projects">📁</div><div class="card-info"><div class="card-value" id="sc_projects">-</div><div class="card-label">项目总数</div><div class="card-detail" id="sc_projects_detail"></div></div></div>
    <div class="stat-card"><div class="card-icon icon-nodes">🔗</div><div class="card-info"><div class="card-value" id="sc_nodes">-</div><div class="card-label">节点总数</div><div class="card-detail" id="sc_nodes_detail"></div></div></div>
    <div class="stat-card"><div class="card-icon icon-success">✅</div><div class="card-info"><div class="card-value" id="sc_success">-</div><div class="card-label">执行成功</div><div class="card-detail" id="sc_success_detail"></div></div></div>
    <div class="stat-card"><div class="card-icon icon-templates">📋</div><div class="card-info"><div class="card-value" id="sc_templates">-</div><div class="card-label">可用模板</div></div></div>
    <div class="stat-card"><div class="card-icon icon-resources">📦</div><div class="card-info"><div class="card-value" id="sc_resources">-</div><div class="card-label">系统资源</div></div></div>
    <div class="stat-card"><div class="card-icon icon-characters">🎭</div><div class="card-info"><div class="card-value" id="sc_characters">-</div><div class="card-label">角色身份卡</div></div></div>
  </div>

  <!-- 内容区 -->
  <div class="dash-content">
    <div style="display:flex;flex-direction:column;gap:20px;">
      <!-- 7天执行趋势 -->
      <div class="dash-panel">
        <div class="panel-title">📊 近7天执行趋势 <span>节点执行次数统计</span></div>
        <div class="chart-bar-container" id="execChart"></div>
      </div>

      <!-- 环形成功率图 -->
      <div class="dash-panel">
        <div class="panel-title">🎯 节点执行成功率 <span id="donutRateText"></span></div>
        <div class="donut-chart-wrap">
          <canvas id="donutCanvas" width="160" height="160"></canvas>
          <div class="donut-legend" id="donutLegend"></div>
        </div>
      </div>

      <!-- 节点类型分布 -->
      <div class="dash-panel">
        <div class="panel-title">🧩 节点类型分布 <span id="nodeTypeTotal"></span></div>
        <div class="type-dist-list" id="typeDistList"></div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:20px;">
      <!-- 项目时间线 -->
      <div class="dash-panel">
        <div class="panel-title">📅 项目时间线 <span><a href="{:url('project_list')}" style="color:#1890ff;">查看全部 →</a></span></div>
        <div class="project-timeline" id="projectTimeline"><div style="color:#999;text-align:center;padding:20px;">加载中...</div></div>
      </div>

      <!-- 快速操作 -->
      <div class="dash-panel">
        <div class="panel-title">⚡ 快速操作</div>
        <div class="quick-actions">
          <a class="quick-action-btn" href="{:url('project_list')}"><span class="qa-icon">➕</span> 新建项目</a>
          <a class="quick-action-btn" href="{:url('template_list')}"><span class="qa-icon">📋</span> 模板库</a>
          <a class="quick-action-btn" href="{:url('resource_list')}"><span class="qa-icon">📦</span> 资源管理</a>
          <a class="quick-action-btn" href="javascript:;" onclick="importProjectFromDash()"><span class="qa-icon">📥</span> 导入项目</a>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

{include file="public/js"/}
<script>
var statusTextMap = {'draft':'草稿','running':'运行中','completed':'已完成','failed':'失败'};
var nodeTypeIconMap = {'script':'📝','character':'🎭','storyboard':'🎬','video':'📹','voice':'🔊','compose':'🎞️'};
var nodeTypeLabelMap = {'script':'剧本','character':'角色','storyboard':'分镜','video':'视频','voice':'配音','compose':'合成'};

function loadDashboard() {
  $.get("{:url('dashboard')}", function(res) {
    if (res.status != 1) return;
    var d = res.data;

    // 统计卡片
    $('#sc_projects').text(d.total_projects);
    var ps = d.project_stats;
    $('#sc_projects_detail').text('草稿:' + (ps.draft||0) + ' 运行:' + (ps.running||0) + ' 完成:' + (ps.completed||0));

    $('#sc_nodes').text(d.total_nodes);
    var ns = d.node_stats;
    $('#sc_nodes_detail').text('空闲:' + (ns.idle||0) + ' 运行:' + (ns.running||0));

    var successRate = d.total_nodes > 0 ? Math.round((ns.succeeded||0)/d.total_nodes*100) : 0;
    $('#sc_success').text((ns.succeeded||0));
    $('#sc_success_detail').text('成功率: ' + successRate + '% | 失败: ' + (ns.failed||0));

    $('#sc_templates').text(d.total_templates);
    $('#sc_resources').text(d.total_resources);
    $('#sc_characters').text(d.total_characters);

    // 7天执行趋势柱状图
    var chart = document.getElementById('execChart');
    var maxVal = 1;
    Object.values(d.daily_exec).forEach(function(v) { if (v > maxVal) maxVal = v; });
    var colors = ['#e6f7ff','#bae7ff','#91d5ff','#69c0ff','#40a9ff','#1890ff','#096dd9'];
    var html = '';
    var i = 0;
    Object.keys(d.daily_exec).forEach(function(day) {
      var val = d.daily_exec[day];
      var h = Math.max(4, (val / maxVal) * 120);
      html += '<div class="chart-bar-item">' +
        '<div class="bar" style="height:'+h+'px;background:'+colors[i%7]+';">' +
        '<span class="bar-value">'+(val||'')+'</span>' +
        '</div>' +
        '<span class="bar-label">'+day.substring(5)+'</span></div>';
      i++;
    });
    chart.innerHTML = html;

    // 节点类型分布
    var distList = document.getElementById('typeDistList');
    var maxType = 1;
    d.node_type_counts.forEach(function(t) { if (t.cnt > maxType) maxType = t.cnt; });
    var distHtml = '';
    ['script','character','storyboard','video','voice','compose'].forEach(function(type) {
      var cnt = 0;
      d.node_type_counts.forEach(function(t) { if (t.node_type === type) cnt = t.cnt; });
      var pct = Math.max(5, (cnt / maxType) * 100);
      distHtml += '<div class="type-dist-item">' +
        '<span class="td-icon">'+(nodeTypeIconMap[type]||'')+'</span>' +
        '<span class="td-label">'+(nodeTypeLabelMap[type]||type)+'</span>' +
        '<div class="td-bar-wrap"><div class="td-bar '+type+'" style="width:'+pct+'%;">'+cnt+'</div></div></div>';
    });
    distList.innerHTML = distHtml;
    document.getElementById('nodeTypeTotal').textContent = '共 ' + d.total_nodes + ' 个节点';

    // 最近项目 -> 项目时间线
    var tlHtml = '';
    if (d.recent_projects.length === 0) {
      tlHtml = '<div style="color:#999;text-align:center;padding:20px;">暂无项目</div>';
    } else {
      d.recent_projects.forEach(function(p) {
        var statusCls = p.status || 'draft';
        var statusColors = {draft:'#d9d9d9;color:#999',running:'#e6f7ff;color:#1890ff',completed:'#f6ffed;color:#52c41a',failed:'#fff2f0;color:#ff4d4f'};
        tlHtml += '<div class="timeline-item status-'+statusCls+'">' +
          '<div class="tl-title"><a href="{:url(\'canvas\')}&id='+p.id+'">🎬 '+p.title+'</a> ' +
          '<span class="tl-status" style="background:'+(statusColors[statusCls]||'#f5f5f5;color:#999')+';">'+(statusTextMap[statusCls]||statusCls)+'</span></div>' +
          '<div class="tl-meta"><span>🕗 '+p.update_time_text+'</span><span>🔗 '+p.node_count+'个节点</span><span>🎨 '+(p.creation_mode||'-')+'</span></div></div>';
      });
    }
    document.getElementById('projectTimeline').innerHTML = tlHtml;

    // 环形成功率图
    drawDonutChart(ns);
  });
}

function importProjectFromDash() {
  layer.open({
    type: 2,
    title: '导入项目',
    area: ['600px','400px'],
    content: '{:url("project_list")}',
    end: function() { loadDashboard(); }
  });
}

function drawDonutChart(ns) {
  var canvas = document.getElementById('donutCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var cx = 80, cy = 80, r = 60, lw = 20;
  ctx.clearRect(0, 0, 160, 160);

  var segments = [
    { label: '成功', value: ns.succeeded || 0, color: '#52c41a' },
    { label: '失败', value: ns.failed || 0, color: '#ff4d4f' },
    { label: '运行中', value: (ns.running || 0) + (ns.polling || 0), color: '#1890ff' },
    { label: '已配置', value: ns.configured || 0, color: '#faad14' },
    { label: '空闲', value: ns.idle || 0, color: '#d9d9d9' },
  ];

  var total = 0;
  segments.forEach(function(s) { total += s.value; });
  if (total === 0) total = 1;

  var rate = total > 0 ? Math.round((ns.succeeded||0)/total*100) : 0;
  document.getElementById('donutRateText').textContent = '成功率 ' + rate + '%';

  var startAngle = -Math.PI / 2;
  segments.forEach(function(seg) {
    if (seg.value === 0) return;
    var sliceAngle = (seg.value / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.arc(cx, cy, r, startAngle, startAngle + sliceAngle);
    ctx.lineWidth = lw;
    ctx.strokeStyle = seg.color;
    ctx.stroke();
    startAngle += sliceAngle;
  });

  // 中心文字
  ctx.fillStyle = '#333'; ctx.font = 'bold 22px Arial'; ctx.textAlign = 'center';
  ctx.fillText(rate + '%', cx, cy + 3);
  ctx.fillStyle = '#999'; ctx.font = '11px Arial';
  ctx.fillText('成功率', cx, cy + 18);

  // 图例
  var legendHtml = '';
  segments.forEach(function(seg) {
    if (seg.value === 0 && seg.label !== '成功') return;
    legendHtml += '<div class="donut-legend-item">' +
      '<span class="dl-dot" style="background:'+seg.color+'"></span>' +
      '<span>'+seg.label+'</span>' +
      '<span class="dl-val">'+seg.value+'</span></div>';
  });
  document.getElementById('donutLegend').innerHTML = legendHtml;
}

$(function() { loadDashboard(); });
</script>
</body>
</html>
