<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>场景配置（新版）</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
  <style>
    .step-wizard {
      margin-bottom: 20px;
    }
    .step-item {
      display: inline-block;
      width: 23%;
      text-align: center;
      position: relative;
      padding: 15px 10px;
    }
    .step-item:not(:last-child):after {
      content: '';
      position: absolute;
      right: -2%;
      top: 30px;
      width: 4%;
      height: 2px;
      background: #e2e2e2;
    }
    .step-item.active {
      color: #16b777;
      font-weight: bold;
    }
    .step-item.active:after {
      background: #16b777;
    }
    .step-item .step-number {
      display: inline-block;
      width: 30px;
      height: 30px;
      line-height: 30px;
      border-radius: 50%;
      background: #e2e2e2;
      color: #666;
      margin-bottom: 5px;
    }
    .step-item.active .step-number {
      background: #16b777;
      color: #fff;
    }
    .step-item.completed .step-number {
      background: #5FB878;
      color: #fff;
    }
    .scene-type-card {
      border: 2px solid #e2e2e2;
      border-radius: 5px;
      padding: 15px;
      margin: 10px 0;
      cursor: pointer;
      transition: all 0.3s;
    }
    .scene-type-card:hover {
      border-color: #16b777;
      box-shadow: 0 2px 8px rgba(22,183,119,0.2);
    }
    .scene-type-card.selected {
      border-color: #16b777;
      background: #f0f9ff;
    }
    .scene-type-card .type-name {
      font-size: 16px;
      font-weight: bold;
      color: #333;
      margin-bottom: 8px;
    }
    .scene-type-card .type-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
    }
    .scene-type-card .type-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 12px;
      margin-right: 5px;
    }
    .scene-type-card .badge-input {
      background: #e8f4ff;
      color: #1e9fff;
    }
    .scene-type-card .badge-output {
      background: #fff7e6;
      color: #ff9800;
    }
    .param-group {
      border: 1px solid #e6e6e6;
      border-radius: 4px;
      padding: 15px;
      margin: 15px 0;
      background: #fafafa;
    }
    .param-group-title {
      font-weight: bold;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px dashed #d2d2d2;
    }
    .image-upload-area {
      border: 2px dashed #d2d2d2;
      border-radius: 4px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .image-upload-area:hover {
      border-color: #16b777;
    }
    .image-upload-area .upload-icon {
      font-size: 48px;
      color: #d2d2d2;
    }
    .image-preview {
      max-width: 200px;
      max-height: 200px;
      margin: 10px 0;
    }
    .layui-imgbox .layui-imgbox-close {
      z-index: 6;
    }
  </style>
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
        <div class="layui-card-header">
          <i class="fa fa-cog"></i> {if empty($info['id'])}新建场景配置{else}编辑场景配置{/if}
          <i class="layui-icon layui-icon-close" style="font-size:18px;font-weight:bold;cursor:pointer;float:right;" onclick="closeself()"></i>
        </div>
        <div class="layui-card-body" pad15>
          <!-- 步骤向导 -->
          <div class="step-wizard">
            <div class="step-item active" id="step1">
              <div class="step-number">1</div>
              <div class="step-title">选择模型</div>
            </div>
            <div class="step-item" id="step2">
              <div class="step-number">2</div>
              <div class="step-title">选择场景类型</div>
            </div>
            <div class="step-item" id="step3">
              <div class="step-number">3</div>
              <div class="step-title">配置参数</div>
            </div>
            <div class="step-item" id="step4">
              <div class="step-number">4</div>
              <div class="step-title">完成配置</div>
            </div>
          </div>

          <form class="layui-form" lay-filter="sceneConfigForm">
            <input type="hidden" name="id" value="{$info.id|default=0}">
            <input type="hidden" name="aid" value="{$aid}">
            <input type="hidden" name="bid" value="{$bid}">
            
            <!-- 步骤1: 选择模型 -->
            <div id="stepContent1" class="step-content">
              <div class="layui-form-item">
                <label class="layui-form-label"><span style="color:red;">*</span> AI模型：</label>
                <div class="layui-input-block" style="max-width: 600px;">
                  <select name="model_id" lay-filter="model_id" lay-verify="required">
                    <option value="">请选择AI模型...</option>
                  </select>
                </div>
                <div class="layui-form-mid layui-word-aux" style="display:block; margin-top:5px; margin-left:110px;">
                  <span style="color:#999;">选择要使用的AI模型，不同模型支持不同的场景类型</span>
                </div>
              </div>
              
              <div class="layui-form-item">
                <div class="layui-input-block" style="margin-left:110px;">
                  <button type="button" class="layui-btn" onclick="nextStep(2)">下一步</button>
                </div>
              </div>
            </div>

            <!-- 步骤2: 选择场景类型 -->
            <div id="stepContent2" class="step-content" style="display:none;">
              <div class="layui-form-item">
                <label class="layui-form-label"><span style="color:red;">*</span> 场景类型：</label>
                <div class="layui-input-block" style="max-width: 800px;">
                  <input type="hidden" name="scene_type" id="scene_type_input">
                  <div id="sceneTypeList">
                    <!-- 动态加载场景类型卡片 -->
                  </div>
                </div>
              </div>
              
              <div class="layui-form-item">
                <div class="layui-input-block" style="margin-left:110px;">
                  <button type="button" class="layui-btn layui-btn-primary" onclick="prevStep(1)">上一步</button>
                  <button type="button" class="layui-btn" onclick="nextStep(3)" style="margin-left:10px;">下一步</button>
                </div>
              </div>
            </div>

            <!-- 步骤3: 配置参数 -->
            <div id="stepContent3" class="step-content" style="display:none;">
              <!-- API配置选择 -->
              <div class="layui-form-item">
                <label class="layui-form-label"><span style="color:red;">*</span> API配置：</label>
                <div class="layui-input-inline" style="width: 400px;">
                  <select name="api_config_id" lay-verify="required">
                    <option value="">请选择API配置...</option>
                  </select>
                </div>
                <div class="layui-form-mid layui-word-aux">选择该模型对应的API密钥配置</div>
              </div>

              <!-- 基础信息 -->
              <div class="param-group">
                <div class="param-group-title">场景基础信息</div>
                
                <div class="layui-form-item">
                  <label class="layui-form-label"><span style="color:red;">*</span> 场景名称：</label>
                  <div class="layui-input-inline" style="width: 400px;">
                    <input type="text" name="scene_name" value="{$info.scene_name|default=''}" lay-verify="required" placeholder="请输入场景名称" class="layui-input">
                  </div>
                </div>

                <div class="layui-form-item">
                  <label class="layui-form-label">场景分类：</label>
                  <div class="layui-input-inline">
                    <select name="category">
                      <option value="">请选择分类</option>
                      <option value="风景">风景</option>
                      <option value="人物">人物</option>
                      <option value="创意">创意</option>
                      <option value="节日">节日</option>
                      <option value="古风">古风</option>
                      <option value="现代">现代</option>
                    </select>
                  </div>
                </div>
              </div>

              <!-- 动态参数区域 -->
              <div id="dynamicParamsArea"></div>

              <!-- 高级选项 -->
              <div class="param-group">
                <div class="param-group-title">高级选项</div>
                
                <div class="layui-form-item">
                  <label class="layui-form-label">所属门店：</label>
                  <div class="layui-input-inline">
                    <select name="mdid">
                      <option value="0">未关联门店（全商家可用）</option>
                    </select>
                  </div>
                </div>

                <div class="layui-form-item">
                  <label class="layui-form-label">排序权重：</label>
                  <div class="layui-input-inline">
                    <input type="number" name="sort" value="100" class="layui-input" placeholder="数字越大越靠前">
                  </div>
                </div>

                <div class="layui-form-item">
                  <label class="layui-form-label">是否公开：</label>
                  <div class="layui-input-inline">
                    <input type="checkbox" name="is_public" value="1" lay-skin="switch" lay-text="是|否">
                  </div>
                  <div class="layui-form-mid layui-word-aux">开启后C端用户可见</div>
                </div>

                <div class="layui-form-item">
                  <label class="layui-form-label">是否推荐：</label>
                  <div class="layui-input-inline">
                    <input type="checkbox" name="is_recommend" value="1" lay-skin="switch" lay-text="是|否">
                  </div>
                </div>

                <div class="layui-form-item">
                  <label class="layui-form-label">状态：</label>
                  <div class="layui-input-inline">
                    <input type="radio" name="status" value="1" title="启用" checked>
                    <input type="radio" name="status" value="0" title="禁用">
                  </div>
                </div>
              </div>
              
              <div class="layui-form-item">
                <div class="layui-input-block" style="margin-left:110px;">
                  <button type="button" class="layui-btn layui-btn-primary" onclick="prevStep(2)">上一步</button>
                  <button type="button" class="layui-btn" lay-submit lay-filter="formSubmit" style="margin-left:10px;">保存配置</button>
                </div>
              </div>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>

  {include file="public/js"/}
  <script>
layui.use(['form', 'layer', 'upload'], function(){
  var form = layui.form;
  var layer = layui.layer;
  var upload = layui.upload;
  var $ = layui.$;
  
  // 全局变量
  var currentStep = 1;
  var selectedModel = null;
  var selectedSceneType = null;
  var sceneTypeMetadata = null;
  
  // 初始化
  $(function(){
    loadModelList();
  });
  
  /**
   * 加载模型列表
   */
  function loadModelList() {
    $.ajax({
      url: '{:url("AiTravelPhoto/get_model_list")}',
      type: 'GET',
      dataType: 'json',
      success: function(res) {
        console.log('模型列表加载成功:', res);
        if (res.code === 0 && res.data && res.data.length > 0) {
          var html = '<option value="">请选择AI模型...</option>';
          res.data.forEach(function(model) {
            html += '<option value="' + model.id + '" data-provider="' + model.provider + '" data-capabilities=\'' + JSON.stringify(model.capability_tags) + '\'>' 
                  + model.model_name + ' (' + model.provider + ')</option>';
          });
          $('select[name="model_id"]').html(html);
          form.render('select');
        } else {
          layer.msg('暂无可用模型，请先配置AI模型');
        }
      },
      error: function() {
        layer.msg('加载模型列表失败');
      }
    });
  }
  
  /**
   * 监听模型选择
   */
  form.on('select(model_id)', function(data){
    var modelId = data.value;
    if (modelId) {
      selectedModel = {
        id: modelId,
        name: $(data.elem).find('option:selected').text(),
        provider: $(data.elem).find('option:selected').data('provider'),
        capabilities: $(data.elem).find('option:selected').data('capabilities')
      };
      console.log('已选择模型:', selectedModel);
    }
  });
  
  /**
   * 下一步
   */
  window.nextStep = function(step) {
    // 验证当前步骤
    if (step === 2) {
      if (!selectedModel || !selectedModel.id) {
        layer.msg('请先选择AI模型');
        return;
      }
      loadSceneTypes(selectedModel.id);
    } else if (step === 3) {
      if (!selectedSceneType) {
        layer.msg('请先选择场景类型');
        return;
      }
      loadApiConfigs(selectedModel.id);
      renderDynamicParams();
    }
    
    // 切换步骤
    $('#stepContent' + currentStep).hide();
    $('#step' + currentStep).removeClass('active').addClass('completed');
    
    currentStep = step;
    $('#stepContent' + currentStep).show();
    $('#step' + currentStep).addClass('active');
    
    // 滚动到顶部
    $('html, body').animate({scrollTop: 0}, 300);
  };
  
  /**
   * 上一步
   */
  window.prevStep = function(step) {
    $('#stepContent' + currentStep).hide();
    $('#step' + currentStep).removeClass('active');
    
    currentStep = step;
    $('#stepContent' + currentStep).show();
    $('#step' + currentStep).addClass('active').removeClass('completed');
    
    $('html, body').animate({scrollTop: 0}, 300);
  };
  
  /**
   * 加载场景类型
   */
  function loadSceneTypes(modelId) {
    $.ajax({
      url: '{:url("AiTravelPhoto/get_scene_types")}',
      type: 'GET',
      data: {model_id: modelId},
      dataType: 'json',
      success: function(res) {
        console.log('场景类型加载成功:', res);
        if (res.code === 0 && res.data && res.data.length > 0) {
          renderSceneTypeCards(res.data);
        } else {
          layer.msg('该模型暂无支持的场景类型');
          $('#sceneTypeList').html('<div style="padding:20px;text-align:center;color:#999;">该模型暂无支持的场景类型</div>');
        }
      },
      error: function() {
        layer.msg('加载场景类型失败');
      }
    });
  }
  
  /**
   * 渲染场景类型卡片
   */
  function renderSceneTypeCards(sceneTypes) {
    var html = '';
    sceneTypes.forEach(function(type) {
      var inputBadges = '';
      var formTemplate = type.form_template || {};
      var requiredParams = formTemplate.required_params || [];
      
      requiredParams.forEach(function(param) {
        inputBadges += '<span class="type-badge badge-input">' + param + '</span>';
      });
      
      var outputBadge = '<span class="type-badge badge-output">' + (type.output_type === 'single_image' ? '单图' : '多图') + '</span>';
      
      html += '<div class="scene-type-card" data-scene-type="' + type.scene_type + '" data-scene-data=\'' + JSON.stringify(type) + '\'>' +
              '<div class="type-name">' + type.scene_name + '</div>' +
              '<div class="type-desc">' + type.description + '</div>' +
              '<div style="margin-top:10px;">' +
              '<span style="color:#999;font-size:12px;">输入:</span> ' + inputBadges +
              ' <span style="color:#999;font-size:12px;margin-left:10px;">输出:</span> ' + outputBadge +
              '</div>' +
              '</div>';
    });
    
    $('#sceneTypeList').html(html);
    
    // 绑定点击事件
    $('.scene-type-card').on('click', function(){
      $('.scene-type-card').removeClass('selected');
      $(this).addClass('selected');
      
      var sceneType = $(this).data('scene-type');
      var sceneData = $(this).data('scene-data');
      
      selectedSceneType = sceneType;
      sceneTypeMetadata = sceneData;
      $('#scene_type_input').val(sceneType);
      
      console.log('已选择场景类型:', selectedSceneType, sceneTypeMetadata);
    });
  }
  
  /**
   * 加载API配置列表
   */
  function loadApiConfigs(modelId) {
    $.ajax({
      url: '{:url("AiTravelPhoto/get_api_config_list")}',
      type: 'GET',
      data: {model_id: modelId},
      dataType: 'json',
      success: function(res) {
        console.log('API配置列表加载成功:', res);
        if (res.code === 0 && res.data) {
          var html = '<option value="">请选择API配置...</option>';
          res.data.forEach(function(config) {
            html += '<option value="' + config.id + '">' + config.api_name + ' (' + config.provider + ')</option>';
          });
          $('select[name="api_config_id"]').html(html);
          form.render('select');
        }
      },
      error: function() {
        layer.msg('加载API配置失败');
      }
    });
  }
  
  /**
   * 渲染动态参数表单
   */
  function renderDynamicParams() {
    if (!sceneTypeMetadata || !sceneTypeMetadata.form_template) {
      return;
    }
    
    var formTemplate = sceneTypeMetadata.form_template;
    var requiredParams = formTemplate.required_params || [];
    var optionalParams = formTemplate.optional_params || [];
    
    var html = '';
    
    // 必填参数组
    if (requiredParams.length > 0) {
      html += '<div class="param-group">' +
              '<div class="param-group-title">必填参数</div>';
      
      requiredParams.forEach(function(paramName) {
        html += renderParamField(paramName, true, formTemplate);
      });
      
      html += '</div>';
    }
    
    // 可选参数组
    if (optionalParams.length > 0) {
      html += '<div class="param-group">' +
              '<div class="param-group-title">可选参数</div>';
      
      optionalParams.forEach(function(paramName) {
        html += renderParamField(paramName, false, formTemplate);
      });
      
      html += '</div>';
    }
    
    $('#dynamicParamsArea').html(html);
    form.render();
  }
  
  /**
   * 渲染单个参数字段
   */
  function renderParamField(paramName, isRequired, formTemplate) {
    var html = '';
    var requiredStar = isRequired ? '<span style="color:red;">*</span> ' : '';
    var layVerify = isRequired ? 'lay-verify="required"' : '';
    
    // 处理不同参数类型
    switch(paramName) {
      case 'prompt':
        html = '<div class="layui-form-item">' +
               '<label class="layui-form-label">' + requiredStar + '提示词：</label>' +
               '<div class="layui-input-block" style="max-width:600px;">' +
               '<textarea name="model_params[prompt]" placeholder="描述想要生成的图像内容" class="layui-textarea" ' + layVerify + '></textarea>' +
               '<div class="layui-form-mid layui-word-aux">描述想要生成的图像内容，支持中英文</div>' +
               '</div>' +
               '</div>';
        break;
      
      case 'negative_prompt':
        html = '<div class="layui-form-item">' +
               '<label class="layui-form-label">负面提示词：</label>' +
               '<div class="layui-input-block" style="max-width:600px;">' +
               '<textarea name="model_params[negative_prompt]" placeholder="排除不想要的元素" class="layui-textarea"></textarea>' +
               '</div>' +
               '</div>';
        break;
      
      case 'image':
        html = '<div class="layui-form-item">' +
               '<label class="layui-form-label">' + requiredStar + '参考图：</label>' +
               '<div class="layui-input-block" style="max-width:600px;">' +
               '<input type="text" name="reference_image" class="layui-input" placeholder="请上传参考图" ' + layVerify + '>' +
               '<button type="button" class="layui-btn layui-btn-sm" style="margin-top:10px;" onclick="uploadImage(\'reference_image\')">上传图片</button>' +
               '</div>' +
               '</div>';
        break;
      
      case 'image[]':
        html = '<div class="layui-form-item">' +
               '<label class="layui-form-label">' + requiredStar + '参考图（多张）：</label>' +
               '<div class="layui-input-block" style="max-width:600px;">' +
               '<div id="multiImagePreview"></div>' +
               '<button type="button" class="layui-btn layui-btn-sm" onclick="uploadMultiImages()">上传多张图片（1-10张）</button>' +
               '<input type="hidden" name="model_params[image]" id="multiImageInput" ' + layVerify + '>' +
               '</div>' +
               '</div>';
        break;
      
      case 'n':
        var maxN = formTemplate.n_range ? formTemplate.n_range[1] : 6;
        html = '<div class="layui-form-item">' +
               '<label class="layui-form-label">' + requiredStar + '生成数量：</label>' +
               '<div class="layui-input-inline">' +
               '<input type="number" name="model_params[n]" value="1" min="1" max="' + maxN + '" class="layui-input" ' + layVerify + '>' +
               '</div>' +
               '<div class="layui-form-mid layui-word-aux">1-' + maxN + '张</div>' +
               '</div>';
        break;
      
      case 'sequential_image_generation_options':
        var maxImages = formTemplate.max_images_range ? formTemplate.max_images_range[1] : 10;
        html = '<div class="layui-form-item">' +
               '<label class="layui-form-label">' + requiredStar + '生成数量：</label>' +
               '<div class="layui-input-inline">' +
               '<input type="number" name="model_params[sequential_image_generation_options][max_images]" value="1" min="1" max="' + maxImages + '" class="layui-input" ' + layVerify + '>' +
               '</div>' +
               '<div class="layui-form-mid layui-word-aux">1-' + maxImages + '张</div>' +
               '</div>';
        break;
      
      case 'size':
        html = '<div class="layui-form-item">' +
               '<label class="layui-form-label">输出尺寸：</label>' +
               '<div class="layui-input-inline">' +
               '<select name="model_params[size]">' +
               '<option value="2K">2K</option>' +
               '<option value="4K">4K</option>' +
               '<option value="1024*1024">1024×1024</option>' +
               '<option value="1024*1536">1024×1536</option>' +
               '<option value="1536*1024">1536×1024</option>' +
               '</select>' +
               '</div>' +
               '</div>';
        break;
      
      case 'watermark':
        html = '<div class="layui-form-item">' +
               '<label class="layui-form-label">水印：</label>' +
               '<div class="layui-input-inline">' +
               '<input type="checkbox" name="model_params[watermark]" value="false" lay-skin="switch" lay-text="开启|关闭">' +
               '</div>' +
               '</div>';
        break;
      
      default:
        html = '<div class="layui-form-item">' +
               '<label class="layui-form-label">' + requiredStar + paramName + '：</label>' +
               '<div class="layui-input-inline">' +
               '<input type="text" name="model_params[' + paramName + ']" class="layui-input" ' + layVerify + '>' +
               '</div>' +
               '</div>';
    }
    
    return html;
  }
  
  /**
   * 上传单张图片
   */
  window.uploadImage = function(inputName) {
    layer.msg('请使用现有的图片上传功能');
  };
  
  /**
   * 上传多张图片
   */
  window.uploadMultiImages = function() {
    layer.msg('请使用现有的图片上传功能');
  };
  
  /**
   * 表单提交
   */
  form.on('submit(formSubmit)', function(data){
    console.log('提交数据:', data.field);
    
    var loadIndex = layer.load(2, {shade: [0.3, '#000']});
    
    $.ajax({
      url: '{:url("AiTravelPhoto/scene_config_save")}',
      type: 'POST',
      data: data.field,
      dataType: 'json',
      success: function(res) {
        layer.close(loadIndex);
        if (res.code === 0) {
          layer.msg('保存成功', {icon: 1}, function(){
            var index = parent.layer.getFrameIndex(window.name);
            parent.layer.close(index);
            parent.location.reload();
          });
        } else {
          layer.msg(res.msg || '保存失败', {icon: 2});
        }
      },
      error: function() {
        layer.close(loadIndex);
        layer.msg('保存失败，请重试', {icon: 2});
      }
    });
    
    return false;
  });
  
});

// 关闭窗口
function closeself() {
  var index = parent.layer.getFrameIndex(window.name);
  parent.layer.close(index);
}
  </script>
