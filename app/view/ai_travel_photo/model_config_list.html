<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>模型配置管理</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    {include file="public/css"/}
</head>
<body>
<div class="layui-fluid">
    <div class="layui-card">
        <div class="layui-card-header">
            <h3>模型配置管理</h3>
        </div>
        <div class="layui-card-body">
            <!-- 搜索栏 -->
            <div class="layui-form" lay-filter="search-form">
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label">模型名称</label>
                        <div class="layui-input-inline">
                            <input type="text" name="model_name" placeholder="模型名称" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">模型代码</label>
                        <div class="layui-input-inline">
                            <input type="text" name="model_code" placeholder="模型代码" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">服务商</label>
                        <div class="layui-input-inline">
                            <select name="provider">
                                <option value="">全部</option>
                                {volist name="providers" id="vo"}
                                <option value="{$key}">{$vo}</option>
                                {/volist}
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">状态</label>
                        <div class="layui-input-inline">
                            <select name="is_active">
                                <option value="">全部</option>
                                <option value="1">激活</option>
                                <option value="0">停用</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <button class="layui-btn" lay-submit lay-filter="search-btn">搜索</button>
                        <button class="layui-btn layui-btn-primary" id="reset-btn">重置</button>
                    </div>
                    <div class="layui-inline" style="float: right;">
                        <button class="layui-btn layui-btn-normal" id="add-btn">
                            <i class="layui-icon layui-icon-add-1"></i> 新增模型
                        </button>
                    </div>
                </div>
            </div>

            <!-- 数据表格 -->
            <table class="layui-hide" id="model-table" lay-filter="model-table"></table>
        </div>
    </div>
</div>

<!-- 表格操作列模板 -->
<script type="text/html" id="toolbar-tpl">
    <a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="params">参数</a>
    <a class="layui-btn layui-btn-xs layui-btn-warm" lay-event="responses">响应</a>
    {{# if (d.is_system == 0) { }}
    <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
    {{# } }}
</script>

<!-- 状态显示模板 -->
<script type="text/html" id="status-tpl">
    {{# if (d.is_active == 1) { }}
    <span class="layui-badge layui-bg-green">激活</span>
    {{# } else { }}
    <span class="layui-badge">停用</span>
    {{# } }}
</script>

<!-- 计费模式模板 -->
<script type="text/html" id="billing-tpl">
    {{# if (d.billing_mode == 'fixed') { }}
    <span class="layui-badge layui-bg-blue">固定</span>
    {{# } else if (d.billing_mode == 'token') { }}
    <span class="layui-badge layui-bg-cyan">Token</span>
    {{# } else { }}
    <span class="layui-badge layui-bg-orange">时长</span>
    {{# } }}
</script>

{include file="public/js"/}
<script>
var tableIns;
layui.use(['table', 'form', 'layer'], function(){
    var table = layui.table;
    var form = layui.form;
    var layer = layui.layer;
    var $ = layui.$;

    // 渲染表格
    tableIns = table.render({
        elem: '#model-table',
        url: '{:url("index")}',
        page: true,
        limit: 15,
        limits: [10, 15, 20, 50, 100],
        cols: [[
            {field: 'id', title: 'ID', width: 60, sort: true},
            {field: 'model_name', title: '模型名称', width: 200},
            {field: 'model_code', title: '模型代码', width: 180},
            {field: 'model_version', title: '版本', width: 80},
            {field: 'provider', title: '服务商', width: 100},
            {field: 'billing_mode', title: '计费', width: 80, templet: '#billing-tpl'},
            {field: 'cost_per_call', title: '成本价', width: 90, templet: function(d){
                return '¥' + d.cost_per_call;
            }},
            {field: 'is_active', title: '状态', width: 70, templet: '#status-tpl'},
            {field: 'sort', title: '排序', width: 70},
            {title: '操作', width: 220, align: 'center', toolbar: '#toolbar-tpl', fixed: 'right'}
        ]],
        done: function(res, curr, count) {
            // 表格渲染完成回调
        }
    });

    // 搜索
    form.on('submit(search-btn)', function(data){
        table.reload('model-table', {
            where: data.field,
            page: {curr: 1}
        });
        return false;
    });

    // 重置
    $('#reset-btn').click(function(){
        $('input[name="model_name"]').val('');
        $('input[name="model_code"]').val('');
        $('select[name="provider"]').val('');
        $('select[name="is_active"]').val('');
        form.render('select');
        table.reload('model-table', {
            where: {},
            page: {curr: 1}
        });
    });

    // 新增
    $('#add-btn').click(function(){
        openmax('{:url("edit")}');
    });

    // 工具栏事件
    table.on('tool(model-table)', function(obj){
        var data = obj.data;
        
        if(obj.event === 'edit'){
            openmax('{:url("edit")}/id/' + data.id);
        } else if(obj.event === 'params'){
            openmax('{:url("parameters")}/model_id/' + data.id);
        } else if(obj.event === 'responses'){
            openmax('{:url("responses")}/model_id/' + data.id);
        } else if(obj.event === 'del'){
            layer.confirm('确定删除该模型吗？删除后无法恢复！', function(index){
                var loadIndex = layer.load();
                $.post('{:url("delete")}', {id: data.id}, function(res){
                    layer.close(loadIndex);
                    dialog(res.message, res.success ? 1 : 0);
                    if(res.success){
                        tableIns.reload();
                    }
                });
                layer.close(index);
            });
        }
    });
});
</script>
{include file="public/copyright"/}
</body>
</html>
