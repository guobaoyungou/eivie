<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>套餐编辑</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
        <div class="layui-card-header">
          {if !$info['id']}<i class="fa fa-plus"></i> 添加套餐{else}<i class="fa fa-pencil"></i> 编辑套餐{/if}
          <i class="layui-icon layui-icon-close" style="font-size:18px;font-weight:bold;cursor:pointer;float:right;" onclick="closeself()"></i>
        </div>
        <div class="layui-card-body" pad15>
          <div class="layui-form form-label-w7" lay-filter="">
            <input type="hidden" name="id" value="{$info.id}">
            
            <div class="layui-form-item">
              <label class="layui-form-label">套餐名称：</label>
              <div class="layui-input-inline" style="width: 400px;">
                <input type="text" name="name" value="{$info.name}" lay-verify="required" lay-verType="tips" autocomplete="off" class="layui-input" placeholder="请输入套餐名称">
              </div>
            </div>
            
            <div class="layui-form-item">
              <label class="layui-form-label">套餐描述：</label>
              <div class="layui-input-block" style="width: 600px;">
                <textarea name="desc" placeholder="请输入套餐描述（选填）" class="layui-textarea" style="min-height: 80px;">{$info.desc}</textarea>
              </div>
            </div>
            
            <div class="layui-form-item">
              <label class="layui-form-label">包含图片数：</label>
              <div class="layui-input-inline">
                <input type="text" name="photo_count" value="{$info.photo_count|default='10'}" lay-verify="required|number" class="layui-input" placeholder="请输入包含图片数量">
              </div>
              <div class="layui-form-mid layui-word-aux">张</div>
            </div>
            
            <div class="layui-form-item">
              <label class="layui-form-label">包含视频数：</label>
              <div class="layui-input-inline">
                <input type="text" name="video_count" value="{$info.video_count|default='0'}" lay-verify="required|number" class="layui-input" placeholder="请输入包含视频数量">
              </div>
              <div class="layui-form-mid layui-word-aux">个</div>
            </div>
            
            <div class="layui-form-item">
              <label class="layui-form-label">套餐价格：</label>
              <div class="layui-input-inline">
                <input type="text" name="price" value="{$info.price|default='99.00'}" lay-verify="required" class="layui-input" placeholder="请输入套餐价格">
              </div>
              <div class="layui-form-mid layui-word-aux">元</div>
            </div>
            
            <div class="layui-form-item">
              <label class="layui-form-label">原价：</label>
              <div class="layui-input-inline">
                <input type="text" name="original_price" value="{$info.original_price}" class="layui-input" placeholder="用于显示划线价（选填）">
              </div>
              <div class="layui-form-mid layui-word-aux">元</div>
            </div>
            
            <div class="layui-form-item">
              <label class="layui-form-label">排序权重：</label>
              <div class="layui-input-inline">
                <input type="text" name="sort" value="{$info.sort|default='0'}" lay-verify="number" class="layui-input" placeholder="数字越大越靠前">
              </div>
            </div>
            
            <div class="layui-form-item">
              <label class="layui-form-label">是否启用：</label>
              <div class="layui-input-inline">
                <input type="radio" name="status" value="1" title="启用" {if $info['status']==1 || !$info['id']}checked{/if}>
                <input type="radio" name="status" value="0" title="禁用" {if $info['id'] && $info['status']==0}checked{/if}>
              </div>
            </div>
            
            <div class="layui-form-item">
              <div class="layui-input-block" style="margin-left:130px;">
                <button class="layui-btn" lay-submit lay-filter="formsubmit">提 交</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  {include file="public/js"/}
  <script>
  layui.form.on('submit(formsubmit)', function(obj){
    var field = obj.field;
    var index = layer.load();
    $.post("{:url('package_edit')}", field, function(data){
      layer.close(index);
      dialog(data.msg, data.status);
      if(data.status == 1){
        setTimeout(function(){
          parent.layer.closeAll();
          parent.tableIns.reload();
        }, 1000)
      }
    })
    return false;
  })
  </script>
  {include file="public/copyright"/}
</body>
</html>
