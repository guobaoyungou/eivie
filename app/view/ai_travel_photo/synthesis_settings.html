<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>合成设置</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
  <style>
    .template-item { padding: 10px; border: 1px solid #e2e2e2; border-radius: 4px; margin-bottom: 10px; cursor: pointer; transition: all 0.3s; }
    .template-item:hover { border-color: #1e9fff; }
    .template-item.selected { border-color: #1e9fff; background: #f0f9ff; }
    .template-item .template-name { font-weight: bold; margin-bottom: 5px; }
    .template-item .template-model { font-size: 12px; color: #666; }
    .template-item .template-images { display: flex; gap: 5px; margin-top: 5px; }
    .template-item .template-images img { width: 40px; height: 40px; object-fit: cover; border-radius: 3px; }
    .template-search { margin-bottom: 15px; }
    .template-search input { width: 100%; padding: 8px 12px; border: 1px solid #e2e2e2; border-radius: 4px; }
    .selected-item { display: inline-flex; align-items: center; padding: 5px 10px; background: #f0f9ff; border: 1px solid #1e9fff; border-radius: 4px; margin: 5px; }
    .selected-item .remove-btn { margin-left: 8px; cursor: pointer; color: #999; }
    .selected-item .remove-btn:hover { color: #f00; }
    .selected-items-container { min-height: 40px; padding: 10px; border: 1px dashed #e2e2e2; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="layui-fluid" style="padding: 15px;">
    <form class="layui-form" lay-filter="formData">
      <input type="hidden" name="portrait_id" value="{$portrait_id|default=0}">
      
      <!-- 提示信息 -->
      <div class="layui-form-item">
        <div class="layui-input-block" style="margin-left: 0;">
          <div style="background: #f0f9ff; border: 1px solid #1e9fff; padding: 10px 15px; border-radius: 4px; color: #666;">
            <i class="layui-icon layui-icon-tips" style="color: #1e9fff;"></i>
            设置合成规则后，点击"开始生成"将自动处理列表中所有未生成的人像
          </div>
        </div>
      </div>

      <!-- 模板搜索 -->
      <div class="layui-form-item">
        <label class="layui-form-label">查找模板</label>
        <div class="layui-input-block">
          <div class="template-search">
            <input type="text" id="templateSearch" placeholder="输入模板名称进行搜索..." oninput="filterTemplates()">
          </div>
        </div>
      </div>

      <!-- 模板来源选择 -->
      <div class="layui-form-item">
        <label class="layui-form-label">模板来源</label>
        <div class="layui-input-block">
          <input type="radio" name="template_source" value="1" title="平台模板" checked lay-filter="templateSource">
          <input type="radio" name="template_source" value="2" title="自建模板" lay-filter="templateSource">
        </div>
      </div>

      <!-- 关联合成模板 -->
      <div class="layui-form-item">
        <label class="layui-form-label"><span class="layui-required">*</span>关联合成模板</label>
        <div class="layui-input-block" id="templateList">
          <div style="color:#999;padding:20px;text-align:center;">加载中...</div>
        </div>
        <div style="color:#999;font-size:12px;margin-top:5px;">请关联要使用的合成模板（可多选）</div>
      </div>

      <!-- 合成数量 -->
      <div class="layui-form-item">
        <label class="layui-form-label"><span class="layui-required">*</span>合成数量</label>
        <div class="layui-input-inline">
          <input type="number" name="generate_count" id="generateCount" min="1" max="10" value="4" class="layui-input" style="width:100px;">
        </div>
        <div class="layui-form-mid layui-word-aux">张（1-10）</div>
      </div>

      <!-- 生成模式 -->
      <div class="layui-form-item">
        <label class="layui-form-label"><span class="layui-required">*</span>生成模式</label>
        <div class="layui-input-block">
          <input type="radio" name="generate_mode" value="1" title="顺序模式" checked lay-filter="generateMode">
          <input type="radio" name="generate_mode" value="2" title="随机模式" lay-filter="generateMode">
        </div>
        <div style="color:#999;font-size:12px;margin-top:5px;">
          <div id="modeDesc1">顺序模式：按选中模板的顺序依次生成，如设置4张，则按模板顺序循环生成</div>
          <div id="modeDesc2" style="display:none;">随机模式：随机从选中模板中抽取生成，如设置4张，则随机挑选4个模板生成</div>
        </div>
      </div>

      <!-- 改写模型选择 -->
      <div class="layui-form-item" id="promptRewriteConfig" style="margin-left:50px;">
        <div style="display:flex;gap:15px;align-items:flex-end;flex-wrap:wrap;">
          <!-- 供应商选择 -->
          <div>
            <label class="layui-form-label" style="width:auto;padding-left:0;">改写模型</label>
            <div>
              <select name="prompt_rewrite_provider" id="promptRewriteProvider" lay-filter="promptRewriteProvider" style="min-width:160px;">
                
                </select>
            </div>
          </div>
          <!-- 模型选择 -->
          <div>
            <label class="layui-form-label" style="width:auto;padding-left:0;">&nbsp;</label>
            <div>
              <select name="prompt_rewrite_model" id="promptRewriteModel" style="min-width:200px;">
                
                </select>
            </div>
          </div>
        </div>
      </div>

      <!-- AI提示词模板输入框 -->
      <div class="layui-form-item" id="nlPromptTemplateRow" style="margin-left:50px;">
        <label class="layui-form-label" style="width:auto;">AI提示词模板</label>
        <div class="layui-input-block">
          <textarea name="nl_prompt_template" id="nlPromptTemplate" class="layui-textarea" style="min-height:180px;"></textarea>
          <div style="color:#999;font-size:12px;margin-top:3px;">
            支持系统变量：<code>{模板提示词}</code>（自动替换为合成模板中的提示词文本） <code>{人像描述}</code>（自动替换为人像的NL描述）
          </div>
        </div>
      </div>

      <!-- 提示词改写模板 -->
      <div class="layui-form-item" id="promptRewriteTemplateRow" style="margin-left:50px;">
        <label class="layui-form-label" style="width:auto;">改写模板</label>
        <div class="layui-input-block">
          <textarea name="prompt_rewrite_template" id="promptRewriteTemplate" class="layui-textarea" style="min-height:80px;"></textarea>
          <div style="color:#999;font-size:12px;margin-top:3px;">
            支持系统变量：<code>{模板提示词}</code> <code>{人像描述}</code> <code>{模板绑定模型}</code>
          </div>
        </div>
      </div>

      <!-- 已关联模板 -->
      <div class="layui-form-item">
        <label class="layui-form-label">已关联模板</label>
        <div class="layui-input-block" id="selectedTemplates">
          <div class="selected-items-container">
            <span style="color:#999">请在上方关联模板</span>
          </div>
        </div>
      </div>
    </form>
  </div>
  {include file="public/js"/}
  <script>
  var selectedTemplateIds = [];
  var selectedTemplateData = {};
  var portraitId = {$portrait_id};

  // 保存所有模板数据用于搜索
  var allTemplates = [];

  // 当前模板来源（全局作用域，saveSettings 需要访问）
  var currentTemplateSource = {$template_source|default=1};

  layui.use(['form', 'layer'], function(){
    var form = layui.form;
    var layer = layui.layer;

    // 延迟执行，确保DOM完全加载
    setTimeout(function() {
      // 清空已选模板数组，确保不会残留旧数据
      selectedTemplateIds = [];
      
      // 加载已保存的全局设置（portrait_id=0）
      var setting = {:empty($setting) ? 'null' : json_encode($setting)};
      
      if(setting && setting.template_source){
        currentTemplateSource = parseInt(setting.template_source) || 1;
        $('input[name="template_source"][value="' + currentTemplateSource + '"]').prop('checked', true);
      }
      
      form.render('radio');

      // 首次加载模板列表
      loadTemplatesBySource(currentTemplateSource, function(){
        if(setting && setting.template_ids){
          // 设置合成数量
          $('#generateCount').val(setting.generate_count || 4);

          // 设置生成模式
          $('input[name="generate_mode"][value="' + (setting.generate_mode || 1) + '"]').prop('checked', true);

          // 选中已保存的模板
          var savedTemplateIds = setting.template_ids ? setting.template_ids.split(',') : [];
          
          savedTemplateIds.forEach(function(id){
            if(id && id.trim() !== '') {
              var templateId = parseInt(id.trim());
              selectTemplateById(templateId);
            }
          });

          form.render('radio');
          updateModeDesc();
        }
      });

      // 监听模式切换
      form.on('radio(generateMode)', function(data){
        updateModeDesc();
      });
      
      // 监听模板来源切换
      form.on('radio(templateSource)', function(data){
        currentTemplateSource = parseInt(data.value);
        // 切换来源时清空已选模板
        selectedTemplateIds = [];
        updateSelectedDisplay();
        loadTemplatesBySource(currentTemplateSource);
      });
    }, 100); // 延迟100ms执行
  });

  // AJAX加载模板列表
  function loadTemplatesBySource(source, callback){
    var loadIndex = layer.load(0, {shade: [0.3, '#000']});
    $.get('{:url("synthesis_get_templates")}', {template_source: source}, function(res){
      layer.close(loadIndex);
      if(res.code === 0 && res.data){
        renderTemplateList(res.data.templates, source);
        if(callback) callback();
      } else {
        layer.msg('加载模板失败: ' + (res.msg || '未知错误'));
      }
    }, 'json').fail(function(){
      layer.close(loadIndex);
      layer.msg('网络错误，加载模板失败');
    });
  }

  // 渲染模板列表
  function renderTemplateList(templates, source){
    var container = $('#templateList');
    if(!templates || templates.length === 0){
      var msg = source == 2 
        ? '<div style="color:#999;padding:20px;text-align:center;">暂无自建模板，请前往<a href="{:url(\"synthesis_template_list\")}" target="_blank" style="color:#1e9fff;">合成模板管理</a>新建模板</div>'
        : '<div style="color:#999;padding:20px;text-align:center;">暂无可用合成模板，请先在"合成模板"中添加</div>';
      container.html(msg);
      allTemplates = [];
      return;
    }
    
    var html = '';
    templates.forEach(function(tpl){
      html += '<div class="template-item" data-id="' + tpl.id + '" data-name="' + (tpl.name || '') + '" onclick="selectTemplate(this, ' + tpl.id + ')">';
      html += '<div class="template-name">' + (tpl.name || '') + '</div>';
      html += '<div class="template-model">模型：' + (tpl.model_name || '未指定') + '</div>';
      html += '<div class="template-images">';
      if(tpl.cover_image){
        html += '<img src="' + tpl.cover_image + '" alt="模板图">';
      }
      if(tpl.images_arr && tpl.images_arr.length > 0){
        tpl.images_arr.slice(0, 3).forEach(function(img){
          html += '<img src="' + img + '" alt="参考图">';
        });
      }
      html += '</div></div>';
    });
    container.html(html);
    
    // 重新初始化全局模板数据
    initTemplatesData();
  }

  // 初始化模板数据
  function initTemplatesData(){
    var items = document.querySelectorAll('.template-item');
    allTemplates = []; // 清空数组，避免重复
    items.forEach(function(item){
      var idStr = item.getAttribute('data-id');
      var id = parseInt(idStr);
      var name = item.getAttribute('data-name');
      allTemplates.push({id: id, name: name, element: item, idStr: idStr});
    });
  }

  // 根据ID选中模板
  function selectTemplateById(id){
    // 检查是否已存在
    if(selectedTemplateIds.indexOf(id) > -1){
      return;
    }
    selectedTemplateIds.push(id);
    
    // 查找模板元素（data-id 可能是字符串或整数）
    var item = document.querySelector('.template-item[data-id="' + id + '"]');
    
    // 如果找不到，尝试查找所有模板并比较ID
    if(!item) {
      var items = document.querySelectorAll('.template-item');
      for(var i = 0; i < items.length; i++) {
        var itemId = parseInt(items[i].getAttribute('data-id'));
        if(itemId === id) {
          item = items[i];
          break;
        }
      }
    }
    
    if(item){
      item.classList.add('selected');
    }
    updateSelectedDisplay();
  }

  // 选择/取消选择模板
  function selectTemplate(obj, id){
    var index = selectedTemplateIds.indexOf(id);
    if(index > -1){
      // 取消选择
      selectedTemplateIds.splice(index, 1);
      obj.classList.remove('selected');
    } else {
      // 选择
      selectedTemplateIds.push(id);
      obj.classList.add('selected');
    }
    updateSelectedDisplay();
  }

  // 初始化选中状态
  function initSelectedStatus(){
    var items = document.querySelectorAll('.template-item');
    items.forEach(function(item){
      var id = parseInt(item.getAttribute('data-id'));
      if(selectedTemplateIds.indexOf(id) > -1){
        item.classList.add('selected');
      }
    });
    updateSelectedDisplay();
  }

  // 过滤模板（搜索功能）
  function filterTemplates(){
    var keyword = document.getElementById('templateSearch').value.toLowerCase().trim();
    var items = document.querySelectorAll('.template-item');
    
    items.forEach(function(item){
      var name = item.getAttribute('data-name') || '';
      
      if(keyword === '' || name.toLowerCase().indexOf(keyword) > -1){
        item.style.display = 'block';
      } else {
        item.style.display = 'none';
      }
    });
  }

  // 更新已选模板显示
  function updateSelectedDisplay(){
    var container = document.getElementById('selectedTemplates');
    if(selectedTemplateIds.length === 0){
      container.innerHTML = '<div class="selected-items-container"><span style="color:#999">请在上方关联模板</span></div>';
      return;
    }

    var html = '<div class="selected-items-container">';
    html += '已关联 <strong>' + selectedTemplateIds.length + '</strong> 个模板：';
    var count = parseInt($('#generateCount').val() || 4);
    html += '<span style="color:#1e9fff">将生成 ' + count + ' 张图片</span>';

    if(selectedTemplateIds.length < count){
      html += '<span style="color:#1e9fff;margin-left:10px;">（模板将循环使用）</span>';
    }
    
    html += '<div style="margin-top:10px;">';
    selectedTemplateIds.forEach(function(id){
      // 从 allTemplates 数组中查找模板信息
      var template = allTemplates.find(function(t) { return t.id === id; });
      var name = template ? template.name : '模板' + id;
      
      html += '<span class="selected-item">';
      html += name;
      html += '<span class="remove-btn" onclick="removeTemplate(' + id + ')">✕</span>';
      html += '</span>';
    });
    html += '</div></div>';

    container.innerHTML = html;
  }

  // 移除已选模板
  function removeTemplate(id){
    var index = selectedTemplateIds.indexOf(id);
    if(index > -1){
      selectedTemplateIds.splice(index, 1);
      var item = document.querySelector('.template-item[data-id="' + id + '"]');
      if(item){
        item.classList.remove('selected');
      }
      updateSelectedDisplay();
    }
  }

  // 更新模式说明
  function updateModeDesc(){
    var mode = $('input[name="generate_mode"]:checked').val();
    if(mode == 1){
      $('#modeDesc1').show();
      $('#modeDesc2').hide();
    } else {
      $('#modeDesc1').hide();
      $('#modeDesc2').show();
    }
  }

  // 监听数量变化
  $('#generateCount').on('change', function(){
    updateSelectedDisplay();
  });

  // ===== 提示词改写配置 =====
  var promptRewriteModels = {$prompt_rewrite_models|json_encode};

  // NL提示词模板默认值（特征提取）
  var defaultNlPromptTemplate = '仔细解析图片里人物全部特征：性别、年龄段、脸型、五官细节、妆容、发型发色、配饰、服装款式颜色、身材体态、表情、画面光影风格，输出结构化信息。并写入"feature_info":人像特征描述,。';

  // 提示词改写模板默认值（优化提示词）
  var defaultPromptRewriteTemplate = '请根据{人像描述}中的人物性别和年龄，将以下图生提示词：{模板提示词}改写为匹配该人物性别的版本，确保服装、发型、妆容与人物实际性别严格一致，保持人物特征适合{模板绑定模型}生成一AI绘画正向提示词，用词专业、细节饱满，适配写实人像生成。';

  // 初始化模型选择器
  function updateModelSelect(provider, selectedModel) {
    var models = promptRewriteModels[provider] || [];
    var $select = $('#promptRewriteModel');
    $select.empty();
    models.forEach(function(m) {
      $select.append('<option value="' + m.code + '">' + m.name + '</option>');
    });
    if (selectedModel) {
      $select.val(selectedModel);
    }
    layui.form.render('select');
  }

  // 监听供应商切换
  layui.form.on('select(promptRewriteProvider)', function(data){
    updateModelSelect(data.value);
  });

  // 初始化提示词改写配置
  function initDescriptionModeConfig() {
    var setting = {$setting|default=null|json_encode};
    if (setting) {
      // 供应商
      var provider = setting.prompt_rewrite_provider || 'volcengine';
      $('#promptRewriteProvider').val(provider);

      // 模型
      var rewriteModel = setting.prompt_rewrite_model || 'doubao-seed-2-0-pro-260215';
      updateModelSelect(provider, rewriteModel);

      // NL模板
      if (setting.nl_prompt_template) {
        $('#nlPromptTemplate').val(setting.nl_prompt_template);
      } else {
        $('#nlPromptTemplate').val(defaultNlPromptTemplate);
      }

      // 改写模板
      if (setting.prompt_rewrite_template) {
        $('#promptRewriteTemplate').val(setting.prompt_rewrite_template);
      } else {
        $('#promptRewriteTemplate').val(defaultPromptRewriteTemplate);
      }
    } else {
      // 无设置时默认值
      $('#nlPromptTemplate').val(defaultNlPromptTemplate);
      $('#promptRewriteTemplate').val(defaultPromptRewriteTemplate);
      // 默认供应商和模型
      updateModelSelect('volcengine', 'doubao-seed-2-0-pro-260215');
      $('#promptRewriteProvider').val('volcengine');
    }
    layui.form.render('select');
  }

  // 统一保存设置
  window.saveSettings = function(callback) {
    if (selectedTemplateIds.length === 0) {
      layer.msg('请关联至少一个合成模板');
      if (callback) callback({code: 1, msg: '请关联至少一个合成模板'});
      return;
    }
    var generateCount = parseInt($('#generateCount').val()) || 4;
    if (generateCount < 1 || generateCount > 10) {
      layer.msg('合成数量应在1-10之间');
      if (callback) callback({code: 1, msg: '合成数量应在1-10之间'});
      return;
    }
    var params = {
      portrait_id: portraitId,
      template_ids: selectedTemplateIds,
      template_source: currentTemplateSource,
      generate_count: generateCount,
      generate_mode: $('input[name="generate_mode"]:checked').val(),
      nl_prompt_template: $('#nlPromptTemplate').val(),
      prompt_rewrite_provider: $('#promptRewriteProvider').val(),
      prompt_rewrite_model: $('#promptRewriteModel').val(),
      prompt_rewrite_template: $('#promptRewriteTemplate').val()
    };
    $.post('{:url("synthesis_settings_save")}', params, function(res) {
      if (callback) callback(res);
    });
  };

  // 页面加载时初始化
  $(function() {
    setTimeout(function() {
      initDescriptionModeConfig();
    }, 200);
  });

  // 开始生成（单个人像）  // 开始生成（单个人像）  // 开始生成（单个人像）
  window.startGenerate = function(callback){
    // 先保存设置
    saveSettings(function(saveRes){
      if(saveRes.code !== 0){
        return;
      }

      // 执行生成
      layer.confirm('确认开始合成生成吗？', function(index){
        layer.close(index);
        var loadIndex = layer.load();

        $.post('{:url("synthesis_generate")}', {
          portrait_id: portraitId
        }, function(res){
          layer.close(loadIndex);
          if(callback) callback(res);
        });
      });
    });
  };

  // 批量生成（所有人像）
  window.startBatchGenerate = function(callback){
    // 先保存设置
    saveSettings(function(saveRes){
      if(saveRes.code !== 0){
        if(callback) callback(saveRes);
        return;
      }

      // 执行批量生成
      var loadIndex = layer.load();

      $.post('{:url("synthesis_batch_generate")}', {}, function(res){
        layer.close(loadIndex);
        if(callback) callback(res);
      });
    });
  };
  </script>
</body>
</html>
