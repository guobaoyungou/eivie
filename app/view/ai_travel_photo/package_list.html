<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>套餐管理</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
        <div class="layui-card-header">套餐管理</div>
        <div class="layui-card-body" pad15>
          <!-- 操作按钮区 -->
          <div class="layui-col-md12" style="padding-bottom:10px">
            <a class="layui-btn layuiadmin-btn-list" href="javascript:void(0)" onclick="openmax('{:url('package_edit')}')"><i class="layui-icon layui-icon-add-1"></i> 新增套餐</a>
          </div>
          
          <!-- 数据表格 -->
          <table class="layui-table" id="tabledata" lay-filter="tabledata"></table>
          
          <!-- 操作列模板 -->
          <script type="text/html" id="barTpl">
            <button class="table-btn" onclick="openmax('{:url('package_edit')}/id/{{d.id}}')">编辑</button>
            <button class="table-btn" onclick="deletePackage({{d.id}})">删除</button>
          </script>
        </div>
      </div>
    </div>
  </div>
  {include file="public/js"/}
  <script>
  var tableIns;
  
  layui.use(['table', 'form'], function(){
    var table = layui.table;
    
    // 渲染表格
    tableIns = table.render({
      elem: '#tabledata',
      url: '{:url('package_list')}',
      page: true,
      limit: 20,
      cols: [[
        {field: 'id', title: 'ID', width: 80, sort: true},
        {field: 'name', title: '套餐名称', width: 200},
        {field: 'num', title: '包含图片数', width: 120, templet: function(d){
          return d.num + '张';
        }},
        {field: 'video_num', title: '包含视频数', width: 120, templet: function(d){
          return d.video_num + '个';
        }},
        {field: 'price', title: '套餐价格', width: 120, templet: function(d){
          return '¥' + d.price;
        }},
        {field: 'original_price', title: '原价', width: 120, templet: function(d){
          return d.original_price ? '¥' + d.original_price : '-';
        }},
        {field: 'status', title: '状态', width: 100, templet: function(d){
          return d.status == 1 ? '<span style="color:#5FB878;">启用</span>' : '<span style="color:#FF5722;">禁用</span>';
        }},
        {field: 'sort', title: '排序', width: 80, sort: true},
        {field: 'create_time', title: '创建时间', width: 160, templet: function(d){
          return d.create_time ? date('Y-m-d H:i:s', d.create_time) : '-';
        }},
        {fixed: 'right', title: '操作', width: 150, toolbar: '#barTpl'}
      ]]
    });
  });
  
  // 删除套餐
  function deletePackage(id) {
    layer.confirm('确定要删除该套餐吗？删除后无法恢复！', {icon: 7, title: '操作确认'}, function(index){
      layer.close(index);
      var loadIndex = layer.load();
      $.post("{:url('package_delete')}", {id: id}, function(data){
        layer.close(loadIndex);
        dialog(data.msg, data.status);
        if(data.status == 1){
          tableIns.reload();
        }
      })
    });
  }
  </script>
  {include file="public/copyright"/}
</body>
</html>
