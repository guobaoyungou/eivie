<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>订单管理</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
        <div class="layui-card-header">订单管理</div>
        <div class="layui-card-body" pad15>
          <!-- 筛选区域 -->
          <div class="layui-form layui-form-search" style="margin-bottom: 15px;">
            <div class="layui-inline">
              <label class="layui-form-label">门店：</label>
              <div class="layui-input-inline">
                <select name="mdid" lay-filter="mdidFilter">
                  <option value="">全部门店</option>
                  {foreach $mendian_list as $md}
                  <option value="{$md.id}">{$md.name}</option>
                  {/foreach}
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">订单状态：</label>
              <div class="layui-input-inline">
                <select name="status" lay-filter="statusFilter">
                  <option value="">全部状态</option>
                  <option value="0">待支付</option>
                  <option value="1">已支付</option>
                  <option value="2">已取消</option>
                  <option value="3">已退款</option>
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">关键词：</label>
              <div class="layui-input-inline" style="width:160px">
                <input type="text" name="keyword" placeholder="订单号/用户名/手机号" autocomplete="off" class="layui-input">
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">日期范围：</label>
              <div class="layui-input-inline">
                <input type="text" name="start_date" id="start_date" placeholder="开始日期" autocomplete="off" class="layui-input">
              </div>
              <div class="layui-form-mid">-</div>
              <div class="layui-input-inline">
                <input type="text" name="end_date" id="end_date" placeholder="结束日期" autocomplete="off" class="layui-input">
              </div>
            </div>
            <div class="layui-inline">
              <button class="layui-btn" lay-submit lay-filter="searchBtn"><i class="layui-icon layui-icon-search"></i> 搜索</button>
              <button type="button" class="layui-btn layui-btn-warm" id="exportBtn"><i class="layui-icon layui-icon-export"></i> 导出</button>
            </div>
          </div>
          
          <!-- 数据表格 -->
          <table class="layui-table" id="tabledata" lay-filter="tabledata"></table>
          
          <!-- 操作列模板 -->
          <script type="text/html" id="barTpl">
            <button class="table-btn" onclick="openmax('{:url('order_detail')}/id/{{d.id}}')">查看详情</button>
          </script>
        </div>
      </div>
    </div>
  </div>
  {include file="public/js"/}
  <script>
  var datawhere = {};
  var tableIns;
  
  layui.use(['table', 'form', 'laydate'], function(){
    var table = layui.table;
    var form = layui.form;
    var laydate = layui.laydate;
    
    // 日期选择器
    laydate.render({
      elem: '#start_date',
      type: 'date'
    });
    
    laydate.render({
      elem: '#end_date',
      type: 'date'
    });
    
    // 渲染表格
    tableIns = table.render({
      elem: '#tabledata',
      url: '{:url('order_list')}',
      page: true,
      limit: 20,
      where: datawhere,
      cols: [[
        {field: 'id', title: 'ID', width: 80, sort: true},
        {field: 'order_no', title: '订单号', width: 200},
        {field: 'nickname', title: '用户昵称', width: 120},
        {field: 'mobile', title: '手机号', width: 120},
        {field: 'mendian_name', title: '门店', width: 120},
        {field: 'goods_count', title: '商品数量', width: 90},
        {field: 'total_price', title: '订单金额', width: 100, templet: function(d){
          return '¥' + (d.total_price || '0.00');
        }},
        {field: 'status', title: '支付状态', width: 90, templet: function(d){
          var statusMap = {
            0: '<span style="color:#FFB800;">待支付</span>',
            1: '<span style="color:#5FB878;">已支付</span>',
            2: '<span style="color:#999;">已取消</span>',
            3: '<span style="color:#FF5722;">已退款</span>'
          };
          return statusMap[d.status] || '-';
        }},
        {field: 'paytype_text', title: '支付方式', width: 100},
        {field: 'pay_time_text', title: '支付时间', width: 160},
        {field: 'create_time', title: '创建时间', width: 160, templet: function(d){
          return d.create_time ? date('Y-m-d H:i:s', d.create_time) : '-';
        }},
        {field: 'commission_info', title: '分销信息', width: 200, templet: function(d){
          if(!d.parent1 && !d.parent2 && !d.parent3) return '<span style="color:#999;">-</span>';
          var html = '';
          if(d.parent1 && d.parent1commission > 0) html += '<div>一级: ' + (d.parent1_name||'-') + ' ¥' + d.parent1commission + '</div>';
          if(d.parent2 && d.parent2commission > 0) html += '<div>二级: ' + (d.parent2_name||'-') + ' ¥' + d.parent2commission + '</div>';
          if(d.parent3 && d.parent3commission > 0) html += '<div>三级: ' + (d.parent3_name||'-') + ' ¥' + d.parent3commission + '</div>';
          return html || '<span style="color:#999;">-</span>';
        }},
        {field: 'commission_total', title: '佣金合计', width: 100, templet: function(d){
          if(!d.commission_total || d.commission_total <= 0) return '<span style="color:#999;">-</span>';
          return '<span style="color:#FF5722;">¥' + d.commission_total + '</span>';
        }},
        {field: 'iscommission', title: '分销状态', width: 90, templet: function(d){
          if(!d.parent1 && !d.parent2 && !d.parent3) return '<span style="color:#999;">-</span>';
          return d.iscommission == 1 ? '<span style="color:#5FB878;">已结算</span>' : '<span style="color:#FFB800;">未结算</span>';
        }},
        {fixed: 'right', title: '操作', width: 120, toolbar: '#barTpl'}
      ]]
    });
    
    // 筛选监听
    form.on('submit(searchBtn)', function(data){
      datawhere = data.field;
      tableIns.reload({
        where: datawhere,
        page: {curr: 1}
      });
      return false;
    });
    
    form.on('select(statusFilter)', function(data){
      datawhere.status = data.value;
      tableIns.reload({
        where: datawhere,
        page: {curr: 1}
      });
    });
  });
  </script>
  {include file="public/copyright"/}
</body>
</html>
