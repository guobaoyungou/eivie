<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>成品列表</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
        <div class="layui-card-header">成品列表</div>
        <div class="layui-card-body" pad15>
          <!-- 筛选区域 -->
          <div class="layui-form layui-form-search" style="margin-bottom: 15px;">
            <div class="layui-inline">
              <label class="layui-form-label">门店：</label>
              <div class="layui-input-inline">
                <select name="mdid" lay-filter="mdidFilter">
                  <option value="">全部门店</option>
                  {foreach $mendian_list as $md}
                  <option value="{$md.id}">{$md.name}</option>
                  {/foreach}
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">类型：</label>
              <div class="layui-input-inline">
                <select name="type" lay-filter="typeFilter">
                  <option value="">全部类型</option>
                  <option value="1">图片</option>
                  <option value="19">视频</option>
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">日期范围：</label>
              <div class="layui-input-inline">
                <input type="text" class="layui-input" id="dateRange" placeholder="选择日期范围">
              </div>
            </div>
            <div class="layui-inline">
              <button class="layui-btn" lay-submit lay-filter="searchSubmit">搜索</button>
              <button type="button" class="layui-btn layui-btn-primary" onclick="resetSearch()">重置</button>
            </div>
          </div>
          
          <!-- 数据表格 -->
          <table class="layui-table" id="tabledata" lay-filter="tabledata"></table>
          
          <!-- 操作列模板 -->
          <script type="text/html" id="barTpl">
            {{# if(d.type == 19){ }}
            <button class="table-btn" onclick="viewVideo('{{d.watermark_url}}')">播放视频</button>
            {{# } else { }}
            <button class="table-btn" onclick="viewImage('{{d.watermark_url}}')">查看图片</button>
            {{# } }}
            <button class="table-btn" onclick="viewPortrait({{d.portrait_id}})">查看人像</button>
          </script>
        </div>
      </div>
    </div>
  </div>
  {include file="public/js"/}
  <script>
  var tableIns;
  var searchParams = {};
  
  layui.use(['table', 'form', 'laydate'], function(){
    var table = layui.table;
    var form = layui.form;
    var laydate = layui.laydate;
    
    // 日期范围选择器
    laydate.render({
      elem: '#dateRange',
      range: true,
      done: function(value){
        if(value){
          var dates = value.split(' - ');
          searchParams.start_date = dates[0];
          searchParams.end_date = dates[1];
        } else {
          delete searchParams.start_date;
          delete searchParams.end_date;
        }
      }
    });
    
    // 监听筛选条件变化
    form.on('select(mdidFilter)', function(data){
      if(data.value){
        searchParams.mdid = data.value;
      } else {
        delete searchParams.mdid;
      }
    });
    
    form.on('select(typeFilter)', function(data){
      if(data.value !== ''){
        searchParams.type = data.value;
      } else {
        delete searchParams.type;
      }
    });
    
    // 监听搜索按钮
    form.on('submit(searchSubmit)', function(){
      renderTable();
      return false;
    });
    
    // 渲染表格
    renderTable();
  });
  
  function renderTable() {
    tableIns = layui.table.render({
      elem: '#tabledata',
      url: '{:url('result_list')}',
      where: searchParams,
      page: true,
      limit: 20,
      cols: [[
        {field: 'id', title: 'ID', width: 80, sort: true},
        {field: 'mendian_name', title: '门店', width: 120},
        {field: 'portrait_url', title: '原始人像', width: 100, templet: function(d){
          if(d.portrait_url){
            return '<img src="' + d.portrait_url + '" style="width:60px;height:60px;object-fit:cover;border-radius:4px;" onclick="previewImage(\'' + d.portrait_url + '\')">';
          }
          return '-';
        }},
        {field: 'watermark_url', title: '生成成品', width: 100, templet: function(d){
          if(d.type == 19){
            return '<video src="' + d.watermark_url + '" style="width:60px;height:60px;object-fit:cover;border-radius:4px;" onclick="viewVideo(\'' + d.watermark_url + '\')"></video>';
          } else {
            return '<img src="' + d.watermark_url + '" style="width:60px;height:60px;object-fit:cover;border-radius:4px;" onclick="previewImage(\'' + d.watermark_url + '\')">';
          }
        }},
        {field: 'scene_name', title: '场景', width: 120},
        {field: 'type', title: '类型', width: 80, templet: function(d){
          return d.type == 19 ? '<span style="color:#FF5722;">视频</span>' : '<span style="color:#1E9FFF;">图片</span>';
        }},
        {field: 'video_duration', title: '时长', width: 80, templet: function(d){
          return d.type == 19 ? (d.video_duration || 0) + '秒' : '-';
        }},
        {field: 'file_size', title: '文件大小', width: 100, templet: function(d){
          if(d.file_size){
            var size = d.file_size;
            if(size > 1024 * 1024){
              return (size / 1024 / 1024).toFixed(2) + ' MB';
            } else if(size > 1024){
              return (size / 1024).toFixed(2) + ' KB';
            } else {
              return size + ' B';
            }
          }
          return '-';
        }},
        {field: 'create_time', title: '生成时间', width: 160, templet: function(d){
          return d.create_time ? date('Y-m-d H:i:s', d.create_time) : '-';
        }},
        {fixed: 'right', title: '操作', width: 180, toolbar: '#barTpl'}
      ]]
    });
  }
  
  // 重置搜索
  function resetSearch() {
    searchParams = {};
    $('select[name="mdid"]').val('');
    $('select[name="type"]').val('');
    $('#dateRange').val('');
    layui.form.render('select');
    renderTable();
  }
  
  // 查看图片
  function viewImage(url) {
    layer.open({
      type: 1,
      title: '查看图片',
      area: ['auto', 'auto'],
      skin: 'layui-layer-nobg',
      shadeClose: true,
      content: '<div style="padding:20px;text-align:center;"><img src="' + url + '" style="max-width:900px;max-height:700px;"></div>'
    });
  }
  
  // 播放视频
  function viewVideo(url) {
    layer.open({
      type: 1,
      title: '播放视频',
      area: ['800px', '600px'],
      content: '<div style="padding:20px;text-align:center;"><video src="' + url + '" controls autoplay style="width:100%;height:100%;"></video></div>'
    });
  }
  
  // 查看人像详情
  function viewPortrait(portraitId) {
    layer.open({
      type: 2,
      title: '查看人像详情',
      area: ['90%', '90%'],
      content: '{:url('portrait_detail')}?id=' + portraitId
    });
  }
  
  // 图片预览
  function previewImage(url) {
    layer.open({
      type: 1,
      title: false,
      closeBtn: 0,
      area: ['auto', 'auto'],
      skin: 'layui-layer-nobg',
      shadeClose: true,
      content: '<img src="' + url + '" style="max-width:800px;max-height:600px;">'
    });
  }
  </script>
  {include file="public/copyright"/}
</body>
</html>
