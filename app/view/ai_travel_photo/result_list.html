<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>成品列表</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
  <style>
  /* 卡片网格布局 */
  .result-card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
  }
  .result-card {
    background: #fff;
    border-radius: 8px;
    border: 1px solid #e8e8e8;
    overflow: hidden;
    transition: box-shadow 0.3s, transform 0.2s;
  }
  .result-card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    transform: translateY(-2px);
  }

  /* 卡片头部 */
  .card-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    background: #fafafa;
    border-bottom: 1px solid #eee;
    gap: 12px;
  }
  .portrait-thumb {
    width: 64px;
    height: 64px;
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
    background: #f5f5f5;
  }
  .portrait-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .portrait-meta {
    flex: 1;
    min-width: 0;
  }
  .meta-row {
    display: flex;
    gap: 6px;
    font-size: 12px;
    line-height: 1.6;
  }
  .meta-label {
    color: #999;
    flex-shrink: 0;
  }
  .meta-value {
    color: #333;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-status {
    flex-shrink: 0;
  }
  .status-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
  .status-success { background: #e8f8f0; color: #16b779; }
  .status-failed { background: #fef0f0; color: #f56c6c; }
  .status-processing { background: #ecf5ff; color: #409eff; }
  .status-pending { background: #f5f5f5; color: #999; }
  .status-paused { background: #fff7e6; color: #fa8c16; }

  /* 卡片主体 */
  .card-body {
    padding: 12px 16px;
  }
  .result-summary {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .summary-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
  }
  .photo-badge { background: #e1f3d8; color: #67c23a; }
  .video-badge { background: #d9ecff; color: #409eff; }
  .total-badge { background: #f0f0f0; color: #666; }
  .scene-badge { background: #fdf6ec; color: #e6a23c; }

  /* 预览网格 */
  .preview-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .preview-grid.has-video {
    grid-template-columns: repeat(2, 1fr);
  }
  .preview-item {
    position: relative;
    aspect-ratio: 1;
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    background: #f5f5f5;
  }
  .preview-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.2s;
  }
  .preview-item:hover img {
    transform: scale(1.05);
  }
  .preview-item.video-item::after {
    content: '\e6e1';
    font-family: 'layui-icon';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 24px;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }
  .preview-item.more-item {
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 14px;
    font-weight: bold;
  }

  /* 错误区域 */
  .error-section {
    margin-top: 10px;
    padding: 8px 10px;
    background: #fef0f0;
    border: 1px solid #fde2e2;
    border-radius: 4px;
    font-size: 12px;
    color: #f56c6c;
    display: flex;
    align-items: flex-start;
    gap: 6px;
  }
  .error-text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  /* 卡片底部 */
  .card-footer {
    padding: 10px 16px;
    border-top: 1px solid #eee;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .card-footer .layui-btn {
    margin: 0;
  }

  /* 加载状态 */
  .card-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px;
    color: #999;
    grid-column: 1 / -1;
  }

  /* 统计栏 */
  #summaryBar {
    margin-bottom: 15px;
    padding: 10px 16px;
    background: #f8f9fa;
    border-radius: 6px;
    font-size: 13px;
    color: #666;
  }
  #summaryBar strong {
    color: #16b779;
    margin: 0 4px;
  }

  /* 空状态 */
  .empty-state {
    text-align: center;
    padding: 60px 0;
    color: #999;
    grid-column: 1 / -1;
  }
  </style>
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
        <div class="layui-card-header">成品列表</div>
        <div class="layui-card-body" pad15>
          <!-- 筛选区域 -->
          <div class="layui-form layui-form-search" style="margin-bottom: 15px;">
            <div class="layui-inline">
              <label class="layui-form-label">门店：</label>
              <div class="layui-input-inline">
                <select name="mdid" lay-filter="mdidFilter">
                  <option value="">全部门店</option>
                  {foreach $mendian_list as $md}
                  <option value="{$md.id}">{$md.name}</option>
                  {/foreach}
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">类型：</label>
              <div class="layui-input-inline">
                <select name="type" lay-filter="typeFilter">
                  <option value="">全部类型</option>
                  <option value="1">仅图片</option>
                  <option value="19">仅视频</option>
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">合成状态：</label>
              <div class="layui-input-inline">
                <select name="synthesis_status" lay-filter="synthesisStatusFilter">
                  <option value="">全部状态</option>
                  <option value="3">成功</option>
                  <option value="4">失败</option>
                  <option value="2">处理中</option>
                  <option value="5">余额暂停</option>
                  <option value="6">空间暂停</option>
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">日期范围：</label>
              <div class="layui-input-inline">
                <input type="text" class="layui-input" id="dateRange" placeholder="选择日期范围">
              </div>
            </div>
            <div class="layui-inline">
              <button class="layui-btn" lay-submit lay-filter="searchSubmit"><i class="layui-icon layui-icon-search"></i> 搜索</button>
              <button type="button" class="layui-btn layui-btn-primary" onclick="resetSearch()"><i class="layui-icon layui-icon-refresh"></i> 重置</button>
            </div>
          </div>

          <!-- 统计栏 -->
          <div id="summaryBar">
            共 <strong id="totalCount">0</strong> 个人像，
            图片 <strong id="totalPhotos">0</strong> 张，
            视频 <strong id="totalVideos">0</strong> 个
          </div>

          <!-- 卡片容器 -->
          <div id="cardContainer" class="result-card-grid">
            <div class="card-loading"><i class="layui-icon layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop"></i> 加载中...</div>
          </div>

          <!-- 分页 -->
          <div id="paginationBar" style="text-align:center; margin-top:20px;"></div>
        </div>
      </div>
    </div>
  </div>
  {include file="public/js"/}
  <script>
  var searchParams = {};
  var currentPage = 1;
  var currentLimit = 12;

  layui.use(['form', 'laydate', 'laypage'], function(){
    var form = layui.form;
    var laydate = layui.laydate;
    var laypage = layui.laypage;

    // 日期范围选择器
    laydate.render({
      elem: '#dateRange',
      range: true,
      done: function(value){
        if(value){
          var dates = value.split(' - ');
          searchParams.start_date = dates[0];
          searchParams.end_date = dates[1];
        } else {
          delete searchParams.start_date;
          delete searchParams.end_date;
        }
      }
    });

    // 监听筛选条件变化
    form.on('select(mdidFilter)', function(data){
      if(data.value){
        searchParams.mdid = data.value;
      } else {
        delete searchParams.mdid;
      }
    });

    form.on('select(typeFilter)', function(data){
      if(data.value !== ''){
        searchParams.type = data.value;
      } else {
        delete searchParams.type;
      }
    });

    form.on('select(synthesisStatusFilter)', function(data){
      if(data.value !== ''){
        searchParams.synthesis_status = data.value;
      } else {
        delete searchParams.synthesis_status;
      }
    });

    // 监听搜索按钮
    form.on('submit(searchSubmit)', function(){
      currentPage = 1;
      renderCards();
      return false;
    });

    // 初始渲染
    renderCards();
  });

  function renderCards() {
    var loadIdx = layer.load();

    $.getJSON('{:url("result_list")}', $.extend({page: currentPage, limit: currentLimit}, searchParams), function(res) {
      layer.close(loadIdx);

      if (res.code !== 0) {
        layer.msg(res.msg || '加载失败', {icon: 2});
        $('#cardContainer').html('<div class="empty-state">加载失败</div>');
        return;
      }

      // 更新统计
      $('#totalCount').text(res.count || 0);
      var totalP = 0, totalV = 0;
      if (res.data) {
        res.data.forEach(function(item) {
          totalP += parseInt(item.photo_count || 0);
          totalV += parseInt(item.video_count || 0);
        });
      }
      $('#totalPhotos').text(totalP);
      $('#totalVideos').text(totalV);

      // 构建卡片
      var html = '';
      if (!res.data || res.data.length === 0) {
        html = '<div class="empty-state">暂无数据</div>';
      } else {
        res.data.forEach(function(item) {
          html += buildCardHtml(item);
        });
      }
      $('#cardContainer').html(html);

      // 渲染分页
      layui.laypage.render({
        elem: 'paginationBar',
        count: res.count || 0,
        limit: currentLimit,
        curr: currentPage,
        layout: ['prev', 'page', 'next', 'count', 'skip'],
        jump: function(obj, first) {
          if (!first) {
            currentPage = obj.curr;
            renderCards();
          }
        }
      });

      // 延迟加载预览图
      setTimeout(loadVisiblePreviews, 100);
    });
  }

  function buildCardHtml(item) {
    var statusMap = {
      0: {text: '未处理', cls: 'pending'},
      1: {text: '已提交', cls: 'pending'},
      2: {text: '处理中', cls: 'processing'},
      3: {text: '成功', cls: 'success'},
      4: {text: '失败', cls: 'failed'},
      5: {text: '余额暂停', cls: 'paused'},
      6: {text: '空间暂停', cls: 'paused'}
    };
    var status = statusMap[item.synthesis_status] || {text: '未知', cls: 'pending'};

    var html = '<div class="result-card" data-portrait-id="' + item.id + '">';

    // 头部
    html += '<div class="card-header">';
    html += '  <div class="portrait-thumb">';
    html += '    <img src="' + escapeHtml(item.original_url) + '" onerror="this.style.display=\'none\'">';
    html += '  </div>';
    html += '  <div class="portrait-meta">';
    html += '    <div class="meta-row"><span class="meta-label">ID</span><span class="meta-value">#' + item.id + '</span></div>';
    html += '    <div class="meta-row"><span class="meta-label">门店</span><span class="meta-value">' + escapeHtml(item.mendian_name || '-') + '</span></div>';
    html += '    <div class="meta-row"><span class="meta-label">上传</span><span class="meta-value">' + (item.create_time_text || '-') + '</span></div>';
    html += '  </div>';
    html += '  <div class="card-status">';
    html += '    <span class="status-badge status-' + status.cls + '">' + status.text + '</span>';
    html += '  </div>';
    html += '</div>';

    // 主体
    html += '<div class="card-body">';
    html += '  <div class="result-summary">';
    html += '    <span class="summary-badge photo-badge">图片 ' + (item.photo_count || 0) + '</span>';
    html += '    <span class="summary-badge video-badge">视频 ' + (item.video_count || 0) + '</span>';
    html += '    <span class="summary-badge total-badge">合计 ' + (item.result_count || 0) + '</span>';
    if (item.scene_name) {
      html += '    <span class="summary-badge scene-badge">' + escapeHtml(item.scene_name) + '</span>';
    }
    html += '  </div>';

    // 预览网格占位
    html += '  <div class="preview-grid" id="preview_' + item.id + '" data-loaded="0">';
    html += '    <div class="card-loading"><i class="layui-icon layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop"></i></div>';
    html += '  </div>';

    // 错误信息
    if (item.last_error_msg) {
      html += '  <div class="error-section">';
      html += '    <i class="layui-icon layui-icon-about"></i>';
      html += '    <span class="error-text">' + escapeHtml(item.last_error_msg) + '</span>';
      html += '  </div>';
    }
    html += '</div>';

    // 底部操作
    html += '<div class="card-footer">';
    html += '  <button class="layui-btn layui-btn-xs layui-btn-normal" onclick="viewFullDetail(' + item.id + ')"><i class="layui-icon layui-icon-about"></i> 查看详情</button>';
    if (item.synthesis_status == 4 || item.synthesis_status == 5 || item.synthesis_status == 6) {
      html += '  <button class="layui-btn layui-btn-xs layui-btn-warm" onclick="retryPortrait(' + item.id + ')"><i class="layui-icon layui-icon-refresh"></i> 重试</button>';
    }
    html += '  <button class="layui-btn layui-btn-xs layui-btn-danger" onclick="deletePortrait(' + item.id + ')"><i class="layui-icon layui-icon-delete"></i> 删除</button>';
    html += '  <button class="layui-btn layui-btn-xs" onclick="loadMoreResults(' + item.id + ')"><i class="layui-icon layui-icon-more"></i> 全部(' + (item.result_count || 0) + ')</button>';
    html += '</div>';

    html += '</div>';

    return html;
  }

  // 懒加载预览图
  function loadVisiblePreviews() {
    $('.preview-grid[data-loaded="0"]').each(function() {
      var el = $(this);
      var portraitId = el.attr('id').replace('preview_', '');
      if (!portraitId) return;

      // 简单的可视区域判断
      var rect = el[0].getBoundingClientRect();
      if (rect.top < window.innerHeight && rect.bottom > 0) {
        loadPreviewResults(portraitId);
      }
    });
  }

  // 滚动监听
  $(window).on('scroll', function() {
    loadVisiblePreviews();
  });

  function loadPreviewResults(portraitId) {
    var el = document.getElementById('preview_' + portraitId);
    if (!el || el.getAttribute('data-loaded') === '1') return;
    el.setAttribute('data-loaded', '1');

    $.getJSON('{:url("result_portrait_detail")}', {portrait_id: portraitId}, function(res) {
      if (res.code !== 0 || !res.data || res.data.length === 0) {
        el.innerHTML = '<div style="text-align:center;padding:10px;color:#999;font-size:12px;">暂无结果</div>';
        return;
      }

      var results = res.data;
      var html = '';
      var previewCount = Math.min(results.length, 6);
      var hasVideo = false;

      for (var i = 0; i < previewCount; i++) {
        var r = results[i];
        var url = r.watermark_url || r.url || '';
        var thumb = r.thumbnail_url || url;

        if (r.type == 19) {
          hasVideo = true;
          html += '<div class="preview-item video-item" onclick="viewVideo(\'' + escapeHtml(url) + '\')">';
          html += '  <img src="' + escapeHtml(thumb) + '" onerror="this.style.background=\'#333\'">';
          html += '</div>';
        } else {
          html += '<div class="preview-item" onclick="previewImage(\'' + escapeHtml(url) + '\')">';
          html += '  <img src="' + escapeHtml(thumb) + '" onerror="this.style.display=\'none\'">';
          html += '</div>';
        }
      }

      // "更多"覆盖层
      if (results.length > 6) {
        html += '<div class="preview-item more-item" onclick="loadMoreResults(' + portraitId + ')">';
        html += '+' + (results.length - 6);
        html += '</div>';
      }

      el.innerHTML = html;
      if (hasVideo) {
        el.classList.add('has-video');
      }
    });
  }

  // 查看完整详情
  function viewFullDetail(portraitId) {
    layer.open({
      type: 2,
      title: '人像详情 #' + portraitId,
      area: ['90%', '90%'],
      maxmin: true,
      content: '{:url("portrait_detail")}?id=' + portraitId
    });
  }

  // 重试合成
  function retryPortrait(id) {
    layer.confirm('确定要重新合成该人像吗？', {icon: 3, title: '重试确认'}, function(index) {
      layer.close(index);
      var loadIndex = layer.load(2, {shade: [0.3, '#000']});
      $.post("{:url('synthesis_retry')}", {portrait_id: id}, function(res) {
        layer.close(loadIndex);
        if (res.code === 0 || res.status === 1) {
          layer.msg('重试成功', {icon: 1});
          renderCards();
        } else {
          layer.msg(res.msg || '重试失败', {icon: 2});
        }
      });
    });
  }

  // 删除人像
  function deletePortrait(id) {
    layer.confirm('确定要删除该人像及其所有生成结果吗？删除后无法恢复！', {icon: 7, title: '操作确认'}, function(index) {
      layer.close(index);
      var loadIndex = layer.load();
      $.post("{:url('portrait_delete')}", {id: id}, function(data) {
        layer.close(loadIndex);
        if (typeof dialog === 'function') {
          dialog(data.msg, data.status);
        } else {
          layer.msg(data.msg, {icon: data.status == 1 ? 1 : 2});
        }
        if (data.status == 1) {
          renderCards();
        }
      });
    });
  }

  // 查看全部结果
  function loadMoreResults(portraitId) {
    var loadIdx = layer.load();
    $.getJSON('{:url("result_portrait_detail")}', {portrait_id: portraitId}, function(res) {
      layer.close(loadIdx);
      if (res.code !== 0) { layer.msg(res.msg, {icon: 2}); return; }

      var results = res.data;
      var html = '<div style="padding:20px;">';
      html += '<h3 style="margin-bottom:15px;">全部结果 (' + results.length + ')</h3>';

      var photos = results.filter(function(r){ return r.type != 19; });
      var videos = results.filter(function(r){ return r.type == 19; });

      if (photos.length > 0) {
        html += '<h4 style="margin:10px 0;">图片 (' + photos.length + ')</h4>';
        html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;">';
        photos.forEach(function(r) {
          var url = r.watermark_url || r.url || '';
          var thumb = r.thumbnail_url || url;
          html += '<div style="border:1px solid #eee;border-radius:4px;overflow:hidden;">';
          html += '  <img src="' + escapeHtml(thumb) + '" style="width:100%;height:160px;object-fit:cover;cursor:pointer;" onclick="previewImage(\'' + escapeHtml(url) + '\')" onerror="this.style.display=\'none\'">';
          html += '  <div style="padding:6px;font-size:12px;color:#666;">' + escapeHtml(r.scene_name || '') + '</div>';
          html += '</div>';
        });
        html += '</div>';
      }

      if (videos.length > 0) {
        html += '<h4 style="margin:10px 0;">视频 (' + videos.length + ')</h4>';
        html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;">';
        videos.forEach(function(r) {
          html += '<div style="border:1px solid #eee;border-radius:4px;overflow:hidden;">';
          html += '  <video src="' + escapeHtml(r.url) + '" controls style="width:100%;height:200px;"></video>';
          html += '  <div style="padding:6px;font-size:12px;color:#666;">' + escapeHtml(r.scene_name || '') + '</div>';
          html += '</div>';
        });
        html += '</div>';
      }

      if (photos.length === 0 && videos.length === 0) {
        html += '<div style="text-align:center;padding:30px;color:#999;">暂无结果</div>';
      }

      html += '</div>';

      layer.open({
        type: 1,
        title: '全部结果 - 人像#' + portraitId,
        area: ['90%', '90%'],
        maxmin: true,
        content: html
      });
    });
  }

  // 查看图片
  function previewImage(url) {
    layer.open({
      type: 1,
      title: false,
      closeBtn: 0,
      area: ['auto', 'auto'],
      skin: 'layui-layer-nobg',
      shadeClose: true,
      content: '<img src="' + url + '" style="max-width:800px;max-height:600px;">'
    });
  }

  // 播放视频
  function viewVideo(url) {
    layer.open({
      type: 1,
      title: '播放视频',
      area: ['800px', '600px'],
      content: '<div style="padding:20px;text-align:center;"><video src="' + url + '" controls autoplay style="width:100%;height:100%;"></video></div>'
    });
  }

  // 重置搜索
  function resetSearch() {
    searchParams = {};
    $('select[name="mdid"]').val('');
    $('select[name="type"]').val('');
    $('select[name="synthesis_status"]').val('');
    $('#dateRange').val('');
    layui.form.render('select');
    currentPage = 1;
    renderCards();
  }

  // HTML转义
  function escapeHtml(text) {
    if (!text) return '';
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
  }
  </script>
