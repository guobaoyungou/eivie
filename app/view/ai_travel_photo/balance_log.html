<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AI消费明细</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
  <style>
    .balance-summary-card {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border-radius: 12px; padding: 20px 24px; color: #fff;
      margin-bottom: 20px; position: relative; overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .balance-summary-card::before {
      content: ''; position: absolute; top: -50%; right: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
      pointer-events: none;
    }
    .balance-summary-card .label { font-size: 14px; opacity: 0.9; margin-bottom: 6px; }
    .balance-summary-card .value { font-size: 28px; font-weight: bold; }
    .balance-summary-card .icon {
      font-size: 50px; opacity: 0.2; position: absolute; right: 24px; top: 50%; transform: translateY(-50%);
      pointer-events: none;
    }
    .type-tag { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 12px; color: #fff; }
    .type-tag.deduct { background: #FF5722; }
    .type-tag.refund { background: #FF9800; }
    .type-tag.recharge { background: #4CAF50; }
    .amount-deduct { color: #FF5722; font-weight: bold; }
    .amount-plus { color: #4CAF50; font-weight: bold; }
    .summary-cards { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .summary-card {
      flex: 1; min-width: 160px; border-radius: 10px; padding: 14px 18px; color: #fff;
      position: relative; overflow: hidden;
    }
    .summary-card .sc-label { font-size: 12px; opacity: 0.85; margin-bottom: 4px; }
    .summary-card .sc-value { font-size: 20px; font-weight: bold; }
    .summary-card.card-synthesis { background: linear-gradient(135deg, #fe5196, #f77062); }
    .summary-card.card-rewrite { background: linear-gradient(135deg, #4facfe, #00f2fe); }
    .summary-card.card-total { background: linear-gradient(135deg, #f093fb, #f5576c); }
    .summary-card.card-count { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #333; }
  </style>
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
        <div class="layui-card-header">AI消费明细</div>
        <div class="layui-card-body" pad15>
          <!-- 余额概览卡片 -->
          <div class="balance-summary-card">
            <i class="layui-icon layui-icon-survey icon"></i>
            <div class="label">当前账户余额</div>
            <div class="value">￥{:number_format($business_info['account_balance'] ?? 0, 2)}</div>
          </div>

          <!-- 筛选栏 -->
          <div class="layui-form layui-form-search" style="margin-bottom: 15px;">
            <div class="layui-inline">
              <label class="layui-form-label">变动类型：</label>
              <div class="layui-input-inline">
                <select name="type" lay-filter="typeFilter">
                  <option value="">全部类型</option>
                  <option value="deduct">合成扣费</option>
                  <option value="refund">退款</option>
                  <option value="recharge">充值</option>
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">日期范围：</label>
              <div class="layui-input-inline">
                <input type="text" name="start_date" id="start_date" placeholder="开始日期" autocomplete="off" class="layui-input">
              </div>
              <div class="layui-form-mid">-</div>
              <div class="layui-input-inline">
                <input type="text" name="end_date" id="end_date" placeholder="结束日期" autocomplete="off" class="layui-input">
              </div>
            </div>
            <div class="layui-inline">
              <button class="layui-btn" lay-submit lay-filter="searchBtn"><i class="layui-icon layui-icon-search"></i> 搜索</button>
              <button type="reset" class="layui-btn layui-btn-primary" id="resetBtn"><i class="layui-icon layui-icon-refresh"></i> 重置</button>
            </div>
          </div>

          <!-- 余额变动流水表格 -->
          <table class="layui-table" id="tabledata" lay-filter="tabledata"></table>

          <!-- 分割线 -->
          <hr style="margin: 24px 0 16px 0; border-top: 2px solid #e6e6e6;">

          <!-- 人像消费统计面板 -->
          <div class="layui-card-header" style="background: #f8f8f8; border-radius: 4px 4px 0 0; margin-bottom: 12px;">
            <i class="layui-icon layui-icon-component" style="font-size: 16px; color: #f5576c;"></i> 人像消费统计
            <span style="color: #999; font-size: 12px; margin-left: 8px;">金额 = (商采价格 × 生成结果数) + (生成结果数 × 0.10元AI改写费)</span>
          </div>

          <!-- 汇总卡片 -->
          <div class="summary-cards" id="summaryCards">
            <div class="summary-card card-count">
              <div class="sc-label">人像数</div>
              <div class="sc-value" id="scCount">-</div>
            </div>
            <div class="summary-card card-synthesis">
              <div class="sc-label">合成费小计</div>
              <div class="sc-value" id="scSynthesis">¥-</div>
            </div>
            <div class="summary-card card-rewrite">
              <div class="sc-label">AI改写费小计</div>
              <div class="sc-value" id="scRewrite">¥-</div>
            </div>
            <div class="summary-card card-total">
              <div class="sc-label">消费总计</div>
              <div class="sc-value" id="scTotal">¥-</div>
            </div>
          </div>

          <!-- 人像消费表格 -->
          <table class="layui-table" id="portraitCostTable" lay-filter="portraitCostTable"></table>
        </div>
      </div>
    </div>
  </div>
  {include file="public/js"/}
  <script>
  var datawhere = {};
  var tableIns;

  layui.use(['table', 'form', 'laydate'], function(){
    var table = layui.table;
    var form = layui.form;
    var laydate = layui.laydate;

    // 日期选择器
    laydate.render({ elem: '#start_date', type: 'date' });
    laydate.render({ elem: '#end_date', type: 'date' });

    // 渲染表格
    tableIns = table.render({
      elem: '#tabledata',
      url: '{:url("balance_log")}',
      page: true,
      limit: 20,
      limits: [10, 20, 50, 100],
      where: datawhere,
      cols: [[
        {field: 'id', title: 'ID', width: 70, sort: true},
        {field: 'createtime', title: '时间', width: 170},
        {field: 'type_text', title: '类型', width: 90, templet: function(d){
          var cls = d.type || '';
          return '<span class="type-tag ' + cls + '">' + (d.type_text || '-') + '</span>';
        }},
        {field: 'amount', title: '金额', width: 120, templet: function(d){
          if (d.type === 'deduct') {
            return '<span class="amount-deduct">-¥' + d.amount + '</span>';
          } else {
            return '<span class="amount-plus">+¥' + d.amount + '</span>';
          }
        }},
        {field: 'balance_before', title: '变动前余额', width: 120, templet: function(d){
          return '¥' + d.balance_before;
        }},
        {field: 'balance_after', title: '变动后余额', width: 120, templet: function(d){
          return '¥' + d.balance_after;
        }},
        {field: 'remark', title: '备注', minWidth: 200}
      ]],
      text: { none: '暂无余额变动记录' }
    });

    // 搜索
    form.on('submit(searchBtn)', function(data){
      datawhere = Object.assign({}, data.field, {start_date: data.field.start_date, end_date: data.field.end_date});
      tableIns.reload({
        where: datawhere,
        page: {curr: 1}
      });
      // 同步刷新人像消费统计表
      if (typeof portraitCostTable !== 'undefined') {
        portraitCostTable.reload({
          where: datawhere,
          page: {curr: 1}
        });
      }
      return false;
    });

    // 类型下拉筛选
    form.on('select(typeFilter)', function(data){
      datawhere.type = data.value;
      tableIns.reload({
        where: datawhere,
        page: {curr: 1}
      });
    });

    // ===== 人像消费统计表格 =====
    var portraitCostTable = table.render({
      elem: '#portraitCostTable',
      url: '{:url("portrait_cost_list")}',
      page: true,
      limit: 20,
      limits: [10, 20, 50, 100],
      where: datawhere,
      cols: [[
        {field: 'id', title: '人像ID', width: 80, sort: true},
        {field: 'file_name', title: '文件名', minWidth: 140},
        {field: 'scene_name', title: '场景模板', width: 110},
        {field: 'business_price_fmt', title: '商采单价', width: 90, templet: function(d){ return '¥' + d.business_price_fmt; }},
        {field: 'result_count', title: '结果数', width: 80},
        {field: 'synthesis_cost', title: '合成费', width: 90, templet: function(d){ return '<span style="color:#f5576c">¥' + d.synthesis_cost + '</span>'; }},
        {field: 'rewrite_cost', title: '改写费', width: 90, templet: function(d){ return '<span style="color:#4facfe">¥' + d.rewrite_cost + '</span>'; }},
        {field: 'total_cost', title: '消费金额', width: 110, templet: function(d){ return '<span style="font-weight:bold;color:#ff5722">¥' + d.total_cost + '</span>'; }},
        {field: 'create_time', title: '创建时间', width: 160}
      ]],
      text: { none: '暂无人像消费记录' },
      done: function(res) {
        if (res.summary) {
          document.getElementById('scCount').textContent = res.summary.portrait_count;
          document.getElementById('scSynthesis').textContent = '¥' + res.summary.synthesis_total;
          document.getElementById('scRewrite').textContent = '¥' + res.summary.rewrite_total;
          document.getElementById('scTotal').textContent = '¥' + res.summary.grand_total;
        }
      }
    });

    // 重置按钮同时刷新两个表格
    document.getElementById('resetBtn').addEventListener('click', function(){
      datawhere = {};
      tableIns.reload({
        where: datawhere,
        page: {curr: 1}
      });
      portraitCostTable.reload({
        where: datawhere,
        page: {curr: 1}
      });
    });
  });
  </script>
  {include file="public/copyright"/}
</body>
</html>
