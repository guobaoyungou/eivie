<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>设备管理</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
        <div class="layui-card-header">设备管理</div>
        <div class="layui-card-body" pad15>
          <!-- 操作按钮区 -->
          <div class="layui-col-md12" style="padding-bottom:10px">
            <button class="layui-btn layuiadmin-btn-list" onclick="generateToken()"><i class="layui-icon layui-icon-add-1"></i> 生成新设备令牌</button>
          </div>
          
          <!-- 数据表格 -->
          <table class="layui-table" id="tabledata" lay-filter="tabledata"></table>
          
          <!-- 操作列模板 -->
          <script type="text/html" id="barTpl">
            <button class="table-btn" onclick="copyToken('{{d.device_token}}')">复制令牌</button>
            <button class="table-btn" onclick="changeStatus({{d.id}}, {{d.status}})">{{# if(d.status==1){ }}禁用{{# }else{ }}启用{{# } }}</button>
            <button class="table-btn" onclick="deleteDevice({{d.id}})">删除</button>
          </script>
        </div>
      </div>
    </div>
  </div>
  {include file="public/js"/}
  <script>
  var tableIns;
  
  layui.use(['table', 'form'], function(){
    var table = layui.table;
    
    // 渲染表格
    renderTable();
  });
  
  function renderTable() {
    tableIns = layui.table.render({
      elem: '#tabledata',
      url: '{:url('device_list')}',
      page: false,
      cols: [[
        {field: 'id', title: 'ID', width: 80, sort: true},
        {field: 'device_name', title: '设备名称', width: 200},
        {field: 'device_id', title: '设备ID', width: 250, templet: function(d){
          return '<span style="font-family: monospace; font-size: 11px; color: #666;">' + (d.device_id || '-') + '</span>';
        }},
        {field: 'mdid', title: '门店', width: 120, templet: function(d){
          return d.mdid > 0 ? '门店ID: ' + d.mdid : '未绑定';
        }},
        {field: 'device_token', title: '设备令牌', minWidth: 300, templet: function(d){
          return '<span style="font-family: monospace; font-size: 12px;">' + d.device_token + '</span>';
        }},
        {field: 'status', title: '状态', width: 100, templet: function(d){
          return d.status == 1 ? '<span style="color:#5FB878;">启用</span>' : '<span style="color:#FF5722;">禁用</span>';
        }},
        {field: 'create_time', title: '创建时间', width: 160, templet: function(d){
          return d.create_time ? date('Y-m-d H:i:s', d.create_time) : '-';
        }},
        {fixed: 'right', title: '操作', width: 200, toolbar: '#barTpl'}
      ]]
    });
  }
  
  // 生成新设备令牌
  function generateToken() {
    layer.open({
      type: 1,
      title: '生成新设备令牌',
      area: ['500px', '300px'],
      content: '<div style="padding: 20px;">' +
        '<div class="layui-form" lay-filter="deviceForm">' +
        '<div class="layui-form-item">' +
        '<label class="layui-form-label">设备名称：</label>' +
        '<div class="layui-input-block">' +
        '<input type="text" name="device_name" lay-verify="required" placeholder="请输入设备名称" class="layui-input">' +
        '</div>' +
        '</div>' +
        '<div class="layui-form-item">' +
        '<label class="layui-form-label">选择门店：</label>' +
        '<div class="layui-input-block">' +
        '<select name="mdid" lay-verify="required">' +
        '<option value="">请选择门店</option>' +
        '{foreach $mendian_list as $md}' +
        '<option value="{$md.id}">{$md.name}</option>' +
        '{/foreach}' +
        '</select>' +
        '</div>' +
        '</div>' +
        '<div class="layui-form-item">' +
        '<div class="layui-input-block">' +
        '<button class="layui-btn" lay-submit lay-filter="submitDevice">生成令牌</button>' +
        '<button type="button" class="layui-btn layui-btn-primary" onclick="layer.closeAll()">取消</button>' +
        '</div>' +
        '</div>' +
        '</div>' +
        '</div>',
      success: function(){
        layui.form.render();
        layui.form.on('submit(submitDevice)', function(data){
          var field = data.field;
          var index = layer.load();
          $.post("{:url('device_generate_token')}", field, function(res){
            layer.close(index);
            if(res.status == 1){
              layer.closeAll();
              
              // 构建显示内容
              var content = '设备令牌生成成功！<br><br>';
              
              // 设备ID
              if(res.data.device_id) {
                content += '<strong>设备ID：</strong><br>';
                content += '<textarea readonly style="width:100%;height:40px;font-family:monospace;font-size:11px;padding:5px;margin-bottom:10px;">' + res.data.device_id + '</textarea><br>';
              }
              
              // 设备令牌
              content += '<strong>设备令牌：</strong><br>';
              content += '<textarea readonly style="width:100%;height:60px;font-family:monospace;font-size:12px;padding:5px;">' + res.data.device_token + '</textarea><br>';
              content += '<button class="layui-btn layui-btn-xs" onclick="copyText(\'' + res.data.device_token + '\')">复制令牌</button>';
              
              layer.alert(content, {
                title: '生成成功',
                btn: ['确定'],
                area: ['500px', 'auto'],
                yes: function(){
                  renderTable();
                  layer.closeAll();
                }
              });
            } else {
              layer.msg(res.msg);
            }
          })
          return false;
        });
      }
    });
  }
  
  // 复制令牌
  function copyToken(token) {
    copyText(token);
  }
  
  // 切换状态
  function changeStatus(id, status) {
    var newStatus = status == 1 ? 0 : 1;
    var statusText = newStatus == 1 ? '启用' : '禁用';
    layer.confirm('确定要' + statusText + '该设备吗？', {icon: 3, title: '操作确认'}, function(index){
      layer.close(index);
      var loadIndex = layer.load();
      $.post("{:url('device_update_status')}", {id: id, status: newStatus}, function(data){
        layer.close(loadIndex);
        dialog(data.msg, data.status);
        if(data.status == 1){
          renderTable();
        }
      })
    });
  }
  
  // 删除设备
  function deleteDevice(id) {
    layer.confirm('确定要删除该设备吗？删除后无法恢复！', {icon: 7, title: '操作确认'}, function(index){
      layer.close(index);
      var loadIndex = layer.load();
      $.post("{:url('device_delete')}", {id: id}, function(data){
        layer.close(loadIndex);
        dialog(data.msg, data.status);
        if(data.status == 1){
          renderTable();
        }
      })
    });
  }
  </script>
  {include file="public/copyright"/}
</body>
</html>
