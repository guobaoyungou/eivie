<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{$category ? '编辑分类' : '新增分类'}</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
        <div class="layui-card-header">
          {if !$category['id']}<i class="fa fa-plus"></i> 新增模型分类{else}<i class="fa fa-pencil"></i> 编辑模型分类{/if}
          <i class="layui-icon layui-icon-close" style="font-size:18px;font-weight:bold;cursor:pointer;float:right;" onclick="closeself()"></i>
        </div>
        <div class="layui-card-body" pad15>
          <div class="layui-form form-label-w7" lay-filter="category-form">
            <input type="hidden" name="id" value="{$category.id|default=''}">
            
            <div class="layui-form-item">
              <label class="layui-form-label">分类层级：</label>
              <div class="layui-input-inline">
                <select name="level" lay-verify="required" lay-verType="tips" lay-filter="level-change">
                  <option value="">请选择层级</option>
                  <option value="1" {if !isset($category) || $category.level == 1}selected{/if}>一级分类</option>
                  <option value="2" {if isset($category) && $category.level == 2}selected{/if}>二级分类</option>
                </select>
              </div>
              <div class="layui-form-mid layui-word-aux">一级为顶级分类，二级归属于一级下</div>
            </div>

            <div class="layui-form-item" id="parent-code-item" style="{if !isset($category) || $category.level != 2}display:none;{/if}">
              <label class="layui-form-label">父级分类：</label>
              <div class="layui-input-inline">
                <select name="parent_code" lay-verify="">
                  <option value="">请选择父级分类</option>
                  {volist name="level1Categories" id="cat1"}
                  <option value="{$cat1.code}" {if isset($category) && $category.parent_code == $cat1.code}selected{/if}>{$cat1.icon} {$cat1.name}</option>
                  {/volist}
                </select>
              </div>
              <div class="layui-form-mid layui-word-aux">二级分类必须选择父级</div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label">分类名称：</label>
              <div class="layui-input-inline" style="width: 400px;">
                <input type="text" name="name" value="{$category.name|default=''}" 
                       placeholder="请输入分类名称" lay-verify="required" lay-verType="tips" 
                       autocomplete="off" class="layui-input" maxlength="50">
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label">分类代码：</label>
              <div class="layui-input-inline" style="width: 400px;">
                <input type="text" name="code" value="{$category.code|default=''}" 
                       placeholder="字母、数字、下划线" lay-verify="required|code" lay-verType="tips" 
                       autocomplete="off" class="layui-input" maxlength="50"
                       {if !empty($category.is_system) && $category.is_system == 1}readonly{/if}>
              </div>
              {if !empty($category.is_system) && $category.is_system == 1}
              <div class="layui-form-mid layui-word-aux" style="color:#999;">(系统分类代码不可修改)</div>
              {/if}
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label">分类描述：</label>
              <div class="layui-input-block" style="width: 600px;">
                <textarea name="description" placeholder="请输入分类描述（选填）" 
                          class="layui-textarea" style="min-height: 80px;" maxlength="200">{$category.description|default=''}</textarea>
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label">分类图标：</label>
              <div class="layui-input-inline" style="width: 400px;">
                <input type="text" name="icon" value="{$category.icon|default=''}" 
                       placeholder="可输入emoji表情或上传图片URL（选填）" 
                       autocomplete="off" class="layui-input" maxlength="200">
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label">排序权重：</label>
              <div class="layui-input-inline">
                <input type="number" name="sort" value="{$category.sort|default='0'}" 
                       placeholder="数字越大越靠前" class="layui-input">
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label">是否启用：</label>
              <div class="layui-input-inline">
                <input type="radio" name="status" value="1" title="启用" 
                       {if !isset($category) || $category.status == 1}checked{/if}>
                <input type="radio" name="status" value="0" title="禁用" 
                       {if isset($category) && $category.status == 0}checked{/if}>
              </div>
            </div>

            <div class="layui-form-item">
              <div class="layui-input-block" style="margin-left:130px;">
                <button class="layui-btn" lay-submit lay-filter="formsubmit">提 交</button>
                <button type="button" class="layui-btn layui-btn-primary" onclick="closeself()">取 消</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  {include file="public/js"/}
  <script>
  layui.use(['form', 'layer'], function(){
    var form = layui.form;
    var layer = layui.layer;
    var $ = layui.$;

    // 自定义验证规则
    form.verify({
      code: function(value, item){
        if(!/^[a-z0-9_]+$/.test(value)){
          return '分类代码只能包含小写字母、数字和下划线';
        }
      }
    });

    // 层级变化事件：控制父级分类显示隐藏
    form.on('select(level-change)', function(data){
      if(data.value == '2'){
        $('#parent-code-item').show();
        $('select[name="parent_code"]').attr('lay-verify', 'required');
      } else {
        $('#parent-code-item').hide();
        $('select[name="parent_code"]').removeAttr('lay-verify');
        $('select[name="parent_code"]').val('');
      }
      form.render('select');
    });

    // 提交表单
    form.on('submit(formsubmit)', function(obj){
      var field = obj.field;
      
      // 验证：二级分类必须选择父级
      if(field.level == '2' && !field.parent_code){
        layer.msg('二级分类必须选择父级分类', {icon: 2});
        return false;
      }
      
      var index = layer.load();
      $.post('/AiTravelPhoto/model_category_edit', field, function(data){
        layer.close(index);
        dialog(data.msg, data.status);
        if(data.status == 1){
          setTimeout(function(){
            parent.layer.closeAll();
            if(parent.tableIns){
              parent.tableIns.reload();
            }
          }, 1000);
        }
      });
      return false;
    });
  });
  </script>
  {include file="public/copyright"/}
</body>
</html>
