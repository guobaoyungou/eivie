<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>参数定义管理 - {$model.model_name}</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    {include file="public/css"/}
</head>
<body>
<div class="layui-fluid">
    <div class="layui-card">
        <div class="layui-card-header">
            <h3>参数定义管理：{$model.model_name}</h3>
            <span style="color:#999;font-size:12px;">模型代码：{$model.model_code}</span>
        </div>
        <div class="layui-card-body">
            <div class="layui-form" style="margin-bottom:15px;">
                <button class="layui-btn layui-btn-normal" id="add-btn">
                    <i class="layui-icon layui-icon-add-1"></i> 新增参数
                </button>
            </div>

            <!-- 数据表格 -->
            <table class="layui-hide" id="param-table" lay-filter="param-table"></table>
        </div>
    </div>
</div>

<!-- 表格操作列模板 -->
<script type="text/html" id="toolbar-tpl">
    <a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
</script>

<!-- 必填显示模板 -->
<script type="text/html" id="required-tpl">
    {{# if (d.is_required == 1) { }}
    <span class="layui-badge layui-bg-red">必填</span>
    {{# } else { }}
    <span class="layui-badge">可选</span>
    {{# } }}
</script>

{include file="public/js"/}
<script>
var modelId = '{$model.id}';
var tableIns;

layui.use(['table', 'form', 'layer'], function(){
    var table = layui.table;
    var form = layui.form;
    var layer = layui.layer;
    var $ = layui.$;

    // 渲染表格
    tableIns = table.render({
        elem: '#param-table',
        url: '{:url("parameters")}/model_id/' + modelId,
        page: false,
        cols: [[
            {field: 'id', title: 'ID', width: 60},
            {field: 'param_name', title: '参数名称', width: 150},
            {field: 'param_label', title: '参数标签', width: 120},
            {field: 'param_type', title: '数据类型', width: 100},
            {field: 'data_format', title: '数据格式', width: 120},
            {field: 'is_required', title: '必填', width: 80, templet: '#required-tpl'},
            {field: 'default_value', title: '默认值', width: 120, templet: function(d){
                return d.default_value || '<span style="color:#ccc;">无</span>';
            }},
            {field: 'description', title: '参数说明', minWidth: 200},
            {field: 'sort', title: '排序', width: 70},
            {title: '操作', width: 120, align: 'center', toolbar: '#toolbar-tpl', fixed: 'right'}
        ]]
    });

    // 新增参数
    $('#add-btn').click(function(){
        console.log('点击了新增按钮');
        try {
            showParamForm(null);
        } catch(e) {
            console.error('调用showParamForm出错:', e);
            layer.msg('出错了：' + e.message, {icon: 2});
        }
    });

    // 工具栏事件
    table.on('tool(param-table)', function(obj){
        var data = obj.data;
        
        if(obj.event === 'edit'){
            showParamForm(data);
        } else if(obj.event === 'del'){
            layer.confirm('确定删除该参数吗？', function(index){
                var loadIndex = layer.load();
                $.post('{:url("delete_parameter")}', {id: data.id}, function(res){
                    layer.close(loadIndex);
                    if(res.success){
                        dialog(res.message, 1);
                        tableIns.reload();
                    } else {
                        dialog(res.message, 0);
                    }
                });
                layer.close(index);
            });
        }
    });
});

// 显示参数表单
function showParamForm(data) {
    console.log('showParamForm被调用, data:', data);
    
    var title = data ? '编辑参数' : '新增参数';
    
    console.log('开始构建表单HTML');
    var content = buildParamForm(data);
    console.log('表单HTML构建完成，长度:', content.length);
    
    console.log('开始打开layer弹窗');
    var formIndex = layer.open({
        type: 1,
        title: title,
        area: ['700px', '90%'],
        content: content,
        success: function(layero, index){
            console.log('layer弹窗打开成功, layero:', layero, 'index:', index, 'formIndex:', formIndex);
            
            // 重新渲染表单
            console.log('开始渲染表单');
            layui.form.render();
            console.log('表单渲染完成');
            
            // 监听表单提交
            console.log('开始监听表单提交事件');
            layui.form.on('submit(param-form-submit)', function(obj){
                var field = obj.field;
                field.model_id = modelId;
                
                console.log('准备提交数据:', field);
                
                var loadIndex = layer.load();
                $.ajax({
                    url: '{:url("save_parameter")}',
                    type: 'POST',
                    data: field,
                    dataType: 'json',
                    success: function(res){
                        layer.close(loadIndex);
                        console.log('服务器响应:', res);
                        if(res.success){
                            layer.msg(res.message, {icon: 1, time: 1500}, function(){
                                layer.close(formIndex);
                                tableIns.reload();
                            });
                        } else {
                            layer.msg(res.message || '保存失败', {icon: 2});
                        }
                    },
                    error: function(xhr, status, error){
                        layer.close(loadIndex);
                        console.error('AJAX请求失败:', {xhr: xhr, status: status, error: error});
                        console.error('响应内容:', xhr.responseText);
                        var errorMsg = '请求失败';
                        if(xhr.responseText){
                            try{
                                var errorData = JSON.parse(xhr.responseText);
                                errorMsg = errorData.message || errorMsg;
                            }catch(e){
                                errorMsg = xhr.statusText || errorMsg;
                            }
                        }
                        layer.msg(errorMsg, {icon: 2});
                    }
                });
                return false;
            });
        }
    });
}

// 构建参数表单HTML
function buildParamForm(data) {
    console.log('buildParamForm被调用, data:', data);
    
    data = data || {};
    var paramTypes = {:json_encode($paramTypes)};
    var dataFormats = {:json_encode($dataFormats)};
    
    console.log('paramTypes:', paramTypes);
    console.log('dataFormats:', dataFormats);
    
    var html = '<div style="padding:20px;">';
    html += '<form class="layui-form form-label-w7" lay-filter="param-form">';
    html += '<input type="hidden" name="id" value="' + (data.id || '') + '">';
    
    // 参数名称
    html += '<div class="layui-form-item">';
    html += '<label class="layui-form-label"><span style="color:red;">*</span> 参数名称</label>';
    html += '<div class="layui-input-block">';
    html += '<input type="text" name="param_name" value="' + (data.param_name || '') + '" ';
    html += 'placeholder="如：reference_image" lay-verify="required" lay-verType="tips" class="layui-input" maxlength="100">';
    html += '</div></div>';
    
    // 参数标签
    html += '<div class="layui-form-item">';
    html += '<label class="layui-form-label"><span style="color:red;">*</span> 参数标签</label>';
    html += '<div class="layui-input-block">';
    html += '<input type="text" name="param_label" value="' + (data.param_label || '') + '" ';
    html += 'placeholder="如：参考图像" lay-verify="required" lay-verType="tips" class="layui-input" maxlength="100">';
    html += '</div></div>';
    
    // 数据类型
    html += '<div class="layui-form-item">';
    html += '<label class="layui-form-label"><span style="color:red;">*</span> 数据类型</label>';
    html += '<div class="layui-input-block">';
    html += '<select name="param_type" lay-verify="required" lay-verType="tips">';
    html += '<option value="">请选择</option>';
    for(var k in paramTypes){
        html += '<option value="' + k + '"' + (data.param_type == k ? ' selected' : '') + '>' + paramTypes[k] + '</option>';
    }
    html += '</select></div></div>';
    
    // 数据格式
    html += '<div class="layui-form-item">';
    html += '<label class="layui-form-label">数据格式</label>';
    html += '<div class="layui-input-block">';
    html += '<select name="data_format">';
    html += '<option value="">无</option>';
    for(var k in dataFormats){
        html += '<option value="' + k + '"' + (data.data_format == k ? ' selected' : '') + '>' + dataFormats[k] + '</option>';
    }
    html += '</select></div></div>';
    
    // 是否必填
    html += '<div class="layui-form-item">';
    html += '<label class="layui-form-label">是否必填</label>';
    html += '<div class="layui-input-block">';
    html += '<input type="radio" name="is_required" value="1" title="必填"' + (!data.id || data.is_required == 1 ? ' checked' : '') + '>';
    html += '<input type="radio" name="is_required" value="0" title="可选"' + (data.is_required == 0 ? ' checked' : '') + '>';
    html += '</div></div>';
    
    // 默认值
    html += '<div class="layui-form-item">';
    html += '<label class="layui-form-label">默认值</label>';
    html += '<div class="layui-input-block">';
    html += '<input type="text" name="default_value" value="' + (data.default_value || '') + '" ';
    html += 'placeholder="留空表示无默认值" class="layui-input">';
    html += '</div></div>';
    
    // 参数说明
    html += '<div class="layui-form-item">';
    html += '<label class="layui-form-label">参数说明</label>';
    html += '<div class="layui-input-block">';
    html += '<textarea name="description" placeholder="用途、注意事项" class="layui-textarea" style="min-height:80px;">' + (data.description || '') + '</textarea>';
    html += '</div></div>';
    
    // 排序
    html += '<div class="layui-form-item">';
    html += '<label class="layui-form-label">排序</label>';
    html += '<div class="layui-input-block">';
    html += '<input type="number" name="sort" value="' + (data.sort || 100) + '" class="layui-input">';
    html += '</div></div>';
    
    // 提交按钮
    html += '<div class="layui-form-item">';
    html += '<div class="layui-input-block">';
    html += '<button class="layui-btn" lay-submit lay-filter="param-form-submit">提 交</button>';
    html += '<button type="button" class="layui-btn layui-btn-primary" onclick="layer.closeAll()">取 消</button>';
    html += '</div></div>';
    
    html += '</form>';
    html += '</div>';
    return html;
}
</script>
{include file="public/copyright"/}
</body>
</html>
