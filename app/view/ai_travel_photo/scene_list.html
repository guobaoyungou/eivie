<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>场景管理</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
  <style>
  /* 修复Layui表格复选框垂直对齐问题 */
  .layui-table-view .layui-table td {
    vertical-align: middle !important;
  }
  .layui-table-cell {
    height: auto !important;
    padding: 9px 15px !important;
  }
  /* 复选框容器居中 */
  .layui-table-cell .layui-form-checkbox {
    top: 0 !important;
    margin: 0 !important;
  }
  /* 确保图片不撑高单元格 */
  .layui-table-cell img {
    vertical-align: middle;
    max-height: 50px;
  }
  </style>
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
        <div class="layui-card-header">场景管理</div>
        <div class="layui-card-body" pad15>
          <!-- 筛选区域 -->
          <div class="layui-form layui-form-search" style="margin-bottom: 15px;">
            <div class="layui-inline">
              <label class="layui-form-label">分类：</label>
              <div class="layui-input-inline">
                <select name="category" lay-filter="categoryFilter">
                  <option value="">全部分类</option>
                  {foreach $categories as $cat}
                  <option value="{$cat}">{$cat}</option>
                  {/foreach}
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">状态：</label>
              <div class="layui-input-inline">
                <select name="status" lay-filter="statusFilter">
                  <option value="">全部状态</option>
                  <option value="1">启用</option>
                  <option value="0">禁用</option>
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">门店：</label>
              <div class="layui-input-inline">
                <select name="mdid" lay-filter="mdidFilter">
                  <option value="">全部门店</option>
                  <option value="0">未关联门店</option>
                  {foreach $mendian_list as $md}
                  <option value="{$md.id}">{$md.name}</option>
                  {/foreach}
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">属性：</label>
              <div class="layui-input-inline">
                <select name="is_public" lay-filter="isPublicFilter">
                  <option value="">全部</option>
                  <option value="1">公共场景</option>
                  <option value="0">私有场景</option>
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <button class="layui-btn" lay-submit lay-filter="searchBtn"><i class="layui-icon layui-icon-search"></i> 搜索</button>
            </div>
          </div>
          
          <!-- 操作按钮区 -->
          <div class="layui-col-md12" style="padding-bottom:10px">
            <a class="layui-btn layuiadmin-btn-list" href="javascript:void(0)" onclick="openmax('{:url('scene_edit')}')"><i class="layui-icon layui-icon-add-1"></i> 新增场景</a>
            <button class="layui-btn layui-btn-normal layuiadmin-btn-list" onclick="batchAction('enable')"><i class="layui-icon layui-icon-ok"></i> 批量启用</button>
            <button class="layui-btn layui-btn-warm layuiadmin-btn-list" onclick="batchAction('disable')"><i class="layui-icon layui-icon-close"></i> 批量禁用</button>
            <button class="layui-btn layui-btn-danger layuiadmin-btn-list" onclick="batchAction('delete')"><i class="layui-icon layui-icon-delete"></i> 批量删除</button>
          </div>
          
          <!-- 数据表格 -->
          <table class="layui-table" id="tabledata" lay-filter="tabledata"></table>
          
          <!-- 操作列模板 -->
          <script type="text/html" id="barTpl">
            <button class="table-btn" onclick="openmax('{:url('scene_edit')}/id/{{d.id}}')">编辑</button>
            <button class="table-btn" onclick="changeStatus({{d.id}}, {{d.status}})">{{# if(d.status==1){ }}禁用{{# }else{ }}启用{{# } }}</button>
            <button class="table-btn" onclick="deleteScene({{d.id}})">删除</button>
          </script>
        </div>
      </div>
    </div>
  </div>
  {include file="public/js"/}
  <script>
  // 定义openmax函数用于打开弹窗
  function openmax(url){
    console.log('[场景管理] 打开弹窗:', url);
    var index = layer.open({
      type: 2,
      title: '场景编辑',
      area: ['90%', '90%'],
      maxmin: true,
      content: url,
      success: function(layero, index){
        console.log('[场景管理] 弹窗打开成功');
      },
      end: function(){
        console.log('[场景管理] 弹窗关闭，刷新列表');
        if(typeof tableIns !== 'undefined'){
          tableIns.reload();
        }
      }
    });
    layer.full(index);
  }
  
  var datawhere = {};
  var tableIns;
  
  layui.use(['table', 'form'], function(){
    var table = layui.table;
    var form = layui.form;
    
    // 渲染表格
    tableIns = table.render({
      elem: '#tabledata',
      url: '{:url('scene_list')}',
      page: true,
      limit: 20,
      where: datawhere,
      cols: [[
        {type: 'checkbox', fixed: 'left'},
        {field: 'id', title: 'ID', width: 80, sort: true},
        {field: 'cover', title: '封面图', width: 100, templet: function(d){ 
          return d.cover ? '<img src="'+d.cover+'" style="height:50px;cursor:pointer;" onclick="layer.photos({photos: {data: [{src: \''+d.cover+'\'}]}, anim: 5});">' : '-';
        }},
        {field: 'name', title: '场景名称', width: 200},
        {field: 'category', title: '分类', width: 120},
        {field: 'mdid', title: '所属门店', width: 150, templet: function(d){
          if(d.mdid == 0) return '<span style="color:#999;">-</span>';
          return d.mendian_name || '门店不存在(ID:'+d.mdid+')';
        }},
        {field: 'is_public', title: '场景属性', width: 100, templet: function(d){
          return d.is_public == 1 ? '<span style="color:#16b777;">公共</span>' : '<span style="color:#999;">私有</span>';
        }},
        {field: 'status', title: '状态', width: 100, templet: function(d){
          return d.status == 1 ? '<span style="color:#5FB878;">启用</span>' : '<span style="color:#FF5722;">禁用</span>';
        }},
        {field: 'use_count', title: '使用次数', width: 100, sort: true},
        {field: 'sort', title: '排序', width: 80, sort: true},
        {field: 'create_time', title: '创建时间', width: 160, templet: function(d){
          return d.create_time ? date('Y-m-d H:i:s', d.create_time) : '-';
        }},
        {fixed: 'right', title: '操作', width: 200, toolbar: '#barTpl'}
      ]]
    });
    
    // 筛选监听
    form.on('submit(searchBtn)', function(data){
      datawhere = data.field;
      tableIns.reload({
        where: datawhere,
        page: {curr: 1}
      });
      return false;
    });
    
    form.on('select(categoryFilter)', function(data){
      datawhere.category = data.value;
      tableIns.reload({
        where: datawhere,
        page: {curr: 1}
      });
    });
    
    form.on('select(statusFilter)', function(data){
      datawhere.status = data.value;
      tableIns.reload({
        where: datawhere,
        page: {curr: 1}
      });
    });
    
    form.on('select(mdidFilter)', function(data){
      datawhere.mdid = data.value;
      tableIns.reload({
        where: datawhere,
        page: {curr: 1}
      });
    });
    
    form.on('select(isPublicFilter)', function(data){
      datawhere.is_public = data.value;
      tableIns.reload({
        where: datawhere,
        page: {curr: 1}
      });
    });
  });
  
  // 批量操作
  function batchAction(action) {
    var checkStatus = layui.table.checkStatus('tabledata');
    var checkData = checkStatus.data;
    if (checkData.length === 0) {
      return layer.msg('请选择要操作的数据');
    }
    
    var ids = [];
    for (var i = 0; i < checkData.length; i++) {
      ids.push(checkData[i].id);
    }
    
    var actionText = action == 'enable' ? '启用' : (action == 'disable' ? '禁用' : '删除');
    layer.confirm('确定要' + actionText + '选中的场景吗？', {icon: 3, title: '操作确认'}, function(index){
      layer.close(index);
      var loadIndex = layer.load();
      $.post("{:url('scene_batch')}", {action: action, ids: ids}, function(data){
        layer.close(loadIndex);
        dialog(data.msg, data.status);
        if(data.status == 1){
          tableIns.reload();
        }
      })
    });
  }
  
  // 切换状态
  function changeStatus(id, status) {
    var newStatus = status == 1 ? 0 : 1;
    var statusText = newStatus == 1 ? '启用' : '禁用';
    layer.confirm('确定要' + statusText + '该场景吗？', {icon: 3, title: '操作确认'}, function(index){
      layer.close(index);
      var loadIndex = layer.load();
      $.post("{:url('scene_batch')}", {action: newStatus == 1 ? 'enable' : 'disable', ids: [id]}, function(data){
        layer.close(loadIndex);
        dialog(data.msg, data.status);
        if(data.status == 1){
          tableIns.reload();
        }
      })
    });
  }
  
  // 删除场景
  function deleteScene(id) {
    layer.confirm('确定要删除该场景吗？删除后无法恢复！', {icon: 7, title: '操作确认'}, function(index){
      layer.close(index);
      var loadIndex = layer.load();
      $.post("{:url('scene_delete')}", {id: id}, function(data){
        layer.close(loadIndex);
        dialog(data.msg, data.status);
        if(data.status == 1){
          tableIns.reload();
        }
      })
    });
  }
  </script>
  {include file="public/copyright"/}
</body>
</html>
