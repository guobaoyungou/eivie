<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>合成模板</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
  <style>
    .template-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 4px; }
    .template-images { display: flex; gap: 5px; flex-wrap: wrap; }
    .template-images img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-card">
      <div class="layui-card-header">
        <i class="layui-icon layui-icon-picture"></i> 合成模板管理
      </div>
      <div class="layui-card-body">
        <!-- 工具栏 -->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto">
          <div class="layui-form-item">
            <div class="layui-inline">
              <label class="layui-form-label">关键词</label>
              <div class="layui-input-inline">
                <input type="text" name="keyword" placeholder="模板名称" autocomplete="off" class="layui-input">
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">状态</label>
              <div class="layui-input-inline">
                <select name="status">
                  <option value="all">全部状态</option>
                  <option value="1">启用</option>
                  <option value="0">禁用</option>
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <button class="layui-btn layui-btn-sm" lay-submit lay-filter="searchForm">
                <i class="layui-icon layui-icon-search"></i> 搜索
              </button>
              <button type="reset" class="layui-btn layui-btn-sm layui-btn-primary">
                <i class="layui-icon layui-icon-refresh"></i> 重置
              </button>
            </div>
          </div>
        </div>

        <!-- 操作栏 -->
        <div style="padding: 10px;">
          <button class="layui-btn layui-btn-sm" onclick="openTemplate(0)">
            <i class="layui-icon layui-icon-add-1"></i> 新增模板
          </button>
        </div>

        <!-- 数据表格 -->
        <table class="layui-table" id="tableData" lay-filter="tableData"></table>

        <!-- 操作列模板 -->
        <script type="text/html" id="barTpl">
          <button class="layui-btn layui-btn-xs" onclick="openTemplate({{d.id}})">编辑</button>
          <button class="layui-btn layui-btn-xs layui-btn-normal" onclick="showQrcode({{d.id}}, '{{d.name}}')">二维码</button>
          <button class="layui-btn layui-btn-danger layui-btn-xs" onclick="deleteTemplate({{d.id}})">删除</button>
        </script>

        <!-- 状态列模板 -->
        <script type="text/html" id="statusTpl">
          {{# if(d.status == 1){ }}
            <span class="layui-badge layui-bg-green">启用</span>
          {{# } else { }}
            <span class="layui-badge">禁用</span>
          {{# } }}
        </script>

        <!-- 图片列模板 -->
        <script type="text/html" id="imagesTpl">
          <div class="template-images">
            {{# var images = d.images ? JSON.parse(d.images) : []; }}
            {{# if(images.length > 0){ }}
              {{# for(var i=0; i<Math.min(images.length, 4); i++){ }}
                <img src="{{images[i]}}" alt="模板图">
              {{# } }}
              {{# if(images.length > 4){ }}
                <span>+{{images.length - 4}}</span>
              {{# } }}
            {{# } else { }}
              <span style="color:#999">暂无图片</span>
            {{# } }}
          </div>
        </script>
      </div>
    </div>
  </div>
  {include file="public/js"/}
  <script>
  var tableIns;

  layui.use(['table', 'form'], function(){
    var table = layui.table;
    var form = layui.form;

    // 渲染表格
    tableIns = table.render({
      elem: '#tableData',
      url: '{:url("synthesis_template_list")}',
      page: true,
      limit: 20,
      cols: [[
        {type: 'checkbox', fixed: 'left'},
        {field: 'id', title: 'ID', width: 80, sort: true},
        {field: 'name', title: '模板名称', width: 150},
        {field: 'scene_template_name', title: '来源场景模板', width: 160, templet: function(d){
          if(d.scene_template_id > 0){
            var name = d.scene_template_name || '已删除';
            if(name === '已删除'){
              return '<span class="layui-badge">' + name + '</span>';
            }
            return '<span title="ID:' + d.scene_template_id + '">' + name + '</span>';
          }
          return '<span style="color:#ccc">手动创建</span>';
        }},
        {field: 'model_name', title: '绑定模型', width: 150},
        {field: 'store_scope', title: '门店范围', minWidth: 180, templet: function(d){
          if(d.store_scope == 0){
            return '<span style="color:#5FB878;">全部门店</span>';
          } else {
            var names = d.store_names || [];
            if(names.length === 0) return '<span style="color:#FF5722;">未指定门店</span>';
            return '<span title="' + names.join('、') + '">' + names.join('、') + '</span>';
          }
        }},
        {field: 'business_price', title: '采购价', width: 90, templet: function(d){
          var p = d.business_price;
          return p && p > 0 ? '¥' + parseFloat(p).toFixed(2) : '-';
        }},
        {field: 'auto_tags', title: '自动标签', width: 240, templet: function(d){
          var html = '';
          // Use joined fields from generation_scene_template
          var g = d.scene_gender_tag;
          if(g){var gl={'Male':'男性','Female':'女性','Unknown':'未知'}[g]||g;html+='<span style="display:inline-block;padding:1px 6px;margin:1px 2px;background:#e8f4f8;color:#1E9FFF;border-radius:2px;font-size:11px">'+gl+'</span>';}
          var a = d.scene_age_tag;
          if(a){var am={'0-2':'新生儿婴儿','3-9':'小学低龄','10-19':'初中少年','20-29':'职场青年','30-39':'而立青年','36-40':'青中年','41-45':'壮年期','46-50':'中年主力','51-55':'中老年前期','56-60':'准老年前期','61-65':'低龄活力老人','66-70':'健康老人','71-75':'中年老人','76-80':'高龄老人','81-85':'超高龄老人','86+':'长寿老人','Unknown':'未知','新生儿婴儿':'新生儿婴儿','学步期':'学步期','低龄幼童':'低龄幼童','小班幼儿':'小班幼儿','中班幼儿':'中班幼儿','大班幼儿':'大班幼儿','小学低龄':'小学低龄','小学高龄':'小学高龄','初中少年':'初中少年','高中青年':'高中青年','校园青年':'校园青年','初入职场':'初入职场','职场青年':'职场青年','而立青年':'而立青年','青中年':'青中年','壮年期':'壮年期','中年主力':'中年主力','中老年前期':'中老年前期','准老年前期':'准老年前期','低龄活力老人':'低龄活力老人','健康老人':'健康老人','中年老人':'中年老人','高龄老人':'高龄老人','超高龄老人':'超高龄老人','长寿老人':'长寿老人','青少年':'青少年','婴幼儿':'婴幼儿','儿童':'儿童','青年':'青年','中青年':'中青年','中年':'中年','中老年':'中老年','老年':'老年','准老年':'准老年'};html+='<span style="display:inline-block;padding:1px 6px;margin:1px 2px;background:#e8f4f8;color:#1E9FFF;border-radius:2px;font-size:11px">'+(am[a]||a)+'</span>';}
          // Single/multi person + face count
          var fc = parseInt(d.scene_face_count) || 0;
          var isMulti = parseInt(d.scene_is_multi) || 0;
          if(fc > 0 || isMulti > 0) {
            if(isMulti > 0 || fc > 1) {
              html += '<span style="display:inline-block;padding:1px 6px;margin:1px 2px;background:#FF5722;color:#fff;border-radius:2px;font-size:11px">多人</span>';
            } else {
              html += '<span style="display:inline-block;padding:1px 6px;margin:1px 2px;background:#5FB878;color:#fff;border-radius:2px;font-size:11px">单人</span>';
            }
            if(fc > 0) html += '<span style="display:inline-block;padding:1px 6px;margin:1px 2px;background:#f0f0f0;color:#666;border-radius:2px;font-size:11px">' + fc + '脸</span>';
          }
          return html ? html : '<span style="color:#ccc">-</span>';
        }},
        {field: 'category', title: '分类', width: 100},
        {field: 'images', title: '模板图片', width: 250, templet: '#imagesTpl'},
        {field: 'sort', title: '排序', width: 80, edit: 'text'},
        {field: 'status', title: '状态', width: 100, templet: '#statusTpl'},
        {field: 'create_time', title: '创建时间', width: 170, templet: function(d){
          return d.create_time ? layui.util.toDateString(d.create_time * 1000, 'yyyy-MM-dd HH:mm') : '-';
        }},
        {fixed: 'right', title: '操作', width: 230, toolbar: '#barTpl'}
      ]]
    });

    // 搜索
    form.on('submit(searchForm)', function(data){
      tableIns.reload({
        where: data.field,
        page: {curr: 1}
      });
      return false;
    });

    // 监听排序编辑
    table.on('edit(tableData)', function(obj){
      var value = obj.value;
      var data = obj.data;
      $.post('{:url("synthesis_template_save")}', {
        id: data.id,
        scene_template_id: data.scene_template_id || 0,
        name: data.name,
        model_id: data.model_id,
        model_name: data.model_name,
        images: JSON.parse(data.images || '[]'),
        prompt: data.prompt,
        status: data.status,
        store_scope: data.store_scope || 0,
        store_ids: data.store_ids || '',
        sort: value
      }, function(res){
        if(res.code !== 0){
          layer.msg(res.msg);
        }
      });
    });

    // 监听删除
    table.on('tool(tableData)', function(obj){
      if(obj.event === 'delete'){
        layer.confirm('确定删除此模板吗？', function(index){
          $.post('{:url("synthesis_template_delete")}', {id: obj.data.id}, function(res){
            if(res.code === 0){
              obj.del();
              layer.close(index);
            } else {
              layer.msg(res.msg);
            }
          });
        });
      }
    });
  });

  // 打开模板编辑弹窗
  function openTemplate(id){
    var url = '{:url("AiTravelPhoto/synthesis_template_edit")}';
    if(id > 0){
      url += '?id=' + id;
    }
    layer.open({
      type: 2,
      title: id > 0 ? '编辑模板' : '新增模板',
      content: url,
      area: ['800px', '700px'],
      btn: ['保存', '取消'],
      yes: function(index, layero){
        var iframeWin = window[layero.find('iframe')[0]['name']];
        iframeWin.submitForm();
      }
    });
  }

  // 删除模板
  function deleteTemplate(id){
    layer.confirm('确定删除此模板吗？', function(index){
      $.post('{:url("synthesis_template_delete")}', {id: id}, function(res){
        if(res.code === 0){
          tableIns.reload();
          layer.close(index);
        } else {
          layer.msg(res.msg);
        }
      });
    });
  }

  // 查看/生成活动二维码
  function showQrcode(id, name){
    var loadIndex = layer.load(1, {shade: [0.3, '#000']});
    $.post('{:url("synthesis_template_qrcode")}', {id: id}, function(res){
      layer.close(loadIndex);
      if(res.code === 0){
        var d = res.data;
        var tipText = d.is_new ? '活动已创建' : '已复用现有活动';
        var html = '<div style="text-align:center;padding:20px;">'
          + '<p style="margin-bottom:12px;color:#666;font-size:13px;">' + tipText + '</p>'
          + '<p style="margin-bottom:10px;font-size:15px;font-weight:bold;color:#333;">' + (d.name || name) + '</p>'
          + '<p style="margin-bottom:8px;color:#FF5722;font-size:15px;">¥' + parseFloat(d.price).toFixed(2) + '</p>'
          + '<img src="' + d.qrcode_url + '" style="width:200px;height:200px;border:1px solid #eee;border-radius:4px;" onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><rect fill=%22%23f0f0f0%22 width=%22200%22 height=%22200%22/><text fill=%22%23999%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2214%22>二维码加载失败</text></svg>\'">'
          + '<p style="margin-top:10px;word-break:break-all;">'
          + '<span style="color:#999;font-size:12px;">活动链接：</span><br>'
          + '<a href="' + d.activity_url + '" target="_blank" style="font-size:12px;color:#1E9FFF;">' + d.activity_url + '</a>'
          + '</p>'
          + '<p style="margin-top:8px;color:#999;font-size:11px;">用户扫码即可进入活动入口</p>'
          + '</div>';
        layer.open({
          type: 1,
          title: '活动二维码 - ' + (d.name || name),
          content: html,
          area: ['420px', '420px'],
          btn: ['关闭'],
          yes: function(idx){ layer.close(idx); }
        });
      } else {
        layer.msg(res.msg, {icon: 2});
      }
    }, 'json').fail(function(){
      layer.close(loadIndex);
      layer.msg('网络请求失败，请重试', {icon: 2});
    });
  }
  </script>
</body>
</html>
