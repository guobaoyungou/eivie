<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>奖励记录</title>
	<meta name="renderer" content="webkit">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
	{include file="public/css"/}
	<style>
	.layui-table-view .layui-table td .table-imgbox{width:60px;height:60px;float:left;display: flex;align-items: center;justify-content: center}
	.layui-table-view .layui-table td .table-imgbox img{max-width:60px;max-height:60px;float:left;}
	</style>
</head>
<body>
<div class="layui-fluid">
	<div class="layui-row layui-col-space15">
		<div class="layui-card layui-col-md12">
			<div class="layui-card-header">
				<i class="fa fa-list"></i> 奖励记录 {if input('param.isopen')==1}<i class="layui-icon layui-icon-close" style="font-size:18px;font-weight:bold;cursor:pointer" onclick="closeself()"></i>{/if}
			</div>
			<div class="layui-card-body" pad15>
				<div class="layui-form layui-col-md12 layui-form-search">
					<div class="layui-inline">
						<label class="layui-form-label">订单号</label>
						<div class="layui-input-inline" style="width: 150px">
							<input type="text" name="ordernum" autocomplete="off" class="layui-input" value="">
						</div>
					</div>
					<div class="layui-inline">
						<label class="layui-form-label">下单时间</label>
						<div class="layui-input-inline" style="width: 150px">
							<input type="text" name="ordertime" id="ctime" autocomplete="off" class="layui-input" value="">
						</div>
					</div>
					<div class="layui-inline">
						<label class="layui-form-label">会员信息</label>
						<div class="layui-input-inline" style="width: 150px">
							<input type="text" name="keyword" placeholder="昵称、手机号" autocomplete="off" class="layui-input">
						</div>
					</div>
					<div class="layui-inline">
						<label class="layui-form-label">奖励类型</label>
						<div class="layui-input-inline" style="width: 150px">
							<select name="reward_type">
								<option value="">全部</option>
								<option value="1">{:t('积分')}</option>
								<option value="2">{:t('优惠券')}</option>
								<option value="3">{:t('余额')}返现</option>
								<option value="4">{:t('佣金')}返现</option>
							</select>
						</div>
					</div>
					<div class="layui-inline">
						<label class="layui-form-label">订单类型</label>
						<div class="layui-input-inline" style="width: 150px">
							<select name="ordertype">
								<option value="">全部</option>
								<option value="shop">商城订单</option>
								<option value="collage">多人拼团订单</option>
								<option value="tuangou">团购订单</option>
								<option value="scoreshop">积分兑换订单</option>
								<option value="businessshop">商家订单</option>
							</select>
						</div>
					</div>
					<div class="layui-inline">
						<button class="layui-btn layuiadmin-btn-replys" lay-submit="" lay-filter="LAY-app-forumreply-search">
							<i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
						</button>
					</div>
				</div>
				<div class="layui-col-md12">
					<table id="tabledata" lay-filter="tabledata"></table>
				</div>
			</div>
		</div>
	</div>
</div>
{include file="public/js"/}
<script>
    var table = layui.table;
    var datawhere = {};
    //数据表
    var tableIns = table.render({
        elem: '#tabledata'
        , url: "{$Request.url}" //数据接口
        , page: true //开启分页
        , cols: [[ //表头
            {type: "checkbox"},
            {field: 'id', title: '奖励ID',width:80},
            {field: 'nickname', title: '会员信息',width:120,templet:function(d){
                var html = '';
                if(d.headimg) html +='<img src="'+d.headimg+'" style="height:50px"/> <br>';
                if(d.nickname) html += d.nickname;
                html += '<br>{:t('会员')}ID：'+d.mid;
                return html;
            }},
            {field: 'ordernum', title: '订单号',templet:function(d){
	            var html = d.ordernum +'<div style="color:#080">'+ date('Y年m月d日 H:i',d.ordertime)+'</div>';
                if(d.bid >0) html += '<div>商家：'+d.business+'</div>';
                return html;
	        }},
            {field: 'ordertype', title: '订单类型'},
            {field: 'goodsdata', title: '商品信息',width:260},
            {field: 'reward_type', title: '奖励类型',templet:function(d){
                var html = '';
                if(d.reward_type == 1) html += '{:t('积分')}';
                if(d.reward_type == 2) html += '{:t('优惠券')}';
                if(d.reward_type == 3) html += '{:t('余额')}返现';
                if(d.reward_type == 4) html += '{:t('佣金')}返现';
                return html;
	        }},
            {field: 'reward', title: '奖励金额/面额'},
            {field: 'createtime', title: '领取时间'},
            {field: 'operation', title: '操作',width:100,templet:function(d){
                var html = '';
                html += '<button class="table-btn" onclick="datadel('+d.id+')">删除</button>';
                return html;
            }}
        ]],
	    done:function(res, curr, count){
            $(".layui-table-body .table-imgbox").each(function(){
                var src = $(this).find('img').attr('lay-src');
                $(this).find('img').attr('src',src)
            })
        }
    });
    //排序
    table.on('sort(tabledata)', function (obj) {
        datawhere.field = obj.field;
        datawhere.order = obj.type;
        tableIns.reload({
            initSort: obj,
            where: datawhere
        });
    });
    //检索
    layui.form.on('submit(LAY-app-forumreply-search)', function (obj) {
        var field = obj.field
        var olddatawhere = datawhere
        datawhere = field
        datawhere.field = olddatawhere.field
        datawhere.order = olddatawhere.order
        tableIns.reload({
            where: datawhere,
            page: {curr: 1}
        });
    });
    layui.laydate.render({
        elem: '#ctime',
        trigger: 'click',
        range: '~' //或 range: '~' 来自定义分割字符
    });
    //删除
    function datadel(id) {
        var ids = [];
        if (id == 0) {
            var checkStatus = table.checkStatus('tabledata')
            var checkData = checkStatus.data; //得到选中的数据
            if (checkData.length === 0) {
                return layer.msg('请选择数据');
            }
            var ids = [];
            for (var i = 0; i < checkData.length; i++) {
                ids.push(checkData[i]['id']);
            }
        } else {
            ids.push(id)
        }
        layer.confirm('确定要删除吗？删除后无法恢复！', {icon: 7, title: '操作确认'}, function (index) {
            //do something
            layer.close(index);
            var index = layer.load();
            $.post("{:url('del')}", {ids: ids}, function (data) {
                layer.close(index);
                dialog(data.msg, data.status);
                tableIns.reload()
            })
        });
    }
</script>
{include file="public/copyright"/}
</body>
</html>
