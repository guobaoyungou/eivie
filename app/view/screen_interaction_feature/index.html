<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>功能列表管理</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
  <style>
    .level-indent { padding-left: 30px; color: #666; }
    .level-indent::before { content: "└ "; color: #999; }
    .system-badge { background: #1E9FFF; color: #fff; padding: 1px 6px; border-radius: 3px; font-size: 12px; }
    .custom-badge { background: #FFB800; color: #fff; padding: 1px 6px; border-radius: 3px; font-size: 12px; }
    .sort-input { width: 60px; text-align: center; border: 1px solid #e6e6e6; border-radius: 2px; height: 28px; }
    .sort-input:focus { border-color: #1E9FFF; }
  </style>
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
        <div class="layui-card-header">
          <i class="layui-icon layui-icon-app"></i> 大屏互动 - 功能列表管理
        </div>
        <div class="layui-card-body" pad15>
          <!-- 操作按钮区 -->
          <div class="layui-col-md4" style="padding-bottom:10px">
            <a class="layui-btn layuiadmin-btn-list" href="javascript:void(0)" onclick="openEdit(0)">
              <i class="layui-icon layui-icon-add-1"></i> 新增功能
            </a>
            <a class="layui-btn layui-btn-normal" href="javascript:void(0)" onclick="batchSaveSort()">
              <i class="layui-icon layui-icon-sort"></i> 保存排序
            </a>
          </div>

          <!-- 搜索区 -->
          <div class="layui-form layui-col-md8 layui-form-search">
            <div class="layui-inline">
              <label class="layui-form-label">名称</label>
              <div class="layui-input-inline" style="width:150px">
                <input type="text" name="keyword" class="layui-input" placeholder="功能名称">
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">状态</label>
              <div class="layui-input-inline" style="width:100px">
                <select name="status">
                  <option value="">全部</option>
                  <option value="1">启用</option>
                  <option value="2">停用</option>
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <button class="layui-btn layuiadmin-btn-replys" lay-submit lay-filter="LAY-search">
                <i class="layui-icon layui-icon-search"></i>
              </button>
            </div>
          </div>

          <!-- 数据表格 -->
          <div class="layui-col-md12">
            <table id="tabledata" lay-filter="tabledata"></table>
          </div>
        </div>
      </div>
    </div>
  </div>

  {include file="public/js"/}
  <script>
  var table = layui.table;
  var datawhere = {};

  function openEdit(id) {
    var url = "{:url('edit')}" + (id ? '/id/' + id : '');
    var index = layer.open({
      type: 2,
      title: id ? '编辑功能' : '新增功能',
      area: ['700px', '80%'],
      maxmin: true,
      content: url,
      end: function() {
        tableIns.reload();
      }
    });
  }

  var tableIns = table.render({
    elem: '#tabledata',
    url: "{$Request.url}",
    page: false,
    limit: 100,
    cols: [[
      {field: 'id', title: 'ID', width: 60},
      {field: 'feature_name_display', title: '功能名称', width: 200, templet: function(d) {
        if (d.level == 2) {
          return '<span class="level-indent">' + layui.util.escape(d.feature_name) + '</span>';
        }
        return '<b>' + layui.util.escape(d.feature_name) + '</b>';
      }},
      {field: 'feature_code', title: '功能标识', width: 170},
      {field: 'icon', title: '图标', width: 80, templet: function(d) {
        if (!d.icon) return '-';
        if (d.icon.indexOf('http') === 0) {
          return '<img src="'+d.icon+'" style="max-height:24px;max-width:60px;vertical-align:middle">';
        }
        return '<i class="'+d.icon+'"></i>';
      }},
      {field: 'status', title: '状态', width: 100, templet: function(d) {
        var checked = d.status == 1 ? 'checked' : '';
        return '<input type="checkbox" name="status" lay-skin="switch" lay-text="启用|停用" lay-filter="statusSwitch" data-id="'+d.id+'" '+checked+'>';
      }},
      {field: 'is_system', title: '类型', width: 90, templet: function(d) {
        return d.is_system == 1 ? '<span class="system-badge">系统</span>' : '<span class="custom-badge">自定义</span>';
      }},
      {field: 'sort', title: '排序', width: 90, templet: function(d) {
        return '<input type="number" class="sort-input" data-id="'+d.id+'" value="'+d.sort+'" min="0">';
      }},
      {field: 'description', title: '描述', minWidth: 180},
      {field: 'operation', title: '操作', width: 200, fixed: 'right', templet: function(d) {
        var html = '';
        html += '<button class="table-btn" onclick="openEdit('+d.id+')">编辑</button>';
        html += '<button class="table-btn" onclick="setParent('+d.id+','+d.parent_id+')">层级</button>';
        if (d.is_system != 1) {
          html += '<button class="table-btn" style="color:#FF5722" onclick="datadel('+d.id+')">删除</button>';
        }
        return html;
      }}
    ]]
  });

  layui.form.on('submit(LAY-search)', function(obj) {
    datawhere = obj.field;
    tableIns.reload({where: datawhere});
    return false;
  });

  layui.form.on('switch(statusSwitch)', function(obj) {
    var id = $(this).data('id');
    var status = obj.elem.checked ? 1 : 2;
    $.post("{:url('setst')}", {id: id, status: status}, function(res) {
      if (res.status != 1) {
        layer.msg(res.msg);
        obj.elem.checked = !obj.elem.checked;
        layui.form.render('checkbox');
      }
    });
  });

  function datadel(id) {
    layer.confirm('确定要删除该功能吗？<br><small style="color:#999">系统预置功能不可删除</small>', {icon: 7}, function(index) {
      layer.close(index);
      $.post("{:url('del')}", {id: id}, function(res) {
        layer.msg(res.msg);
        if (res.status == 1) tableIns.reload();
      });
    });
  }

  function setParent(id, currentParentId) {
    // 弹窗选择父级
    $.get("{$Request.url}", {}, function(res) {
      if (res.code != 0) return;
      var options = '<option value="0">无（一级菜单）</option>';
      $.each(res.data, function(i, item) {
        if (item.level == 1 && item.id != id) {
          var sel = item.id == currentParentId ? 'selected' : '';
          options += '<option value="'+item.id+'" '+sel+'>' + item.feature_name + ' ('+item.feature_code+')</option>';
        }
      });
      layer.open({
        type: 1,
        title: '设置层级',
        area: ['400px', '200px'],
        content: '<div style="padding:20px"><div class="layui-form-item"><label class="layui-form-label">父级功能</label><div class="layui-input-inline"><select id="parentSelect">' + options + '</select></div></div></div>',
        btn: ['确定', '取消'],
        yes: function(idx) {
          var parentId = $('#parentSelect').val();
          $.post("{:url('set_parent')}", {id: id, parent_id: parentId}, function(res) {
            layer.msg(res.msg);
            if (res.status == 1) {
              layer.close(idx);
              tableIns.reload();
            }
          });
        }
      });
    });
  }

  function batchSaveSort() {
    var sorts = [];
    $('.sort-input').each(function() {
      sorts.push({id: $(this).data('id'), sort: parseInt($(this).val()) || 0});
    });
    if (sorts.length == 0) {
      layer.msg('没有可排序的数据');
      return;
    }
    $.post("{:url('sort')}", {sorts: sorts}, function(res) {
      layer.msg(res.msg);
      if (res.status == 1) tableIns.reload();
    });
  }
  </script>
</body>
</html>
