<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>编辑功能</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-card">
      <div class="layui-card-header">
        <i class="layui-icon layui-icon-edit"></i> {if $info['id']}编辑功能{else/}新增功能{/if}
      </div>
      <div class="layui-card-body" pad15>
        <div class="layui-form form-label-w8" lay-filter="featureForm">
          <input type="hidden" name="id" value="{$info.id}">

          <div class="layui-form-item">
            <label class="layui-form-label">功能标识：</label>
            <div class="layui-input-inline">
              {if $info['id']}
              <input type="text" name="feature_code" class="layui-input layui-disabled" value="{$info.feature_code}" readonly>
              {else/}
              <input type="text" name="feature_code" lay-verify="required" class="layui-input" value="{$info.feature_code}" placeholder="如：my_feature">
              {/if}
            </div>
            <div class="layui-form-mid layui-word-aux">
              {if $info['id']}编辑时不可修改{else/}仅允许字母、数字、下划线，长度2~32{/if}
            </div>
          </div>

          <div class="layui-form-item">
            <label class="layui-form-label">功能名称：</label>
            <div class="layui-input-inline">
              <input type="text" name="feature_name" lay-verify="required" class="layui-input" value="{$info.feature_name}" placeholder="如：签到墙">
            </div>
          </div>

          <div class="layui-form-item">
            <label class="layui-form-label">图标：</label>
            <div class="layui-input-inline">
              <input type="text" name="icon" class="layui-input" value="{$info.icon}" placeholder="CSS类名或图片URL">
            </div>
            <div class="layui-form-mid layui-word-aux">如: layui-icon layui-icon-app 或 https://...</div>
          </div>

          <div class="layui-form-item">
            <label class="layui-form-label">父级功能：</label>
            <div class="layui-input-inline">
              <select name="parent_id">
                <option value="0">无（一级菜单）</option>
                {volist name="topFeatures" id="tf"}
                  {if $tf['id'] != $info['id']}
                  <option value="{$tf.id}" {if $tf['id'] == $info['parent_id']}selected{/if}>{$tf.feature_name} ({$tf.feature_code})</option>
                  {/if}
                {/volist}
              </select>
            </div>
            <div class="layui-form-mid layui-word-aux">选择后成为二级菜单</div>
          </div>

          <div class="layui-form-item">
            <label class="layui-form-label">排序值：</label>
            <div class="layui-input-inline" style="width:120px">
              <input type="number" name="sort" class="layui-input" value="{$info.sort}" min="0">
            </div>
            <div class="layui-form-mid layui-word-aux">数字越小越靠前</div>
          </div>

          <div class="layui-form-item">
            <label class="layui-form-label">状态：</label>
            <div class="layui-input-inline">
              <input type="radio" name="status" value="1" title="启用" {if $info['status']==1}checked{/if}>
              <input type="radio" name="status" value="2" title="停用" {if $info['status']==2}checked{/if}>
            </div>
          </div>

          <div class="layui-form-item layui-form-text">
            <label class="layui-form-label">功能描述：</label>
            <div class="layui-input-block">
              <textarea name="description" class="layui-textarea" placeholder="选填，简要描述该功能">{$info.description}</textarea>
            </div>
          </div>

          <div class="layui-form-item">
            <div class="layui-input-block">
              <button class="layui-btn" lay-submit lay-filter="submitFeature">保存</button>
              <button type="reset" class="layui-btn layui-btn-primary">重置</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  {include file="public/js"/}
  <script>
  layui.form.on('submit(submitFeature)', function(obj) {
    var loadIndex = layer.load();
    $.post("{:url('edit')}", obj.field, function(res) {
      layer.close(loadIndex);
      if (res.status == 1) {
        layer.msg('保存成功', {icon: 1, time: 1000}, function() {
          var index = parent.layer.getFrameIndex(window.name);
          parent.layer.close(index);
        });
      } else {
        layer.msg(res.msg, {icon: 2});
      }
    });
    return false;
  });
  </script>
</body>
</html>
