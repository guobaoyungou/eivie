<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>照片生成记录</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
        <div class="layui-card-header">
          <i class="layui-icon layui-icon-list"></i> 照片生成记录
        </div>
        <div class="layui-card-body" pad15>
          <!-- 操作按钮区 -->
          <div class="layui-col-md12" style="padding-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;">
            <div style="display:flex;gap:10px;align-items:center;margin-bottom:5px;">
              <a class="layui-btn layuiadmin-btn-list" href="{:url('task_create')}">
                <i class="layui-icon layui-icon-add-1"></i> 新建任务
              </a>
              <button class="layui-btn layui-btn-primary layuiadmin-btn-list" onclick="datadel(0)">批量删除</button>
            </div>
            <div style="display:flex;gap:10px;align-items:center;margin-bottom:5px;">
              <button class="layui-btn layui-btn-normal layui-btn-sm" onclick="manualRefresh()" id="refreshBtn">
                <i class="layui-icon layui-icon-refresh"></i> 刷新
              </button>
              <div class="layui-form" lay-filter="refreshForm" style="display:flex;align-items:center;">
                <span style="color:#666;font-size:13px;margin-right:5px;">自动刷新:</span>
                <select name="refresh_interval" lay-filter="refreshInterval" style="width:100px;height:30px;">
                  <option value="0">关闭</option>
                  <option value="60000">1分钟</option>
                  <option value="300000" selected>5分钟</option>
                  <option value="600000">10分钟</option>
                  <option value="1800000">30分钟</option>
                </select>
              </div>
              <span id="lastRefreshTime" style="color:#999;font-size:12px;margin-left:10px;"></span>
            </div>
          </div>
          
          <!-- 搜索区 -->
          <div class="layui-form layui-col-md9 layui-form-search">
            <div class="layui-inline">
              <label class="layui-form-label">状态</label>
              <div class="layui-input-inline" style="width:100px">
                <select name="status">
                  <option value="">全部</option>
                  <option value="0">待处理</option>
                  <option value="1">处理中</option>
                  <option value="2">成功</option>
                  <option value="3">失败</option>
                  <option value="4">已取消</option>
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">模型</label>
              <div class="layui-input-inline" style="width:150px">
                <select name="model_id">
                  <option value="">全部模型</option>
                  {volist name="models" id="m"}
                  <option value="{$m.id}">{$m.model_name}</option>
                  {/volist}
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">开始日期</label>
              <div class="layui-input-inline" style="width:130px">
                <input type="text" name="date_start" id="dateStart" class="layui-input" placeholder="开始日期">
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">结束日期</label>
              <div class="layui-input-inline" style="width:130px">
                <input type="text" name="date_end" id="dateEnd" class="layui-input" placeholder="结束日期">
              </div>
            </div>
            <div class="layui-inline">
              <button class="layui-btn layuiadmin-btn-replys" lay-submit lay-filter="LAY-search">
                <i class="layui-icon layui-icon-search"></i>
              </button>
            </div>
          </div>
          
          <!-- 数据表格 -->
          <div class="layui-col-md12">
            <table id="tabledata" lay-filter="tabledata"></table>
          </div>
        </div>
      </div>
    </div>
  </div>

  {include file="public/js"/}
  <script>
  var table = layui.table;
  var laydate = layui.laydate;
  var form = layui.form;
  var datawhere = {};
  
  // 日期选择器
  laydate.render({elem: '#dateStart'});
  laydate.render({elem: '#dateEnd'});
  
  // 自动刷新相关变量
  var autoRefreshTimer = null;
  var currentRefreshInterval = 300000; // 默认5分钟
  var lastRefreshTimestamp = Date.now();
  
  // 更新最后刷新时间显示
  function updateLastRefreshTime() {
    lastRefreshTimestamp = Date.now();
    var now = new Date();
    var timeStr = now.getHours().toString().padStart(2,'0') + ':' + 
                  now.getMinutes().toString().padStart(2,'0') + ':' + 
                  now.getSeconds().toString().padStart(2,'0');
    $('#lastRefreshTime').text('上次刷新: ' + timeStr);
  }
  
  // 手动刷新
  function manualRefresh() {
    var btn = $('#refreshBtn');
    btn.prop('disabled', true).html('<i class="layui-icon layui-icon-loading-1 layui-anim layui-anim-rotate layui-anim-loop"></i> 刷新中');
    tableIns.reload({where: datawhere});
    setTimeout(function() {
      btn.prop('disabled', false).html('<i class="layui-icon layui-icon-refresh"></i> 刷新');
    }, 1000);
  }
  
  // 启动自动刷新
  function startAutoRefresh(interval) {
    stopAutoRefresh();
    if (interval > 0) {
      currentRefreshInterval = interval;
      autoRefreshTimer = setInterval(function() {
        tableIns.reload({where: datawhere});
      }, interval);
    }
  }
  
  // 停止自动刷新
  function stopAutoRefresh() {
    if (autoRefreshTimer) {
      clearInterval(autoRefreshTimer);
      autoRefreshTimer = null;
    }
  }
  
  // 监听刷新间隔选择
  form.on('select(refreshInterval)', function(data) {
    var interval = parseInt(data.value);
    if (interval === 0) {
      stopAutoRefresh();
      layer.msg('已关闭自动刷新', {icon: 0});
    } else {
      startAutoRefresh(interval);
      var minutes = interval / 60000;
      layer.msg('已设置每' + minutes + '分钟自动刷新', {icon: 1});
    }
    // 保存到本地存储
    localStorage.setItem('photo_record_refresh_interval', interval);
  });
  
  // 从本地存储读取用户设置的刷新间隔
  var savedInterval = localStorage.getItem('photo_record_refresh_interval');
  if (savedInterval !== null) {
    currentRefreshInterval = parseInt(savedInterval);
    // 设置下拉框选中值
    $('select[name=refresh_interval]').val(currentRefreshInterval);
    form.render('select', 'refreshForm');
  }
  
  // 缓存表格数据（用于生成视频等操作获取输出图片列表）
  var tableDataCache = {};
  
  // 状态模板
  function statusTpl(d) {
    var statusMap = {
      0: {text: '待处理', color: '#999', icon: 'layui-icon-time'},
      1: {text: '处理中', color: '#1E9FFF', icon: 'layui-icon-loading-1 layui-anim layui-anim-rotate layui-anim-loop'},
      2: {text: '成功', color: '#5FB878', icon: 'layui-icon-ok-circle'},
      3: {text: '失败', color: '#FF5722', icon: 'layui-icon-close-fill'},
      4: {text: '已取消', color: '#999', icon: 'layui-icon-404'}
    };
    var status = statusMap[d.status] || {text: '未知', color: '#999', icon: ''};
    var html = '<span style="color:' + status.color + '">';
    if (status.icon) html += '<i class="layui-icon ' + status.icon + '" style="margin-right:3px"></i>';
    html += status.text + '</span>';
    return html;
  }
  
  // 渲染表格
  var tableIns = table.render({
    elem: '#tabledata',
    url: "{$Request.url}",
    page: true,
    cols: [[
      {type: "checkbox", width: 50},
      {field: 'id', title: 'ID', sort: true, width: 70},
      {field: 'model_name', title: '模型', width: 150, templet: function(d) {
        return '<div title="' + d.model_code + '">' + d.model_name + '</div>';
      }},
      {field: 'provider_name', title: '供应商', width: 100},
      {field: 'output_count', title: '输出', width: 70, templet: function(d) {
        if (d.output_count > 0) {
          return '<span class="layui-badge layui-bg-blue">' + d.output_count + '张</span>';
        }
        return '<span style="color:#999">-</span>';
      }},
      {field: 'status', title: '状态', width: 90, templet: statusTpl},
      {field: 'cost_time_text', title: '耗时', width: 80},
      {field: 'retry_count', title: '重试', width: 60, templet: function(d) {
        return d.retry_count > 0 ? '<span style="color:#FF5722">' + d.retry_count + '</span>' : '0';
      }},
      {field: 'create_time_text', title: '创建时间', width: 160},
      {field: 'finish_time_text', title: '完成时间', width: 160},
      {field: 'operation', title: '操作', width: 280, fixed: 'right', templet: function(d) {
        var html = '';
        html += '<button class="table-btn" onclick="viewDetail(' + d.id + ')"><i class="layui-icon layui-icon-read"></i>详情</button>';
        if (d.status == 2) {
          if (d.is_template_converted) {
            html += '<button class="table-btn" disabled style="opacity:0.5;cursor:not-allowed;color:#999">已转模板</button>';
          } else {
            html += '<button class="table-btn" onclick="convertTemplate(' + d.id + ')">转模板</button>';
          }
          if (d.output_count > 0) {
            html += '<button class="table-btn" style="color:#FF6600" onclick="generateVideo(' + d.id + ')"><i class="layui-icon layui-icon-video"></i>生成视频</button>';
          }
        }
        if (d.status == 3) {
          html += '<button class="table-btn" onclick="retryTask(' + d.id + ')">重试</button>';
        }
        if (d.status == 0 || d.status == 1) {
          html += '<button class="table-btn" onclick="cancelTask(' + d.id + ')">取消</button>';
        }
        html += '<button class="table-btn" onclick="datadel(' + d.id + ')">删除</button>';
        return html;
      }}
    ]],
    done: function(res, curr, count) {
      // 缓存表格数据
      if (res.data) {
        res.data.forEach(function(item) {
          tableDataCache[item.id] = item;
        });
      }
      // 更新最后刷新时间
      updateLastRefreshTime();
      // 根据用户设置的间隔启动自动刷新
      if (currentRefreshInterval > 0 && !autoRefreshTimer) {
        startAutoRefresh(currentRefreshInterval);
      }
    }
  });
  
  // 排序事件
  table.on('sort(tabledata)', function(obj) {
    datawhere.field = obj.field;
    datawhere.order = obj.type;
    tableIns.reload({initSort: obj, where: datawhere});
  });
  
  // 搜索事件
  layui.form.on('submit(LAY-search)', function(obj) {
    datawhere = obj.field;
    tableIns.reload({where: datawhere, page: {curr: 1}});
    return false;
  });
  
  // 查看详情
  function viewDetail(id) {
    layer.open({
      type: 2,
      title: '记录详情',
      area: ['900px', '600px'],
      content: "{:url('record_detail')}/id/" + id
    });
  }
  
  // 转为场景模板
  function convertTemplate(id) {
    layer.open({
      type: 2,
      title: '转为场景模板',
      area: ['650px', '680px'],
      content: "{:url('convert_to_template')}/record_id/" + id,
      end: function() {
        tableIns.reload();
      }
    });
  }
  
  // 生成视频（使用生成的图片作为首帧）
  function generateVideo(recordId) {
    var record = tableDataCache[recordId];
    if (!record) {
      layer.msg('记录不存在');
      return;
    }
    
    var outputUrls = record.output_urls || [];
    if (outputUrls.length == 0) {
      layer.msg('没有可用的输出图片');
      return;
    }
    
    // 如果只有一张图，直接跳转
    if (outputUrls.length == 1) {
      openVideoTaskCreate(outputUrls[0]);
      return;
    }
    
    // 多张图片时，弹出选择对话框
    var html = '<div style="padding:20px;"><p style="margin-bottom:15px;color:#666">该记录共有 ' + outputUrls.length + ' 张图片，请选择一张作为视频首帧：</p>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:10px;">';
    outputUrls.forEach(function(url, idx) {
      html += '<div class="video-img-option" data-url="' + url + '" style="cursor:pointer;border:2px solid #e6e6e6;border-radius:6px;padding:5px;transition:all 0.2s;">';
      html += '<img src="' + url + '" style="width:100px;height:100px;object-fit:cover;border-radius:4px;display:block;">';
      html += '<div style="text-align:center;font-size:12px;color:#666;margin-top:5px;">图' + (idx+1) + '</div>';
      html += '</div>';
    });
    html += '</div></div>';
    
    var layerIndex = layer.open({
      type: 1,
      title: '选择图片生成视频',
      area: ['500px', 'auto'],
      content: html,
      success: function(layero) {
        $(layero).find('.video-img-option').hover(
          function() { $(this).css({'border-color': '#1E9FFF', 'transform': 'scale(1.02)'}); },
          function() { $(this).css({'border-color': '#e6e6e6', 'transform': 'scale(1)'}); }
        ).click(function() {
          var selectedUrl = $(this).data('url');
          layer.close(layerIndex);
          openVideoTaskCreate(selectedUrl);
        });
      }
    });
  }
  
  // 打开视频生成任务创建页面
  function openVideoTaskCreate(imageUrl) {
    // 将图片URL传递给视频生成任务创建页面
    var baseUrl = "{:url('VideoGeneration/task_create')}";
    var separator = baseUrl.indexOf('?') >= 0 ? '&' : '?';
    var url = baseUrl + separator + "first_frame_image=" + encodeURIComponent(imageUrl);
    // 使用layer弹窗打开，方便用户操作
    layer.open({
      type: 2,
      title: '生成视频',
      area: ['90%', '90%'],
      maxmin: true,
      content: url
    });
  }
  
  // 重试任务
  function retryTask(id) {
    layer.confirm('确定要重试该任务吗？', {icon: 3}, function(index) {
      layer.close(index);
      var loadIndex = layer.load();
      $.post("{:url('task_retry')}", {id: id}, function(res) {
        layer.close(loadIndex);
        if (res.status == 1) {
          layer.msg('重试成功');
          tableIns.reload();
        } else {
          layer.msg(res.msg);
        }
      });
    });
  }
  
  // 取消任务
  function cancelTask(id) {
    layer.confirm('确定要取消该任务吗？', {icon: 7}, function(index) {
      layer.close(index);
      $.post("{:url('task_cancel')}", {id: id}, function(res) {
        layer.msg(res.msg);
        if (res.status == 1) tableIns.reload();
      });
    });
  }
  
  // 删除
  function datadel(id) {
    var ids = [];
    if (id == 0) {
      var checkStatus = table.checkStatus('tabledata');
      if (checkStatus.data.length === 0) {
        return layer.msg('请选择数据');
      }
      checkStatus.data.forEach(function(item) {
        ids.push(item.id);
      });
    } else {
      ids.push(id);
    }
    
    layer.confirm('确定要删除吗？删除后无法恢复！', {icon: 7}, function(index) {
      layer.close(index);
      var loadIndex = layer.load();
      var delCount = 0;
      
      ids.forEach(function(id, idx) {
        $.post("{:url('record_delete')}", {id: id}, function(res) {
          if (res.status == 1) delCount++;
          if (idx == ids.length - 1) {
            layer.close(loadIndex);
            layer.msg('成功删除' + delCount + '条数据');
            tableIns.reload();
          }
        });
      });
    });
  }
  </script>
</body>
</html>
