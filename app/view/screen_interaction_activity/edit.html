<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>编辑互动活动</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-card">
      <div class="layui-card-header">
        <i class="layui-icon layui-icon-edit"></i> {if $info['id']}编辑活动{else/}新增活动{/if}
      </div>
      <div class="layui-card-body" pad15>
        <div class="layui-form form-label-w8" lay-filter="activityForm">
          <input type="hidden" name="id" value="{$info.id}">

          <div class="layui-form-item">
            <label class="layui-form-label">活动标题：</label>
            <div class="layui-input-inline" style="width:350px">
              <input type="text" name="title" lay-verify="required" class="layui-input" value="{$info.title}" placeholder="请输入活动标题">
            </div>
          </div>

          <div class="layui-form-item">
            <label class="layui-form-label">所属商户：</label>
            <div class="layui-input-inline" style="width:250px">
              <select name="bid" lay-filter="bidSelect">
                <option value="0">无（平台自营）</option>
                {volist name="businessList" id="biz"}
                <option value="{$biz.id}" {if $info['bid']==$biz['id']}selected{/if}>{$biz.name}</option>
                {/volist}
              </select>
            </div>
          </div>

          <div class="layui-form-item">
            <label class="layui-form-label">门店：</label>
            <div class="layui-input-inline" style="width:250px">
              <select name="mdid" id="mdidSelect">
                <option value="0">无</option>
                {volist name="mendianList" id="md"}
                <option value="{$md.id}" data-bid="{$md.bid}" {if $info['mdid']==$md['id']}selected{/if}>{$md.name}</option>
                {/volist}
              </select>
            </div>
            <div class="layui-form-mid layui-word-aux">根据商户联动筛选</div>
          </div>

          <div class="layui-form-item">
            <label class="layui-form-label">开始时间：</label>
            <div class="layui-input-inline" style="width:250px">
              <input type="text" name="started_at" id="startedAt" class="layui-input" value="{$info.started_at_text}" placeholder="选择开始时间">
            </div>
          </div>

          <div class="layui-form-item">
            <label class="layui-form-label">结束时间：</label>
            <div class="layui-input-inline" style="width:250px">
              <input type="text" name="ended_at" id="endedAt" class="layui-input" value="{$info.ended_at_text}" placeholder="选择结束时间">
            </div>
            <div class="layui-form-mid layui-word-aux">必须晚于开始时间</div>
          </div>

          <div class="layui-form-item">
            <label class="layui-form-label">验证码：</label>
            <div class="layui-input-inline">
              <input type="text" name="verifycode" class="layui-input" value="{$info.verifycode}" placeholder="自动生成">
            </div>
            <div class="layui-form-mid layui-word-aux">管理员验证密码</div>
          </div>

          <div class="layui-form-item">
            <div class="layui-input-block">
              <button class="layui-btn" lay-submit lay-filter="submitActivity">保存</button>
              <button type="reset" class="layui-btn layui-btn-primary">重置</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  {include file="public/js"/}
  <script>
  // 日期时间选择器
  layui.laydate.render({
    elem: '#startedAt',
    type: 'datetime'
  });
  layui.laydate.render({
    elem: '#endedAt',
    type: 'datetime'
  });

  // 商户-门店联动
  layui.form.on('select(bidSelect)', function(data) {
    var bid = data.value;
    var $mdSelect = $('#mdidSelect');
    $mdSelect.find('option').each(function() {
      var optBid = $(this).data('bid');
      if (!optBid && $(this).val() == '0') {
        // 保留"无"选项
      } else if (bid == '0' || optBid == bid) {
        $(this).show();
      } else {
        $(this).hide();
      }
    });
    $mdSelect.val('0');
    layui.form.render('select');
  });

  layui.form.on('submit(submitActivity)', function(obj) {
    var loadIndex = layer.load();
    $.post("{:url('edit')}", obj.field, function(res) {
      layer.close(loadIndex);
      if (res.status == 1) {
        layer.msg('保存成功', {icon: 1, time: 1000}, function() {
          var index = parent.layer.getFrameIndex(window.name);
          parent.layer.close(index);
        });
      } else {
        layer.msg(res.msg, {icon: 2});
      }
    });
    return false;
  });
  </script>
</body>
</html>
