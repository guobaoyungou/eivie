<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AI旅拍 - 提示词模板管理</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    {include file="public/css"/}
    <style>
        .template-preview {
            max-height: 100px;
            overflow-y: auto;
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        .template-type-badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
        }
        .type-image2video {
            background: #667eea;
            color: white;
        }
        .type-text2video {
            background: #764ba2;
            color: white;
        }
        .type-effects {
            background: #f093fb;
            color: white;
        }
        .prompt-preview {
            background: #fff3cd;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            color: #333;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-row layui-col-space15">
            <div class="layui-card layui-col-md12">
                <div class="layui-card-header">
                    <i class="fa fa-file-text"></i> AI旅拍 - 提示词模板管理
                </div>
                <div class="layui-card-body pad15">
                    <blockquote class="layui-elem-quote">
                        管理AI生成的提示词模板,支持自定义模板和系统预设
                    </blockquote>
                    
                    <div class="layui-col-md6" style="padding-bottom:10px">
                        <button class="layui-btn layuiadmin-btn-list" onclick="openmax('{:url('edit')}')">
                            <i class="fa fa-plus"></i> 新增模板
                        </button>
                        <button class="layui-btn layui-btn-primary layuiadmin-btn-list" onclick="importTemplate()">
                            <i class="fa fa-upload"></i> 导入模板
                        </button>
                    </div>
                    
                    <div class="layui-col-md12">
                        <table id="tabledata" lay-filter="tabledata"></table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    {include file="public/js"/}
    <script>
        layui.use(['table', 'layer', 'form'], function(){
            var table = layui.table;
            var layer = layui.layer;
            var form = layui.form;
            
            // 数据表
            var tableIns = table.render({
                elem: '#tabledata',
                url: "{:url('template_list')}",
                page: true,
                cols: [[
                    {type: 'checkbox'},
                    {field: 'id', title: 'ID', width: 80},
                    {field: 'template_name', title: '模板名称'},
                    {field: 'template_type', title: '模板类型', width: 120, templet: function(d){
                        var typeClass = '';
                        var typeText = '';
                        
                        if(d.template_type == 'image2video'){
                            typeClass = 'type-image2video';
                            typeText = '图生视频';
                        } else if(d.template_type == 'text2video'){
                            typeClass = 'type-text2video';
                            typeText = '文生视频';
                        } else if(d.template_type == 'effects'){
                            typeClass = 'type-effects';
                            typeText = '视频特效';
                        }
                        
                        return '<span class="template-type-badge ' + typeClass + '">' + typeText + '</span>';
                    }},
                    {field: 'prompt', title: '提示词', templet: function(d){
                        return '<div class="prompt-preview">' + d.prompt + '</div>';
                    }},
                    {field: 'model_name', title: '模型名称'},
                    {field: 'mode', title: '生成模式'},
                    {field: 'aspect_ratio', title: '画幅比例'},
                    {field: 'duration', title: '视频时长(秒)'},
                    {field: 'effect_scene', title: '特效场景'},
                    {field: 'is_default', title: '默认模板', width: 100, templet: function(d){
                        return d.is_default == 1 ? '<span class="layui-badge layui-bg-blue">是</span>' : '<span class="layui-badge layui-bg-gray">否</span>';
                    }},
                    {field: 'sort', title: '排序', width: 80},
                    {field: 'status', title: '状态', width: 100, templet: function(d){
                        return d.status == 1 ? '<span class="layui-badge layui-bg-green">启用</span>' : '<span class="layui-badge layui-bg-gray">禁用</span>';
                    }},
                    {field: 'createtime', title: '创建时间', templet: function(d){
                        return layui.util.toDateString(d.createtime * 1000, 'yyyy-MM-dd HH:mm:ss');
                    }},
                    {fixed: 'right', title: '操作', toolbar: '#tableToolbar', width: 200}
                ]],
                page: true,
                limit: 20,
                limits: [10, 20, 50, 100],
                done: function(res, curr, count){
                    // 数据加载完成
                }
            });
            
            // 工具栏
            table.on('toolbar(tabledata)', function(obj){
                var checkStatus = table.checkStatus(tabledata);
                var data = obj.data;
                
                if(obj.event === 'edit'){
                    openmax('{:url('edit', ['id' => data.id])}');
                } else if(obj.event === 'del'){
                    if(checkStatus){
                        layer.confirm('确定删除该模板吗?', function(index){
                            layui.$.ajax({
                                url: "{:url('delete')}",
                                type: 'POST',
                                data: {id: data.id},
                                success: function(res){
                                    if(res.status == 1){
                                        layer.msg('删除成功');
                                        tableIns.reload();
                                    } else {
                                        layer.msg(res.msg || '删除失败');
                                    }
                                    layer.close(index);
                                }
                            });
                        });
                    }
                }
            });
        });
        
        function openmax(url){
            layer.open({
                type: 2,
                title: '模板信息',
                area: ['900px', '700px'],
                content: url,
                end: function(){
                    // 窗口关闭后的回调
                }
            });
        }
        
        function importTemplate(){
            layer.open({
                type: 2,
                title: '导入模板',
                area: ['600px', '400px'],
                content: '<div style="padding:20px;"><textarea id="importData" placeholder="请粘贴模板JSON数据" style="width:100%;height:200px;"></textarea></div>',
                btn: ['导入', '取消'],
                yes: function(index){
                    var data = document.getElementById('importData').value;
                    if(!data){
                        layer.msg('请输入模板数据');
                        return;
                    }
                    
                    try{
                        var template = JSON.parse(data);
                        layui.$.ajax({
                            url: "{:url('import')}",
                            type: 'POST',
                            data: template,
                            success: function(res){
                                if(res.status == 1){
                                    layer.msg('导入成功');
                                    tableIns.reload();
                                    layer.close(index);
                                } else {
                                    layer.msg(res.msg || '导入失败');
                                }
                            }
                        });
                    } catch(e){
                        layer.msg('JSON格式错误');
                    }
                }
            });
        }
    </script>
</body>
</html>
