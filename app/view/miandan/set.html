<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>物流助手设置</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    {include file="public/css"/}
    <style>
        .layui-form-label{width:130px!important}
    </style>
</head>
<body>
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-card layui-col-md12">
            <div class="layui-card-header"><i class="fa fa-cog"></i> 物流助手设置{if input('param.isopen')==1}<i class="layui-icon layui-icon-close" style="font-size:18px;font-weight:bold;cursor:pointer" onclick="closeself()"></i>{/if}</div>
            <div class="layui-card-body" pad15>
                <div class="layui-form form-label-w8" lay-filter="">
                    <div class="layui-form-item">
                        <label class="layui-form-label">状态：</label>
                        <div class="layui-input-inline">
                            <input type="radio" name="info[status]" value="1" title="开启" {if $info['status']==1}checked{/if}>
                            <input type="radio" name="info[status]" value="0" title="关闭" {if $info['status']==0}checked{/if}>
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">优先使用物流助手<br>查询物流：</label>
                        <div class="layui-input-inline">
                            <input type="radio" name="info[query_status]" value="1" title="开启" {if $info['query_status']==1}checked{/if}>
                            <input type="radio" name="info[query_status]" value="0" title="关闭" {if $info['query_status']==0}checked{/if}>
                        </div>
                        <div class="layui-form-mid layui-word-aux layui-clear">开启后优先使用微信物流助手查询物流轨迹（免费），查询不到时再使用系统物流查询</div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">一联单/二联单：</label>
                        <div class="layui-input-inline">
                            <input type="radio" name="info[print_type]" value="1" title="一联单" {if $info['print_type']==1}checked{/if}>
                            <input type="radio" name="info[print_type]" value="0" title="二联单" {if $info['print_type']==0}checked{/if}>
                        </div>
                        <div class="layui-form-mid layui-word-aux layui-clear">打印面单类型，顺丰不支持一联单（系统会自动读取二联单数据）</div>
                        <!--该参数仅在getOrder接口生效，batchGetOrder接口不生效。获取打印面单类型【1：一联单，0：二联单】，默认获取二联单 https://developers.weixin.qq.com/miniprogram/dev/OpenApiDoc/express/express-by-business/getOrder.html-->
                    </div>
                    
<!--                    <div class="layui-inline" style="display: inline-block; width: auto!important;">-->
<!--                        <label class="layui-form-label" style="width: 270px;">面单打印商品信息</label>-->
<!--                        <input type="radio" name="miandan_print_product" value="0" title="关闭" {if $miandan_print_product==0}checked{/if}>-->
<!--                        <input type="radio" name="miandan_print_product" value="1" title="开启" {if $miandan_print_product==1}checked{/if}>-->
<!--                    </div>-->

                    <div class="layui-form-item">
                        <label class="layui-form-label"></label>
                        <div class="layui-input-block">
                            <button class="layui-btn" lay-submit lay-filter="formsubmit">提 交</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{include file="public/js"/}
<script>

    layui.form.on('submit(formsubmit)', function(obj){
        var index = layer.load();
        var field = obj.field
        $.post("{:url('set')}",field,function(data){
            layer.close(index);
            dialog(data.msg,data.status,data.url);
        })
    });

</script>
{include file="public/copyright"/}
</body>
</html>
