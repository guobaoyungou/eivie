<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VoxCPM2 语音对话</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    .chat-wrap { display: flex; height: calc(100vh - 10px); padding: 5px; box-sizing: border-box; gap: 8px; }
    .model-panel { width: 260px; min-width: 220px; background: #fff; border: 1px solid #e6e6e6; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
    .model-panel-header { padding: 12px 14px; border-bottom: 1px solid #eee; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: space-between; }
    .model-panel-header .refresh-btn { cursor: pointer; font-size: 18px; color: #1E9FFF; transition: transform .3s; }
    .model-panel-header .refresh-btn:hover { transform: rotate(180deg); }
    .voxcpm-status { padding: 8px 14px; border-bottom: 1px solid #eee; font-size: 12px; display: flex; align-items: center; gap: 6px; }
    .voxcpm-status .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .status-dot.online { background: #5FB878; }
    .status-dot.offline { background: #FF5722; }
    .model-list { flex: 1; overflow-y: auto; padding: 6px; }
    .model-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; transition: all .15s; border: 1px solid transparent; }
    .model-item:hover { background: #f0f7ff; }
    .model-item.active { background: #e8f4ff; border-color: #1E9FFF; }
    .model-item .mi-name { font-size: 13px; font-weight: 600; color: #333; display: flex; align-items: center; gap: 6px; }
    .model-item .mi-name .mi-tag { font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: normal; }
    .mi-tag-chat { background: #e8f4fd; color: #1890ff; }
    .mi-tag-think { background: #fff3e0; color: #ff9800; }
    .model-item .mi-desc { font-size: 11px; color: #999; margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .model-item .mi-meta { font-size: 11px; color: #bbb; margin-top: 2px; }
    .model-item.not-installed { opacity: .5; }
    .model-item.not-installed .mi-name::after { content: '未安装'; font-size: 10px; color: #FF5722; background: #fff0ed; padding: 1px 5px; border-radius: 3px; margin-left: auto; }
    .chat-panel { flex: 1; background: #fff; border: 1px solid #e6e6e6; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { padding: 10px 16px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; min-height: 44px; }
    .chat-header .ch-model { font-weight: bold; font-size: 14px; }
    .chat-header .ch-info { font-size: 12px; color: #999; }
    .chat-header .ch-actions { margin-left: auto; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px 20px; background: #fafafa; }
    .msg-row { display: flex; margin-bottom: 16px; gap: 10px; }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .msg-row.assistant .msg-avatar { background: #e8f4fd; color: #1890ff; }
    .msg-row.user .msg-avatar { background: #e8f8e8; color: #52c41a; }
    .msg-bubble { max-width: 70%; padding: 10px 14px; border-radius: 10px; font-size: 13px; line-height: 1.7; word-break: break-word; white-space: pre-wrap; }
    .msg-row.assistant .msg-bubble { background: #fff; border: 1px solid #e6e6e6; border-top-left-radius: 2px; }
    .msg-row.user .msg-bubble { background: #1E9FFF; color: #fff; border-top-right-radius: 2px; }
    .msg-meta { font-size: 11px; color: #bbb; margin-top: 4px; }
    .msg-row.user .msg-meta { text-align: right; }
    .msg-audio { margin-top: 6px; display: flex; align-items: center; gap: 6px; }
    .msg-audio .audio-play-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #1E9FFF; background: #f0f7ff; color: #1E9FFF; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all .15s; }
    .msg-audio .audio-play-btn:hover { background: #1E9FFF; color: #fff; }
    .msg-audio .audio-play-btn.playing { background: #1E9FFF; color: #fff; }
    .msg-audio .audio-error { font-size: 11px; color: #FF5722; }
    .chat-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #ccc; }
    .chat-empty i { font-size: 64px; margin-bottom: 10px; }
    .chat-empty p { font-size: 14px; }
    .chat-input-area { padding: 12px 16px; border-top: 1px solid #eee; background: #fff; }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    .input-row textarea { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 10px 12px; font-size: 13px; resize: none; outline: none; min-height: 42px; max-height: 120px; line-height: 1.5; font-family: inherit; transition: border-color .2s; }
    .input-row textarea:focus { border-color: #1E9FFF; }
    .input-row .send-btn { height: 42px; min-width: 70px; border: none; background: #1E9FFF; color: #fff; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; transition: background .2s; }
    .input-row .send-btn:hover { background: #0d8de6; }
    .input-row .send-btn:disabled { background: #ccc; cursor: not-allowed; }
    .input-hints { font-size: 11px; color: #bbb; margin-top: 6px; display: flex; gap: 12px; align-items: center; }
    .voice-settings { padding: 8px 16px; border-top: 1px solid #f0f0f0; background: #fafafa; display: flex; gap: 16px; flex-wrap: wrap; align-items: center; font-size: 12px; }
    .voice-settings label { color: #666; display: flex; align-items: center; gap: 4px; }
    .voice-settings input[type=text] { border: 1px solid #ddd; border-radius: 4px; padding: 3px 8px; font-size: 12px; width: 160px; }
    .voice-settings input[type=range] { width: 80px; }
    .voice-settings .pval { font-size: 12px; color: #1E9FFF; min-width: 28px; }
    .param-inline { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
    .param-inline label { font-size: 12px; color: #666; }
    .param-inline input[type=range] { width: 100px; }
    .param-inline .pval { font-size: 12px; color: #1E9FFF; min-width: 30px; }
    .typing-dots span { animation: blink 1.4s infinite both; }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100%{ opacity:0 } 40%{ opacity:1 } }
  </style>
</head>
<body>
<div class="chat-wrap">
  <!-- 左侧模型选择 -->
  <div class="model-panel">
    <div class="model-panel-header">
      <span>🎙️ 语音对话</span>
      <i class="layui-icon layui-icon-refresh refresh-btn" title="刷新" onclick="loadModels()"></i>
    </div>
    <div class="voxcpm-status" id="voxcpmStatus">
      <span class="status-dot offline" id="voxcpmDot"></span>
      <span id="voxcpmText">VoxCPM2: 检测中...</span>
    </div>
    <div class="model-list" id="modelList">
      <div style="text-align:center;padding:40px 0;color:#ccc">加载中...</div>
    </div>
  </div>

  <!-- 右侧对话区 -->
  <div class="chat-panel">
    <div class="chat-header" id="chatHeader">
      <span class="ch-model" id="headerModelName">请选择模型</span>
      <span class="ch-info" id="headerModelInfo"></span>
      <div class="ch-actions">
        <button class="layui-btn layui-btn-sm layui-btn-primary" onclick="clearChat()"><i class="layui-icon layui-icon-delete"></i> 清空对话</button>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-empty" id="chatEmpty">
        <i class="layui-icon layui-icon-dialogue"></i>
        <p>选择左侧模型，开始语音对话</p>
        <p style="font-size:12px;margin-top:6px">Ollama 生成文本 → VoxCPM2 合成语音</p>
      </div>
    </div>
    <!-- 声音设置 -->
    <div class="voice-settings" id="voiceSettings" style="display:none">
      <label>🔊 声音描述 <input type="text" id="voiceControl" placeholder="如：年轻女性，温柔甜美" title="VoxCPM2 control 参数"></label>
      <label>CFG <input type="range" id="voiceCfg" min="0.5" max="5" step="0.1" value="2.0" oninput="document.getElementById('cfgVal').textContent=this.value"> <span class="pval" id="cfgVal">2.0</span></label>
      <label><input type="checkbox" id="autoPlayToggle" checked> 自动播放</label>
    </div>
    <div class="chat-input-area" id="chatInputArea" style="display:none">
      <div class="input-row">
        <textarea id="msgInput" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
      </div>
      <div class="input-hints">
        <div class="param-inline">
          <label>温度 <input type="range" id="paramTemp" min="0" max="1" step="0.1" value="0.7" oninput="document.getElementById('paramTempVal').textContent=this.value"> <span class="pval" id="paramTempVal">0.7</span></label>
          <label>最大Token <input type="number" id="paramMaxTokens" value="4096" min="64" max="32768" style="width:70px;font-size:12px;border:1px solid #ddd;border-radius:4px;padding:2px 4px"></label>
        </div>
        <span style="margin-left:auto" id="statusHint"></span>
      </div>
    </div>
  </div>
</div>

{include file="public/js"/}
<script>
var currentModel = null;
var chatHistory = [];
var isSending = false;
var voxcpmOnline = false;
var audioElements = {}; // msgIndex -> Audio element

// ==== 模型列表 + VoxCPM 状态 ====
function loadModels() {
  $('#modelList').html('<div style="text-align:center;padding:40px 0;color:#ccc"><i class="layui-icon layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop"></i> 加载中...</div>');
  $('#voxcpmText').text('VoxCPM2: 检测中...');
  $('#voxcpmDot').removeClass('online').addClass('offline');

  $.get("{:url('get_models')}", function(res) {
    if (res.status != 1) {
      $('#modelList').html('<div style="text-align:center;padding:20px;color:#FF5722;font-size:12px">' + escHtml(res.msg) + '</div>');
    } else {
      renderModelList(res.models || []);
    }
    // VoxCPM2 status
    var vs = res.voxcpm_status || {};
    voxcpmOnline = !!vs.online;
    if (voxcpmOnline) {
      $('#voxcpmDot').removeClass('offline').addClass('online');
      var txt = 'VoxCPM2: 在线';
      if (vs.server_mode) txt += ' (' + vs.server_mode + ')';
      if (vs.sample_rate) txt += ' · ' + (vs.sample_rate/1000) + 'kHz';
      $('#voxcpmText').text(txt);
    } else {
      $('#voxcpmDot').removeClass('online').addClass('offline');
      $('#voxcpmText').text('VoxCPM2: 离线 - ' + (vs.message || '不可达'));
    }
  }).fail(function() {
    $('#modelList').html('<div style="text-align:center;padding:20px;color:#FF5722;font-size:12px">请求失败，请检查网络</div>');
  });
}

function renderModelList(models) {
  if (!models.length) {
    $('#modelList').html('<div style="text-align:center;padding:40px 0;color:#ccc;font-size:12px">暂无可用模型<br><br>请先安装模型：<br><code>ollama pull qwen3:8b</code></div>');
    return;
  }
  var html = '';
  models.sort(function(a,b){ return (b.installed?1:0) - (a.installed?1:0); });
  for (var i = 0; i < models.length; i++) {
    var m = models[i];
    var cls = 'model-item' + (m.installed ? '' : ' not-installed') + (currentModel && currentModel.model_code === m.model_code ? ' active' : '');
    var tagCls = m.type_code === 'deep_thinking' ? 'mi-tag-think' : 'mi-tag-chat';
    var tagText = m.type_code === 'deep_thinking' ? '深度思考' : '对话';
    html += '<div class="' + cls + '" data-code="' + escAttr(m.model_code) + '" onclick="selectModel(this,' + i + ')">';
    html += '  <div class="mi-name">' + escHtml(m.model_name) + ' <span class="mi-tag ' + tagCls + '">' + tagText + '</span></div>';
    html += '  <div class="mi-desc" title="' + escAttr(m.description) + '">' + escHtml(m.description || '本地大语言模型') + '</div>';
    html += '  <div class="mi-meta">' + (m.size_gb > 0 ? m.size_gb + 'GB' : '') + (m.version ? ' · v' + m.version : '') + '</div>';
    html += '</div>';
  }
  $('#modelList').html(html);
  window._modelData = models;
}

function selectModel(el, idx) {
  var m = window._modelData[idx];
  if (!m) return;
  if (!m.installed) {
    layer.msg('该模型未安装，请先执行: ollama pull ' + m.model_code, {icon: 0});
    return;
  }
  $('.model-item').removeClass('active');
  $(el).addClass('active');
  if (currentModel && currentModel.model_code !== m.model_code) {
    chatHistory = [];
    audioElements = {};
    renderMessages();
  }
  currentModel = m;
  $('#headerModelName').text(m.model_name);
  $('#headerModelInfo').text(m.type_name + (m.size_gb > 0 ? ' · ' + m.size_gb + 'GB' : '') + (voxcpmOnline ? ' · 🔊语音已就绪' : ' · 🔇语音不可用'));
  $('#chatEmpty').hide();
  $('#chatInputArea').show();
  $('#voiceSettings').show();
  $('#msgInput').focus();
}

// ==== 对话消息 ====
function sendMessage() {
  if (isSending) return;
  if (!currentModel) { layer.msg('请先选择模型'); return; }
  var text = $('#msgInput').val().trim();
  if (!text) return;

  chatHistory.push({ role: 'user', content: text });
  renderMessages();
  $('#msgInput').val('').css('height', '42px');
  scrollToBottom();

  isSending = true;
  $('#sendBtn').prop('disabled', true).text('生成中...');
  $('#statusHint').html('<span class="typing-dots">模型思考中<span>.</span><span>.</span><span>.</span></span>');

  var voiceOptions = {};
  var control = $('#voiceControl').val().trim();
  if (control) voiceOptions.control = control;
  voiceOptions.cfg_value = parseFloat($('#voiceCfg').val());

  // 阶段1: 发送消息获取文本回复
  $.ajax({
    url: "{:url('send_message')}",
    type: 'POST',
    contentType: 'application/json',
    timeout: 90000, // 90秒超时
    data: JSON.stringify({
      model: currentModel.model_code,
      messages: chatHistory,
      options: {
        temperature: parseFloat($('#paramTemp').val()),
        max_tokens: parseInt($('#paramMaxTokens').val())
      }
    }),
    dataType: 'json',
    success: function(res) {
      if (res.status == 1 && res.message) {
        var msgIdx = chatHistory.length;
        var msgObj = res.message;
        msgObj._audio_base64 = '';
        msgObj._audio_error = '';
        msgObj._audio_loading = voxcpmOnline && res.processed_text; // 标记正在加载音频
        msgObj._latency = res.latency || {};
        chatHistory.push(msgObj);

        var metaParts = [];
        if (res.latency) {
          metaParts.push('Ollama ' + res.latency.ollama_ms + 'ms');
          metaParts.push('总计 ' + res.latency.total_ms + 'ms');
        }
        if (res.usage && res.usage.total_tokens) metaParts.push(res.usage.total_tokens + ' tokens');
        $('#statusHint').text(metaParts.join(' · '));

        renderMessages();
        scrollToBottom();

        isSending = false;
        $('#sendBtn').prop('disabled', false).text('发送');

        // 阶段2: 异步调用语音合成
        if (voxcpmOnline && res.processed_text) {
          synthesizeAudio(msgIdx, res.processed_text, voiceOptions);
        }
      } else {
        chatHistory.push({ role: 'assistant', content: '⚠️ ' + (res.msg || '请求失败') });
        $('#statusHint').text('');
        renderMessages();
        scrollToBottom();
        isSending = false;
        $('#sendBtn').prop('disabled', false).text('发送');
      }
    },
    error: function(xhr, status, error) {
      isSending = false;
      $('#sendBtn').prop('disabled', false).text('发送');
      var errMsg = status === 'timeout' ? '⚠️ 请求超时，请稍后重试' : '⚠️ 网络请求失败，请检查连接';
      chatHistory.push({ role: 'assistant', content: errMsg });
      $('#statusHint').text('');
      renderMessages();
      scrollToBottom();
    }
  });
}

// 阶段2: 异步语音合成
function synthesizeAudio(msgIdx, text, voiceOptions) {
  var msg = chatHistory[msgIdx];
  if (!msg) return;

  // 30秒后更新提示文案
  var _synthTimer = setTimeout(function() {
    if (msg._audio_loading) {
      msg._audio_loading_hint = '语音合成中，GPU正在推理，请耐心等待...';
      renderMessages();
    }
  }, 30000);

  $.ajax({
    url: "{:url('synthesize')}",
    type: 'POST',
    contentType: 'application/json',
    timeout: 200000, // 200秒超时，与后端 Gradio SSE 超时对齐
    data: JSON.stringify({
      text: text,
      voice_options: voiceOptions
    }),
    dataType: 'json',
    success: function(res) {
      clearTimeout(_synthTimer);
      msg._audio_loading = false;
      msg._audio_loading_hint = '';
      if (res.status == 1 && res.audio_base64) {
        msg._audio_base64 = res.audio_base64;
        msg._audio_error = '';
        // 更新延迟信息
        if (res.latency && res.latency.voxcpm_ms) {
          msg._latency.voxcpm_ms = res.latency.voxcpm_ms;
          msg._latency.total_ms = (msg._latency.ollama_ms || 0) + res.latency.voxcpm_ms;
          var metaParts = [];
          metaParts.push('Ollama ' + (msg._latency.ollama_ms || 0) + 'ms');
          metaParts.push('VoxCPM ' + res.latency.voxcpm_ms + 'ms');
          metaParts.push('总计 ' + msg._latency.total_ms + 'ms');
          $('#statusHint').text(metaParts.join(' · '));
        }
        renderMessages();
        // 自动播放
        if ($('#autoPlayToggle').is(':checked')) {
          setTimeout(function(){ playAudio(msgIdx); }, 200);
        }
      } else {
        msg._audio_error = res.msg || '语音合成失败';
        renderMessages();
      }
    },
    error: function(xhr, status) {
      clearTimeout(_synthTimer);
      msg._audio_loading = false;
      msg._audio_loading_hint = '';
      msg._audio_error = status === 'timeout' ? '语音合成超时' : '语音合成请求失败';
      renderMessages();
    }
  });
}

function renderMessages() {
  if (chatHistory.length === 0) {
    $('#chatMessages').html('<div class="chat-empty" id="chatEmpty"><i class="layui-icon layui-icon-dialogue"></i><p>开始和 ' + escHtml(currentModel ? currentModel.model_name : '模型') + ' 语音对话吧</p></div>');
    return;
  }
  var html = '';
  for (var i = 0; i < chatHistory.length; i++) {
    var msg = chatHistory[i];
    var isUser = msg.role === 'user';
    var avatarIcon = isUser ? '👤' : '🤖';
    html += '<div class="msg-row ' + msg.role + '">';
    html += '  <div class="msg-avatar">' + avatarIcon + '</div>';
    html += '  <div>';
    html += '    <div class="msg-bubble">' + escHtml(msg.content) + '</div>';
    // 音频控件（仅 assistant）
    if (!isUser) {
      html += '<div class="msg-audio">';
      if (msg._audio_loading) {
        var hintText = msg._audio_loading_hint || '语音合成中...';
        html += '<span style="font-size:11px;color:#1E9FFF"><i class="layui-icon layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop" style="font-size:14px"></i> ' + escHtml(hintText) + '</span>';
      } else if (msg._audio_base64) {
        html += '<button class="audio-play-btn" id="playBtn' + i + '" onclick="playAudio(' + i + ')" title="播放语音">▶</button>';
        html += '<span style="font-size:11px;color:#999">语音可用</span>';
      } else if (msg._audio_error) {
        html += '<span class="audio-error">🔇 ' + escHtml(msg._audio_error) + '</span>';
      }
      // latency
      if (msg._latency && msg._latency.total_ms) {
        html += '<span style="font-size:11px;color:#bbb;margin-left:8px">' + msg._latency.total_ms + 'ms</span>';
      }
      html += '</div>';
    }
    html += '  </div>';
    html += '</div>';
  }
  $('#chatMessages').html(html);
}

function playAudio(msgIdx) {
  var msg = chatHistory[msgIdx];
  if (!msg || !msg._audio_base64) return;

  // 停止其他播放
  for (var k in audioElements) {
    if (audioElements[k]) {
      audioElements[k].pause();
      audioElements[k].currentTime = 0;
      var btn = document.getElementById('playBtn' + k);
      if (btn) { btn.textContent = '▶'; btn.classList.remove('playing'); }
    }
  }

  if (audioElements[msgIdx]) {
    var a = audioElements[msgIdx];
    if (!a.paused) {
      a.pause(); a.currentTime = 0;
      var btn = document.getElementById('playBtn' + msgIdx);
      if (btn) { btn.textContent = '▶'; btn.classList.remove('playing'); }
      return;
    }
  }

  var audio = new Audio('data:audio/wav;base64,' + msg._audio_base64);
  audioElements[msgIdx] = audio;
  var btn = document.getElementById('playBtn' + msgIdx);
  audio.onplay = function() { if (btn) { btn.textContent = '⏸'; btn.classList.add('playing'); } };
  audio.onended = function() { if (btn) { btn.textContent = '▶'; btn.classList.remove('playing'); } };
  audio.onerror = function() { if (btn) { btn.textContent = '▶'; btn.classList.remove('playing'); } layer.msg('音频播放失败', {icon: 2}); };
  audio.play().catch(function(e) { layer.msg('浏览器阻止了自动播放，请手动点击播放', {icon: 0}); });
}

function clearChat() {
  if (chatHistory.length === 0) return;
  layer.confirm('确定清空当前对话记录？', { icon: 3, title: '提示' }, function(idx) {
    layer.close(idx);
    // 停止所有音频
    for (var k in audioElements) { if (audioElements[k]) audioElements[k].pause(); }
    audioElements = {};
    chatHistory = [];
    renderMessages();
    $('#statusHint').text('');
  });
}

function scrollToBottom() {
  var el = document.getElementById('chatMessages');
  setTimeout(function() { el.scrollTop = el.scrollHeight; }, 50);
}

// textarea 自适应高度 + Enter 发送
$('#msgInput').on('input', function() {
  this.style.height = '42px';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
$('#msgInput').on('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function escHtml(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}
function escAttr(s) { return escHtml(s).replace(/"/g, '&quot;'); }

// 初始化
loadModels();
</script>
