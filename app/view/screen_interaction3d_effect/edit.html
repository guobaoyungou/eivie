<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>编辑3D特效</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-card">
      <div class="layui-card-header">
        <i class="layui-icon layui-icon-edit"></i> {if $info['id']}编辑特效{else/}新增特效{/if}
      </div>
      <div class="layui-card-body" pad15>
        <div class="layui-form form-label-w8" lay-filter="effectForm">
          <input type="hidden" name="id" value="{$info.id}">

          <div class="layui-form-item">
            <label class="layui-form-label">所属活动：</label>
            <div class="layui-input-inline" style="width:300px">
              <select name="activity_id" lay-verify="required" lay-filter="activitySelect">
                <option value="">请选择活动</option>
                {volist name="activities" id="act"}
                <option value="{$act.id}" {if $info['activity_id']==$act['id']}selected{/if}>{$act.title}</option>
                {/volist}
              </select>
            </div>
          </div>

          <div class="layui-form-item">
            <label class="layui-form-label">效果类型：</label>
            <div class="layui-input-inline" style="width:250px">
              <select name="type" lay-verify="required" lay-filter="typeSelect">
                <option value="preset_shape" {if $info['type']=='preset_shape'}selected{/if}>预设造型</option>
                <option value="image_logo" {if $info['type']=='image_logo'}selected{/if}>图片Logo</option>
                <option value="text_logo" {if $info['type']=='text_logo'}selected{/if}>文字Logo</option>
                <option value="countdown" {if $info['type']=='countdown'}selected{/if}>倒计时</option>
              </select>
            </div>
          </div>

          <!-- 预设造型选择 -->
          <div class="layui-form-item content-group" id="content_preset_shape" style="{if $info['type']!='preset_shape'}display:none{/if}">
            <label class="layui-form-label">预设造型：</label>
            <div class="layui-input-inline" style="width:250px">
              <select name="content_preset" lay-filter="presetSelect">
                {volist name="presetShapes" id="label" key="code"}
                <option value="{$key}" {if $info['type']=='preset_shape' && $info['content']==$key}selected{/if}>{$label} ({$key})</option>
                {/volist}
              </select>
            </div>
            <div class="layui-form-mid layui-word-aux">球形/隧道/方阵/螺旋/圆柱/基因</div>
          </div>

          <!-- 图片Logo输入 -->
          <div class="layui-form-item content-group" id="content_image_logo" style="{if $info['type']!='image_logo'}display:none{/if}">
            <label class="layui-form-label">Logo地址：</label>
            <div class="layui-input-inline" style="width:350px">
              <input type="text" name="content_image" class="layui-input" value="{if $info['type']=='image_logo'}{$info.content}{/if}" placeholder="输入图片URL地址">
            </div>
            <div class="layui-form-mid layui-word-aux">仅支持PNG格式</div>
          </div>

          <!-- 文字Logo输入 -->
          <div class="layui-form-item content-group" id="content_text_logo" style="{if $info['type']!='text_logo'}display:none{/if}">
            <label class="layui-form-label">文字内容：</label>
            <div class="layui-input-inline" style="width:300px">
              <input type="text" name="content_text" class="layui-input" value="{if $info['type']=='text_logo'}{$info.content}{/if}" placeholder="输入显示文字（最多20字）" maxlength="20">
            </div>
          </div>

          <!-- 倒计时输入 -->
          <div class="layui-form-item content-group" id="content_countdown" style="{if $info['type']!='countdown'}display:none{/if}">
            <label class="layui-form-label">倒计时：</label>
            <div class="layui-input-inline" style="width:150px">
              <input type="number" name="content_countdown" class="layui-input" value="{if $info['type']=='countdown'}{$info.content}{/if}" placeholder="秒数" min="3" max="300">
            </div>
            <div class="layui-form-mid layui-word-aux">秒（3-300）</div>
          </div>

          <div class="layui-form-item">
            <label class="layui-form-label">排序：</label>
            <div class="layui-input-inline" style="width:120px">
              <input type="number" name="sort" class="layui-input" value="{$info.sort}" placeholder="0=自动">
            </div>
            <div class="layui-form-mid layui-word-aux">数字越小越靠前，0=自动排到末尾</div>
          </div>

          <div class="layui-form-item">
            <div class="layui-input-block">
              <button class="layui-btn" lay-submit lay-filter="submitEffect">保存</button>
              <button type="reset" class="layui-btn layui-btn-primary">重置</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  {include file="public/js"/}
  <script>
  // 类型切换显示对应内容输入框
  layui.form.on('select(typeSelect)', function(data) {
    $('.content-group').hide();
    $('#content_' + data.value).show();
  });

  // 表单提交
  layui.form.on('submit(submitEffect)', function(obj) {
    var field = obj.field;
    var type = field.type;

    // 根据类型提取正确的content值
    var content = '';
    if (type === 'preset_shape') {
      content = field.content_preset || '';
    } else if (type === 'image_logo') {
      content = field.content_image || '';
    } else if (type === 'text_logo') {
      content = field.content_text || '';
    } else if (type === 'countdown') {
      content = field.content_countdown || '';
    }

    if (!content) {
      layer.msg('请填写效果内容', {icon: 7});
      return false;
    }

    var postData = {
      id: field.id,
      activity_id: field.activity_id,
      type: type,
      content: content,
      sort: field.sort
    };

    var loadIndex = layer.load();
    $.post("{:url('edit')}", postData, function(res) {
      layer.close(loadIndex);
      if (res.status == 1) {
        layer.msg('保存成功', {icon: 1, time: 1000}, function() {
          var index = parent.layer.getFrameIndex(window.name);
          parent.layer.close(index);
        });
      } else {
        layer.msg(res.msg, {icon: 2});
      }
    });
    return false;
  });
  </script>
</body>
</html>
