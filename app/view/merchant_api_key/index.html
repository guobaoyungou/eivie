<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>API Key配置</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
  <style>
    .pool-status { background: #f0f9ff; border: 1px solid #d0e8ff; border-radius: 6px; padding: 15px; margin-bottom: 15px; }
    .pool-status .stat-item { display: inline-block; margin-right: 30px; }
    .pool-status .stat-item .label { color: #666; font-size: 12px; }
    .pool-status .stat-item .value { font-size: 20px; font-weight: bold; color: #1E9FFF; }
    .pool-status .stat-item .value.warning { color: #FFB800; }
    .pool-status .stat-item .value.danger { color: #FF5722; }
    .concurrency-bar { display: inline-block; width: 80px; height: 8px; background: #eee; border-radius: 4px; vertical-align: middle; margin-left: 5px; }
    .concurrency-bar .fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
    .concurrency-bar .fill.low { background: #5FB878; }
    .concurrency-bar .fill.medium { background: #FFB800; }
    .concurrency-bar .fill.high { background: #FF5722; }
    .scope-tag { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 12px; }
    .scope-tag.all { background: #e8f4ff; color: #1E9FFF; }
    .scope-tag.partial { background: #fff3e0; color: #FF9800; }
  </style>
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
        <div class="layui-card-header">
          <i class="layui-icon layui-icon-set"></i> API Key配置
          <span class="layui-badge layui-bg-cyan" style="margin-left:10px">商户级配置</span>
        </div>
        <div class="layui-card-body" pad15>
          
          <!-- Key池状态概览 -->
          <div class="pool-status" id="poolStatus">
            <div class="stat-item">
              <div class="label">总Key数</div>
              <div class="value" id="totalKeys">-</div>
            </div>
            <div class="stat-item">
              <div class="label">启用中</div>
              <div class="value" id="activeKeys">-</div>
            </div>
            <div class="stat-item">
              <div class="label">总并发容量</div>
              <div class="value" id="totalCapacity">-</div>
            </div>
            <div class="stat-item">
              <div class="label">已使用并发</div>
              <div class="value" id="usedCapacity">-</div>
            </div>
            <div class="stat-item">
              <div class="label">可用并发</div>
              <div class="value" id="availableCapacity">-</div>
            </div>
          </div>
          
          <!-- 操作按钮区 -->
          <div class="layui-col-md4" style="padding-bottom:10px">
            <a class="layui-btn layuiadmin-btn-list" href="javascript:void(0)" onclick="openmax('{:url(\'edit\')}')">
              <i class="layui-icon layui-icon-add-1"></i> 新增配置
            </a>
            <button class="layui-btn layui-btn-primary layuiadmin-btn-list" onclick="datadel(0)">批量删除</button>
          </div>
          
          <!-- 搜索区 -->
          <div class="layui-form layui-col-md8 layui-form-search">
            <div class="layui-inline layuiadmin-input-useradmin">
              <label class="layui-form-label">关键词</label>
              <div class="layui-input-inline">
                <input type="text" name="keyword" autocomplete="off" class="layui-input" placeholder="配置名称/供应商">
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">供应商</label>
              <div class="layui-input-inline" style="width:150px">
                <select name="provider_code">
                  <option value="">全部供应商</option>
                  {volist name="providers" id="p"}
                  <option value="{$p.provider_code}">{$p.provider_name}</option>
                  {/volist}
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">状态</label>
              <div class="layui-input-inline" style="width:100px">
                <select name="is_active">
                  <option value="">全部</option>
                  <option value="1">启用</option>
                  <option value="0">停用</option>
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <button class="layui-btn layuiadmin-btn-replys" lay-submit lay-filter="LAY-search">
                <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
              </button>
            </div>
          </div>
          
          <!-- 数据表格 -->
          <div class="layui-col-md12">
            <table id="tabledata" lay-filter="tabledata"></table>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  {include file="public/js"/}
  <script>
  var table = layui.table;
  var datawhere = {};
  
  // 加载Key池状态
  function loadPoolStatus() {
    $.get("{:url('get_pool_status')}", function(res) {
      if (res.status == 1 && res.data) {
        var s = res.data.summary;
        $('#totalKeys').text(s.total_keys);
        $('#activeKeys').text(s.active_keys);
        $('#totalCapacity').text(s.total_capacity);
        $('#usedCapacity').text(s.used_capacity).toggleClass('warning', s.used_capacity > s.total_capacity * 0.5);
        $('#availableCapacity').text(s.available_capacity).toggleClass('danger', s.available_capacity <= 0);
      }
    });
  }
  loadPoolStatus();
  
  // 渲染表格
  var tableIns = table.render({
    elem: '#tabledata',
    url: "{$Request.url}",
    page: true,
    cols: [[
      {type: "checkbox", width: 50},
      {field: 'id', title: 'ID', sort: true, width: 60},
      {field: 'provider_logo', title: '供应商', width: 130, templet: function(d) {
        var html = '';
        if (d.provider_logo) {
          html += '<img src="'+d.provider_logo+'" style="width:24px;height:24px;border-radius:3px;vertical-align:middle;margin-right:6px"/>';
        }
        html += '<span>' + (d.provider_name || d.provider_code) + '</span>';
        return html;
      }},
      {field: 'config_name', title: '配置名称', width: 130},
      {field: 'api_key_masked', title: 'API Key', width: 150, templet: function(d) {
        return '<code style="background:#f5f5f5;padding:2px 6px;border-radius:3px">' + d.api_key_masked + '</code>';
      }},
      {field: 'scope_text', title: '门店范围', width: 120, templet: function(d) {
        var cls = d.scope_type == 0 ? 'all' : 'partial';
        return '<span class="scope-tag ' + cls + '">' + d.scope_text + '</span>';
      }},
      {field: 'concurrency_text', title: '并发占用', width: 120, templet: function(d) {
        var ratio = d.max_concurrency > 0 ? d.current_concurrency / d.max_concurrency : 0;
        var cls = ratio < 0.5 ? 'low' : (ratio < 0.8 ? 'medium' : 'high');
        var pct = Math.min(100, Math.round(ratio * 100));
        return d.current_concurrency + '/' + d.max_concurrency + 
          '<div class="concurrency-bar"><div class="fill '+cls+'" style="width:'+pct+'%"></div></div>';
      }},
      {field: 'weight', title: '权重', width: 60},
      {field: 'total_calls', title: '调用次数', width: 80, sort: true},
      {field: 'success_rate', title: '成功率', width: 70},
      {field: 'is_active', title: '状态', width: 80, templet: function(d) {
        var checked = d.is_active == 1 ? 'checked' : '';
        return '<input type="checkbox" name="is_active" lay-skin="switch" lay-text="启用|停用" lay-filter="statusSwitch" data-id="'+d.id+'" '+checked+'>';
      }},
      {field: 'operation', title: '操作', width: 150, fixed: 'right', templet: function(d) {
        var html = '';
        html += '<button class="table-btn" onclick="testApi('+d.id+')">测试</button>';
        html += '<button class="table-btn" onclick="openmax(\'{:url(\'edit\')}/id/'+d.id+'\')">编辑</button>';
        html += '<button class="table-btn" onclick="datadel('+d.id+')">删除</button>';
        return html;
      }}
    ]],
    done: function() {
      loadPoolStatus();
    }
  });
  
  // 排序事件
  table.on('sort(tabledata)', function(obj) {
    datawhere.field = obj.field;
    datawhere.order = obj.type;
    tableIns.reload({
      initSort: obj,
      where: datawhere
    });
  });
  
  // 搜索事件
  layui.form.on('submit(LAY-search)', function(obj) {
    var field = obj.field;
    var olddatawhere = datawhere;
    datawhere = field;
    datawhere.field = olddatawhere.field;
    datawhere.order = olddatawhere.order;
    tableIns.reload({
      where: datawhere,
      page: {curr: 1}
    });
    return false;
  });
  
  // 状态开关
  layui.form.on('switch(statusSwitch)', function(obj) {
    var id = $(this).data('id');
    var status = obj.elem.checked ? 1 : 0;
    $.post("{:url('setst')}", {id: id, status: status}, function(res) {
      if (res.status != 1) {
        layer.msg(res.msg);
        obj.elem.checked = !obj.elem.checked;
        layui.form.render('checkbox');
      } else {
        layer.msg('操作成功');
        loadPoolStatus();
      }
    });
  });
  
  // 测试API连接
  function testApi(id) {
    var index = layer.load();
    $.post("{:url('test')}", {id: id}, function(res) {
      layer.close(index);
      if (res.status == 1) {
        layer.alert('<div style="text-align:center"><i class="layui-icon layui-icon-ok-circle" style="font-size:48px;color:#5FB878"></i><p style="margin-top:10px">' + res.msg + '</p><p style="color:#999;font-size:12px">供应商：' + res.provider + '</p></div>', {
          title: '测试结果', icon: -1
        });
      } else {
        layer.alert('<div style="text-align:center"><i class="layui-icon layui-icon-close-fill" style="font-size:48px;color:#FF5722"></i><p style="margin-top:10px">' + res.msg + '</p></div>', {
          title: '测试结果', icon: -1
        });
      }
    });
  }
  
  // 删除
  function datadel(id) {
    var ids = [];
    if (id == 0) {
      var checkStatus = table.checkStatus('tabledata');
      var checkData = checkStatus.data;
      if (checkData.length === 0) {
        return layer.msg('请选择数据');
      }
      for (var i = 0; i < checkData.length; i++) {
        ids.push(checkData[i]['id']);
      }
    } else {
      ids.push(id);
    }
    
    layer.confirm('确定要删除吗？删除后无法恢复！', {icon: 7, title: '操作确认'}, function(index) {
      layer.close(index);
      var index2 = layer.load();
      var delCount = 0;
      var errMsg = '';
      
      ids.forEach(function(id, idx) {
        $.post("{:url('delete')}", {id: id}, function(data) {
          if (data.status != 1) {
            errMsg = data.msg;
          } else {
            delCount++;
          }
          if (idx == ids.length - 1) {
            layer.close(index2);
            if (delCount > 0) {
              layer.msg('成功删除' + delCount + '条数据');
            } else {
              layer.msg(errMsg || '删除失败');
            }
            tableIns.reload();
          }
        });
      });
    });
  }
  </script>
</body>
</html>
