<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>API配置管理</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    {include file="public/css"/}
</head>
<body>
<div class="layui-fluid">
    <div class="layui-card">
        <div class="layui-card-header">API配置管理</div>
        <div class="layui-card-body">
            <!-- 搜索栏 -->
            <div class="layui-form" lay-filter="searchForm">
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label">API代码</label>
                        <div class="layui-input-inline">
                            <input type="text" name="api_code" placeholder="请输入API代码" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">API名称</label>
                        <div class="layui-input-inline">
                            <input type="text" name="api_name" placeholder="请输入API名称" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">服务提供商</label>
                        <div class="layui-input-inline">
                            <select name="provider">
                                <option value="">全部</option>
                                {volist name="providers" id="pv" key="pk"}
                                <option value="{$pk}">{$pv}</option>
                                {/volist}
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">作用域</label>
                        <div class="layui-input-inline">
                            <select name="scope_type">
                                <option value="">全部</option>
                                <option value="1">全局公开</option>
                                <option value="2">仅自用</option>
                                <option value="3">付费公开</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">状态</label>
                        <div class="layui-input-inline">
                            <select name="is_active">
                                <option value="">全部</option>
                                <option value="1">启用</option>
                                <option value="0">禁用</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <button class="layui-btn" lay-submit lay-filter="search">搜索</button>
                        <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                    </div>
                </div>
            </div>

            <!-- 工具栏 -->
            <div class="layui-btn-group">
                <button class="layui-btn layui-btn-sm" onclick="addApi()">
                    <i class="layui-icon layui-icon-add-1"></i> 新增API
                </button>
            </div>

            <!-- 数据表格 -->
            <table class="layui-hide" id="apiTable" lay-filter="apiTable"></table>
        </div>
    </div>
</div>

<!-- 操作列模板 -->
<script type="text/html" id="barTpl">
    <a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="pricing">计费设置</a>
    {{# if(d.is_active == 1){ }}
    <a class="layui-btn layui-btn-xs layui-btn-warm" lay-event="disable">禁用</a>
    {{# } else { }}
    <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="enable">启用</a>
    {{# } }}
    <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="del">删除</a>
</script>

<!-- 状态模板 -->
<script type="text/html" id="statusTpl">
    {{# if(d.is_active == 1){ }}
    <span class="layui-badge layui-bg-green">启用</span>
    {{# } else { }}
    <span class="layui-badge layui-bg-gray">禁用</span>
    {{# } }}
</script>

<!-- 作用域模板 -->
<script type="text/html" id="scopeTpl">
    {{# if(d.scope_type == 1){ }}
    <span class="layui-badge layui-bg-blue">全局公开</span>
    {{# } else if(d.scope_type == 2){ }}
    <span class="layui-badge layui-bg-orange">仅自用</span>
    {{# } else if(d.scope_type == 3){ }}
    <span class="layui-badge layui-bg-green">付费公开</span>
    {{# } }}
</script>

{include file="public/js"/}
<script>
layui.use(['table', 'form', 'layer'], function(){
    var table = layui.table;
    var form = layui.form;
    var layer = layui.layer;

    // 渲染表格
    table.render({
        elem: '#apiTable',
        url: '/ApiConfig/index?aid={$Request.get.aid ?? 0}',
        page: true,
        limit: 15,
        limits: [15, 30, 50, 100],
        cols: [[
            {field: 'id', title: 'ID', width: 80, sort: true},
            {field: 'api_name', title: 'API名称', width: 200},
            {field: 'api_code', title: 'API代码', width: 180},
            {field: 'api_type', title: 'API类型', width: 150},
            {field: 'provider', title: '服务提供商', width: 120},
            {field: 'scope_type', title: '作用域', width: 120, templet: '#scopeTpl'},
            {field: 'is_active', title: '状态', width: 100, templet: '#statusTpl'},
            {field: 'sort', title: '排序', width: 80},
            {field: 'create_time', title: '创建时间', width: 180, templet: function(d){
                return d.create_time ? layui.util.toDateString(d.create_time * 1000, 'yyyy-MM-dd HH:mm:ss') : '';
            }},
            {fixed: 'right', title: '操作', width: 320, align: 'center', toolbar: '#barTpl'}
        ]],
        done: function(res, curr, count){
            console.log('表格数据加载完成:', res);
        }
    });

    // 搜索
    form.on('submit(search)', function(data){
        table.reload('apiTable', {
            where: data.field,
            page: {curr: 1}
        });
        return false;
    });

    // 监听工具条
    table.on('tool(apiTable)', function(obj){
        var data = obj.data;
        
        if(obj.event === 'edit'){
            editApi(data.id);
        } else if(obj.event === 'pricing'){
            setPricing(data.id);
        } else if(obj.event === 'enable' || obj.event === 'disable'){
            toggleStatus(data.id, obj.event === 'enable' ? 1 : 0);
        } else if(obj.event === 'del'){
            deleteApi(data.id, obj);
        }
    });
});

// 新增API
function addApi(){
    layer.open({
        type: 2,
        title: '新增API',
        area: ['900px', '600px'],
        content: '/ApiConfig/edit?aid={$Request.get.aid ?? 0}'
    });
}

// 编辑API
function editApi(id){
    layer.open({
        type: 2,
        title: '编辑API',
        area: ['900px', '600px'],
        content: '/ApiConfig/edit?id=' + id + '&aid={$Request.get.aid ?? 0}'
    });
}

// 计费设置
function setPricing(id){
    layer.open({
        type: 2,
        title: '计费规则设置',
        area: ['800px', '500px'],
        content: '/ApiConfig/pricing?api_config_id=' + id + '&aid={$Request.get.aid ?? 0}'
    });
}

// 切换状态
function toggleStatus(id, status){
    layui.layer.confirm(status == 1 ? '确定要启用此API配置吗?' : '确定要禁用此API配置吗?', function(index){
        layui.jquery.post('/ApiConfig/toggle?aid={$Request.get.aid ?? 0}', {
            id: id,
            is_active: status
        }, function(res){
            if(res.code == 0){
                layui.layer.msg(res.msg, {icon: 1});
                layui.table.reload('apiTable');
            } else {
                layui.layer.msg(res.msg, {icon: 2});
            }
        }, 'json');
        layui.layer.close(index);
    });
}

// 删除API
function deleteApi(id, obj){
    layui.layer.confirm('确定要删除此API配置吗?删除后无法恢复!', function(index){
        layui.jquery.post('/ApiConfig/delete?aid={$Request.get.aid ?? 0}', {
            id: id
        }, function(res){
            if(res.code == 0){
                layui.layer.msg(res.msg, {icon: 1});
                obj.del();
            } else {
                layui.layer.msg(res.msg, {icon: 2});
            }
        }, 'json');
        layui.layer.close(index);
    });
}
</script>
</body>
</html>
