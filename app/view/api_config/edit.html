<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{$api ? '编辑API' : '新增API'}</title>
  <meta name="renderer" content="webkit">
  <meta name="http-equiv" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
  <style>
    .layui-tab-content { padding: 20px; }
    .layui-form-label { width: 120px; }
    .layui-input-block { margin-left: 150px; }
    .pricing-section {
      background: #f8f8f8;
      padding: 15px;
      border-radius: 4px;
      margin-top: 10px;
    }
    .pricing-tip {
      color: #FF5722;
      font-size: 12px;
      margin-left: 5px;
    }
  </style>
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
        <div class="layui-card-header">
          {if empty($api.id)}<i class="fa fa-plus"></i> 新增API{else}<i class="fa fa-pencil"></i> 编辑API{/if}
          <i class="layui-icon layui-icon-close" style="font-size:18px;font-weight:bold;cursor:pointer;float:right;" onclick="closeself()"></i>
        </div>
        <div class="layui-card-body">
          <form class="layui-form" lay-filter="api-form">
            <input type="hidden" name="id" value="{$api.id|default=''}">
            
            <!-- 第一步：选择AI模型 -->
            <div class="layui-form-item">
              <label class="layui-form-label"><span style="color:red;">*</span> 关联AI模型：</label>
              <div class="layui-input-inline" style="width: 400px;">
                <select name="model_id" lay-filter="model_id" lay-verify="required" lay-verType="tips">
                  <option value="">请先选择AI模型</option>
                  {volist name="models" id="model"}
                  <option value="{$model.id}" 
                          data-provider="{$model.provider}"
                          data-model-code="{$model.model_code}"
                          data-model-name="{$model.model_name}"
                          data-billing-mode="{$model.billing_mode|default='image'}"
                          {if !empty($api) && $api.model_id == $model.id}selected{/if}>
                    {$model.model_name} ({$model.model_code})
                  </option>
                  {/volist}
                </select>
              </div>
              <div class="layui-form-mid layui-word-aux"><i class="layui-icon layui-icon-tips"></i> 必须先选择模型，后续配置将自动填充</div>
            </div>

            <!-- 基本信息区 -->
            <div class="layui-form-item">
              <label class="layui-form-label"><span style="color:red;">*</span> API名称：</label>
              <div class="layui-input-block" style="width: 500px;">
                <input type="text" name="api_name" value="{$api.api_name|default=''}" 
                       placeholder="如：阿里云通义万相V1" lay-verify="required" lay-verType="tips" 
                       autocomplete="off" class="layui-input" maxlength="200" id="api_name_input">
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label"><span style="color:red;">*</span> API代码：</label>
              <div class="layui-input-block" style="width: 500px;">
                <input type="text" name="api_code" value="{$api.api_code|default=''}" 
                       placeholder="如：aliyun_wanx_v1" lay-verify="required" lay-verType="tips" 
                       autocomplete="off" class="layui-input" maxlength="100" id="api_code_input">
                <div class="layui-form-mid layui-word-aux">唯一标识，只能包含字母、数字、横杠和下划线</div>
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label"><span style="color:red;">*</span> API类型：</label>
              <div class="layui-input-inline">
                <input type="text" name="api_type" value="{$api.api_type|default=''}" 
                       placeholder="如：image_generation" lay-verify="required" 
                       autocomplete="off" class="layui-input" id="api_type_input">
              </div>
              <div class="layui-form-mid layui-word-aux">自动填充</div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label"><span style="color:red;">*</span> 服务提供商：</label>
              <div class="layui-input-inline">
                <select name="provider" lay-verify="required" lay-verType="tips" id="provider_select">
                  <option value="">自动填充</option>
                  {volist name="providers" id="pname" key="pkey"}
                  <option value="{$pkey}" {if !empty($api) && $api.provider == $pkey}selected{/if}>{$pname}</option>
                  {/volist}
                </select>
              </div>
            </div>

            <!-- API密钥配置区 -->
            <div class="layui-form-item" style="border-top: 1px dashed #eee; padding-top: 15px; margin-top: 15px;">
              <label class="layui-form-label" style="width: 150px;"><i class="layui-icon layui-icon-key"></i> API密钥配置</label>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label"><span style="color:red;">*</span> API端点：</label>
              <div class="layui-input-block" style="width: 600px;">
                <input type="text" name="endpoint_url" value="{$api.endpoint_url|default=''}" 
                       placeholder="https://api.example.com/v1/generate" 
                       lay-verify="required|url" lay-verType="tips" 
                       autocomplete="off" class="layui-input" id="endpoint_url_input">
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label"><span style="color:red;">*</span> API密钥：</label>
              <div class="layui-input-block" style="width: 500px;">
                <input type="text" name="api_key" value="{$api.api_key|default=''}" 
                       placeholder="sk-xxxxxxxxxx" lay-verify="required" lay-verType="tips" 
                       autocomplete="off" class="layui-input">
                <div class="layui-form-mid layui-word-aux"><i class="layui-icon layui-icon-tips"></i> 将加密存储，请填写模型所需的API密钥</div>
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label">API Secret：</label>
              <div class="layui-input-block" style="width: 500px;">
                <input type="text" name="api_secret" value="{$api.api_secret|default=''}" 
                       placeholder="可选，某些服务商需要" 
                       autocomplete="off" class="layui-input">
              </div>
            </div>

            <!-- 作用域设置 -->
            <div class="layui-form-item" style="border-top: 1px dashed #eee; padding-top: 15px; margin-top: 15px;">
              <label class="layui-form-label">作用域：</label>
              <div class="layui-input-inline">
                <select name="scope_type" lay-filter="scope_type">
                  {volist name="scopeTypes" id="sname" key="skey"}
                  <option value="{$skey}" {if !empty($api) && $api.scope_type == $skey}selected{elseif empty($api) && $skey == 2}selected{/if}>
                    {$sname}
                  </option>
                  {/volist}
                </select>
              </div>
              <div class="layui-form-mid layui-word-aux"><span class="pricing-tip">选择"付费公开"时需配置计费规则</span></div>
            </div>

            <!-- 计费规则配置区（仅在选择"付费公开"时显示） -->
            <div id="pricing-section" class="pricing-section" style="display: {if !empty($api) && $api.scope_type == 3}block{else}none{/if};">
              <div class="layui-form-item">
                <label class="layui-form-label" style="width: 150px;"><i class="layui-icon layui-icon-rmb"></i> 计费规则配置</label>
                <div class="layui-form-mid layui-word-aux pricing-tip">⚠️ 作用域为"付费公开"时必须配置</div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label">计费模式：</label>
                <div class="layui-input-inline">
                  <select name="pricing[billing_mode]" id="billing_mode_select">
                    <option value="image" {if empty($api.pricing) || $api.pricing.billing_mode == 'image'}selected{/if}>图片计费</option>
                    <option value="token" {if !empty($api.pricing) && $api.pricing.billing_mode == 'token'}selected{/if}>Token计费</option>
                    <option value="fixed" {if !empty($api.pricing) && $api.pricing.billing_mode == 'fixed'}selected{/if}>固定计费</option>
                    <option value="duration" {if !empty($api.pricing) && $api.pricing.billing_mode == 'duration'}selected{/if}>时长计费</option>
                  </select>
                </div>
                <div class="layui-form-mid layui-word-aux">💡 推荐：图片计费</div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label"><span style="color:red;">*</span> 成本价：</label>
                <div class="layui-input-inline">
                  <input type="text" name="pricing[cost_per_unit]" 
                         value="{$api.pricing.cost_per_unit|default='0.02'}" 
                         placeholder="单位成本" class="layui-input" id="cost_per_unit_input">
                </div>
                <div class="layui-form-mid layui-word-aux">元 <span class="pricing-tip">(推荐: 0.02元/张)</span></div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label"><span style="color:red;">*</span> 售价：</label>
                <div class="layui-input-inline">
                  <input type="text" name="pricing[price_per_unit]" 
                         value="{$api.pricing.price_per_unit|default='0.05'}" 
                         placeholder="单位售价" class="layui-input" id="price_per_unit_input">
                </div>
                <div class="layui-form-mid layui-word-aux">元 <span class="pricing-tip">(推荐: 0.05元/张，利润率150%)</span></div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label">免费额度：</label>
                <div class="layui-input-inline">
                  <input type="number" name="pricing[free_quota]" 
                         value="{$api.pricing.free_quota|default='10'}" 
                         placeholder="每日免费次数" class="layui-input" id="free_quota_input">
                </div>
                <div class="layui-form-mid layui-word-aux">次/天 <span class="pricing-tip">(推荐: 10次/天)</span></div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label">计费单位：</label>
                <div class="layui-input-inline">
                  <select name="pricing[unit_type]">
                    <option value="per_image" {if empty($api.pricing) || $api.pricing.unit_type == 'per_image'}selected{/if}>每张图片</option>
                    <option value="per_call" {if !empty($api.pricing) && $api.pricing.unit_type == 'per_call'}selected{/if}>每次调用</option>
                    <option value="per_token" {if !empty($api.pricing) && $api.pricing.unit_type == 'per_token'}selected{/if}>每个Token</option>
                    <option value="per_minute" {if !empty($api.pricing) && $api.pricing.unit_type == 'per_minute'}selected{/if}>每分钟</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- 其他配置 -->
            <div class="layui-form-item" style="border-top: 1px dashed #eee; padding-top: 15px; margin-top: 15px;">
              <label class="layui-form-label">配置参数：</label>
              <div class="layui-input-block" style="width: 600px;">
                <textarea name="config_json" placeholder='其他配置参数（JSON格式），如：{"timeout": 30}' 
                          class="layui-textarea" style="min-height: 80px;">{$api.config_json|default=''|json_encode}</textarea>
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label">API描述：</label>
              <div class="layui-input-block" style="width: 600px;">
                <textarea name="description" placeholder="功能说明、使用场景" 
                          class="layui-textarea" style="min-height: 80px;">{$api.description|default=''}</textarea>
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label">排序权重：</label>
              <div class="layui-input-inline">
                <input type="number" name="sort" value="{$api.sort|default='100'}" 
                       placeholder="数字越大越靠前" class="layui-input">
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label">是否启用：</label>
              <div class="layui-input-inline">
                <input type="radio" name="is_active" value="1" title="启用" 
                       {if empty($api) || $api.is_active == 1}checked{/if}>
                <input type="radio" name="is_active" value="0" title="禁用" 
                       {if !empty($api) && $api.is_active == 0}checked{/if}>
              </div>
            </div>

            <div class="layui-form-item">
              <div class="layui-input-block" style="margin-left:150px;">
                <button class="layui-btn" lay-submit lay-filter="formsubmit">提 交</button>
                <button type="button" class="layui-btn layui-btn-primary" onclick="closeself()">取 消</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  {include file="public/js"/}
  <script>
  var apiId = '{$api.id|default=""}';
  
  // 预定义的模型端点配置
  var modelEndpoints = {
    'aliyun': 'https://dashscope.aliyuncs.com/api/v1/',
    'baidu': 'https://aip.baidubce.com/rpc/2.0/',
    'openai': 'https://api.openai.com/v1/',
    'tencent': 'https://api.tencent.com/v1/'
  };
  
  layui.use(['form', 'layer'], function(){
    var form = layui.form;
    var layer = layui.layer;
    var $ = layui.$;

    // 监听模型选择 - 自动填充相关字段
    form.on('select(model_id)', function(data){
      var $option = $(data.elem).find('option:selected');
      var modelId = data.value;
      
      if(modelId){
        var provider = $option.data('provider');
        var modelCode = $option.data('model-code');
        var modelName = $option.data('model-name');
        var billingMode = $option.data('billing-mode') || 'image';
        
        // 自动填充服务提供商
        $('#provider_select').val(provider);
        
        // 自动填充API名称（如果为空）
        if(!$('#api_name_input').val()){
          $('#api_name_input').val(modelName);
        }
        
        // 自动填充API代码（如果为空）
        if(!$('#api_code_input').val()){
          $('#api_code_input').val(modelCode.replace(/[^a-z0-9_-]/gi, '_'));
        }
        
        // 自动填充API类型
        if(modelCode.indexOf('image') >= 0 || modelCode.indexOf('wanx') >= 0){
          $('#api_type_input').val('image_generation');
        } else if(modelCode.indexOf('qwen') >= 0 || modelCode.indexOf('chat') >= 0){
          $('#api_type_input').val('text_generation');
        }
        
        // 自动填充端点URL（如果为空）
        if(!$('#endpoint_url_input').val() && modelEndpoints[provider]){
          $('#endpoint_url_input').val(modelEndpoints[provider]);
        }
        
        // 设置计费模式
        $('#billing_mode_select').val(billingMode);
        
        form.render();
        
        layer.msg('已根据模型自动填充配置信息', {icon: 1, time: 1500});
      }
    });

    // 监听作用域选择 - 显示/隐藏计费规则
    form.on('select(scope_type)', function(data){
      if(data.value == 3){ // 付费公开
        $('#pricing-section').slideDown(300);
        layer.tips('请配置计费规则', $(data.elem), {
          tips: [1, '#FF5722'],
          time: 2000
        });
      } else {
        $('#pricing-section').slideUp(300);
      }
    });

    // 表单提交验证
    form.on('submit(formsubmit)', function(data){
      var scopeType = $('select[name="scope_type"]').val();
      
      // 如果是付费公开，验证计费规则
      if(scopeType == 3){
        var costPrice = $('input[name="pricing[cost_per_unit]"]').val();
        var sellPrice = $('input[name="pricing[price_per_unit]"]').val();
        
        if(!costPrice || parseFloat(costPrice) <= 0){
          layer.msg('付费公开模式必须设置成本价', {icon: 2});
          return false;
        }
        
        if(!sellPrice || parseFloat(sellPrice) <= 0){
          layer.msg('付费公开模式必须设置售价', {icon: 2});
          return false;
        }
        
        if(parseFloat(sellPrice) <= parseFloat(costPrice)){
          layer.msg('售价必须大于成本价', {icon: 2});
          return false;
        }
      }
      
      var loadIndex = layer.load(2);
      
      $.ajax({
        url: '/ApiConfig/edit?aid={$Request.get.aid ?? 0}',
        type: 'POST',
        data: data.field,
        dataType: 'json',
        success: function(res){
          layer.close(loadIndex);
          if(res.code == 0){
            layer.msg(res.msg, {icon: 1, time: 1500}, function(){
              parent.layui.table.reload('apiTable');
              closeself();
            });
          } else {
            layer.msg(res.msg, {icon: 2});
          }
        },
        error: function(){
          layer.close(loadIndex);
          layer.msg('网络错误，请重试', {icon: 2});
        }
      });
      
      return false;
    });
  });

  function closeself(){
    var index = parent.layer.getFrameIndex(window.name);
    parent.layer.close(index);
  }
  </script>
</body>
</html>
