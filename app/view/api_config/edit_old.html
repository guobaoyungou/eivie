<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{$api ? '编辑API' : '新增API'}</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
  <style>
    .layui-tab-content { padding: 20px; }
    .layui-form-label { width: 120px; }
    .layui-input-block { margin-left: 150px; }
  </style>
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
        <div class="layui-card-header">
          {if empty($api.id)}<i class="fa fa-plus"></i> 新增API{else}<i class="fa fa-pencil"></i> 编辑API{/if}
          <i class="layui-icon layui-icon-close" style="font-size:18px;font-weight:bold;cursor:pointer;float:right;" onclick="closeself()"></i>
        </div>
        <div class="layui-card-body">
          <form class="layui-form" lay-filter="api-form">
            <input type="hidden" name="id" value="{$api.id|default=''}">
            
            <div class="layui-form-item">
              <label class="layui-form-label"><span style="color:red;">*</span> API名称：</label>
              <div class="layui-input-block" style="width: 500px;">
                <input type="text" name="api_name" value="{$api.api_name|default=''}" 
                       placeholder="如：阿里云通义万相V1" lay-verify="required" lay-verType="tips" 
                       autocomplete="off" class="layui-input" maxlength="200">
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label"><span style="color:red;">*</span> API代码：</label>
              <div class="layui-input-block" style="width: 500px;">
                <input type="text" name="api_code" value="{$api.api_code|default=''}" 
                       placeholder="如：aliyun_wanx_v1" lay-verify="required" lay-verType="tips" 
                       autocomplete="off" class="layui-input" maxlength="100">
                <div class="layui-form-mid layui-word-aux">唯一标识，只能包含字母、数字、横杠和下划线</div>
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label"><span style="color:red;">*</span> 关联AI模型：</label>
              <div class="layui-input-inline">
                <select name="model_id" lay-filter="model_id" lay-verify="required" lay-verType="tips">
                  <option value="">请选择AI模型</option>
                  {volist name="models" id="model"}
                  <option value="{$model.id}" 
                          data-provider="{$model.provider}"
                          data-model-code="{$model.model_code}"
                          data-model-name="{$model.model_name}"
                          {if !empty($api) && $api.model_id == $model.id}selected{/if}>
                    {$model.model_name} ({$model.model_code})
                  </option>
                  {/volist}
                </select>
              </div>
              <div class="layui-form-mid layui-word-aux">必须先选择模型</div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label"><span style="color:red;">*</span> API类型：</label>
              <div class="layui-input-inline">
                <input type="text" name="api_type" value="{$api.api_type|default=''}" 
                       placeholder="如：image_generation" lay-verify="required" 
                       autocomplete="off" class="layui-input">
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label"><span style="color:red;">*</span> 服务提供商：</label>
              <div class="layui-input-inline">
                <select name="provider" lay-verify="required" lay-verType="tips">
                  <option value="">请选择服务商</option>
                  {volist name="providers" id="pname" key="pkey"}
                  <option value="{$pkey}" {if !empty($api) && $api.provider == $pkey}selected{/if}>{$pname}</option>
                  {/volist}
                </select>
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label"><span style="color:red;">*</span> API端点：</label>
              <div class="layui-input-block" style="width: 600px;">
                <input type="text" name="endpoint_url" value="{$api.endpoint_url|default=''}" 
                       placeholder="https://api.example.com/v1/generate" 
                       lay-verify="required|url" lay-verType="tips" 
                       autocomplete="off" class="layui-input">
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label"><span style="color:red;">*</span> API密钥：</label>
              <div class="layui-input-block" style="width: 500px;">
                <input type="text" name="api_key" value="{$api.api_key|default=''}" 
                       placeholder="sk-xxxxxxxxxx" lay-verify="required" lay-verType="tips" 
                       autocomplete="off" class="layui-input">
                <div class="layui-form-mid layui-word-aux">将加密存储</div>
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label">API Secret：</label>
              <div class="layui-input-block" style="width: 500px;">
                <input type="text" name="api_secret" value="{$api.api_secret|default=''}" 
                       placeholder="可选，某些服务商需要" 
                       autocomplete="off" class="layui-input">
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label">作用域：</label>
              <div class="layui-input-inline">
                <select name="scope_type">
                  {volist name="scopeTypes" id="sname" key="skey"}
                  <option value="{$skey}" {if !empty($api) && $api.scope_type == $skey}selected{elseif empty($api) && $skey == 2}selected{/if}>
                    {$sname}
                  </option>
                  {/volist}
                </select>
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label">配置参数：</label>
              <div class="layui-input-block" style="width: 600px;">
                <textarea name="config_json" placeholder='其他配置参数（JSON格式），如：{"timeout": 30}' 
                          class="layui-textarea" style="min-height: 80px;">{$api.config_json|default=''|json_encode}</textarea>
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label">API描述：</label>
              <div class="layui-input-block" style="width: 600px;">
                <textarea name="description" placeholder="功能说明、使用场景" 
                          class="layui-textarea" style="min-height: 80px;">{$api.description|default=''}</textarea>
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label">排序权重：</label>
              <div class="layui-input-inline">
                <input type="number" name="sort" value="{$api.sort|default='100'}" 
                       placeholder="数字越大越靠前" class="layui-input">
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label">是否启用：</label>
              <div class="layui-input-inline">
                <input type="radio" name="is_active" value="1" title="启用" 
                       {if empty($api) || $api.is_active == 1}checked{/if}>
                <input type="radio" name="is_active" value="0" title="禁用" 
                       {if !empty($api) && $api.is_active == 0}checked{/if}>
              </div>
            </div>

            <div class="layui-form-item" style="border-top: 1px solid #eee; padding-top: 20px; margin-top: 20px;">
              <label class="layui-form-label" style="width: 150px;">计费规则：</label>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label">继承模型定价：</label>
              <div class="layui-input-inline">
                <input type="checkbox" name="inherit_pricing" value="1" title="是" lay-skin="primary"
                       {if empty($api)}checked{/if}>
              </div>
              <div class="layui-form-mid layui-word-aux">勾选后将使用关联模型的计费规则</div>
            </div>

            <div id="pricing-config" style="display: {if !empty($api) && !empty($api.pricing)}block{else}none{/if};">
              <div class="layui-form-item">
                <label class="layui-form-label">计费模式：</label>
                <div class="layui-input-inline">
                  <select name="pricing[billing_mode]">
                    <option value="fixed" {if !empty($api.pricing) && $api.pricing.billing_mode == 'fixed'}selected{/if}>固定计费</option>
                    <option value="token" {if !empty($api.pricing) && $api.pricing.billing_mode == 'token'}selected{/if}>Token计费</option>
                    <option value="duration" {if !empty($api.pricing) && $api.pricing.billing_mode == 'duration'}selected{/if}>时长计费</option>
                    <option value="image" {if !empty($api.pricing) && $api.pricing.billing_mode == 'image'}selected{/if}>图片计费</option>
                  </select>
                </div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label">成本价：</label>
                <div class="layui-input-inline">
                  <input type="text" name="pricing[cost_per_unit]" 
                         value="{$api.pricing.cost_per_unit|default='0.00'}" 
                         placeholder="单位成本" class="layui-input">
                </div>
                <div class="layui-form-mid layui-word-aux">元</div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label">售价：</label>
                <div class="layui-input-inline">
                  <input type="text" name="pricing[price_per_unit]" 
                         value="{$api.pricing.price_per_unit|default='0.00'}" 
                         placeholder="单位售价" class="layui-input">
                </div>
                <div class="layui-form-mid layui-word-aux">元</div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label">免费额度：</label>
                <div class="layui-input-inline">
                  <input type="number" name="pricing[free_quota]" 
                         value="{$api.pricing.free_quota|default='0'}" 
                         placeholder="每日免费次数" class="layui-input">
                </div>
                <div class="layui-form-mid layui-word-aux">次/天</div>
              </div>
            </div>

            <div class="layui-form-item">
              <div class="layui-input-block" style="margin-left:150px;">
                <button class="layui-btn" lay-submit lay-filter="formsubmit">提 交</button>
                <button type="button" class="layui-btn layui-btn-primary" onclick="closeself()">取 消</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  {include file="public/js"/}
  <script>
  var apiId = '{$api.id|default=""}';
  
  layui.use(['form', 'layer'], function(){
    var form = layui.form;
    var layer = layui.layer;
    var $ = layui.$;

    // 监听继承定价复选框
    form.on('checkbox(inherit_pricing)', function(data){
      if(data.elem.checked){
        $('#pricing-config').hide();
      } else {
        $('#pricing-config').show();
      }
    });

    // 监听模型选择
    form.on('select(model_id)', function(data){
      var modelId = data.value;
      if(modelId > 0){
        var provider = $(data.elem).find('option:selected').data('provider');
        $('select[name="provider"]').val(provider);
        form.render('select');
      }
    });

    // 表单提交
    form.on('submit(formsubmit)', function(data){
      var loadIndex = layer.load(2);
      
      $.ajax({
        url: '/ApiConfig/edit?aid={$Request.get.aid ?? 0}',
        type: 'POST',
        data: data.field,
        dataType: 'json',
        success: function(res){
          layer.close(loadIndex);
          if(res.code == 0){
            layer.msg(res.msg, {icon: 1, time: 1500}, function(){
              parent.layui.table.reload('apiTable');
              closeself();
            });
          } else {
            layer.msg(res.msg, {icon: 2});
          }
        },
        error: function(){
          layer.close(loadIndex);
          layer.msg('网络错误，请重试', {icon: 2});
        }
      });
      
      return false;
    });
  });

  function closeself(){
    var index = parent.layer.getFrameIndex(window.name);
    parent.layer.close(index);
  }
  </script>
</body>
</html>
