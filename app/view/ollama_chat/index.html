<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ollama 本地模型对话</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    .chat-wrap { display: flex; height: calc(100vh - 10px); padding: 5px; box-sizing: border-box; gap: 8px; }

    /* ---- 左侧模型面板 ---- */
    .model-panel { width: 260px; min-width: 220px; background: #fff; border: 1px solid #e6e6e6; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
    .model-panel-header { padding: 12px 14px; border-bottom: 1px solid #eee; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: space-between; }
    .model-panel-header .refresh-btn { cursor: pointer; font-size: 18px; color: #1E9FFF; transition: transform .3s; }
    .model-panel-header .refresh-btn:hover { transform: rotate(180deg); }
    .model-list { flex: 1; overflow-y: auto; padding: 6px; }
    .model-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; transition: all .15s; border: 1px solid transparent; }
    .model-item:hover { background: #f0f7ff; }
    .model-item.active { background: #e8f4ff; border-color: #1E9FFF; }
    .model-item .mi-name { font-size: 13px; font-weight: 600; color: #333; display: flex; align-items: center; gap: 6px; }
    .model-item .mi-name .mi-tag { font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: normal; }
    .mi-tag-chat { background: #e8f4fd; color: #1890ff; }
    .mi-tag-think { background: #fff3e0; color: #ff9800; }
    .model-item .mi-desc { font-size: 11px; color: #999; margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .model-item .mi-meta { font-size: 11px; color: #bbb; margin-top: 2px; }
    .model-item.not-installed { opacity: .5; }
    .model-item.not-installed .mi-name::after { content: '未安装'; font-size: 10px; color: #FF5722; background: #fff0ed; padding: 1px 5px; border-radius: 3px; margin-left: auto; }

    /* ---- 右侧对话面板 ---- */
    .chat-panel { flex: 1; background: #fff; border: 1px solid #e6e6e6; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { padding: 10px 16px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; min-height: 44px; }
    .chat-header .ch-model { font-weight: bold; font-size: 14px; }
    .chat-header .ch-info { font-size: 12px; color: #999; }
    .chat-header .ch-actions { margin-left: auto; }

    .chat-messages { flex: 1; overflow-y: auto; padding: 16px 20px; background: #fafafa; }
    .msg-row { display: flex; margin-bottom: 16px; gap: 10px; }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .msg-row.assistant .msg-avatar { background: #e8f4fd; color: #1890ff; }
    .msg-row.user .msg-avatar { background: #e8f8e8; color: #52c41a; }
    .msg-bubble { max-width: 70%; padding: 10px 14px; border-radius: 10px; font-size: 13px; line-height: 1.7; word-break: break-word; white-space: pre-wrap; }
    .msg-row.assistant .msg-bubble { background: #fff; border: 1px solid #e6e6e6; border-top-left-radius: 2px; }
    .msg-row.user .msg-bubble { background: #1E9FFF; color: #fff; border-top-right-radius: 2px; }
    .msg-meta { font-size: 11px; color: #bbb; margin-top: 4px; }
    .msg-row.user .msg-meta { text-align: right; }

    .chat-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #ccc; }
    .chat-empty i { font-size: 64px; margin-bottom: 10px; }
    .chat-empty p { font-size: 14px; }

    /* ---- 输入区 ---- */
    .chat-input-area { padding: 12px 16px; border-top: 1px solid #eee; background: #fff; }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    .input-row textarea { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 10px 12px; font-size: 13px; resize: none; outline: none; min-height: 42px; max-height: 120px; line-height: 1.5; font-family: inherit; transition: border-color .2s; }
    .input-row textarea:focus { border-color: #1E9FFF; }
    .input-row .send-btn { height: 42px; min-width: 70px; border: none; background: #1E9FFF; color: #fff; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; transition: background .2s; }
    .input-row .send-btn:hover { background: #0d8de6; }
    .input-row .send-btn:disabled { background: #ccc; cursor: not-allowed; }
    .input-hints { font-size: 11px; color: #bbb; margin-top: 6px; display: flex; gap: 12px; align-items: center; }

    /* ---- 参数设置抽屉 ---- */
    .param-inline { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
    .param-inline label { font-size: 12px; color: #666; }
    .param-inline input[type=range] { width: 100px; }
    .param-inline .pval { font-size: 12px; color: #1E9FFF; min-width: 30px; }

    /* typing animation */
    .typing-dots span { animation: blink 1.4s infinite both; }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100%{ opacity:0 } 40%{ opacity:1 } }
  </style>
</head>
<body>
<div class="chat-wrap">
  <!-- 左侧模型选择 -->
  <div class="model-panel">
    <div class="model-panel-header">
      <span>🦙 本地模型</span>
      <i class="layui-icon layui-icon-refresh refresh-btn" title="刷新模型列表" onclick="loadModels()"></i>
    </div>
    <div class="model-list" id="modelList">
      <div style="text-align:center;padding:40px 0;color:#ccc">加载中...</div>
    </div>
  </div>

  <!-- 右侧对话区 -->
  <div class="chat-panel">
    <div class="chat-header" id="chatHeader">
      <span class="ch-model" id="headerModelName">请选择模型</span>
      <span class="ch-info" id="headerModelInfo"></span>
      <div class="ch-actions">
        <button class="layui-btn layui-btn-sm layui-btn-primary" onclick="clearChat()"><i class="layui-icon layui-icon-delete"></i> 清空对话</button>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="chat-empty" id="chatEmpty">
        <i class="layui-icon layui-icon-dialogue"></i>
        <p>选择左侧模型，开始对话</p>
      </div>
    </div>

    <div class="chat-input-area" id="chatInputArea" style="display:none">
      <div class="input-row">
        <textarea id="msgInput" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
      </div>
      <div class="input-hints">
        <div class="param-inline">
          <label>温度 <input type="range" id="paramTemp" min="0" max="1" step="0.1" value="0.7" oninput="document.getElementById('paramTempVal').textContent=this.value"> <span class="pval" id="paramTempVal">0.7</span></label>
          <label>最大Token <input type="number" id="paramMaxTokens" value="4096" min="64" max="32768" style="width:70px;font-size:12px;border:1px solid #ddd;border-radius:4px;padding:2px 4px"></label>
        </div>
        <span style="margin-left:auto" id="statusHint"></span>
      </div>
    </div>
  </div>
</div>

{include file="public/js"/}
<script>
var currentModel = null;   // 当前选中的模型
var chatHistory = [];       // 当前对话历史 [{role,content}, ...]
var isSending = false;

// ==== 模型列表 ====
function loadModels() {
  $('#modelList').html('<div style="text-align:center;padding:40px 0;color:#ccc"><i class="layui-icon layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop"></i> 加载中...</div>');
  $.get("{:url('get_models')}", function(res) {
    if (res.status != 1) {
      $('#modelList').html('<div style="text-align:center;padding:20px;color:#FF5722;font-size:12px">' + escHtml(res.msg) + '</div>');
      return;
    }
    renderModelList(res.models || []);
  }).fail(function() {
    $('#modelList').html('<div style="text-align:center;padding:20px;color:#FF5722;font-size:12px">请求失败，请检查网络</div>');
  });
}

function renderModelList(models) {
  if (!models.length) {
    $('#modelList').html('<div style="text-align:center;padding:40px 0;color:#ccc;font-size:12px">暂无可用模型<br><br>请先安装模型：<br><code>ollama pull qwen3:8b</code></div>');
    return;
  }
  var html = '';
  // 已安装的排前面
  models.sort(function(a,b){ return (b.installed?1:0) - (a.installed?1:0); });
  for (var i = 0; i < models.length; i++) {
    var m = models[i];
    var cls = 'model-item' + (m.installed ? '' : ' not-installed') + (currentModel && currentModel.model_code === m.model_code ? ' active' : '');
    var tagCls = m.type_code === 'deep_thinking' ? 'mi-tag-think' : 'mi-tag-chat';
    var tagText = m.type_code === 'deep_thinking' ? '深度思考' : '对话';
    html += '<div class="' + cls + '" data-code="' + escAttr(m.model_code) + '" onclick="selectModel(this,' + i + ')">';
    html += '  <div class="mi-name">' + escHtml(m.model_name) + ' <span class="mi-tag ' + tagCls + '">' + tagText + '</span></div>';
    html += '  <div class="mi-desc" title="' + escAttr(m.description) + '">' + escHtml(m.description || '本地大语言模型') + '</div>';
    html += '  <div class="mi-meta">' + (m.size_gb > 0 ? m.size_gb + 'GB' : '') + (m.version ? ' · v' + m.version : '') + '</div>';
    html += '</div>';
  }
  $('#modelList').html(html);
  // 缓存到全局
  window._modelData = models;
}

function selectModel(el, idx) {
  var m = window._modelData[idx];
  if (!m) return;
  if (!m.installed) {
    layer.msg('该模型未安装，请先执行: ollama pull ' + m.model_code, {icon: 0});
    return;
  }
  // 切换选中状态
  $('.model-item').removeClass('active');
  $(el).addClass('active');

  // 模型切换时保留或清空对话
  if (currentModel && currentModel.model_code !== m.model_code) {
    chatHistory = [];
    renderMessages();
  }
  currentModel = m;
  $('#headerModelName').text(m.model_name);
  $('#headerModelInfo').text(m.type_name + (m.size_gb > 0 ? ' · ' + m.size_gb + 'GB' : ''));
  $('#chatEmpty').hide();
  $('#chatInputArea').show();
  $('#msgInput').focus();
}

// ==== 对话消息 ====
function sendMessage() {
  if (isSending) return;
  if (!currentModel) { layer.msg('请先选择模型'); return; }

  var text = $('#msgInput').val().trim();
  if (!text) return;

  // 用户消息加入历史
  chatHistory.push({ role: 'user', content: text });
  renderMessages();
  $('#msgInput').val('').css('height', '42px');
  scrollToBottom();

  isSending = true;
  $('#sendBtn').prop('disabled', true).text('生成中...');
  $('#statusHint').html('<span class="typing-dots">模型思考中<span>.</span><span>.</span><span>.</span></span>');

  // 发送到后端
  $.ajax({
    url: "{:url('send_message')}",
    type: 'POST',
    contentType: 'application/json',
    data: JSON.stringify({
      model: currentModel.model_code,
      messages: chatHistory,
      options: {
        temperature: parseFloat($('#paramTemp').val()),
        max_tokens: parseInt($('#paramMaxTokens').val())
      }
    }),
    dataType: 'json',
    success: function(res) {
      isSending = false;
      $('#sendBtn').prop('disabled', false).text('发送');
      if (res.status == 1 && res.message) {
        chatHistory.push(res.message);
        var metaText = '';
        if (res.latency_ms) metaText += res.latency_ms + 'ms';
        if (res.usage && res.usage.total_tokens) metaText += ' · ' + res.usage.total_tokens + ' tokens';
        $('#statusHint').text(metaText);
      } else {
        // 错误时移除最后一条用户消息的等待状态，显示错误
        chatHistory.push({ role: 'assistant', content: '⚠️ ' + (res.msg || '请求失败') });
        $('#statusHint').text('');
      }
      renderMessages();
      scrollToBottom();
    },
    error: function() {
      isSending = false;
      $('#sendBtn').prop('disabled', false).text('发送');
      chatHistory.push({ role: 'assistant', content: '⚠️ 网络请求失败，请检查连接' });
      $('#statusHint').text('');
      renderMessages();
      scrollToBottom();
    }
  });
}

function renderMessages() {
  if (chatHistory.length === 0) {
    $('#chatMessages').html('<div class="chat-empty" id="chatEmpty"><i class="layui-icon layui-icon-dialogue"></i><p>开始和 ' + escHtml(currentModel ? currentModel.model_name : '模型') + ' 对话吧</p></div>');
    return;
  }
  var html = '';
  for (var i = 0; i < chatHistory.length; i++) {
    var msg = chatHistory[i];
    var isUser = msg.role === 'user';
    var avatarIcon = isUser ? '👤' : '🤖';
    html += '<div class="msg-row ' + msg.role + '">';
    html += '  <div class="msg-avatar">' + avatarIcon + '</div>';
    html += '  <div><div class="msg-bubble">' + escHtml(msg.content) + '</div></div>';
    html += '</div>';
  }
  $('#chatMessages').html(html);
}

function clearChat() {
  if (chatHistory.length === 0) return;
  layer.confirm('确定清空当前对话记录？', { icon: 3, title: '提示' }, function(idx) {
    layer.close(idx);
    chatHistory = [];
    renderMessages();
    $('#statusHint').text('');
  });
}

function scrollToBottom() {
  var el = document.getElementById('chatMessages');
  setTimeout(function() { el.scrollTop = el.scrollHeight; }, 50);
}

// ==== textarea 自适应高度 + Enter 发送 ====
$('#msgInput').on('input', function() {
  this.style.height = '42px';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
$('#msgInput').on('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ==== 工具 ====
function escHtml(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}
function escAttr(s) {
  return escHtml(s).replace(/"/g, '&quot;');
}

// ==== 初始化 ====
loadModels();
</script>
</body>
</html>
