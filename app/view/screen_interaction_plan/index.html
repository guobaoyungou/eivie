<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>互动套餐管理</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
        <div class="layui-card-header">
          <i class="layui-icon layui-icon-screen-full"></i> 互动套餐管理
        </div>
        <div class="layui-card-body" pad15>
          <!-- 操作按钮区 -->
          <div class="layui-col-md4" style="padding-bottom:10px">
            <a class="layui-btn layuiadmin-btn-list" href="javascript:void(0)" onclick="openEdit(0)">
              <i class="layui-icon layui-icon-add-1"></i> 新增套餐
            </a>
          </div>

          <!-- 搜索区 -->
          <div class="layui-form layui-col-md8 layui-form-search">
            <div class="layui-inline">
              <label class="layui-form-label">名称</label>
              <div class="layui-input-inline" style="width:150px">
                <input type="text" name="keyword" class="layui-input" placeholder="套餐名称">
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">状态</label>
              <div class="layui-input-inline" style="width:100px">
                <select name="status">
                  <option value="">全部</option>
                  <option value="1">启用</option>
                  <option value="2">停用</option>
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <button class="layui-btn layuiadmin-btn-replys" lay-submit lay-filter="LAY-search">
                <i class="layui-icon layui-icon-search"></i>
              </button>
            </div>
          </div>

          <!-- 数据表格 -->
          <div class="layui-col-md12">
            <table id="tabledata" lay-filter="tabledata"></table>
          </div>
        </div>
      </div>
    </div>
  </div>

  {include file="public/js"/}
  <script>
  var table = layui.table;
  var datawhere = {};

  function openEdit(id) {
    var url = "{:url('edit')}" + (id ? '/id/' + id : '');
    var index = layer.open({
      type: 2,
      title: id ? '编辑套餐' : '新增套餐',
      area: ['800px', '90%'],
      maxmin: true,
      content: url,
      end: function() {
        tableIns.reload();
      }
    });
  }

  var tableIns = table.render({
    elem: '#tabledata',
    url: "{$Request.url}",
    page: true,
    cols: [[
      {field: 'id', title: 'ID', sort: true, width: 60},
      {field: 'name', title: '套餐名称', width: 120},
      {field: 'code', title: '套餐编码', width: 100},
      {field: 'price', title: '价格(元)', width: 100, templet: function(d) {
        return '<span style="color:#FF6B00;font-weight:bold">¥' + d.price + '</span>';
      }},
      {field: 'period_text', title: '计费周期', width: 80},
      {field: 'duration_days', title: '有效天数', width: 80},
      {field: 'max_stores', title: '最大门店', width: 80},
      {field: 'max_activities', title: '最大活动', width: 80},
      {field: 'max_participants', title: '最大参与人数', width: 110},
      {field: 'is_recommended', title: '推荐', width: 70, templet: function(d) {
        return d.is_recommended == 1 ? '<span class="layui-badge layui-bg-green">是</span>' : '<span class="layui-badge layui-bg-gray">否</span>';
      }},
      {field: 'sort', title: '排序', width: 60, sort: true},
      {field: 'status', title: '状态', width: 80, templet: function(d) {
        var checked = d.status == 1 ? 'checked' : '';
        return '<input type="checkbox" name="status" lay-skin="switch" lay-text="启用|停用" lay-filter="statusSwitch" data-id="'+d.id+'" '+checked+'>';
      }},
      {field: 'create_time_text', title: '创建时间', width: 150},
      {field: 'operation', title: '操作', width: 150, fixed: 'right', templet: function(d) {
        var html = '';
        html += '<button class="table-btn" onclick="openEdit('+d.id+')">编辑</button>';
        html += '<button class="table-btn" style="color:#FF5722" onclick="datadel('+d.id+')">删除</button>';
        return html;
      }}
    ]]
  });

  table.on('sort(tabledata)', function(obj) {
    datawhere.field = obj.field;
    datawhere.order = obj.type;
    tableIns.reload({initSort: obj, where: datawhere});
  });

  layui.form.on('submit(LAY-search)', function(obj) {
    datawhere = obj.field;
    tableIns.reload({where: datawhere, page: {curr: 1}});
    return false;
  });

  layui.form.on('switch(statusSwitch)', function(obj) {
    var id = $(this).data('id');
    var status = obj.elem.checked ? 1 : 2;
    $.post("{:url('setst')}", {id: id, status: status}, function(res) {
      if (res.status != 1) {
        layer.msg(res.msg);
        obj.elem.checked = !obj.elem.checked;
        layui.form.render('checkbox');
      }
    });
  });

  function datadel(id) {
    layer.confirm('确定要删除该套餐吗？', {icon: 7}, function(index) {
      layer.close(index);
      $.post("{:url('del')}", {id: id}, function(res) {
        layer.msg(res.msg);
        if (res.status == 1) tableIns.reload();
      });
    });
  }
  </script>
</body>
</html>
