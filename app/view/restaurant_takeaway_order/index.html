<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>订单管理</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
	<style>
	.orderdetail{background:#f7f7f8;width: 94%;box-sizing:border-box;margin:0 10px;display:flex;flex-direction:column;}
	.orderdetail *{box-sizing:border-box;}
	.address{ display:flex;align-items:center;width: 100%; padding:10px 0; background: #FFF;color:#222}
	.address .img{width:45px;padding:0 10px}
	.address img{width:25px; height:25px;}
	.address .info{flex:1;display:flex;flex-direction:column;}
	.address .info .t1{ font-weight:bold}

	.express { width:100%;background: #fff; padding:10px;display:flex;align-items:center;margin-top:5px;color:#333}
	.express .f1{ width:40px;font-size:20px;color:#999}
	.express .f2{display:flex;flex-direction:column;flex:auto}

	.product{width:100%; padding:5px;background: #FFF;margin-top:5px;}
	.product .content{display:flex;position:relative;width: 100%; padding:5px 0px;border-bottom: 1px #e5e5e5 dashed;position:relative}
	.product .content:last-child{ border-bottom: 0; }
	.product .content img{ width: 70px; height: 70px;}
	.product .content .detail{display:flex;flex-direction:column;margin-left:7px;flex:1}
	.product .content .detail .t1{height: 30px;line-height: 15px;color: #000;}
	.product .content .detail .t2{height: 23px;line-height: 23px;color: #999;overflow: hidden;font-size:13px;}
	.product .content .detail .t3{display:flex;height:15px;line-height:15px;color: #ff4246;}
	.product .content .detail .x1{ flex:1}
	.product .content .detail .x2{ width:50px;font-size:16px;text-align:right;margin-right:4px}
	.product .content .comment{position:absolute;top:32px;right:5px;border: 1px #ffc702 solid; border-radius:5px;background:#fff; color: #ffc702;  padding: 0 5px; height: 23px; line-height: 23px;}

	.orderinfo{ width:100%;margin-top:5px;padding: 5px;background: #FFF;}
	.orderinfo .item{display:flex;width:100%;padding:10px 0;border-bottom:1px dashed #ededed;}
	.orderinfo .item:last-child{ border-bottom: 0;}
	.orderinfo .item .t1{width:100px;}
	.orderinfo .item .t2{flex:1;text-align:right}
	.orderinfo .item .red{color:red}

	.logistics{ width: 94%;  background: #fff; padding: 0 10px;display:flex;flex-direction:column;color: #979797;}
	.logistics .on{color: #23aa5e;}
	.logistics .item{display:flex;width: 96%;  margin: 0 2%;/*border-left: 1px #dadada solid;*/padding:0 0}
	.logistics .item .f1{ width:30px;position:relative}
	/*.logistics img{width: 15px; height: 15px; position: absolute; left: -8px; top:11px;}*/
	.logistics .item .f1 img{ width: 15px; height: 100%;}

	.logistics .item .f2{display:flex;flex-direction:column;flex:auto;padding:5px 0}
	.logistics .item .f2 .t1{font-size: 15px;}
	.logistics .item .f2 .t1{font-size: 13px;}
	</style>
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-card layui-col-md12">
          <div class="layui-card-header">
						<div class="layui-tab layui-tab-brief">
							<ul class="layui-tab-title">
								<li {if !input('?param.status') || input('param.status')===''}class="layui-this"{/if} onclick="location.href='{:url('index')}'">全部订单</li>
								<li {if input('param.status')==='0'}class="layui-this"{/if} onclick="location.href='{:url('index')}/status/0'">未支付</li>
								<li {if input('param.status')=='1'}class="layui-this"{/if} onclick="location.href='{:url('index')}/status/1'">待发货</li>
								<li {if input('param.status')=='2'}class="layui-this"{/if} onclick="location.href='{:url('index')}/status/2'">已发货</li>
								<li {if input('param.status')=='3'}class="layui-this"{/if} onclick="location.href='{:url('index')}/status/3'">已完成</li>
								<li {if input('param.status')=='4'}class="layui-this"{/if} onclick="location.href='{:url('index')}/status/4'">已关闭</li>
								<li {if input('param.status')=='5'}class="layui-this"{/if} onclick="location.href='{:url('index')}/status/5'">退款中</li>
							</ul>
						</div> 
						{if input('param.isopen')==1}<i class="layui-icon layui-icon-close" style="font-size:18px;font-weight:bold;cursor:pointer" onclick="closeself()"></i>{/if}
          </div>
          <div class="layui-card-body" pad15>
						<div class="layui-col-md12">
							<div class="layui-col-md3" style="padding-bottom:10px">
								<button class="layui-btn layui-btn-primary layuiadmin-btn-list" data-form-export="{:url('excel')}">导出</button>
								<!-- <button class="layui-btn layui-btn-primary layuiadmin-btn-list" onclick="plfh()">批量发货</button> -->
							</div>
							<div class="layui-col-md9 layui-form layui-form-search">
								<div class="layui-inline layuiadmin-input-useradmin" style="display:none">
									<label class="layui-form-label">{:t('会员')}ID</label>
									<div class="layui-input-inline">
										<input type="text" name="mid" value="{$Request.param.mid}" autocomplete="off" class="layui-input">
									</div>
								</div>
								<div class="layui-inline layuiadmin-input-useradmin">
									<label class="layui-form-label">订单号</label>
									<div class="layui-input-inline">
										<input type="text" name="ordernum" autocomplete="off" class="layui-input">
									</div>
								</div>
								<div class="layui-inline">
									<label class="layui-form-label">收货人</label>
									<div class="layui-input-inline">
										<input type="text" name="linkman" autocomplete="off" class="layui-input">
									</div>
								</div>
								<div class="layui-inline">
									<label class="layui-form-label">手机号</label>
									<div class="layui-input-inline">
										<input type="text" name="tel" autocomplete="off" class="layui-input">
									</div>
								</div>
								<div class="layui-inline">
									<label class="layui-form-label">下单时间</label>
									<div class="layui-input-inline" style="width:180px">
										<input type="text" name="ctime" id="ctime" autocomplete="off" class="layui-input">
									</div>
								</div>
								<div class="layui-inline">
									<label class="layui-form-label">状态</label>
									<div class="layui-input-inline">
										<select name="status">
											<option value="">全部</option>
											<option value="0" {if input('param.status')==='0'}selected{/if}>未支付</option>
											<option value="1" {if input('param.status')==='1'}selected{/if}>已支付</option>
											<option value="12" {if input('param.status')==='12'}selected{/if}>已接单</option>
											<option value="2" {if input('param.status')==='2'}selected{/if}>已发货</option>
											<option value="3" {if input('param.status')==='3'}selected{/if}>已收货</option>
											<option value="4" {if input('param.status')==='4'}selected{/if}>已关闭</option>
											<option value="5" {if input('param.status')==='5'}selected{/if}>退款待审核</option>
											<option value="6" {if input('param.status')==='6'}selected{/if}>已退款</option>
											<option value="7" {if input('param.status')==='7'}selected{/if}>退款驳回</option>
										</select>
									</div>
								</div>
								<div class="layui-inline">
									<button class="layui-btn layuiadmin-btn-replys" lay-submit="" lay-filter="LAY-app-forumreply-search">
										<i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
									</button>
								</div>
							</div>
						</div>
						<div class="layui-col-md12">
							<table id="tabledata" lay-filter="tabledata"></table>
						</div>
          </div>
        </div>
    </div>
  </div>
	{include file="public/js"/}
	<script>
  var table = layui.table;
	var datawhere = {};
	{if input('?param.status') && input('param.status')!==''}
	datawhere['status'] = "{$Request.param.status}";
	{/if}
  //数据表
  var tableIns = table.render({
    elem: '#tabledata'
    ,url: "{$Request.url}" //数据接口
    ,page: true //开启分页
		//,size:'sm'
    ,cols: [[ //表头
			//{type:"checkbox"},
      {field: 'id', title: 'ID',  sort: true,width:60},
			{if input('param.showtype')==2}
      {field: 'bname', title: '所属商户',width:160},
			{/if}
      {field: 'goodsdata', title: '菜品信息',width:240},
      {field: 'ordernum', title: '订单号/下单时间',sort: true,width:160,templet:function(d){ return d.ordernum +'<div style="color:#080">'+ date('Y年m月d日 H:i',d.createtime)+'</div>'}},
	  {field: 'product_price', title: '菜品总价/实付款',templet:function(d){
			  var text = '实付';
			  if(d.status ==0) text = '应付';
			  var html='';
			  html +='<div>总价：￥'+d.product_price+'</div>';
			  html +='<div style="font-weight:bold">'+text+'：￥'+d.totalprice+'</div>';
			  return html;
		  }, width: 150},
      //{field: 'totalprice', title: '实付款'},
	  {field: 'nickname', title: '下单人',templet:function(d){
			  if(d.nickname && d.headimg){
				  return '<img src="'+d.headimg+'" style="width:40px;height:40px"> '+d.nickname;
			  }
			  return '';
		  }, width: 150},
      {field: 'address', title: '收货地址',templet: '<div><div style="font-weight:bold">{{d.linkman}} {{d.tel}} </div><div style="line-height:20px;font-size:12px">{{d.area}} {{d.address}}</div>{{#if(d.message){ }}<!-- <div style="line-height:20px;font-size:12px;color:#e55555">客户留言：{{d.message}}</div> -->{{# } }}</div>'},
      {field: 'paytype', title: '支付方式',width:90},
			{field: 'freight_text', title: '配送方式',width:150},
      {field: 'status', title: '状态',templet:function(d){
				var html = '';
				if(d.status==0) html+='<div style="color:#ff8758">未支付</span>';
				if(d.status==1) html+='<div style="color:#008000">已支付</span>';
				if(d.status==12) html+='<div style="color:#008000">已接单</span>';
				if(d.status==2) html+='<div style="color:#ff4246">已发货</span>';
				if(d.status==3) html+='<div style="color:#999">已完成</span>';
				if(d.status==4) html+='<div style="color:#bbb">已关闭</span>';
				if(d.refund_status == 1) html+='<div style="color:red">退款待审核,￥'+d.refund_money+'</div>';
				if(d.refund_status == 2) html+='<div style="color:red">已退款,￥'+d.refund_money+'</div>';
				if(d.refund_status == 3) html+='<div style="color:red">退款驳回,￥'+d.refund_money+'</div>';
			  	if(d.express_type == 'express_wx' && d.express_order){
					if(d.express_order.order_status==101){
						html+= '<div style="color:orange">即时配送：等待分配骑手</div>';
					}else if(d.express_order.order_status==102){
						html+= '<div style="color:green">即时配送：已分配骑手</div>';
					}else if(d.express_order.order_status==103){
						html+= '<div style="color:#ccc">即时配送：商家取消订单</div>';
					}else if(d.express_order.order_status==201){
						html+= '<div style="color:green">即时配送：骑手到店</div>';
					}else if(d.express_order.order_status==202){
						html+= '<div style="color:green">即时配送：骑手取货成功</div>';
					}else if(d.express_order.order_status==203){
						html+= '<div style="color:red">即时配送：取货失败-商家取消</div>';
					}else if(d.express_order.order_status==204){
						html+= '<div style="color:red">即时配送：取货失败-骑手原因</div>';
					}else if(d.express_order.order_status==205){
						html+= '<div style="color:red">即时配送：取货失败-骑手因商家取消</div>';
					}else if(d.express_order.order_status==301){
						html+= '<div style="">即时配送：配送中</div>';
					}else if(d.express_order.order_status==302){
						html+= '<div style="color:green">即时配送：配送完成</div>';
					}else if(d.express_order.order_status==303){
						html+= '<div style="">即时配送：返还-商家取消</div>';
					}else if(d.express_order.order_status==304){
						html+= '<div style="">即时配送：返还-无法联系收货人</div>';
					}else if(d.express_order.order_status==305){
						html+= '<div style="">即时配送：返还-收货人拒收</div>';
					}else if(d.express_order.order_status==401){
						html+= '<div style="color:#999">即时配送：返还-成功</div>';
					}else if(d.express_order.order_status==501){
						html+= '<div style="color:#999">即时配送：运力系统原因取消</div>';
					}else if(d.express_order.order_status==502){
						html+= '<div style="color:#999">即时配送：不可抗拒因素（天气，道路管制等原因）取消</div>';
					}
				}

				return html;
			}},
      //{field: 'createtime', title: '下单时间',sort: true,templet:function(d){ return date('Y-m-d H:i',d.createtime)},width:150},
      {field: 'operation', title: '操作',templet:function(d){
				var html = '';
				html += '<button class="table-btn" onclick="showdetail('+d.id+')">详情</button>';
				if(d.status==0 || d.status==1 || d.status==2){
				}
				html += '<button class="table-btn" onclick="openmax(\'{:url('shd')}/id/'+d.id+'\')">送货单</button>';
				{if $hasprint}
				html += '<button class="table-btn" onclick="wifiprint('+d.id+')">打印小票</button>';
				{/if}
				{if $bid==0}html += '<button class="table-btn" onclick="openmax(\'{:url('edit')}/id/'+d.id+'\')">修改</button>';{/if}
				html += '<button class="table-btn" onclick="datadel('+d.id+')">删除</button><br/>';
				if(d.refund_status==1){ //退款待审核
					html += '<button class="table-btn" onclick="doOperation('+d.id+',\'退款审核\')">退款审核</button>';
				}
				if(d.status==0){ //未支付
					html += '<button class="table-btn" onclick="doOperation('+d.id+',\'关闭订单\')">关闭订单</button>';
					{if $bid==0}html += '<button class="table-btn" onclick="doOperation('+d.id+',\'已支付\')">改为已支付</button>';{/if}
				}
				if(d.status==1){ //已支付
					html += '<button class="table-btn" onclick="doOperation('+d.id+',\'接单\')">接单</button>';
					html += '<button class="table-btn" onclick="doOperation('+d.id+',\'退款\')">拒单退款</button>';
				}
				if(d.status==12){ //已接单
					if(d.freight_type == 1){
						html += '<button class="table-btn" onclick="doOperation('+d.id+',\'确认收货\')">已取货</button>';
					}else{
						html += '<button class="table-btn" onclick="doOperation('+d.id+',\'发货\')">发货</button>';
					}
					if(d.freight_type==2 && '{$peisong_set.status}'==1){
						if('{$peisong_set.myt_status}'==1){
							//html += '<button class="table-btn" onclick="doOperation('+d.id+',\'麦芽田配送\')">麦芽田配送</button>';
							html += '<button class="table-btn" onclick="showmyt('+d.id+',\'麦芽田配送\')">麦芽田配送</button>';
						}else if('{$peisong_set.express_wx_status}'==1){
							html += '<button class="table-btn" onclick="doOperation('+d.id+',\'即时配送\')">即时配送派单</button>';
						}else{
							html += '<button class="table-btn" onclick="doOperation('+d.id+',\'配送员配送\')">配送</button>';
						}
					}
					html += '<button class="table-btn" onclick="doOperation('+d.id+',\'退款\')">退款</button>';
				}
				if(d.status==2){ //已发货
					html += '<button class="table-btn" onclick="doOperation('+d.id+',\'查物流\')">查物流</button>';
					{if $bid==0}
					html += '<button class="table-btn" onclick="doOperation('+d.id+',\'确认收货\')">确认收货</button>';
					{/if}
				}
				if(d.status==3){ //已完成
					html += '<button class="table-btn" onclick="doOperation('+d.id+',\'查物流\')">查物流</button>';
				}
				return html;
      }}
    ]]
  });
	//排序
	table.on('sort(tabledata)', function(obj){
		datawhere.field = obj.field;
		datawhere.order = obj.type;
		tableIns.reload({
			initSort: obj,
			where: datawhere
		});
	});
	//日期范围选择
	layui.laydate.render({ 
		elem: '#ctime',
		trigger: 'click',
		range: '~', //或 range: '~' 来自定义分割字符
		type:'datetime'
	});
	//检索
	layui.form.on('submit(LAY-app-forumreply-search)', function(obj){
		var field = obj.field
		var olddatawhere = datawhere
		datawhere = field
		datawhere.field = olddatawhere.field
		datawhere.order = olddatawhere.order
		tableIns.reload({
			where: datawhere,
			page: {curr: 1}
		});
	})
	//打印小票
	function wifiprint(id){
		layer.confirm('确定要打印小票吗?',{icon: 7, title:'操作确认'}, function(index){
			layer.close(index);
			var index = layer.load();
			$.post("{:url('wifiprint')}",{id:id},function(data){
				layer.close(index);
				dialog(data.msg,data.status);
			})
		})
	}
	//删除
	function datadel(id){
		layer.confirm('确定要删除吗？删除后无法恢复！',{icon: 7, title:'操作确认'}, function(index){
			//do something
			layer.close(index);
			var index = layer.load();
			$.post("{:url('del')}",{id:id},function(data){
				layer.close(index);
				dialog(data.msg,data.status);
				tableIns.reload()
			})
		});
	}
	var detailLayer;
	function showdetail(orderid){
		var index = layer.load();
		$.post("{:url('getdetail')}",{orderid:orderid},function(data){
			layer.close(index);
			var html = '';
			//var data = { //数据
			//	"title":"Layui常用模块",
			//	"list":[{"modname":"弹层","alias":"layer","site":"layer.layui.com"},{"modname":"表单","alias":"form"}]
			//}
			layui.laytpl(detailtpl.innerHTML).render(data, function(html){
				//view.innerHTML = html;
				var detailBtn = [];
				if(data.order.refund_status==1){ //退款待审核
					detailBtn.push('退款审核');
				}
				if(data.order.status==0){ //未支付
					detailBtn.push('关闭订单');
					detailBtn.push('改价');
				}
				if(data.order.status==1){ //已支付
					detailBtn.push('接单');
					detailBtn.push('退款');
				}
				if(data.order.status==12){ //已接单
					detailBtn.push('发货');
					if(data.order.freight_type==2 &&'{$peisong_set.status}'==1){
						if('{$peisong_set.myt_status}'==1){
							detailBtn.push('麦芽田配送');
						}else if('{$peisong_set.express_wx_status}'==1){
							detailBtn.push('即时配送');
						}else{
							detailBtn.push('配送员配送');
						}
					}
					detailBtn.push('退款');
				}
				if(data.order.status==2){ //已发货
					detailBtn.push('查物流');
					detailBtn.push('确认收货');
				}
				if(data.order.status==3){ //已完成
					detailBtn.push('查物流');
				}
				//if(data.order.status==4){ //已关闭
					detailBtn.push('删除');
				//}
				detailBtn.push('设置备注');
				detailLayer = layer.open({type:1,title:'订单详情',area:'500px',content:html,resize:true,shadeClose:true,maxmin:true,btn:detailBtn,
					yes:function(){
						return btnOperation(detailBtn[0],data);
					},
					btn2:function(){
						return btnOperation(detailBtn[1],data);
					},
					btn3:function(){
						return btnOperation(detailBtn[2],data);
					},
					btn4:function(){
						return btnOperation(detailBtn[3],data);
					},
					btn5:function(){
						return btnOperation(detailBtn[4],data);
					}
				});
			});
			//layer.open({type:1,area:['600px','600px'],title:false,shadeClose:true,btn: ['发货', '退款审核', '设置备注']});
		})
	}
	function doOperation(orderid,type){
		$.post("{:url('getdetail')}",{orderid:orderid},function(data){
			btnOperation(type,data);
		})
	}
	function btnOperation(type,data){
		var orderid = data.order.id;
		if(type == '接单'){
			layer.confirm('确定要接单吗?',{icon: 7, title:'操作确认'}, function(index){
				layer.close(index);
				var index = layer.load();
				$.post("{:url('jiedan')}",{orderid:orderid},function(res){

	function plfh(){
		var html = '<div style="margin:20px auto;">';
		html+='<div class="layui-form" lay-filter="">';
		html+='<div class="layui-form-item" style="margin-top:40px;margin-right:20px;">';
		html+='	<label class="layui-form-label" style="width:150px">快递公司</label>';
		html+='	<div class="layui-input-inline" style="width:180px">';
		html+='		<select id="plfh_express" name="plfh_express" style="width:100%;height: 38px;line-height: 38px;border:1px solid #e6e6e6;background-color: #fff;border-radius: 2px;">';
		{foreach $express_data as $k=>$v}
		html+='			<option>{$k}</option>';
		{/foreach}
		html+='		</select>';
		html+='	</div>';
		html+='</div>';
		html+='	<div class="layui-form-item">';
		html+='		<label class="layui-form-label" style="width:150px">上传EXCEL文件：</label>';
		html+='		<div class="layui-input-inline" style="width:300px">';
		html+='			<input type="text" name="plfh_file" id="plfh_file" class="layui-input">';
		html+='		</div>';
		html+='		<button style="float:left;" type="button" class="layui-btn layui-btn-primary uploadexcel" upload-input="plfh_file">上传</button>';
		//html+='		<div class="layui-form-mid layui-word-aux"></div>';
		html+='	</div>';
		html+='	<div class="layui-form-item">';
		html+='		<label class="layui-form-label" style="width:150px"></label>';
		html+='		<div class="layui-form-mid"> <a href="__STATIC__/demo_plfh.xls">点击下载查看导入格式</a></div>';
		html+='	</div>';
		html+='	<div class="layui-form-item" style="margin-top:30px">';
		html+='		<label class="layui-form-label" style="width:150px"></label>';
		html+='		<div class="layui-input-inline">';
		html+='			<button class="layui-btn layui-btn-normal" lay-submit lay-filter="submit_excel">确定导入发货</button>';
		html+='		</div>';
		html+='	</div>';
		html+='</div>';
		html+='</div>'
		var plfhLayer = layer.open({type:1,area: ['600px', '460px'],title:'导入EXCEl文件',content:html,shadeClose:true})
		layui.form.render();
		//文件上传
		layui.upload.render({
			elem: '.uploadexcel',
			accept:'file',
			url: "{:url('upload/index')}",
			done: function(res){
				if(res.status==0){
					dialog(res.msg,0);
				}else{
					var item = this.item;
					var inputid = $(this.item).attr('upload-input');
					if(inputid){
						$('#'+inputid).val(res.url);
						$('#'+inputid).change();
					}
				}
			}
		});
		layui.form.on('submit(submit_excel)', function(obj){
			var field = obj.field;
			var index= layer.load();
			$.post("{:url('plfh')}",field,function(res){
				layer.close(index);
				dialog(res.msg,res.status);
				layer.close(plfhLayer);
				tableIns.reload();
			})
		})
	}
