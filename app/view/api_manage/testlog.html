<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>测试历史</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="/static/admin/layui/css/layui.css">
</head>
<body>
<div style="padding: 15px;">
    <table class="layui-hide" id="testLogTable" lay-filter="testLogTable"></table>
</div>

<script type="text/html" id="toolbarTpl">
    <div class="layui-btn-container">
        <button class="layui-btn layui-btn-sm" onclick="history.back()">返回</button>
    </div>
</script>

<script type="text/html" id="statusTpl">
    {{# if(d.status_code == 200){ }}
        <span style="color: #5FB878;">{{d.status_code}}</span>
    {{# } else { }}
        <span style="color: #FF5722;">{{d.status_code}}</span>
    {{# } }}
</script>

<script type="text/html" id="operateTpl">
    <a class="layui-btn layui-btn-xs" lay-event="detail">查看详情</a>
</script>

<script src="/static/admin/layui/layui.js"></script>
<script>
layui.use(['table', 'layer', 'jquery'], function(){
    var table = layui.table;
    var layer = layui.layer;
    var $ = layui.jquery;
    
    // 渲染表格
    table.render({
        elem: '#testLogTable',
        url: "{:url('ApiManage/testlog')}",
        toolbar: '#toolbarTpl',
        page: true,
        limit: 20,
        limits: [20, 50, 100],
        cols: [[
            {field: 'id', title: 'ID', width: 80, sort: true},
            {field: 'interface_name', title: '接口名称', width: 200},
            {field: 'interface_path', title: '接口路径', width: 250},
            {field: 'status_code', title: '状态码', width: 100, templet: '#statusTpl'},
            {field: 'response_time', title: '响应时间', width: 120, templet: function(d){
                return d.response_time + 'ms';
            }},
            {field: 'ip', title: '请求IP', width: 150},
            {field: 'create_time', title: '测试时间', width: 180, templet: function(d){
                return formatTime(d.create_time);
            }},
            {fixed: 'right', title: '操作', width: 120, toolbar: '#operateTpl'}
        ]]
    });
    
    // 监听工具条
    table.on('tool(testLogTable)', function(obj){
        var data = obj.data;
        if(obj.event === 'detail'){
            showDetail(data.id);
        }
    });
    
    // 查看详情
    function showDetail(id) {
        $.ajax({
            url: "{:url('ApiManage/testlogdetail')}",
            type: 'GET',
            data: {id: id},
            dataType: 'json',
            success: function(res) {
                if (res.status == 1) {
                    var item = res.data;
                    var html = '<div style="padding: 15px; line-height: 2;">';
                    html += '<p><strong>接口名称：</strong>' + item.interface_name + '</p>';
                    html += '<p><strong>接口路径：</strong>' + item.interface_path + '</p>';
                    html += '<p><strong>状态码：</strong>' + item.status_code + '</p>';
                    html += '<p><strong>响应时间：</strong>' + item.response_time + 'ms</p>';
                    html += '<p><strong>请求IP：</strong>' + item.ip + '</p>';
                    html += '<p><strong>测试时间：</strong>' + formatTime(item.create_time) + '</p>';
                    html += '<hr>';
                    html += '<p><strong>请求参数：</strong></p>';
                    html += '<pre style="background: #f8f8f8; padding: 10px; border-radius: 4px;">' + JSON.stringify(item.request_params, null, 2) + '</pre>';
                    html += '<p><strong>响应数据：</strong></p>';
                    html += '<pre style="background: #f8f8f8; padding: 10px; border-radius: 4px; max-height: 400px; overflow-y: auto;">' + JSON.stringify(item.response_data, null, 2) + '</pre>';
                    html += '</div>';
                    
                    layer.open({
                        type: 1,
                        title: '测试日志详情',
                        area: ['800px', '600px'],
                        content: html
                    });
                }
            }
        });
    }
    
    // 时间格式化
    function formatTime(timestamp) {
        var date = new Date(timestamp * 1000);
        var Y = date.getFullYear();
        var M = (date.getMonth() + 1 < 10 ? '0' + (date.getMonth() + 1) : date.getMonth() + 1);
        var D = date.getDate() < 10 ? '0' + date.getDate() : date.getDate();
        var h = date.getHours() < 10 ? '0' + date.getHours() : date.getHours();
        var m = date.getMinutes() < 10 ? '0' + date.getMinutes() : date.getMinutes();
        var s = date.getSeconds() < 10 ? '0' + date.getSeconds() : date.getSeconds();
        return Y + '-' + M + '-' + D + ' ' + h + ':' + m + ':' + s;
    }
});
</script>
</body>
</html>
