<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>编辑接口</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="/static/admin/layui/css/layui.css">
    <style>
        .edit-container { padding: 20px; background: #fff; }
        .form-section { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #e6e6e6; }
        .form-section:last-child { border-bottom: none; }
        .section-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #333; }
        .json-editor { min-height: 200px; border: 1px solid #e6e6e6; border-radius: 4px; }
    </style>
</head>
<body>
<div class="edit-container">
    <form class="layui-form" lay-filter="editForm">
        <input type="hidden" name="id" value="{$detail.id}">
        
        <!-- 基本信息 -->
        <div class="form-section">
            <div class="section-title">基本信息</div>
            
            <div class="layui-form-item">
                <label class="layui-form-label"><span style="color:red;">*</span>接口名称</label>
                <div class="layui-input-block">
                    <input type="text" name="name" value="{$detail.name}" required lay-verify="required" placeholder="请输入接口名称" class="layui-input">
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">接口分类</label>
                <div class="layui-input-block">
                    <input type="text" name="category" value="{$detail.category}" placeholder="如：会员管理、订单管理等" class="layui-input">
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">接口路径</label>
                <div class="layui-input-block">
                    <input type="text" value="{$detail.path}" readonly class="layui-input layui-disabled">
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">请求方式</label>
                <div class="layui-input-block">
                    <input type="text" value="{$detail.method}" readonly class="layui-input layui-disabled">
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">认证要求</label>
                <div class="layui-input-block">
                    <input type="radio" name="auth_required" value="1" title="需要登录" {$detail.auth_required==1?'checked':''}>
                    <input type="radio" name="auth_required" value="0" title="无需登录" {$detail.auth_required==0?'checked':''}>
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">状态</label>
                <div class="layui-input-block">
                    <input type="radio" name="status" value="1" title="启用" {$detail.status==1?'checked':''}>
                    <input type="radio" name="status" value="0" title="停用" {$detail.status==0?'checked':''}>
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">排序</label>
                <div class="layui-input-block">
                    <input type="number" name="sort" value="{$detail.sort}" placeholder="数字越大越靠前" class="layui-input" style="width: 200px;">
                </div>
            </div>
        </div>
        
        <!-- 接口描述 -->
        <div class="form-section">
            <div class="section-title">接口描述</div>
            
            <div class="layui-form-item layui-form-text">
                <label class="layui-form-label">接口说明</label>
                <div class="layui-input-block">
                    <textarea name="description" placeholder="请输入接口描述信息" class="layui-textarea" style="min-height: 100px;">{$detail.description}</textarea>
                </div>
            </div>
        </div>
        
        <!-- 请求参数 -->
        <div class="form-section">
            <div class="section-title">请求参数</div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">参数定义</label>
                <div class="layui-input-block">
                    <textarea name="request_params" id="requestParams" placeholder='JSON格式，如：[{"name":"aid","type":"int","required":true,"desc":"账户ID"}]' class="layui-textarea" style="min-height: 200px;">{$detail.request_params|json_encode}</textarea>
                    <div class="layui-form-mid layui-word-aux">请使用JSON格式定义参数</div>
                </div>
            </div>
        </div>
        
        <!-- 响应示例 -->
        <div class="form-section">
            <div class="section-title">响应示例</div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">响应数据</label>
                <div class="layui-input-block">
                    <textarea name="response_example" id="responseExample" placeholder='JSON格式，如：{"status":1,"msg":"成功","data":{}}' class="layui-textarea" style="min-height: 200px;">{$detail.response_example|json_encode}</textarea>
                    <div class="layui-form-mid layui-word-aux">请使用JSON格式定义响应示例</div>
                </div>
            </div>
        </div>
        
        <!-- 其他信息 -->
        <div class="form-section">
            <div class="section-title">其他信息</div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">标签</label>
                <div class="layui-input-block">
                    <input type="text" name="tags" value="{$detail.tags}" placeholder="多个标签用逗号分隔，如：常用,已测试" class="layui-input">
                </div>
            </div>
            
            <div class="layui-form-item layui-form-text">
                <label class="layui-form-label">备注说明</label>
                <div class="layui-input-block">
                    <textarea name="remark" placeholder="内部备注信息" class="layui-textarea">{$detail.remark}</textarea>
                </div>
            </div>
        </div>
        
        <!-- 提交按钮 -->
        <div class="layui-form-item">
            <div class="layui-input-block">
                <button type="submit" class="layui-btn" lay-submit lay-filter="submitForm">保存</button>
                <button type="button" class="layui-btn layui-btn-primary" onclick="history.back()">返回</button>
            </div>
        </div>
    </form>
</div>

<script src="/static/admin/layui/layui.js"></script>
<script>
layui.use(['layer', 'form', 'jquery'], function(){
    var layer = layui.layer;
    var form = layui.form;
    var $ = layui.jquery;
    
    // 表单提交
    form.on('submit(submitForm)', function(data){
        var loadingIndex = layer.load(1, {shade: 0.3});
        
        $.ajax({
            url: "{:url('ApiManage/edit')}",
            type: 'POST',
            data: data.field,
            dataType: 'json',
            success: function(res) {
                layer.close(loadingIndex);
                if (res.status == 1) {
                    layer.msg(res.msg, {icon: 1}, function() {
                        history.back();
                    });
                } else {
                    layer.msg(res.msg, {icon: 2});
                }
            },
            error: function() {
                layer.close(loadingIndex);
                layer.msg('保存失败', {icon: 2});
            }
        });
        
        return false;
    });
    
    // JSON格式化
    function formatJson(str) {
        try {
            var obj = JSON.parse(str);
            return JSON.stringify(obj, null, 2);
        } catch (e) {
            return str;
        }
    }
    
    // 初始化JSON编辑器
    var requestParams = $('#requestParams').val();
    if (requestParams) {
        $('#requestParams').val(formatJson(requestParams));
    }
    
    var responseExample = $('#responseExample').val();
    if (responseExample) {
        $('#responseExample').val(formatJson(responseExample));
    }
});
</script>
</body>
</html>
