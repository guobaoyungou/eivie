<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>接口扫描</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="/static/admin/layui/css/layui.css">
    <style>
        body { margin: 0; padding: 0; background: #f5f5f5; }
        .scan-container { padding: 15px; max-width: 1400px; margin: 0 auto; }
        
        /* 左右分栏布局 */
        .scan-layout { display: flex; gap: 15px; }
        .scan-left { flex: 0 0 400px; }
        .scan-right { flex: 1; min-width: 0; }
        
        /* 扫描选项卡片 */
        .scan-options { background: #fff; padding: 20px; border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .scan-options .layui-form-label { width: 100px; }
        .scan-options .layui-input-block { margin-left: 120px; }
        
        /* 自定义Radio样式 - 增强优先级 */
        .custom-radio-group { display: flex; gap: 25px; margin-bottom: 15px; }
        .custom-radio { cursor: pointer; display: flex; align-items: center; font-size: 14px; }
        .custom-radio input[type="radio"] { 
            margin-right: 8px !important; 
            cursor: pointer !important; 
            width: 16px !important; 
            height: 16px !important;
            opacity: 1 !important;
            position: relative !important;
            display: inline-block !important;
        }
        .custom-radio span {
            display: inline-block;
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }
        .custom-radio:hover { color: #1E9FFF; }
        .custom-radio:hover span { color: #1E9FFF; }
        
        /* 自定义Checkbox样式 - 增强优先级 */
        .custom-checkbox { display: block; margin: 5px 0; cursor: pointer; padding: 5px; transition: background 0.2s; }
        .custom-checkbox:hover { background: #f0f0f0; border-radius: 3px; }
        .custom-checkbox input[type="checkbox"] { 
            margin-right: 8px !important; 
            cursor: pointer !important; 
            width: 16px !important; 
            height: 16px !important; 
            vertical-align: middle !important;
            opacity: 1 !important;
            position: relative !important;
            display: inline-block !important;
        }
        .custom-checkbox span {
            display: inline-block;
            vertical-align: middle;
        }
        
        /* 控制器列表 */
        #controllerList { max-height: 300px; overflow-y: auto; border: 1px solid #e6e6e6; padding: 10px; border-radius: 4px; background: #fafafa; }
        #controllerList .custom-checkbox { margin: 3px 0; }
        
        /* 扫描结果卡片 */
        .scan-result { background: #fff; padding: 20px; border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        
        /* 结果标签页 */
        .result-tabs { border-bottom: 2px solid #e6e6e6; margin-bottom: 15px; display: flex; }
        .result-tab { padding: 12px 24px; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.3s; font-weight: 500; }
        .result-tab:hover { color: #1E9FFF; background: #f8f8f8; }
        .result-tab.active { color: #1E9FFF; border-bottom-color: #1E9FFF; background: #f0f7ff; }
        
        /* 结果列表 */
        .result-list { max-height: 600px; overflow-y: auto; }
        .result-item { padding: 15px; border: 1px solid #e6e6e6; border-radius: 4px; margin-bottom: 10px; background: #fafafa; transition: all 0.3s; }
        .result-item:hover { border-color: #1E9FFF; box-shadow: 0 2px 8px rgba(30,159,255,0.15); }
        .result-item-header { display: flex; align-items: center; margin-bottom: 10px; }
        .result-method { display: inline-block; padding: 3px 10px; border-radius: 3px; font-size: 12px; font-weight: bold; margin-right: 10px; color: #fff; min-width: 50px; text-align: center; }
        .result-method.GET { background: #5FB878; }
        .result-method.POST { background: #FFB800; }
        .result-method.PUT { background: #1E9FFF; }
        .result-method.DELETE { background: #FF5722; }
        .result-name { font-weight: bold; flex: 1; font-size: 14px; }
        .result-path { color: #666; font-size: 13px; margin-bottom: 5px; font-family: Consolas, Monaco, monospace; }
        .result-category { color: #999; font-size: 12px; }
        
        /* 进度信息 */
        .progress-info { padding: 15px; background: #f0f7ff; border-radius: 4px; margin-bottom: 15px; border: 1px solid #d9ecff; }
        .progress-info strong { color: #1E9FFF; }
        
        /* 空提示 */
        .empty-tip { text-align: center; padding: 60px 20px; color: #999; }
        .empty-tip i { font-size: 48px; color: #ddd; }
        
        /* 按钮区域 */
        .btn-group { margin-top: 20px; text-align: center; padding-top: 15px; border-top: 1px solid #e6e6e6; }
        
        /* 响应式调整 */
        @media (max-width: 1200px) {
            .scan-layout { flex-direction: column; }
            .scan-left { flex: none; width: 100%; }
        }
    </style>
</head>
<body>
<div class="scan-container">
    <!-- 页面标题 -->
    <div style="background: #fff; padding: 20px; border-radius: 4px; margin-bottom: 15px; box-shadow: 0 1px 4px rgba(0,0,0,0.05);">
        <h2 style="margin: 0 0 10px 0; color: #333; font-size: 20px;">
            <i class="layui-icon layui-icon-survey" style="color: #1E9FFF;"></i> 接口扫描
        </h2>
        <p style="color: #999; font-size: 13px; margin: 0; line-height: 1.6;">自动扫描系统中的API控制器，识别并录入接口信息。支持全量扫描和增量扫描两种模式。</p>
    </div>
    
    <!-- 左右分栏布局 -->
    <div class="scan-layout">
        <!-- 左侧：扫描选项 -->
        <div class="scan-left">
            <div class="scan-options">
                <form class="layui-form" lay-filter="scanForm">
                    <!-- 扫描类型 -->
                    <div class="layui-form-item">
                        <label class="layui-form-label">扫描类型</label>
                        <div class="layui-input-block">
                            <div class="custom-radio-group">
                                <label class="custom-radio">
                                    <input type="radio" name="type" value="all" checked>
                                    <span>全量扫描</span>
                                </label>
                                <label class="custom-radio">
                                    <input type="radio" name="type" value="increment">
                                    <span>增量扫描</span>
                                </label>
                            </div>
                            
                            <!-- 说明文字 -->
                            <div style="line-height: 1.8; padding: 0;">
                                <div style="color: #5FB878; margin-bottom: 8px; padding: 10px; background: #f0f9ff; border-left: 3px solid #5FB878; border-radius: 2px;">
                                    <i class="layui-icon layui-icon-ok-circle"></i> 
                                    <strong>全量扫描：</strong>扫描所有接口并覆盖已有数据
                                </div>
                                <div style="color: #FFB800; padding: 10px; background: #fffbf0; border-left: 3px solid #FFB800; border-radius: 2px;">
                                    <i class="layui-icon layui-icon-tips"></i> 
                                    <strong>增量扫描：</strong>仅添加新接口，不修改已有数据
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 控制器列表 -->
                    <div class="layui-form-item" style="margin-top: 20px;">
                        <label class="layui-form-label" style="padding-top: 0;">控制器列表</label>
                        <div class="layui-input-block">
                            <!-- 全选 -->
                            <div style="margin-bottom: 10px; padding: 10px; background: #f0f7ff; border-radius: 4px; border: 1px solid #d9ecff;">
                                <label class="custom-checkbox" style="margin: 0; font-weight: bold; color: #1E9FFF;">
                                    <input type="checkbox" id="selectAll">
                                    <span id="selectAllText">全选（共 <span id="totalCount">0</span> 个控制器）</span>
                                </label>
                            </div>
                            
                            <!-- 控制器列表 -->
                            <div id="controllerList">
                                {volist name="controllers" id="ctrl"}
                                <label class="custom-checkbox controller-item">
                                    <input type="checkbox" name="controllers[]" value="{$ctrl.name}" class="controller-checkbox">
                                    <span style="font-family: Consolas, Monaco, monospace;">{$ctrl.name}</span>
                                </label>
                                {/volist}
                            </div>
                        </div>
                    </div>
                    
                    <div class="layui-form-item" style="margin-top: 20px; margin-bottom: 0;">
                        <div class="layui-input-block">
                            <button type="button" class="layui-btn layui-btn-normal" id="startScan" style="width: 100%;">
                                <i class="layui-icon layui-icon-release"></i> 开始扫描
                            </button>
                            <button type="button" class="layui-btn layui-btn-primary" onclick="history.back()" style="width: 100%; margin-top: 10px;">
                                <i class="layui-icon layui-icon-return"></i> 返回列表
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- 右侧：扫描结果 -->
        <div class="scan-right">
            <!-- 扫描结果区域 -->
            <div class="scan-result" id="scanResult" style="display: none;">
                <!-- 进度信息 -->
                <div class="progress-info" id="progressInfo" style="display: none;">
                    <div style="margin-bottom: 10px;">
                        <strong><i class="layui-icon layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop"></i> 扫描进度：</strong>
                        <span id="progressText">准备中...</span>
                    </div>
                    <div class="layui-progress" lay-showpercent="true">
                        <div class="layui-progress-bar" lay-percent="0%" id="progressBar"></div>
                    </div>
                </div>
                
                <!-- 结果标签页 -->
                <div class="result-tabs">
                    <span class="result-tab active" data-tab="new">
                        <i class="layui-icon layui-icon-add-circle"></i> 新增接口 (<span id="newCount">0</span>)
                    </span>
                    <span class="result-tab" data-tab="update">
                        <i class="layui-icon layui-icon-edit"></i> 更新接口 (<span id="updateCount">0</span>)
                    </span>
                </div>
                
                <!-- 新增接口列表 -->
                <div class="result-list" id="newList">
                    <div class="empty-tip">
                        <i class="layui-icon layui-icon-file"></i>
                        <p style="margin-top: 10px;">暂无新增接口</p>
                    </div>
                </div>
                
                <!-- 更新接口列表 -->
                <div class="result-list" id="updateList" style="display: none;">
                    <div class="empty-tip">
                        <i class="layui-icon layui-icon-file"></i>
                        <p style="margin-top: 10px;">暂无需要更新的接口</p>
                    </div>
                </div>
                
                <!-- 按钮组 -->
                <div class="btn-group">
                    <button type="button" class="layui-btn layui-btn-lg" id="saveBtn" disabled>
                        <i class="layui-icon layui-icon-ok"></i> 保存接口到数据库
                    </button>
                    <button type="button" class="layui-btn layui-btn-normal layui-btn-lg" id="rescanBtn">
                        <i class="layui-icon layui-icon-refresh"></i> 重新扫描
                    </button>
                </div>
            </div>
            
            <!-- 初始提示 -->
            <div id="emptyHint" class="scan-result">
                <div class="empty-tip" style="padding: 100px 20px;">
                    <i class="layui-icon layui-icon-survey" style="font-size: 80px; color: #ddd;"></i>
                    <p style="margin-top: 20px; font-size: 16px; color: #666;">请在左侧选择控制器后，点击"开始扫描"按钮</p>
                    <p style="margin-top: 10px; font-size: 13px; color: #999;">扫描结果将在此处显示</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/static/admin/layui/layui.js"></script>
<script>
layui.use(['layer', 'element', 'jquery'], function(){
    var layer = layui.layer;
    var element = layui.element;
    var $ = layui.jquery;
    
    var scanData = null;
    
    console.log('[初始化] Layui版本:', layui.v);
    console.log('[初始化] 开始初始化页面...');
    
    // 等待DOM完全加载
    setTimeout(function() {
        // 计算总数
        var totalControllers = $('.controller-checkbox').length;
        $('#totalCount').text(totalControllers);
        console.log('[初始化] 控制器总数:', totalControllers);
        
        // 初始化文本
        updateSelectAllText();
        
        console.log('[初始化] 页面初始化完成');
    }, 100);
    
    // 全选控制 - 使用原生jQuery事件
    $('#selectAll').on('click', function() {
        console.log('[全选] 全选复选框被点击, 选中:', this.checked);
        var checked = this.checked;
        
        // 设置所有控制器复选框的状态
        $('.controller-checkbox').prop('checked', checked);
        
        // 更新文本
        updateSelectAllText();
        
        console.log('[全选] 已' + (checked ? '全选' : '取消全选') + $('.controller-checkbox').length + '个控制器');
    });
    
    // 监听Radio变化
    $('input[name="type"]').on('change', function() {
        console.log('[扫描类型] 选择了:', this.value);
    });
    
    // 监听单个控制器复选框的变化
    $(document).on('change', '.controller-checkbox', function() {
        console.log('[选择] 控制器复选框变化:', $(this).val(), '选中:', this.checked);
        
        // 更新状态
        updateSelectAllState();
        updateSelectAllText();
    });
    
    // 更新全选按钮的状态
    function updateSelectAllState() {
        var total = $('.controller-checkbox').length;
        var checked = $('.controller-checkbox:checked').length;
        
        var selectAllElem = $('#selectAll')[0];
        
        if (checked === 0) {
            selectAllElem.checked = false;
            selectAllElem.indeterminate = false;
        } else if (checked === total) {
            selectAllElem.checked = true;
            selectAllElem.indeterminate = false;
        } else {
            selectAllElem.checked = false;
            selectAllElem.indeterminate = true; // 设置为半选状态
        }
        
        console.log('[状态] 全选状态更新: 已选 ' + checked + '/' + total);
    }
    
    // 更新全选按钮的文本
    function updateSelectAllText() {
        var total = $('.controller-checkbox').length;
        var checked = $('.controller-checkbox:checked').length;
        
        if (checked === 0) {
            $('#selectAllText').html('全选（共 <span id="totalCount">' + total + '</span> 个控制器）');
        } else if (checked === total) {
            $('#selectAllText').html('<span style="color: #5FB878;">✔ 已全选 ' + total + ' 个控制器</span>');
        } else {
            $('#selectAllText').html('<span style="color: #FFB800;">已选择 ' + checked + ' / ' + total + ' 个控制器</span>');
        }
    }
    
    // 标签页切换
    $('.result-tab').click(function() {
        $('.result-tab').removeClass('active');
        $(this).addClass('active');
        var tab = $(this).data('tab');
        if (tab == 'new') {
            $('#newList').show();
            $('#updateList').hide();
        } else {
            $('#newList').hide();
            $('#updateList').show();
        }
    });
    
    // 开始扫描
    $('#startScan').click(function() {
        console.log('[扫描] 开始扫描按钮被点击');
        var type = $('input[name="type"]:checked').val();
        var controllers = [];
        $('input[name="controllers[]"]:checked').each(function() {
            controllers.push($(this).val());
        });
        
        console.log('[扫描] 扫描类型:', type);
        console.log('[扫描] 选中的控制器数量:', controllers.length);
        console.log('[扫描] 控制器列表:', controllers);
        
        if (controllers.length == 0) {
            layer.msg('请至少选择一个控制器', {icon: 0, time: 2000});
            return;
        }
        
        // 隐藏提示，显示结果区域
        $('#emptyHint').hide();
        $('#scanResult').show();
        $('#progressInfo').show();
        $('#progressText').html('<i class="layui-icon layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop"></i> 正在扫描 ' + controllers.length + ' 个控制器...');
        element.progress('progressBar', '30%');
        
        var loadingIndex = layer.load(1, {shade: 0.3});
        
        console.log('[扫描] 准备发送AJAX请求');
        
        $.ajax({
            url: "{:url('ApiManage/scan')}",
            type: 'POST',
            data: {
                type: type,
                controllers: controllers
            },
            dataType: 'json',
            beforeSend: function() {
                console.log('[扫描] AJAX请求已发送');
                element.progress('progressBar', '50%');
            },
            success: function(res) {
                console.log('[扫描] AJAX请求成功返回', res);
                layer.close(loadingIndex);
                element.progress('progressBar', '100%');
                $('#progressText').html('<i class="layui-icon layui-icon-ok"></i> 扫描完成！');
                
                setTimeout(function() {
                    $('#progressInfo').fadeOut();
                }, 2000);
                
                if (res.status == 1) {
                    scanData = res.data;
                    renderResult(res.data);
                    $('#saveBtn').prop('disabled', false);
                    layer.msg(res.msg, {icon: 1, time: 2000});
                } else {
                    layer.msg(res.msg || '扫描失败', {icon: 2, time: 3000});
                    console.error('[扫描] 扫描失败:', res.msg);
                }
            },
            error: function(xhr, status, error) {
                console.error('[扫描] AJAX请求失败', {
                    status: xhr.status,
                    statusText: xhr.statusText,
                    error: error,
                    response: xhr.responseText
                });
                layer.close(loadingIndex);
                $('#progressInfo').hide();
                
                var errorMsg = '扫描请求失败';
                if (xhr.status === 0) {
                    errorMsg = '网络连接失败，请检查网络';
                } else if (xhr.status === 403) {
                    errorMsg = '权限不足，请使用管理员账号';
                } else if (xhr.status === 404) {
                    errorMsg = '接口地址不存在';
                } else if (xhr.status === 500) {
                    errorMsg = '服务器错误: ' + (xhr.responseText || error);
                }
                
                layer.msg(errorMsg, {icon: 2, time: 3000});
            }
        });
    });
    
    // 渲染结果
    function renderResult(data) {
        console.log('[渲染] 开始渲染结果', data);
        
        var newCount = data.new_count || 0;
        var updateCount = data.update_count || 0;
        
        $('#newCount').text(newCount);
        $('#updateCount').text(updateCount);
        
        // 渲染新增列表
        if (data.new && data.new.length > 0) {
            var html = '';
            $.each(data.new, function(i, item) {
                html += '<div class="result-item">';
                html += '  <div class="result-item-header">';
                html += '    <span class="result-method ' + (item.method || 'GET') + '">' + (item.method || 'GET') + '</span>';
                html += '    <span class="result-name">' + (item.name || '未命名接口') + '</span>';
                html += '  </div>';
                html += '  <div class="result-path"><i class="layui-icon layui-icon-link"></i> ' + (item.path || '') + '</div>';
                if (item.category) {
                    html += '  <div class="result-category"><i class="layui-icon layui-icon-tabs"></i> 分类：' + item.category + '</div>';
                }
                if (item.description) {
                    html += '  <div style="color: #999; font-size: 12px; margin-top: 5px;">' + item.description + '</div>';
                }
                html += '</div>';
            });
            $('#newList').html(html);
            console.log('[渲染] 新增接口渲染完成:', data.new.length + '个');
        } else {
            $('#newList').html('<div class="empty-tip"><i class="layui-icon layui-icon-file"></i><p style="margin-top: 10px;">暂无新增接口</p></div>');
            console.log('[渲染] 无新增接口');
        }
        
        // 渲染更新列表
        if (data.update && data.update.length > 0) {
            var html = '';
            $.each(data.update, function(i, item) {
                html += '<div class="result-item">';
                html += '  <div class="result-item-header">';
                html += '    <span class="result-method ' + (item.method || 'GET') + '">' + (item.method || 'GET') + '</span>';
                html += '    <span class="result-name">' + (item.name || '未命名接口') + '</span>';
                html += '  </div>';
                html += '  <div class="result-path"><i class="layui-icon layui-icon-link"></i> ' + (item.path || '') + '</div>';
                if (item.category) {
                    html += '  <div class="result-category"><i class="layui-icon layui-icon-tabs"></i> 分类：' + item.category + '</div>';
                }
                if (item.description) {
                    html += '  <div style="color: #999; font-size: 12px; margin-top: 5px;">' + item.description + '</div>';
                }
                html += '</div>';
            });
            $('#updateList').html(html);
            console.log('[渲染] 更新接口渲染完成:', data.update.length + '个');
        } else {
            $('#updateList').html('<div class="empty-tip"><i class="layui-icon layui-icon-file"></i><p style="margin-top: 10px;">暂无需要更新的接口</p></div>');
            console.log('[渲染] 无更新接口');
        }
    }
    
    // 保存接口
    $('#saveBtn').click(function() {
        console.log('保存按钮被点击');
        if (!scanData) {
            layer.msg('没有可保存的数据');
            return;
        }
        
        var interfaces = [];
        if (scanData.new) {
            interfaces = interfaces.concat(scanData.new);
        }
        if (scanData.update) {
            interfaces = interfaces.concat(scanData.update);
        }
        
        console.log('待保存接口数量:', interfaces.length);
        
        if (interfaces.length == 0) {
            layer.msg('没有可保存的数据');
            return;
        }
        
        var loadingIndex = layer.load(1, {shade: 0.3});
        
        console.log('[保存] 准备保存', interfaces.length, '个接口');
        console.log('[保存] 数据内容:', interfaces);
        
        $.ajax({
            url: "{:url('ApiManage/savescan')}",
            type: 'POST',
            data: {
                interfaces: JSON.stringify(interfaces)
            },
            dataType: 'json',
            success: function(res) {
                console.log('[保存] 保存成功返回', res);
                layer.close(loadingIndex);
                if (res.status == 1) {
                    layer.msg(res.msg, {icon: 1, time: 2000}, function() {
                        window.location.href = "{:url('ApiManage/index')}";
                    });
                } else {
                    layer.msg(res.msg || '保存失败', {icon: 2, time: 3000});
                }
            },
            error: function(xhr, status, error) {
                console.error('[保存] 保存失败', {
                    status: xhr.status,
                    statusText: xhr.statusText,
                    error: error,
                    response: xhr.responseText
                });
                layer.close(loadingIndex);
                
                var errorMsg = '保存失败';
                if (xhr.status === 500) {
                    errorMsg = '服务器错误，请查看日志: ' + (xhr.responseText || error);
                } else if (xhr.status === 0) {
                    errorMsg = '网络连接失败';
                }
                
                layer.msg(errorMsg, {icon: 2, time: 3000});
            }
        });
    });
    
    // 重新扫描
    $('#rescanBtn').click(function() {
        console.log('[操作] 重新扫描');
        $('#scanResult').hide();
        $('#emptyHint').show();
        $('#progressInfo').hide();
        scanData = null;
        $('#saveBtn').prop('disabled', true);
        element.progress('progressBar', '0%');
        
        // 清空勾选
        $('.controller-checkbox').prop('checked', false);
        $('#selectAll').prop('checked', false);
        $('#selectAll')[0].indeterminate = false;
        updateSelectAllText();
    });
    
    // 页面加载完成
    console.log('[初始化] 接口扫描页面加载完成');
});
</script>
</body>
</html>
