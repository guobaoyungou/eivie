<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>照片场景分组</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    {include file="public/css"/}
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-row layui-col-space15">
            <div class="layui-card layui-col-md12">
                <div class="layui-card-header">
                    <i class="layui-icon layui-icon-tabs"></i> 照片场景分组
                </div>
                <div class="layui-card-body" pad15>
                    <div class="layui-col-md8" style="padding-bottom:10px">
                        <a class="layui-btn layuiadmin-btn-list" href="javascript:void(0)" onclick="openmax('{:url('edit')}')">
                            <i class="layui-icon layui-icon-add-1"></i> 添加分组
                        </a>
                        <button class="layui-btn layui-btn-primary layuiadmin-btn-list" onclick="datadel(0)">删除</button>
                    </div>
                    <div class="layui-col-md4" style="padding-bottom:10px;text-align:right">
                        <div class="layui-inline">
                            <input type="text" id="searchName" class="layui-input" placeholder="分组名称" style="width:150px">
                        </div>
                        <div class="layui-inline">
                            <select id="searchStatus" style="width:100px">
                                <option value="">全部状态</option>
                                <option value="1">启用</option>
                                <option value="0">禁用</option>
                            </select>
                        </div>
                        <button class="layui-btn" onclick="reloadTable()"><i class="layui-icon layui-icon-search"></i> 搜索</button>
                    </div>
                    <div class="xm-d2-hang2">
                        <table id="tabledata" lay-filter="tabledata"></table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    {include file="public/js"/}
    <script>
    var table = layui.table;
    var datawhere = {};
    
    var tableIns = table.render({
        elem: '#tabledata',
        url: "{$Request.url}",
        where: datawhere,
        page: true,
        limit: 20,
        cols: [[
            { type: "checkbox" },
            { field: 'id', title: 'ID', width: 80, sort: true },
            { field: 'pic', title: '图标', width: 80, templet: function(d) {
                if (d.pic) {
                    return '<img src="' + d.pic + '" style="height:36px;border-radius:4px"/>';
                }
                return '<span style="color:#ccc">-</span>';
            }},
            { field: 'name', title: '分组名称', minWidth: 150 },
            { field: 'description', title: '描述', minWidth: 200, templet: function(d) {
                return d.description || '<span style="color:#ccc">-</span>';
            }},
            { field: 'template_count', title: '关联模板', width: 100, templet: function(d) {
                return '<span style="color:#1E9FFF">' + (d.template_count || 0) + '</span> 个';
            }},
            { field: 'sort', title: '排序', width: 80, sort: true },
            { field: 'status', title: '状态', width: 80, templet: function(d) {
                return d.status == 1 ? '<span style="color:green">启用</span>' : '<span style="color:red">禁用</span>';
            }},
            { field: 'create_time', title: '创建时间', width: 170, templet: function(d) {
                return d.create_time ? layui.util.toDateString(d.create_time * 1000) : '-';
            }},
            { field: 'operation', title: '操作', width: 150, templet: function(d) {
                var html = '';
                html += '<button class="table-btn" onclick="openmax(\'{:url(\'edit\')}/id/' + d.id + '\')">编辑</button>';
                html += '<button class="table-btn" onclick="datadel(' + d.id + ')">删除</button>';
                return html;
            }}
        ]]
    });
    
    // 排序
    table.on('sort(tabledata)', function(obj) {
        datawhere.field = obj.field;
        datawhere.order = obj.type;
        reloadTable();
    });
    
    // 搜索
    function reloadTable() {
        datawhere.name = $('#searchName').val();
        datawhere.status = $('#searchStatus').val();
        tableIns.reload({
            where: datawhere,
            page: { curr: 1 }
        });
    }
    
    // 供子页面调用刷新
    function renderTable() {
        reloadTable();
    }
    
    // 删除
    function datadel(id) {
        var ids = [];
        if (id == 0) {
            var checkStatus = table.checkStatus('tabledata');
            var checkData = checkStatus.data;
            if (checkData.length === 0) {
                return layer.msg('请选择数据');
            }
            for (var i = 0; i < checkData.length; i++) {
                ids.push(checkData[i]['id']);
            }
        } else {
            ids.push(id);
        }
        layer.confirm('确定要删除选中的分组吗？', { icon: 7, title: '操作确认' }, function(index) {
            layer.close(index);
            var loadIndex = layer.load();
            $.post("{:url('del')}", { ids: ids }, function(data) {
                layer.close(loadIndex);
                if (data.status == 1) {
                    dialog(data.msg, data.status);
                    reloadTable();
                } else if (data.has_template) {
                    // 有关联模板，提示是否强制删除
                    layer.confirm(data.msg + '<br><br>是否强制删除？（将自动取消模板关联）', { icon: 0, title: '提示' }, function(idx) {
                        layer.close(idx);
                        var loadIdx = layer.load();
                        $.post("{:url('del')}", { ids: ids, force: 1 }, function(res) {
                            layer.close(loadIdx);
                            dialog(res.msg, res.status);
                            reloadTable();
                        });
                    });
                } else {
                    dialog(data.msg, data.status);
                }
            });
        });
    }
    </script>
    {include file="public/copyright"/}
</body>
</html>
