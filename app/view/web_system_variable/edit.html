<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>编辑系统变量</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
  <style>
    .var-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
    .var-row .layui-input { flex: 1; }
    .var-row .layui-input.var-name { flex: 0 0 180px; }
    .var-row .layui-input.var-desc { flex: 1; }
    .var-tips { color: #999; font-size: 12px; margin-bottom: 15px; }
  </style>
</head>
<body>
  <div class="layui-fluid" style="padding: 15px;">
    <form class="layui-form" lay-filter="varForm">
      <div class="var-tips">
        <i class="layui-icon layui-icon-tips" style="color:#1e9fff;"></i>
        在提示词改写模板中使用 <code>{变量名}</code> 格式引用变量，生成时将自动替换为实际值。
      </div>
      <div id="varContainer">
        {notempty name="variables"}
        {volist name="variables" id="desc" key="name"}
        <div class="var-row">
          <input type="text" name="variables[{$key}][name]" value="{$name}" placeholder="变量名" class="layui-input var-name" readonly>
          <input type="text" name="variables[{$key}][description]" value="{$desc}" placeholder="说明（如：人像自动识别的性别）" class="layui-input var-desc">
          <button type="button" class="layui-btn layui-btn-danger layui-btn-sm" onclick="removeVarRow(this)">删除</button>
        </div>
        {/volist}
        {/notempty}
      </div>
      <div style="margin: 15px 0;">
        <button type="button" class="layui-btn layui-btn-sm" onclick="addVarRow()">
          <i class="layui-icon layui-icon-add-1"></i> 新增变量
        </button>
      </div>
      <div class="layui-form-item" style="text-align: center; margin-top: 20px;">
        <button type="button" class="layui-btn" lay-submit lay-filter="saveVars">保存</button>
        <button type="button" class="layui-btn layui-btn-primary" onclick="parent.layer.closeAll()">取消</button>
      </div>
    </form>
  </div>
  {include file="public/js"/}
  <script>
  var rowIndex = {$variables|count|default=0};

  function addVarRow(){
    var html = '<div class="var-row">';
    html += '<input type="text" name="variables[' + rowIndex + '][name]" value="" placeholder="变量名（不含花括号）" class="layui-input var-name">';
    html += '<input type="text" name="variables[' + rowIndex + '][description]" value="" placeholder="说明（如：人像自动识别的性别）" class="layui-input var-desc">';
    html += '<button type="button" class="layui-btn layui-btn-danger layui-btn-sm" onclick="removeVarRow(this)">删除</button>';
    html += '</div>';
    $('#varContainer').append(html);
    rowIndex++;
  }

  function removeVarRow(btn){
    $(btn).closest('.var-row').remove();
  }

  layui.use(['form', 'layer'], function(){
    var form = layui.form;
    var layer = layui.layer;

    form.on('submit(saveVars)', function(data){
      $.post('{:url("edit")}', {variables: data.field.variables}, function(res){
        if(res.status == 1){
          layer.msg('保存成功', {icon: 1}, function(){
            parent.layer.closeAll();
          });
        } else {
          layer.msg(res.msg || '保存失败');
        }
      }, 'json');
      return false;
    });
  });
  </script>
</body>
</html>
