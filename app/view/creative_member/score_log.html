<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>创作积分流水</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
        <div class="layui-card-header">
          <i class="layui-icon layui-icon-log"></i> 创作积分流水
        </div>
        <div class="layui-card-body" pad15>
          <!-- 搜索区 -->
          <div class="layui-form layui-form-search" style="padding-bottom:10px">
            <div class="layui-inline">
              <label class="layui-form-label">会员ID</label>
              <div class="layui-input-inline" style="width:100px">
                <input type="text" name="mid" class="layui-input" placeholder="会员ID">
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">类型</label>
              <div class="layui-input-inline" style="width:120px">
                <select name="type">
                  <option value="">全部</option>
                  <option value="1">月度发放</option>
                  <option value="2">每日登录</option>
                  <option value="3">消费扣除</option>
                  <option value="4">退款返还</option>
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <button class="layui-btn layuiadmin-btn-replys" lay-submit lay-filter="LAY-search">
                <i class="layui-icon layui-icon-search"></i>
              </button>
            </div>
          </div>

          <!-- 数据表格 -->
          <div class="layui-col-md12">
            <table id="tabledata" lay-filter="tabledata"></table>
          </div>
        </div>
      </div>
    </div>
  </div>

  {include file="public/js"/}
  <script>
  var table = layui.table;
  var datawhere = {};

  var tableIns = table.render({
    elem: '#tabledata',
    url: "{$Request.url}",
    page: true,
    cols: [[
      {field: 'id', title: 'ID', sort: true, width: 60},
      {field: 'mid', title: '会员ID', width: 70},
      {field: 'member_name', title: '会员昵称', width: 120},
      {field: 'type_text', title: '类型', width: 90, templet: function(d) {
        var colorMap = {1:'#5FB878', 2:'#1E9FFF', 3:'#FF5722', 4:'#FFB800'};
        var color = colorMap[d.type] || '#999';
        return '<span style="color:'+color+';font-weight:bold">' + d.type_text + '</span>';
      }},
      {field: 'amount', title: '变动数量', width: 90, templet: function(d) {
        var color = d.amount > 0 ? '#5FB878' : '#FF5722';
        var prefix = d.amount > 0 ? '+' : '';
        return '<span style="color:'+color+';font-weight:bold">' + prefix + d.amount + '</span>';
      }},
      {field: 'balance', title: '变动后余额', width: 100},
      {field: 'remark', title: '备注', minWidth: 200},
      {field: 'related_order_id', title: '关联订单', width: 90},
      {field: 'create_time_text', title: '时间', width: 150}
    ]]
  });

  table.on('sort(tabledata)', function(obj) {
    datawhere.field = obj.field;
    datawhere.order = obj.type;
    tableIns.reload({initSort: obj, where: datawhere});
  });

  layui.form.on('submit(LAY-search)', function(obj) {
    datawhere = obj.field;
    tableIns.reload({where: datawhere, page: {curr: 1}});
    return false;
  });
  </script>
</body>
</html>
