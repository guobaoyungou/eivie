<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>创作会员订阅记录</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
        <div class="layui-card-header">
          <i class="layui-icon layui-icon-list"></i> 创作会员订阅记录
        </div>
        <div class="layui-card-body" pad15>
          <!-- 搜索区 -->
          <div class="layui-form layui-form-search" style="padding-bottom:10px">
            <div class="layui-inline">
              <label class="layui-form-label">会员ID</label>
              <div class="layui-input-inline" style="width:100px">
                <input type="text" name="mid" class="layui-input" placeholder="会员ID">
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">版本</label>
              <div class="layui-input-inline" style="width:120px">
                <select name="version_code">
                  <option value="">全部</option>
                  <option value="basic">基础版</option>
                  <option value="pro">专业版</option>
                  <option value="master">大师版</option>
                  <option value="flagship">旗舰版</option>
                  <option value="premium">尊享版</option>
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">状态</label>
              <div class="layui-input-inline" style="width:100px">
                <select name="status">
                  <option value="">全部</option>
                  <option value="1">生效中</option>
                  <option value="0">已过期</option>
                  <option value="2">已取消</option>
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <button class="layui-btn layuiadmin-btn-replys" lay-submit lay-filter="LAY-search">
                <i class="layui-icon layui-icon-search"></i>
              </button>
            </div>
          </div>

          <!-- 数据表格 -->
          <div class="layui-col-md12">
            <table id="tabledata" lay-filter="tabledata"></table>
          </div>
        </div>
      </div>
    </div>
  </div>

  {include file="public/js"/}
  <script>
  var table = layui.table;
  var datawhere = {};

  var tableIns = table.render({
    elem: '#tabledata',
    url: "{$Request.url}",
    page: true,
    cols: [[
      {field: 'id', title: 'ID', sort: true, width: 60},
      {field: 'mid', title: '会员ID', width: 70},
      {field: 'member_name', title: '会员昵称', width: 120, templet: function(d) {
        var html = '';
        if (d.member_headimg) {
          html += '<img src="'+d.member_headimg+'" style="width:24px;height:24px;border-radius:50%;vertical-align:middle;margin-right:4px">';
        }
        html += (d.member_name || '-');
        return html;
      }},
      {field: 'version_name', title: '版本', width: 90},
      {field: 'mode_text', title: '购买模式', width: 90},
      {field: 'plan_price', title: '套餐价格', width: 90, templet: function(d) {
        return d.plan_price ? '¥' + d.plan_price : '-';
      }},
      {field: 'remaining_score', title: '剩余积分', width: 80, templet: function(d) {
        return '<span class="layui-badge layui-bg-blue">' + (d.remaining_score || 0) + '</span>';
      }},
      {field: 'total_score_used', title: '已用积分', width: 80},
      {field: 'auto_renew', title: '自动续费', width: 80, templet: function(d) {
        return d.auto_renew == 1 ? '<span class="layui-badge layui-bg-green">是</span>' : '<span class="layui-badge layui-bg-gray">否</span>';
      }},
      {field: 'status_text', title: '状态', width: 80, templet: function(d) {
        var color = d.status == 1 ? '#5FB878' : (d.status == 2 ? '#FFB800' : '#999');
        return '<span style="color:'+color+';font-weight:bold">' + d.status_text + '</span>';
      }},
      {field: 'start_time_text', title: '生效时间', width: 140},
      {field: 'expire_time_text', title: '到期时间', width: 140},
      {field: 'create_time_text', title: '创建时间', width: 140}
    ]]
  });

  table.on('sort(tabledata)', function(obj) {
    datawhere.field = obj.field;
    datawhere.order = obj.type;
    tableIns.reload({initSort: obj, where: datawhere});
  });

  layui.form.on('submit(LAY-search)', function(obj) {
    datawhere = obj.field;
    tableIns.reload({where: datawhere, page: {curr: 1}});
    return false;
  });
  </script>
</body>
</html>
