	var new_sign_arr=[];

	/* ===== 空闲防冷场动画状态变量 ===== */
	var idleTimer = null;           // 空闲延迟定时器引用
	var isIdleAnimation = false;    // 当前播放的是否为空闲动画
	var lastIdleUserIndex = -1;     // 上一次空闲动画抽取的用户索引
	var isShowingSign = false;      // 是否正在播放签到通知动画（防止重入）
{/literal}
	var idleEnabled = {$threed_idle_enabled};   // 是否启用空闲防冷场动画
	var idleDelay = {$threed_idle_delay};       // 空闲延迟时间（毫秒）
{literal}

	/**
	 * 显示签到通知卡片（真实签到与空闲动画共用）
	 * CSS动画总时长约8.5秒（vv: 8s + vp: 0.5s@8s），JS清理超时须≥CSS动画周期
	 */
	function showSignCard(person) {
		isShowingSign = true;
		console.log('[IdleAnim] showSignCard:', person.nickname, 'idle=' + isIdleAnimation);
		$("#qdtx").attr("src", person.avatar);
		$("#qdnums").html(person.signorder);
		$("#qdname").html(person.nickname);
		// 强制移除旧动画状态并触发回流，确保 CSS 动画重新播放
		var tuchuEl = document.querySelector('.tuchu');
		tuchuEl.classList.remove('view');
		void tuchuEl.offsetWidth; // 强制浏览器回流
		tuchuEl.classList.add('view');
		// 9秒后清理：匹配CSS动画周期（vv 8s + vp 0.5s@8s = 8.5s，留0.5s余量）
		window.setTimeout(function() {
			$(".tuchu").removeClass('view');
			isShowingSign = false;
			console.log('[IdleAnim] card hidden, queue=' + new_sign_arr.length);
			// 动画结束后：优先处理真实签到队列
			if (new_sign_arr.length > 0) {
				setTimeout(function() { shownewsign(); }, 500);
			} else if (isIdleAnimation && idleEnabled && personArray.length > 0) {
				// 空闲动画结束且仍无新签到，继续调度
				scheduleIdleAnimation();
			}
			isIdleAnimation = false;
		}, 9000);
	}

	/**
	 * 清除空闲计时器
	 */
	function clearIdleTimer() {
		if (idleTimer) {
			clearTimeout(idleTimer);
			idleTimer = null;
		}
	}

	/**
	 * 调度空闲动画（延迟触发）
	 */
	function scheduleIdleAnimation() {
		if (idleTimer || isShowingSign || !idleEnabled) return;
		console.log('[IdleAnim] scheduled, delay=' + idleDelay + 'ms');
		idleTimer = setTimeout(function() {
			idleTimer = null;
			playIdleAnimation();
		}, idleDelay);
	}

	/**
	 * 播放空闲动画：从已签到用户中随机抽取
	 */
	function playIdleAnimation() {
		// 若有真实签到到达，优先处理
		if (new_sign_arr.length > 0) { shownewsign(); return; }
		if (personArray.length === 0 || isShowingSign) return;

		var idx;
		if (personArray.length === 1) {
			idx = 0;
		} else {
			do { idx = Math.floor(Math.random() * personArray.length); } while (idx === lastIdleUserIndex);
		}
		lastIdleUserIndex = idx;
		isIdleAnimation = true;
		console.log('[IdleAnim] playing idle, user:', personArray[idx].nickname);
		showSignCard(personArray[idx]);
	}

	/**
	 * 主签到通知调度
	 */
	function shownewsign(){
		if (isShowingSign) return false;

		if (new_sign_arr.length > 0) {
			clearIdleTimer();
			isIdleAnimation = false;
			var person = new_sign_arr.shift();
			showSignCard(person);
		} else if (idleEnabled && personArray.length > 0) {
			scheduleIdleAnimation();
		}
	}

	$(function(){
		console.log('[IdleAnim] init: enabled=' + idleEnabled + ' delay=' + idleDelay + ' persons=' + personArray.length);
		setInterval(function(){shownewsign()},5000);
		// 立即启动空闲调度
		if (idleEnabled && personArray.length > 0) {
			scheduleIdleAnimation();
		}
	})

var show_interval = "0"; // 间隔时间
var return_array = new Array();
function getArrayItems(arr, num) {
    //新建一个数组,将传入的数组复制过来,用于运算,而不要直接操作传入的数组;
    var temp_array = new Array();
    for (var index in arr) {
        temp_array.push(arr[index]);
    }
    //取出的数值项,保存在此数组
    for (var i = 0; i<num; i++) {
        //判断如果数组还有可以取出的元素,以防下标越界
        if (temp_array.length>0) {
            //在数组中产生一个随机索引
            var arrIndex = Math.floor(Math.random()*temp_array.length);
            //将此随机索引的对应的数组元素值复制出来
            return_array[i] = temp_array[arrIndex];
            //然后删掉此索引的数组元素,这时候temp_array变为新的数组
            temp_array.splice(arrIndex, 1);
        } else {
            //数组中数据项取完后,退出循环,比如数组本来只有10项,但要求取出20项.
            return false;
        }
    }
    return return_array;
}
getArrayItems(personArray,window.AvatarNum);
