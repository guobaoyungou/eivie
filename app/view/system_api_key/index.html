<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>API Key配置</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
  <style>
    .pool-summary { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
    .pool-card { background: #fff; border: 1px solid #e6e6e6; border-radius: 6px; padding: 12px 18px; min-width: 140px; text-align: center; }
    .pool-card .card-num { font-size: 28px; font-weight: bold; line-height: 1.2; }
    .pool-card .card-label { font-size: 12px; color: #999; margin-top: 4px; }
    .pool-card.blue .card-num { color: #1E9FFF; }
    .pool-card.green .card-num { color: #5FB878; }
    .pool-card.orange .card-num { color: #FFB800; }
    .pool-card.red .card-num { color: #FF5722; }
    .concurrency-bar { display: inline-block; width: 60px; height: 6px; background: #e6e6e6; border-radius: 3px; vertical-align: middle; margin-left: 5px; }
    .concurrency-bar .bar-inner { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .bar-safe { background: #5FB878; }
    .bar-warn { background: #FFB800; }
    .bar-danger { background: #FF5722; }
  </style>
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-card layui-col-md12">
        <div class="layui-card-header">
          <i class="layui-icon layui-icon-set"></i> API Key配置
          <span class="layui-badge layui-bg-blue" style="margin-left:10px">系统级配置 - 多Key池</span>
        </div>
        <div class="layui-card-body" pad15>
          <!-- Key池状态概览 -->
          <div id="poolSummary" class="pool-summary" style="display:none">
            <div class="pool-card blue">
              <div class="card-num" id="statTotalKeys">0</div>
              <div class="card-label">Key总数</div>
            </div>
            <div class="pool-card green">
              <div class="card-num" id="statActiveKeys">0</div>
              <div class="card-label">启用数</div>
            </div>
            <div class="pool-card blue">
              <div class="card-num" id="statTotalCapacity">0</div>
              <div class="card-label">总并发容量</div>
            </div>
            <div class="pool-card orange">
              <div class="card-num" id="statUsedCapacity">0</div>
              <div class="card-label">使用中</div>
            </div>
            <div class="pool-card green">
              <div class="card-num" id="statAvailCapacity">0</div>
              <div class="card-label">可用容量</div>
            </div>
          </div>
          <!-- 操作按钮区 -->
          <div class="layui-col-md4" style="padding-bottom:10px">
            <a class="layui-btn layuiadmin-btn-list" href="javascript:void(0)" onclick="openmax('{:url(\'edit\')}')">
              <i class="layui-icon layui-icon-add-1"></i> 新增配置
            </a>
            <button class="layui-btn layui-btn-primary layuiadmin-btn-list" onclick="datadel(0)">批量删除</button>
          </div>
          
          <!-- 搜索区 -->
          <div class="layui-form layui-col-md8 layui-form-search">
            <div class="layui-inline layuiadmin-input-useradmin">
              <label class="layui-form-label">关键词</label>
              <div class="layui-input-inline">
                <input type="text" name="keyword" autocomplete="off" class="layui-input" placeholder="配置名称/供应商">
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">供应商</label>
              <div class="layui-input-inline" style="width:150px">
                <select name="provider_code">
                  <option value="">全部供应商</option>
                  {volist name="providers" id="p"}
                  <option value="{$p.provider_code}">{$p.provider_name}</option>
                  {/volist}
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">状态</label>
              <div class="layui-input-inline" style="width:100px">
                <select name="is_active">
                  <option value="">全部</option>
                  <option value="1">启用</option>
                  <option value="0">停用</option>
                </select>
              </div>
            </div>
            <div class="layui-inline">
              <button class="layui-btn layuiadmin-btn-replys" lay-submit lay-filter="LAY-search">
                <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
              </button>
            </div>
          </div>
          
          <!-- 数据表格 -->
          <div class="layui-col-md12">
            <table id="tabledata" lay-filter="tabledata"></table>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  {include file="public/js"/}
  <script>
  var table = layui.table;
  var datawhere = {};
  
  // 渲染表格
  var tableIns = table.render({
    elem: '#tabledata',
    url: "{$Request.url}",
    page: true,
    cols: [[
      {type: "checkbox", width: 50},
      {field: 'id', title: 'ID', sort: true, width: 60},
      {field: 'provider_logo', title: 'Logo', width: 60, templet: function(d) {
        if (d.provider_logo) {
          return '<img src="'+d.provider_logo+'" style="width:32px;height:32px;border-radius:4px"/>';
        }
        return '<span style="color:#999">-</span>';
      }},
      {field: 'provider_name', title: '供应商', width: 100},
      {field: 'config_name', title: '配置名称', minWidth: 130},
      {field: 'api_key_masked', title: 'API Key', width: 140, templet: function(d) {
        return '<code style="background:#f5f5f5;padding:2px 6px;border-radius:3px">' + d.api_key_masked + '</code>';
      }},
      {field: 'concurrency_text', title: '并发状态', width: 110, templet: function(d) {
        var max = d.max_concurrency || 5;
        var cur = d.current_concurrency || 0;
        var pct = Math.min(100, Math.round(cur / max * 100));
        var cls = pct < 60 ? 'bar-safe' : (pct < 85 ? 'bar-warn' : 'bar-danger');
        return '<span>' + cur + '/' + max + '</span>' +
          '<div class="concurrency-bar"><div class="bar-inner ' + cls + '" style="width:' + pct + '%"></div></div>';
      }},
      {field: 'weight', title: '权重', width: 70, sort: true},
      {field: 'call_stats', title: '调用/失败', width: 90, templet: function(d) {
        var total = d.total_calls || 0;
        var fail = d.fail_calls || 0;
        var color = fail > 0 ? '#FF5722' : '#5FB878';
        return total + '/<span style="color:'+color+'">' + fail + '</span>';
      }},
      {field: 'success_rate', title: '成功率', width: 80, templet: function(d) {
        if (d.success_rate === '-') return '-';
        var rate = parseFloat(d.success_rate);
        var color = rate >= 90 ? '#5FB878' : (rate >= 70 ? '#FFB800' : '#FF5722');
        return '<span style="color:'+color+';font-weight:bold">' + d.success_rate + '</span>';
      }},
      {field: 'last_used_time_text', title: '最后使用', width: 130},
      {field: 'is_active', title: '状态', width: 80, templet: function(d) {
        var checked = d.is_active == 1 ? 'checked' : '';
        return '<input type="checkbox" name="is_active" lay-skin="switch" lay-text="启用|停用" lay-filter="statusSwitch" data-id="'+d.id+'" '+checked+'>';
      }},
      {field: 'operation', title: '操作', width: 260, fixed: 'right', templet: function(d) {
        var html = '';
        html += '<button class="table-btn" onclick="testApi('+d.id+')">测试</button>';
        var pcode = d.provider_code || d.provider_code_ref || '';
        if (pcode === 'ollama') {
          html += '<button class="table-btn" style="color:#1E9FFF" onclick="openChat()">对话</button>';
        }
        if (pcode === 'voxcpm') {
          html += '<button class="table-btn" style="color:#FF9800" onclick="openVoiceChat()">语音对话</button>';
        }
        html += '<button class="table-btn" onclick="openmax(\'{:url(\'edit\')}/id/'+d.id+'\')">编辑</button>';
        html += '<button class="table-btn" onclick="datadel('+d.id+')">删除</button>';
        return html;
      }}
    ]]
  });
  
  // 排序事件
  table.on('sort(tabledata)', function(obj) {
    datawhere.field = obj.field;
    datawhere.order = obj.type;
    tableIns.reload({
      initSort: obj,
      where: datawhere
    });
  });
  
  // 搜索事件
  layui.form.on('submit(LAY-search)', function(obj) {
    var field = obj.field;
    var olddatawhere = datawhere;
    datawhere = field;
    datawhere.field = olddatawhere.field;
    datawhere.order = olddatawhere.order;
    tableIns.reload({
      where: datawhere,
      page: {curr: 1}
    });
    return false;
  });
  
  // 状态开关
  layui.form.on('switch(statusSwitch)', function(obj) {
    var id = $(this).data('id');
    var status = obj.elem.checked ? 1 : 0;
    $.post("{:url('setst')}", {id: id, status: status}, function(res) {
      if (res.status != 1) {
        layer.msg(res.msg);
        obj.elem.checked = !obj.elem.checked;
        layui.form.render('checkbox');
      } else {
        layer.msg('操作成功');
        loadPoolStatus();
      }
    });
  });
  
  // 打开Ollama对话页面
  function openChat() {
    var chatUrl = "{:url('OllamaChat/index')}";
    var index = layer.open({
      type: 2,
      title: '🦙 Ollama 本地模型对话',
      content: chatUrl,
      area: ['90%', '90%'],
      maxmin: true,
      shadeClose: false
    });
    layer.full(index);
  }

  // 打开VoxCPM2语音对话页面
  function openVoiceChat() {
    var chatUrl = "{:url('VoiceChat/index')}";
    var index = layer.open({
      type: 2,
      title: '🎙️ VoxCPM2 语音对话',
      content: chatUrl,
      area: ['90%', '90%'],
      maxmin: true,
      shadeClose: false
    });
    layer.full(index);
  }

  // 测试API连接
  function testApi(id) {
    var index = layer.load();
    $.post("{:url('test')}", {id: id}, function(res) {
      layer.close(index);
      if (res.test_detail) {
        // Ollama 等真实连通性测试 —— 多阶段详情模式
        var html = renderTestDetail(res);
        layer.open({
          type: 1,
          title: '连通性测试结果 - ' + (res.provider || ''),
          area: ['520px', 'auto'],
          content: html,
          btn: ['关闭'],
          shadeClose: true
        });
      } else {
        // 通用供应商格式校验 —— 原有简单文本模式
        if (res.status == 1) {
          layer.alert('<div style="text-align:center"><i class="layui-icon layui-icon-ok-circle" style="font-size:48px;color:#5FB878"></i><p style="margin-top:10px">' + res.msg + '</p><p style="color:#999;font-size:12px">供应商：' + res.provider + '</p></div>', {
            title: '测试结果',
            icon: -1
          });
        } else {
          layer.alert('<div style="text-align:center"><i class="layui-icon layui-icon-close-fill" style="font-size:48px;color:#FF5722"></i><p style="margin-top:10px">' + res.msg + '</p></div>', {
            title: '测试结果',
            icon: -1
          });
        }
      }
    });
  }

  // 渲染多阶段测试结果 HTML
  function renderTestDetail(res) {
    var d = res.test_detail;
    var html = '<div style="padding:15px 20px;font-size:13px;line-height:1.8">';

    // 总体结论
    var iconCls = res.status == 1 ? 'layui-icon-ok-circle' : 'layui-icon-close-fill';
    var iconColor = res.status == 1 ? '#5FB878' : '#FF5722';
    html += '<div style="text-align:center;margin-bottom:12px"><i class="layui-icon ' + iconCls + '" style="font-size:40px;color:' + iconColor + '"></i>';
    html += '<p style="margin-top:6px;font-size:13px">' + escHtml(res.msg) + '</p></div>';
    html += '<hr style="border:0;border-top:1px solid #eee;margin:10px 0">';

    // 判断是 VoxCPM2 两阶段还是 Ollama 三阶段
    if (d.synthesis !== undefined) {
      // VoxCPM2 两阶段
      var svc = d.service || {};
      html += renderPhaseRow('服务健康检查', svc.passed, escHtml(svc.message) + (svc.latency_ms ? '（' + svc.latency_ms + 'ms）' : ''));

      var syn = d.synthesis || {};
      var synMsg = escHtml(syn.message);
      if (syn.passed) {
        synMsg += '<div style="margin-top:4px;font-size:12px;color:#666">';
        if (syn.sample_rate) synMsg += '采样率: ' + syn.sample_rate + 'Hz　';
        if (syn.duration) synMsg += '时长: ' + syn.duration + 's　';
        if (syn.latency_ms) synMsg += '耗时: ' + syn.latency_ms + 'ms';
        synMsg += '</div>';
      }
      html += renderPhaseRow('语音合成测试', syn.passed, synMsg);
    } else {
      // Ollama 三阶段（原有逻辑）
      var svc = d.service || {};
      html += renderPhaseRow('服务连通性', svc.passed, svc.message + (svc.latency_ms ? '（' + svc.latency_ms + 'ms）' : ''));

      var mdl = d.models || {};
      var mdlMsg = '';
      if (mdl.available && mdl.available.length) {
        mdlMsg += '<span style="color:#5FB878">可用: </span>';
        for (var i = 0; i < mdl.available.length; i++) {
          mdlMsg += '<span style="display:inline-block;background:#f0f9eb;color:#5FB878;padding:1px 8px;border-radius:3px;margin:2px 3px;font-size:12px">' + escHtml(mdl.available[i]) + '</span>';
        }
      }
      if (mdl.missing && mdl.missing.length) {
        mdlMsg += '<br><span style="color:#FFB800">缺失: </span>';
        for (var j = 0; j < mdl.missing.length; j++) {
          mdlMsg += '<span style="display:inline-block;background:#fff8e6;color:#FFB800;padding:1px 8px;border-radius:3px;margin:2px 3px;font-size:12px">' + escHtml(mdl.missing[j]) + '</span>';
        }
        mdlMsg += '<br><span style="color:#999;font-size:11px">提示: 执行 <code>ollama pull 模型名</code> 下载缺失模型</span>';
      }
      html += renderPhaseRow('模型可用性', mdl.passed, mdlMsg);

      var cap = d.capability || {};
      var capMsg = '';
      if (cap.model_tested) {
        capMsg += '测试模型: <b>' + escHtml(cap.model_tested) + '</b>';
      }
      if (cap.latency_ms) {
        capMsg += '　耗时: ' + cap.latency_ms + 'ms';
      }
      if (cap.tokens) {
        capMsg += '　Token: ' + cap.tokens;
      }
      if (cap.response_preview) {
        capMsg += '<div style="background:#f8f8f8;border-left:3px solid #5FB878;padding:6px 10px;margin-top:6px;font-size:12px;color:#666;word-break:break-all">' + escHtml(cap.response_preview) + '</div>';
      }
      if (cap.message && !cap.passed) {
        capMsg += '<div style="color:#FF5722;margin-top:4px">' + escHtml(cap.message) + '</div>';
      }
      html += renderPhaseRow('真实能力调用', cap.passed, capMsg);
    }

    html += '</div>';
    return html;
  }

  // 渲染单行阶段结果
  function renderPhaseRow(title, passed, detail) {
    var icon = passed ? '<span style="color:#5FB878">✅</span>' : '<span style="color:#FF5722">❌</span>';
    var html = '<div style="margin-bottom:10px">';
    html += '<div style="font-weight:bold;margin-bottom:4px">' + icon + ' ' + escHtml(title) + '</div>';
    html += '<div style="padding-left:22px">' + (detail || '-') + '</div>';
    html += '</div>';
    return html;
  }

  // HTML 转义
  function escHtml(s) {
    if (!s) return '';
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }
  
  // 删除
  function datadel(id) {
    var ids = [];
    if (id == 0) {
      var checkStatus = table.checkStatus('tabledata');
      var checkData = checkStatus.data;
      if (checkData.length === 0) {
        return layer.msg('请选择数据');
      }
      for (var i = 0; i < checkData.length; i++) {
        ids.push(checkData[i]['id']);
      }
    } else {
      ids.push(id);
    }
    
    layer.confirm('确定要删除吗？删除后无法恢复！', {icon: 7, title: '操作确认'}, function(index) {
      layer.close(index);
      var index2 = layer.load();
      var delCount = 0;
      var errMsg = '';
      
      ids.forEach(function(id, idx) {
        $.post("{:url('delete')}", {id: id}, function(data) {
          if (data.status != 1) {
            errMsg = data.msg;
          } else {
            delCount++;
          }
          if (idx == ids.length - 1) {
            layer.close(index2);
            if (delCount > 0) {
              layer.msg('成功删除' + delCount + '条数据');
            } else {
              layer.msg(errMsg || '删除失败');
            }
            tableIns.reload();
            loadPoolStatus();
          }
        });
      });
    });
  }
  
  // 加载Key池状态
  function loadPoolStatus() {
    $.get("{:url('get_pool_status')}", function(res) {
      if (res.status == 1 && res.data && res.data.summary) {
        var s = res.data.summary;
        $('#statTotalKeys').text(s.total_keys);
        $('#statActiveKeys').text(s.active_keys);
        $('#statTotalCapacity').text(s.total_capacity);
        $('#statUsedCapacity').text(s.used_capacity);
        $('#statAvailCapacity').text(s.available_capacity);
        $('#poolSummary').show();
      }
    });
  }
  
  // 初始加载
  loadPoolStatus();
  </script>
</body>
</html>
