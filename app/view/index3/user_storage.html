<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>云端空间 - {$webinfo.webname}</title>
    {if $webinfo.ico}<link rel="shortcut icon" type="image/x-icon" href="{$webinfo.ico}">{/if}
    <link rel="stylesheet" href="/static/index3/css/theme-light.css?v=2">
    <link rel="stylesheet" href="/static/index3/css/theme-dark.css?v=2">
    <link rel="stylesheet" href="/static/index3/css/sidebar.css?v=1">
    <link rel="stylesheet" href="/static/index3/css/index.css?v=7">
    <link rel="stylesheet" href="/static/index3/css/responsive.css?v=6">
    <script src="/static/index3/js/theme.js?v=1"></script>
    <style>
    .storage-overview{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:20px;padding:28px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(102,126,234,.25)}
    .storage-overview::before{content:'';position:absolute;top:-60px;right:-40px;width:180px;height:180px;background:rgba(255,255,255,.07);border-radius:50%;pointer-events:none}
    .storage-overview::after{content:'';position:absolute;bottom:-50px;left:-30px;width:140px;height:140px;background:rgba(255,255,255,.05);border-radius:50%;pointer-events:none}
    .storage-overview .so-title{font-size:18px;font-weight:700;margin-bottom:16px}
    .storage-overview .so-usage{font-size:28px;font-weight:700;margin-bottom:4px}
    .storage-overview .so-quota{font-size:13px;opacity:.85;margin-bottom:16px}
    .storage-overview .so-progress-bar{height:8px;background:rgba(255,255,255,.3);border-radius:4px;overflow:hidden}
    .storage-overview .so-progress-fill{height:100%;border-radius:4px;transition:width .6s ease}
    .so-progress-fill.normal{background:#fff}
    .so-progress-fill.warning{background:#fbbf24}
    .so-progress-fill.critical{background:#f97316}
    .so-progress-fill.full{background:#ef4444}
    .storage-overview .so-stats{display:flex;gap:16px;margin-top:16px}
    .storage-overview .so-stat{text-align:center;flex:1;padding:12px 8px;background:rgba(255,255,255,.1);border-radius:12px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
    .storage-overview .so-stat-value{font-size:20px;font-weight:700}
    .storage-overview .so-stat-label{font-size:12px;opacity:.8;margin-top:2px}
    .storage-overview .so-member-badge{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);backdrop-filter:blur(4px);border-radius:20px;padding:4px 12px;font-size:12px}

    .storage-warning-banner{padding:12px 16px;border-radius:12px;margin-bottom:16px;display:none;font-size:14px;line-height:1.5}
    .storage-warning-banner.warning{display:block;background:#fef3c7;color:#92400e;border:1px solid #fde68a}
    .storage-warning-banner.critical{display:block;background:#fed7aa;color:#9a3412;border:1px solid #fdba74}
    .storage-warning-banner.full{display:block;background:#fecaca;color:#991b1b;border:1px solid #fca5a5}
    .storage-warning-banner .swb-actions{margin-top:8px;display:flex;gap:8px}
    .storage-warning-banner .swb-btn{padding:4px 12px;border-radius:6px;font-size:13px;border:none;cursor:pointer;transition:all .2s}
    .swb-btn-clean{background:rgba(0,0,0,.1);color:inherit}
    .swb-btn-upgrade{background:#7c3aed;color:#fff}

    .storage-filter{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    .sf-btn{padding:7px 18px;border-radius:20px;border:1px solid var(--border-color,#e5e7eb);background:var(--bg-primary,#fff);color:var(--text-secondary,#6b7280);font-size:13px;cursor:pointer;transition:all .2s;font-weight:500}
    .sf-btn.active{background:#7c3aed;color:#fff;border-color:#7c3aed;box-shadow:0 2px 8px rgba(124,58,237,.25)}

    .file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:16px}
    @media(min-width:1024px){.file-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}}
    @media(max-width:480px){.file-grid{grid-template-columns:repeat(2,1fr)}}
    .file-card{border-radius:14px;overflow:hidden;background:var(--bg-primary,#fff);border:1px solid var(--border-color,#e5e7eb);position:relative;transition:all .25s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .file-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.1);transform:translateY(-2px)}
    .file-card.selected{border-color:#7c3aed;box-shadow:0 0 0 2px rgba(124,58,237,.3)}
    .file-card .fc-thumb-wrap{width:100%;aspect-ratio:1;position:relative;overflow:hidden;background:#f3f4f6;cursor:pointer}
    .file-card .fc-thumb{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
    .file-card:hover .fc-thumb{transform:scale(1.05)}
    /* Hover overlay with action buttons */
    .file-card .fc-hover-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;gap:10px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:2}
    .file-card:hover .fc-hover-overlay{opacity:1;pointer-events:auto}
    .fc-hover-btn{padding:6px 14px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:#fff;transition:transform .15s}
    .fc-hover-btn:hover{transform:scale(1.05)}
    .fc-hover-btn--preview{background:rgba(255,255,255,.2);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
    .fc-hover-btn--download{background:#7c3aed}
    .file-card .fc-info{padding:8px;display:flex;align-items:center;justify-content:space-between}
    .file-card .fc-meta{flex:1;min-width:0}
    .file-card .fc-size{font-size:12px;color:var(--text-tertiary,#9ca3af)}
    .file-card .fc-time{font-size:11px;color:var(--text-tertiary,#9ca3af)}
    .file-card .fc-lock{position:absolute;top:8px;right:8px;width:24px;height:24px;background:rgba(0,0,0,.5);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;z-index:2}
    .file-card .fc-check{position:absolute;top:8px;left:8px;width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,.8);background:rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;transition:all .2s;cursor:pointer;z-index:3;opacity:0}
    .file-card:hover .fc-check,.file-card.selected .fc-check{opacity:1}
    .file-card.selected .fc-check{background:#7c3aed;border-color:#7c3aed}
    .file-card .fc-type-badge{position:absolute;bottom:8px;left:8px;padding:2px 6px;border-radius:4px;font-size:11px;color:#fff;background:rgba(0,0,0,.5);z-index:2}
    .file-card .fc-type-badge.video{background:rgba(239,68,68,.8)}
    .file-card .fc-play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;z-index:1;pointer-events:none;border:2px solid rgba(255,255,255,.2);animation:breathe 2s ease-in-out infinite}
    @keyframes breathe{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.9}50%{transform:translate(-50%,-50%) scale(1.08);opacity:1}}
    .file-card .fc-dl-btn{width:28px;height:28px;border-radius:6px;border:none;background:var(--bg-secondary,#f3f4f6);color:var(--text-secondary,#6b7280);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
    .file-card .fc-dl-btn:hover{background:#7c3aed;color:#fff}

    /* 倒计时标记 */
    .fc-countdown{position:absolute;bottom:8px;right:8px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;color:#fff;z-index:2;line-height:1.4}
    .fc-countdown.expiring{background:rgba(245,158,11,.9)}
    .fc-countdown.urgent{background:rgba(239,68,68,.9);animation:pulse-urgent 1.5s infinite}
    .fc-countdown.expired{background:rgba(107,114,128,.9)}
    @keyframes pulse-urgent{0%,100%{opacity:1}50%{opacity:.7}}

    /* 过期提示横幅 */
    .expiry-banner{padding:10px 16px;border-radius:10px;margin-bottom:16px;background:#fffbeb;border:1px solid #fde68a;color:#92400e;font-size:13px;display:none;line-height:1.5}
    .expiry-banner.show{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .expiry-banner .eb-text{flex:1}
    .expiry-banner .eb-btn{padding:4px 12px;border-radius:6px;font-size:12px;border:none;cursor:pointer;background:#f59e0b;color:#fff;white-space:nowrap}

    .batch-bar{position:sticky;bottom:0;left:0;right:0;background:var(--bg-primary,#fff);border-top:1px solid var(--border-color,#e5e7eb);padding:12px 16px;display:none;align-items:center;justify-content:space-between;z-index:10}
    .batch-bar.show{display:flex}
    .batch-bar .bb-info{font-size:14px;color:var(--text-secondary,#6b7280)}
    .batch-bar .bb-actions{display:flex;gap:8px}
    .bb-btn{padding:8px 20px;border-radius:8px;border:none;font-size:14px;cursor:pointer;transition:all .2s}
    .bb-btn-cancel{background:var(--bg-secondary,#f3f4f6);color:var(--text-primary,#111)}
    .bb-btn-download{background:#7c3aed;color:#fff}
    .bb-btn-delete{background:#ef4444;color:#fff}

    .empty-state{text-align:center;padding:60px 20px;color:var(--text-tertiary,#9ca3af)}
    .empty-state .es-icon{font-size:48px;margin-bottom:12px}
    .empty-state .es-text{font-size:15px}

    .load-more-btn{width:100%;padding:12px;border:1px solid var(--border-color,#e5e7eb);border-radius:10px;background:var(--bg-primary,#fff);color:var(--text-secondary,#6b7280);font-size:14px;cursor:pointer;margin-bottom:20px}
    .load-more-btn:hover{background:var(--bg-secondary,#f9fafb)}

    /* Lightbox 全屏预览 */
    .lightbox-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:9999;align-items:center;justify-content:center;flex-direction:column}
    .lightbox-overlay.show{display:flex}
    .lightbox-close{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;cursor:pointer;z-index:3;display:flex;align-items:center;justify-content:center}
    .lightbox-close:hover{background:rgba(255,255,255,.3)}
    .lightbox-content{max-width:90vw;max-height:80vh;position:relative;transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s}
    .lightbox-content img{max-width:90vw;max-height:80vh;border-radius:12px;object-fit:contain;box-shadow:0 16px 48px rgba(0,0,0,.4)}
    .lightbox-content video{max-width:90vw;max-height:80vh;border-radius:12px;outline:none;box-shadow:0 16px 48px rgba(0,0,0,.4)}
    .lightbox-nav{position:absolute;top:50%;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.12);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:20px;cursor:pointer;transform:translateY(-50%);display:flex;align-items:center;justify-content:center;z-index:3;transition:all .2s}
    .lightbox-nav:hover{background:rgba(255,255,255,.25);transform:translateY(-50%) scale(1.1)}
    .lightbox-prev{left:12px}
    .lightbox-next{right:12px}
    .lightbox-toolbar{margin-top:16px;display:flex;gap:12px;align-items:center;padding:10px 20px;background:rgba(255,255,255,.08);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:12px;border:1px solid rgba(255,255,255,.08)}
    .lightbox-toolbar button{padding:8px 20px;border-radius:8px;border:none;color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:6px;transition:all .2s}
    .lightbox-btn-dl{background:#7c3aed}
    .lightbox-btn-dl:hover{background:#6d28d9}
    .lightbox-info{color:rgba(255,255,255,.7);font-size:13px}
    .lightbox-countdown-bar{color:#fbbf24;font-size:13px;font-weight:600}
    </style>
</head>
<body>
<div class="layout-wrapper">
    {include file="index3/public/sidebar"/}
    <div class="main-content">
        {include file="index3/public/header"/}
        <div class="page-content" style="max-width:1100px;margin:0 auto;padding:24px 16px">

            <!-- 存储概览 -->
            <div class="storage-overview" id="storageOverview">
                <div class="so-member-badge" id="soMemberBadge" style="display:none"></div>
                <div class="so-title">☁️ 云端空间</div>
                <div class="so-usage" id="soUsage">-- GB</div>
                <div class="so-quota" id="soQuota">总配额 -- GB，已使用 --%</div>
                <div class="so-progress-bar"><div class="so-progress-fill normal" id="soProgressFill" style="width:0%"></div></div>
                <div class="so-stats">
                    <div class="so-stat"><div class="so-stat-value" id="soFileCount">0</div><div class="so-stat-label">文件总数</div></div>
                    <div class="so-stat"><div class="so-stat-value" id="soImageCount">0</div><div class="so-stat-label">图片</div></div>
                    <div class="so-stat"><div class="so-stat-value" id="soVideoCount">0</div><div class="so-stat-label">视频</div></div>
                </div>
            </div>

            <!-- 告警 Banner -->
            <div class="storage-warning-banner" id="warningBanner">
                <div id="warningText"></div>
                <div class="swb-actions">
                    <button class="swb-btn swb-btn-clean" onclick="scrollToFiles()">清理空间</button>
                    <button class="swb-btn swb-btn-upgrade" onclick="Auth.showSubscriptionPopup()">升级会员</button>
                </div>
            </div>

            <!-- 过期提示横幅 -->
            <div class="expiry-banner" id="expiryBanner">
                <span class="eb-text">⚠️ 部分生成文件的链接即将过期，请及时下载到本地保存</span>
                <button class="eb-btn" onclick="batchDownloadExpiring()">下载即将过期文件</button>
            </div>

            <!-- 筛选栏 -->
            <div class="storage-filter">
                <button class="sf-btn active" data-file-type="all">全部</button>
                <button class="sf-btn" data-file-type="image">图片</button>
                <button class="sf-btn" data-file-type="video">视频</button>
                <span style="flex:1"></span>
                <button class="sf-btn" data-source-type="all">全部来源</button>
                <button class="sf-btn" data-source-type="upload">上传</button>
                <button class="sf-btn" data-source-type="generated">生成</button>
            </div>

            <!-- 文件网格 -->
            <div class="file-grid" id="fileGrid"></div>

            <!-- 空状态 -->
            <div class="empty-state" id="emptyState" style="display:none">
                <div class="es-icon">📁</div>
                <div class="es-text">暂无文件</div>
            </div>

            <!-- 加载更多 -->
            <button class="load-more-btn" id="loadMoreBtn" style="display:none" onclick="loadMore()">加载更多</button>

        </div>
    </div>
</div>

<!-- 批量操作栏 -->
<div class="batch-bar" id="batchBar">
    <div class="bb-info">已选择 <span id="bbCount">0</span> 个文件</div>
    <div class="bb-actions">
        <button class="bb-btn bb-btn-cancel" onclick="clearSelection()">取消</button>
        <button class="bb-btn bb-btn-download" onclick="batchDownloadSelected()">⬇ 下载</button>
        <button class="bb-btn bb-btn-delete" onclick="deleteSelected()">删除</button>
    </div>
</div>

<!-- Lightbox 全屏预览 -->
<div class="lightbox-overlay" id="lightboxOverlay" onclick="if(event.target===this)closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <button class="lightbox-nav lightbox-prev" onclick="lightboxPrev()">❮</button>
    <button class="lightbox-nav lightbox-next" onclick="lightboxNext()">❯</button>
    <div class="lightbox-content" id="lightboxContent"></div>
    <div class="lightbox-toolbar" id="lightboxToolbar">
        <span class="lightbox-info" id="lightboxInfo"></span>
        <span class="lightbox-countdown-bar" id="lightboxCountdown"></span>
        <button class="lightbox-btn-dl" onclick="lightboxDownload()">⬇ 下载到本地</button>
    </div>
</div>

{include file="index3/public/tabbar"/}
<script src="/static/index3/js/api.js?v=4"></script>
<script src="/static/index3/js/auth.js?v=2"></script>
<script src="/static/index3/js/sidebar.js?v=1"></script>
<script>
(function(){
    var state = {
        fileType: 'all',
        sourceType: 'all',
        page: 1,
        limit: 20,
        total: 0,
        selectedIds: [],
        files: [],
        lightboxIndex: -1,
        countdownTimer: null
    };

    function init(){
        if(!Auth.isChecked()){ setTimeout(init, 200); return; }
        if(!Auth.isLoggedIn()){ location.href = '/?s=/index/index'; return; }
        bindFilters();
        loadData();
        // 启动全局倒计时更新
        state.countdownTimer = setInterval(updateCountdowns, 1000);
    }

    function bindFilters(){
        document.querySelectorAll('.sf-btn[data-file-type]').forEach(function(btn){
            btn.addEventListener('click', function(){
                document.querySelectorAll('.sf-btn[data-file-type]').forEach(function(b){ b.classList.remove('active'); });
                this.classList.add('active');
                state.fileType = this.dataset.fileType;
                state.page = 1; state.files = []; state.selectedIds = [];
                loadData();
            });
        });
        document.querySelectorAll('.sf-btn[data-source-type]').forEach(function(btn){
            btn.addEventListener('click', function(){
                document.querySelectorAll('.sf-btn[data-source-type]').forEach(function(b){ b.classList.remove('active'); });
                this.classList.add('active');
                state.sourceType = this.dataset.sourceType;
                state.page = 1; state.files = []; state.selectedIds = [];
                loadData();
            });
        });
        // 键盘快捷键
        document.addEventListener('keydown', function(e){
            if(state.lightboxIndex < 0) return;
            if(e.key === 'Escape') closeLightbox();
            if(e.key === 'ArrowLeft') lightboxPrev();
            if(e.key === 'ArrowRight') lightboxNext();
        });
    }

    function loadData(){
        var params = { file_type: state.fileType, source_type: state.sourceType, page: state.page, limit: state.limit };
        var xhr = new XMLHttpRequest();
        var qs = [];
        for(var k in params){ qs.push(encodeURIComponent(k)+'='+encodeURIComponent(params[k])); }
        xhr.open('GET', '/?s=/index/user_storage_files&'+qs.join('&'), true);
        xhr.setRequestHeader('X-Requested-With','XMLHttpRequest');
        xhr.onreadystatechange = function(){
            if(xhr.readyState===4 && xhr.status===200){
                try{
                    var res = JSON.parse(xhr.responseText);
                    if(res.status===1){
                        var d = res.data;
                        if(state.page===1) state.files = d.list || [];
                        else state.files = state.files.concat(d.list || []);
                        state.total = d.count || 0;
                        renderStorageInfo(d.storage_info || {});
                        renderFiles();
                        updateBatchBar();
                        checkExpiringFiles();
                    }
                }catch(e){}
            }
        };
        xhr.send();
    }

    function renderStorageInfo(info){
        document.getElementById('soUsage').textContent = (info.used_gb||0)+' GB / '+(info.total_quota_gb||0)+' GB';
        document.getElementById('soQuota').textContent = '已使用 '+(info.used_percent||0)+'%';
        var fill = document.getElementById('soProgressFill');
        fill.style.width = Math.min(100, info.used_percent||0)+'%';
        fill.className = 'so-progress-fill '+(info.warning_level||'normal');
        document.getElementById('soFileCount').textContent = info.file_count||0;
        document.getElementById('soImageCount').textContent = info.image_count||0;
        document.getElementById('soVideoCount').textContent = info.video_count||0;
        var badge = document.getElementById('soMemberBadge');
        if(info.is_member){
            badge.style.display = 'block';
            badge.textContent = '👑 '+escapeHtml(info.version_name||'创作会员');
        } else { badge.style.display = 'none'; }
        var banner = document.getElementById('warningBanner');
        var warnText = document.getElementById('warningText');
        banner.className = 'storage-warning-banner';
        if(info.warning_level==='warning'){
            banner.classList.add('warning');
            warnText.textContent = '⚠️ 存储空间即将用满（已用'+info.used_percent+'%），建议清理文件或升级会员';
        } else if(info.warning_level==='critical'){
            banner.classList.add('critical');
            warnText.textContent = '🔶 存储空间严重不足（已用'+info.used_percent+'%），请尽快清理或升级会员';
        } else if(info.warning_level==='full'){
            banner.classList.add('full');
            warnText.textContent = '🔴 存储空间已满！无法上传或生成新文件，请删除文件或升级会员';
        }
    }

    /* ===== 倒计时检测 & 横幅 ===== */
    function checkExpiringFiles(){
        var banner = document.getElementById('expiryBanner');
        var hasExpiring = false;
        for(var i=0;i<state.files.length;i++){
            if(state.files[i].is_third_party && state.files[i].remaining_seconds > 0){
                hasExpiring = true; break;
            }
        }
        if(hasExpiring){ banner.classList.add('show'); } else { banner.classList.remove('show'); }
    }

    function formatCountdown(seconds){
        if(seconds <= 0) return '已过期';
        var h = Math.floor(seconds/3600);
        var m = Math.floor((seconds%3600)/60);
        if(h > 0) return h+'h'+m+'m';
        if(m > 0) return m+'m';
        return seconds+'s';
    }

    function updateCountdowns(){
        // 更新卡片上的倒计时
        document.querySelectorAll('.fc-countdown[data-expire]').forEach(function(el){
            var expire = parseInt(el.dataset.expire);
            var now = Math.floor(Date.now()/1000);
            var remaining = expire - now;
            if(remaining <= 0){
                el.textContent = '已过期';
                el.className = 'fc-countdown expired';
            } else {
                el.textContent = '⏳ '+formatCountdown(remaining);
                el.className = 'fc-countdown '+(remaining < 3600 ? 'urgent' : 'expiring');
            }
        });
        // 更新 lightbox 中的倒计时
        if(state.lightboxIndex >= 0){
            updateLightboxCountdown();
        }
    }

    /* ===== 文件渲染 ===== */
    function renderFiles(){
        var grid = document.getElementById('fileGrid');
        var empty = document.getElementById('emptyState');
        var loadBtn = document.getElementById('loadMoreBtn');
        if(state.files.length===0){
            grid.innerHTML = ''; empty.style.display = 'block'; loadBtn.style.display = 'none'; return;
        }
        empty.style.display = 'none';
        loadBtn.style.display = state.files.length < state.total ? 'block' : 'none';
        var html = '';
        for(var i=0;i<state.files.length;i++){
            var f = state.files[i];
            var isSelected = state.selectedIds.indexOf(f.id) > -1;
            var thumbUrl = f.thumbnail_url || f.file_url || '/static/index3/img/default_avatar.svg';
            html += '<div class="file-card'+(isSelected?' selected':'')+'" data-id="'+f.id+'" data-idx="'+i+'">';
            // 缩略图区域（点击放大）
            html += '<div class="fc-thumb-wrap" onclick="openLightbox('+i+')">';
            // Hover overlay with buttons
            html += '<div class="fc-hover-overlay"><button class="fc-hover-btn fc-hover-btn--preview" onclick="event.stopPropagation();openLightbox('+i+')">\ud83d\udd0d 预览</button><button class="fc-hover-btn fc-hover-btn--download" onclick="event.stopPropagation();downloadFile('+f.id+')">\u2b07 下载</button></div>';
            if(f.file_type==='video'){
                if(f.thumbnail_url){
                    html += '<img class="fc-thumb" src="'+escapeHtml(f.thumbnail_url)+'" alt="" onerror="this.style.background=\'#1a1a2e\'">';
                } else {
                    html += '<div class="fc-thumb" style="background:#1a1a2e;display:flex;align-items:center;justify-content:center"><span style="font-size:40px;opacity:.5">🎬</span></div>';
                }
                html += '<div class="fc-play-btn">▶</div>';
                html += '<span class="fc-type-badge video">视频</span>';
            } else {
                html += '<img class="fc-thumb" src="'+escapeHtml(thumbUrl)+'" alt="" onerror="this.src=\'/static/index3/img/default_avatar.svg\'">';
            }
            // 倒计时标记
            if(f.is_third_party){
                var now = Math.floor(Date.now()/1000);
                var remain = (f.expire_time||0) - now;
                if(remain <= 0){
                    html += '<div class="fc-countdown expired" data-expire="'+f.expire_time+'">已过期</div>';
                } else {
                    var cls = remain < 3600 ? 'urgent' : 'expiring';
                    html += '<div class="fc-countdown '+cls+'" data-expire="'+f.expire_time+'">⏳ '+formatCountdown(remain)+'</div>';
                }
            }
            html += '</div>'; // close fc-thumb-wrap
            // 勾选框
            html += '<div class="fc-check" onclick="event.stopPropagation();toggleSelect('+f.id+')">'+(isSelected?'✓':'')+'</div>';
            if(f.is_template_ref) html += '<div class="fc-lock">🔒</div>';
            // 底部信息 + 下载按钮
            html += '<div class="fc-info"><div class="fc-meta"><div class="fc-size">'+(f.file_size_text||'--')+'</div><div class="fc-time">'+(f.create_time||'')+'</div></div>';
            html += '<button class="fc-dl-btn" onclick="event.stopPropagation();downloadFile('+f.id+')" title="下载">⬇</button>';
            html += '</div></div>';
        }
        grid.innerHTML = html;
    }

    /* ===== 选择 ===== */
    window.toggleSelect = function(id){
        var idx = state.selectedIds.indexOf(id);
        if(idx > -1) state.selectedIds.splice(idx,1);
        else state.selectedIds.push(id);
        renderFiles(); updateBatchBar();
    };
    function updateBatchBar(){
        var bar = document.getElementById('batchBar');
        if(state.selectedIds.length > 0){
            bar.classList.add('show');
            document.getElementById('bbCount').textContent = state.selectedIds.length;
        } else { bar.classList.remove('show'); }
    }
    window.clearSelection = function(){
        state.selectedIds = []; renderFiles(); updateBatchBar();
    };

    /* ===== 下载 ===== */
    window.downloadFile = function(fileId){
        var url = '/?s=/index/download_storage_file&file_id=' + fileId;
        var a = document.createElement('a');
        a.href = url; a.target = '_blank'; a.style.display = 'none';
        document.body.appendChild(a); a.click();
        setTimeout(function(){ document.body.removeChild(a); }, 100);
    };

    window.batchDownloadSelected = function(){
        if(state.selectedIds.length === 0){ alert('请先选择文件'); return; }
        if(state.selectedIds.length > 20){ alert('批量下载最多20个文件，请减少选择'); return; }
        state.selectedIds.forEach(function(id, i){
            setTimeout(function(){ downloadFile(id); }, i * 500);
        });
    };

    window.batchDownloadExpiring = function(){
        var now = Math.floor(Date.now()/1000);
        var expiringIds = [];
        for(var i=0;i<state.files.length;i++){
            var f = state.files[i];
            if(f.is_third_party && f.remaining_seconds > 0 && (f.expire_time - now) > 0){
                expiringIds.push(f.id);
            }
        }
        if(expiringIds.length === 0){ alert('没有即将过期的文件'); return; }
        if(expiringIds.length > 20){
            alert('即将过期文件较多（'+expiringIds.length+'个），将下载前20个');
            expiringIds = expiringIds.slice(0, 20);
        }
        expiringIds.forEach(function(id, i){
            setTimeout(function(){ downloadFile(id); }, i * 500);
        });
    };

    /* ===== Lightbox 全屏预览 ===== */
    window.openLightbox = function(idx){
        state.lightboxIndex = idx;
        renderLightbox();
        document.getElementById('lightboxOverlay').classList.add('show');
        document.body.style.overflow = 'hidden';
    };
    window.closeLightbox = function(){
        state.lightboxIndex = -1;
        document.getElementById('lightboxOverlay').classList.remove('show');
        document.body.style.overflow = '';
        // 停止视频播放
        var v = document.querySelector('#lightboxContent video');
        if(v) v.pause();
    };
    window.lightboxPrev = function(){
        if(state.lightboxIndex > 0){ state.lightboxIndex--; renderLightbox(); }
    };
    window.lightboxNext = function(){
        if(state.lightboxIndex < state.files.length - 1){ state.lightboxIndex++; renderLightbox(); }
    };
    window.lightboxDownload = function(){
        if(state.lightboxIndex < 0) return;
        downloadFile(state.files[state.lightboxIndex].id);
    };

    function renderLightbox(){
        var f = state.files[state.lightboxIndex];
        if(!f) return;
        var content = document.getElementById('lightboxContent');
        var info = document.getElementById('lightboxInfo');
        // 导航按钮显示逻辑
        document.querySelector('.lightbox-prev').style.display = state.lightboxIndex > 0 ? '' : 'none';
        document.querySelector('.lightbox-next').style.display = state.lightboxIndex < state.files.length - 1 ? '' : 'none';
        info.textContent = (state.lightboxIndex+1) + ' / ' + state.files.length + '  ·  ' + (f.file_size_text||'') + (f.create_time ? '  ·  ' + f.create_time : '');

        if(f.file_type === 'video'){
            content.innerHTML = '<video src="'+escapeHtml(f.file_url)+'" controls autoplay playsinline style="max-width:90vw;max-height:80vh;border-radius:12px;outline:none;box-shadow:0 16px 48px rgba(0,0,0,.4)"></video>';
        } else {
            content.innerHTML = '<img src="'+escapeHtml(f.file_url)+'" alt="" style="max-width:90vw;max-height:80vh;border-radius:12px;object-fit:contain;box-shadow:0 16px 48px rgba(0,0,0,.4)" ondblclick="window.open(this.src)">';
        }
        updateLightboxCountdown();
    }

    function updateLightboxCountdown(){
        var cdEl = document.getElementById('lightboxCountdown');
        if(state.lightboxIndex < 0){ cdEl.textContent = ''; return; }
        var f = state.files[state.lightboxIndex];
        if(!f || !f.is_third_party){ cdEl.textContent = ''; return; }
        var now = Math.floor(Date.now()/1000);
        var remain = (f.expire_time||0) - now;
        if(remain <= 0){
            cdEl.textContent = '⚠️ 链接已过期，可能无法播放/显示';
            cdEl.style.color = '#ef4444';
        } else {
            cdEl.textContent = '⏳ 链接将在 '+formatCountdown(remain)+' 后过期，请及时下载';
            cdEl.style.color = remain < 3600 ? '#ef4444' : '#fbbf24';
        }
    }

    /* ===== 删除 ===== */
    window.deleteSelected = function(){
        if(state.selectedIds.length===0) return;
        if(!confirm('确定要删除选中的 '+state.selectedIds.length+' 个文件吗？被场景模板引用的文件将不会被删除。')) return;
        var xhr = new XMLHttpRequest();
        xhr.open('POST','/?s=/index/delete_storage_file',true);
        xhr.setRequestHeader('Content-Type','application/x-www-form-urlencoded');
        xhr.setRequestHeader('X-Requested-With','XMLHttpRequest');
        xhr.onreadystatechange = function(){
            if(xhr.readyState===4 && xhr.status===200){
                try{
                    var res = JSON.parse(xhr.responseText);
                    if(res.status===1){
                        var msg = '成功删除 '+res.deleted_count+' 个文件';
                        if(res.skipped && res.skipped.length>0) msg += '，'+res.skipped.length+' 个文件因被模板引用而跳过';
                        alert(msg);
                        state.selectedIds = []; state.page = 1; state.files = []; loadData();
                    } else { alert(res.msg||'删除失败'); }
                }catch(e){ alert('删除失败'); }
            }
        };
        var body = state.selectedIds.map(function(id){ return 'file_ids[]='+id; }).join('&');
        xhr.send(body);
    };

    /* ===== 工具 ===== */
    window.loadMore = function(){ state.page++; loadData(); };
    window.scrollToFiles = function(){
        var grid = document.getElementById('fileGrid');
        if(grid) grid.scrollIntoView({behavior:'smooth'});
    };
    function escapeHtml(str){
        if(!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    init();
})();
</script>
</body>
</html>
