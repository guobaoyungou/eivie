<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>短剧创作 - {$webinfo.webname}</title>
    <meta name="keywords" content="{$webinfo.webname},AI短剧创作,剧本生成,角色设计,分镜绘制,视频合成">
    <meta name="description" content="{$webinfo.webname} - AI短剧创作平台，从创意输入到成片输出的一站式短剧创作体验。">
    {if $webinfo.ico}<link rel="shortcut icon" type="image/x-icon" href="{$webinfo.ico}">{/if}
    <!-- 主题CSS -->
    <link rel="stylesheet" href="/static/index3/css/theme-light.css?v=1">
    <link rel="stylesheet" href="/static/index3/css/theme-dark.css?v=1">
    <!-- 组件CSS -->
    <link rel="stylesheet" href="/static/index3/css/sidebar.css?v=6">
    <link rel="stylesheet" href="/static/index3/css/index.css?v=12">
    <link rel="stylesheet" href="/static/index3/css/short_drama.css?v=1">
    <link rel="stylesheet" href="/static/index3/css/responsive.css?v=3">
    <!-- 主题JS（提前加载防闪烁） -->
    <script src="/static/index3/js/theme.js?v=1"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
<div class="layout-wrapper">
    <!-- 侧边栏 -->
    {include file="index3/public/sidebar"/}

    <!-- 主内容区 -->
    <div class="main-content">
        <!-- 顶部栏 -->
        {include file="index3/public/header"/}

        <!-- 页面内容 -->
        <div class="page-content">
            <div class="sd-container">
                <!-- 页面标题 + 操作按钮 -->
                <div class="sd-page-header">
                    <div>
                        <h1 class="sd-page-title">短剧创作</h1>
                        <p class="sd-page-subtitle">创意输入 → 剧本生成 → 角色设计 → 分镜绘制 → 视频合成 → 配音成片</p>
                    </div>
                    <div class="sd-actions">
                        <button class="sd-btn" id="sdOneclickBtn">
                            <i data-lucide="zap"></i> 一键生成
                        </button>
                        <button class="sd-btn primary" id="sdCreateBtn">
                            <i data-lucide="plus"></i> 创建项目
                        </button>
                    </div>
                </div>

                <!-- 筛选栏 -->
                <div class="sd-filters">
                    <div class="sd-filter-item">
                        <label>状态</label>
                        <select id="sdStatusFilter">
                            <option value="">全部</option>
                            <option value="draft">草稿</option>
                            <option value="running">生成中</option>
                            <option value="completed">已完成</option>
                            <option value="failed">失败</option>
                        </select>
                    </div>
                    <div class="sd-filter-item">
                        <label>题材</label>
                        <select id="sdGenreFilter">
                            <option value="">全部</option>
                            <option value="甜宠">甜宠</option>
                            <option value="悬疑">悬疑</option>
                            <option value="都市">都市</option>
                            <option value="古风">古风</option>
                            <option value="科幻">科幻</option>
                            <option value="喜剧">喜剧</option>
                        </select>
                    </div>
                    <div class="sd-search-wrap">
                        <span class="search-icon"><i data-lucide="search" style="width:14px;height:14px"></i></span>
                        <input class="sd-search-input" id="sdSearchInput" type="text" placeholder="搜索项目名称...">
                    </div>
                </div>

                <!-- 项目卡片网格 -->
                <div class="sd-project-grid" id="sdProjectGrid">
                    <div style="text-align:center;padding:40px;color:var(--text-tertiary)">加载中...</div>
                </div>

                <!-- 分页 -->
                <div class="sd-pagination" id="sdPagination"></div>
            </div>
        </div><!-- .page-content end -->
    </div><!-- .main-content end -->
</div><!-- .layout-wrapper end -->

<!-- 创建项目弹窗 -->
<div class="sd-modal-overlay" id="sdCreateModal">
    <div class="sd-modal">
        <div class="sd-modal-header">
            <span class="sd-modal-title">创建短剧项目</span>
            <button class="sd-modal-close">&times;</button>
        </div>
        <div class="sd-modal-body">
            <!-- 模式选择 -->
            <div class="sd-form-group">
                <label class="sd-form-label">选择创作模式</label>
                <div class="sd-mode-cards">
                    <div class="sd-mode-card" data-mode="oneclick">
                        <div class="mode-icon"><i data-lucide="zap"></i></div>
                        <div class="mode-name">一键生成</div>
                        <div class="mode-desc">选择模板，自动完成全部流程</div>
                    </div>
                    <div class="sd-mode-card active" data-mode="canvas">
                        <div class="mode-icon"><i data-lucide="workflow"></i></div>
                        <div class="mode-name">画布编排</div>
                        <div class="mode-desc">自由拖拽节点，精细化创作</div>
                    </div>
                </div>
            </div>

            <div class="sd-form-group">
                <label class="sd-form-label"><span class="required">*</span> 项目标题</label>
                <input class="sd-form-input" id="sdProjectTitle" placeholder="为您的短剧起个名字" maxlength="50">
            </div>
            <div class="sd-form-group">
                <label class="sd-form-label">项目描述</label>
                <textarea class="sd-form-textarea" id="sdProjectDesc" placeholder="简单描述您的短剧内容（可选）"></textarea>
            </div>
            <div class="sd-form-group">
                <label class="sd-form-label">题材类型</label>
                <select class="sd-form-select" id="sdProjectGenre">
                    <option value="">请选择</option>
                    <option value="甜宠">甜宠</option>
                    <option value="悬疑">悬疑</option>
                    <option value="都市">都市</option>
                    <option value="古风">古风</option>
                    <option value="科幻">科幻</option>
                    <option value="喜剧">喜剧</option>
                </select>
            </div>
        </div>
        <div class="sd-modal-footer">
            <button class="sd-btn sd-modal-cancel">取消</button>
            <button class="sd-btn primary" onclick="ShortDrama.projectList.submitCreate()">创建</button>
        </div>
    </div>
</div>

<!-- 一键生成弹窗 -->
<div class="sd-modal-overlay" id="sdOneclickModal">
    <div class="sd-modal">
        <div class="sd-modal-header">
            <span class="sd-modal-title">一键生成短剧</span>
            <button class="sd-modal-close">&times;</button>
        </div>
        <div class="sd-modal-body">
            <!-- 预设模板 -->
            <div class="sd-form-group">
                <label class="sd-form-label">选择预设模板（可选）</label>
                <div class="sd-template-grid" id="sdPresetTemplateGrid">
                    <div style="text-align:center;color:var(--text-tertiary);font-size:13px;padding:16px">加载中...</div>
                </div>
            </div>

            <div class="sd-form-group">
                <label class="sd-form-label">创意描述</label>
                <textarea class="sd-form-textarea" id="sdOneclickCreativity" placeholder="描述您想创作的短剧故事，例如：一个穿越到古代的都市女白领，意外成为将军府的小姐..."></textarea>
            </div>

            <div class="sd-form-group">
                <label class="sd-form-label">题材类型</label>
                <select class="sd-form-select" id="sdOneclickGenre">
                    <option value="">自动匹配</option>
                    <option value="甜宠">甜宠</option>
                    <option value="悬疑">悬疑</option>
                    <option value="都市">都市</option>
                    <option value="古风">古风</option>
                    <option value="科幻">科幻</option>
                    <option value="喜剧">喜剧</option>
                </select>
            </div>

            <div style="display:flex;gap:12px">
                <div class="sd-form-group" style="flex:1">
                    <label class="sd-form-label">集数</label>
                    <input class="sd-form-input" id="sdOneclickEpisodes" type="number" value="1" min="1" max="20">
                </div>
                <div class="sd-form-group" style="flex:1">
                    <label class="sd-form-label">每集时长(秒)</label>
                    <input class="sd-form-input" id="sdOneclickDuration" type="number" value="60" min="30" max="300" step="10">
                </div>
            </div>
        </div>
        <div class="sd-modal-footer">
            <button class="sd-btn sd-modal-cancel">取消</button>
            <button class="sd-btn primary" id="sdOneclickSubmit" onclick="ShortDrama.projectList.submitOneclick()">
                <i data-lucide="sparkles"></i> 开始生成
            </button>
        </div>
    </div>
</div>

<!-- 移动端组件 -->
{include file="index3/public/tabbar"/}

<!-- JS -->
<script src="/static/index3/js/api.js?v=3"></script>
<script src="/static/index3/js/auth.js?v=3"></script>
<script src="/static/index3/js/sidebar.js?v=6"></script>
<script src="/static/index3/js/short_drama.js?v=1"></script>
<script>
    if(typeof lucide!=='undefined'){lucide.createIcons();}
    // 初始化项目列表
    if(window.ShortDrama && ShortDrama.projectList){
        ShortDrama.projectList.init();
    }
</script>
</body>
</html>
