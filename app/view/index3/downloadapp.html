<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>APP下载 - {$webinfo.webname}</title>
    <link rel="stylesheet" href="/static/index3/css/theme-light.css?v=1">
    <link rel="stylesheet" href="/static/index3/css/theme-dark.css?v=1">
    <link rel="stylesheet" href="/static/index3/css/index.css?v=10">
    <link rel="stylesheet" href="/static/index3/css/responsive.css?v=1">
    <script src="/static/index3/js/theme.js?v=1"></script>
    <style>
        .dl-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; text-align: center; background: var(--bg-primary); }
        .dl-logo { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 16px; }
        .dl-name { font-size: 20px; font-weight: 600; color: var(--text-primary); margin-bottom: 32px; }
        .dl-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 32px; border-radius: 8px; background: var(--accent-color); color: #fff; font-size: 15px; cursor: pointer; margin: 8px; border: none; text-decoration: none; transition: background .2s; }
        .dl-btn:hover { background: var(--accent-hover); }
        .dl-btn img { width: 22px; height: 22px; }
        .weixin-mask { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 9999; color: #fff; padding: 40px; text-align: center; font-size: 16px; line-height: 2; }
        .weixin-mask.show { display: block; }
    </style>
</head>
<body>
<div class="dl-page">
    <img class="dl-logo" src="{$set.logo}" alt="">
    <div class="dl-name">{$set.name}</div>
    {if $androidurl}
    <a class="dl-btn" href="{$androidurl}">📱 安卓下载</a>
    {/if}
    {if $iosurl}
    <a class="dl-btn" href="{$iosurl}">🍎 iOS下载</a>
    {/if}
</div>

{if $isweixin}
<div class="weixin-mask show" onclick="this.classList.remove('show')">
    <p>1. 点击右上角 ··· 打开菜单</p>
    <p>2. 选择在浏览器中打开</p>
    <p style="margin-top:24px;font-size:13px;color:#aaa">点击任意位置关闭提示</p>
</div>
{/if}
</body>
</html>
