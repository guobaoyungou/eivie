<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>会员等级 - {$webinfo.webname}</title>
    {if $webinfo.ico}<link rel="shortcut icon" type="image/x-icon" href="{$webinfo.ico}">{/if}
    <link rel="stylesheet" href="/static/index3/css/theme-light.css?v=1">
    <link rel="stylesheet" href="/static/index3/css/theme-dark.css?v=1">
    <link rel="stylesheet" href="/static/index3/css/sidebar.css?v=1">
    <link rel="stylesheet" href="/static/index3/css/index.css?v=7">
    <link rel="stylesheet" href="/static/index3/css/pay.css?v=1">
    <link rel="stylesheet" href="/static/index3/css/responsive.css?v=6">
    <script src="/static/index3/js/theme.js?v=1"></script>
</head>
<body>
<div class="layout-wrapper">
    {include file="index3/public/sidebar"/}
    <div class="main-content">
        {include file="index3/public/header"/}
        <div class="page-content" style="max-width:900px;margin:0 auto;padding:24px 16px">
            <h2 style="font-size:22px;font-weight:700;margin-bottom:24px;color:var(--text-primary,#333)">👑 会员等级</h2>

            <!-- 当前等级 -->
            <div class="page-card" id="currentLevelCard" style="text-align:center;background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;border:none">
                <div style="font-size:13px;opacity:.8">我的当前等级</div>
                <div id="currentLevelName" style="font-size:28px;font-weight:700;margin:8px 0">加载中...</div>
                <div id="currentLevelIcon" style="font-size:40px"></div>
            </div>

            <!-- 等级列表 -->
            <div class="page-card">
                <div class="page-card-title">📋 全部等级</div>
                <div class="level-grid" id="levelGrid">
                    <div style="grid-column:1/-1;text-align:center;color:var(--text-tertiary,#999);padding:30px">加载中...</div>
                </div>
            </div>
        </div>
    </div>
</div>
{include file="index3/public/tabbar"/}

<script src="/static/index3/js/api.js?v=4"></script>
<script src="/static/index3/js/auth.js?v=2"></script>
<script src="/static/index3/js/pay.js?v=1"></script>
<script src="/static/index3/js/sidebar.js?v=1"></script>
<script>
(function(){
    function init(){
        if(!Auth.isChecked()){ setTimeout(init, 200); return; }
        if(!Auth.isLoggedIn()){ location.href = '/?s=/index/index'; return; }
        loadLevels();
    }

    function loadLevels(){
        Api.getLevelList(function(err, res){
            if(err || !res || res.status !== 1){
                document.getElementById('levelGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#ef4444;padding:30px">' + (res && res.msg || '加载失败') + '</div>';
                return;
            }
            var data = res.data;
            // 当前等级
            var cur = data.current_level || {};
            document.getElementById('currentLevelName').textContent = cur.name || '普通会员';
            if(cur.icon){
                document.getElementById('currentLevelIcon').innerHTML = '<img src="' + cur.icon + '" style="width:48px;height:48px;border-radius:50%">';
            } else {
                document.getElementById('currentLevelIcon').textContent = '👑';
            }

            // 等级列表
            var levels = data.levels || [];
            if(levels.length === 0){
                document.getElementById('levelGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--text-tertiary,#999);padding:30px">暂无等级数据</div>';
                return;
            }
            var html = '';
            for(var i = 0; i < levels.length; i++){
                var lv = levels[i];
                var isCurrent = cur.id && cur.id == lv.id;
                var cardClass = 'level-card' + (isCurrent ? ' current' : '');
                var badgeHtml = isCurrent ? '<span class="level-card-badge current-badge">当前等级</span>' : '';
                var iconHtml = lv.icon ? '<img class="level-card-icon" src="' + lv.icon + '">' : '<span class="level-card-icon-emoji">👑</span>';

                var btnHtml = '';
                if(isCurrent){
                    btnHtml = '<button class="level-card-btn btn-current" disabled>当前等级</button>';
                } else if(lv.can_apply == 1){
                    if(lv.need_pay == 1){
                        btnHtml = '<button class="level-card-btn btn-primary" data-level-id="' + lv.id + '">付费升级 ¥' + (lv.apply_paymoney || 0) + '</button>';
                    } else if(lv.apply_check == 1){
                        btnHtml = '<button class="level-card-btn btn-primary" data-level-id="' + lv.id + '">申请升级（需审核）</button>';
                    } else {
                        btnHtml = '<button class="level-card-btn btn-primary" data-level-id="' + lv.id + '">申请升级</button>';
                    }
                } else if(lv.sort <= (cur.sort || 0)){
                    btnHtml = '<button class="level-card-btn btn-disabled" disabled>' + (lv.is_default ? '默认等级' : '低于当前等级') + '</button>';
                } else if(lv.can_apply_setting == 1 && lv.meet_condition == 0){
                    // 后台已开启申请，但用户未满足条件
                    btnHtml = '<button class="level-card-btn btn-disabled" disabled>条件未满足</button>';
                } else {
                    btnHtml = '<button class="level-card-btn btn-disabled" disabled>暂不可申请</button>';
                }

                html += '<div class="' + cardClass + '">' +
                    badgeHtml +
                    '<div class="level-card-header">' + iconHtml + '<div class="level-card-name">' + escapeHtml(lv.name) + '</div></div>' +
                    (lv.condition_text ? '<div class="level-card-condition">' + escapeHtml(lv.condition_text) + '</div>' : '') +
                    (lv.discount ? '<div class="level-card-discount">享 ' + lv.discount + ' 折优惠</div>' : '') +
                    (lv.need_pay == 1 ? '<div class="level-card-price">升级费用：<strong>¥' + (lv.apply_paymoney || 0) + '</strong></div>' : '') +
                    btnHtml +
                '</div>';
            }
            document.getElementById('levelGrid').innerHTML = html;

            // 绑定申请按钮
            var btns = document.querySelectorAll('.level-card-btn[data-level-id]');
            for(var k = 0; k < btns.length; k++){
                btns[k].addEventListener('click', function(){
                    var btn = this;
                    var levelId = btn.getAttribute('data-level-id');
                    btn.disabled = true;
                    btn.textContent = '处理中...';
                    Api.applyLevel({level_id: levelId}, function(err, res){
                        if(err || !res){
                            alert('请求失败');
                            btn.disabled = false;
                            return;
                        }
                        if(res.status === 1){
                            if(res.data && res.data.need_pay && res.data.ordernum){
                                Pay.startPay({
                                    ordernum: res.data.ordernum,
                                    order_type: 'level',
                                    amount: res.data.price || '0',
                                    title: '等级升级',
                                    onSuccess: function(){
                                        Auth.checkLogin();
                                        setTimeout(function(){ location.reload(); }, 1000);
                                    }
                                });
                            } else {
                                alert(res.msg || '升级成功');
                                Auth.checkLogin();
                                setTimeout(function(){ location.reload(); }, 1000);
                            }
                        } else {
                            alert(res.msg || '操作失败');
                        }
                        btn.disabled = false;
                    });
                });
            }
        });
    }

    function escapeHtml(str){
        if(!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    init();
})();
</script>
</body>
</html>
