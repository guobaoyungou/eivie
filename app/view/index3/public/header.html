<!-- header.html — 顶部固定栏组件 -->
<header class="header">
    <!-- 汉堡菜单（平板/手机可见） -->
    <button class="header-hamburger" aria-label="菜单">☰</button>

    <!-- 移动端Logo -->
    {if $webinfo.logo}
    <img class="header-logo-mobile" src="{$webinfo.logo}" alt="{$webinfo.webname}">
    {/if}

    <!-- 搜索框（PC端） -->
    <div class="header-search">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="搜索模型、场景模板..." id="headerSearchInput">
    </div>

    <!-- 搜索图标（移动端） -->
    <button class="header-search-icon-mobile" aria-label="搜索">🔍</button>

    <!-- 右侧按钮组 -->
    <div class="header-actions">
        <a class="header-btn hide-mobile hide-tablet" href="javascript:;">
            <span>🎁</span>
            <span class="btn-label">邀请有礼</span>
        </a>
        <!-- 未登录态：会员中心 -->
        <a class="header-btn header-btn-vip hide-mobile" href="javascript:;" onclick="if(window.Index3&&Index3.showLoginModal){Index3.showLoginModal()}else{location.href='/?s=/Backstage/index'}">
            <span>👑</span>
            <span class="btn-label">会员中心</span>
        </a>
        <!-- 已登录态：余额积分摘要（默认隐藏） -->
        <div class="header-balance-info hide-mobile" id="headerBalanceInfo" style="display:none">
            <a class="header-balance-item" href="/?s=/index/recharge" title="点击充值">💰 <span class="header-balance-money">¥0.00</span></a>
            <a class="header-balance-item" href="/?s=/index/score_shop" title="点击购买积分">⭐ <span class="header-balance-score">0分</span></a>
        </div>
        <!-- 已登录态：消息图标占位（默认隐藏） -->
        <button class="header-btn header-msg-icon hide-mobile" id="headerMsgIcon" style="display:none" title="消息功能开发中" disabled>
            <span>🔔</span>
        </button>
        <!-- 未登录态：登录/注册按钮 -->
        <a class="header-btn primary" id="headerLoginBtn" href="{:url('Backstage/index')}">
            <span class="btn-label">商家登录/注册</span>
            <span class="btn-icon-only" style="display:none">👤</span>
        </a>
        <!-- 已登录态：用户头像（默认隐藏） -->
        <div class="header-avatar-wrap" id="headerAvatarWrap" style="display:none">
            <img class="header-user-avatar" src="/static/index3/img/default_avatar.svg" alt="头像">
        </div>
    </div>

    <!-- 用户信息下拉弹窗 -->
    <div class="user-dropdown" id="userDropdown"></div>
</header>

<!-- 全屏搜索（移动端） -->
<div class="fullscreen-search">
    <div class="fs-top">
        <input class="fs-input" type="text" placeholder="搜索模型、场景模板...">
        <button class="fs-cancel">取消</button>
    </div>
</div>
