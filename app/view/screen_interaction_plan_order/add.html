<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>手动录入订单</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  {include file="public/css"/}
</head>
<body>
  <div class="layui-fluid">
    <div class="layui-card">
      <div class="layui-card-header">
        <i class="layui-icon layui-icon-edit"></i> 手动录入订单
      </div>
      <div class="layui-card-body" pad15>
        <div class="layui-form form-label-w8" lay-filter="orderForm">

          <div class="layui-form-item">
            <label class="layui-form-label">套餐选择：</label>
            <div class="layui-input-inline" style="width:250px">
              <select name="plan_id" lay-verify="required" lay-filter="planSelect">
                <option value="">请选择套餐</option>
                {volist name="plans" id="plan"}
                <option value="{$plan.id}" data-price="{$plan.price}">{$plan.name} (¥{$plan.price})</option>
                {/volist}
              </select>
            </div>
          </div>

          <div class="layui-form-item">
            <label class="layui-form-label">商户：</label>
            <div class="layui-input-inline" style="width:250px">
              <select name="bid">
                <option value="0">无（平台自营）</option>
                {volist name="businessList" id="biz"}
                <option value="{$biz.id}">{$biz.name}</option>
                {/volist}
              </select>
            </div>
          </div>

          <div class="layui-form-item">
            <label class="layui-form-label">订单类型：</label>
            <div class="layui-input-inline">
              <input type="radio" name="order_type" value="1" title="新购" checked>
              <input type="radio" name="order_type" value="2" title="续费">
            </div>
          </div>

          <div class="layui-form-item">
            <label class="layui-form-label">原价(元)：</label>
            <div class="layui-input-inline">
              <input type="number" name="original_price" id="originalPrice" class="layui-input" value="" step="0.01" min="0" placeholder="默认取套餐价格">
            </div>
          </div>

          <div class="layui-form-item">
            <label class="layui-form-label">实付金额(元)：</label>
            <div class="layui-input-inline">
              <input type="number" name="amount" lay-verify="required|number" class="layui-input" value="" step="0.01" min="0" placeholder="实际支付金额">
            </div>
          </div>

          <div class="layui-form-item">
            <label class="layui-form-label">支付状态：</label>
            <div class="layui-input-inline">
              <input type="radio" name="pay_status" value="1" title="已支付" checked>
              <input type="radio" name="pay_status" value="0" title="未支付">
            </div>
          </div>

          <div class="layui-form-item">
            <label class="layui-form-label">备注：</label>
            <div class="layui-input-inline" style="width:350px">
              <input type="text" name="remark" class="layui-input" placeholder="可选，如：线下转账等">
            </div>
          </div>

          <div class="layui-form-item">
            <div class="layui-input-block">
              <button class="layui-btn" lay-submit lay-filter="submitOrder">保存</button>
              <button type="reset" class="layui-btn layui-btn-primary">重置</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  {include file="public/js"/}
  <script>
  // 套餐选择联动：自动填充原价
  layui.form.on('select(planSelect)', function(data) {
    var price = $(data.elem).find('option:selected').data('price');
    if (price !== undefined) {
      $('#originalPrice').val(price);
    }
  });

  layui.form.on('submit(submitOrder)', function(obj) {
    var loadIndex = layer.load();
    $.post("{:url('add')}", obj.field, function(res) {
      layer.close(loadIndex);
      if (res.status == 1) {
        layer.msg('录入成功', {icon: 1, time: 1000}, function() {
          var index = parent.layer.getFrameIndex(window.name);
          parent.layer.close(index);
        });
      } else {
        layer.msg(res.msg, {icon: 2});
      }
    });
    return false;
  });
  </script>
</body>
</html>
