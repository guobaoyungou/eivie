<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>选片中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#f5f5f5;color:#333;overflow-x:hidden;-webkit-user-select:none;user-select:none}
.loading-mask{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column}
.loading-mask .spinner{width:40px;height:40px;border:3px solid #eee;border-top-color:#07c160;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-mask p{margin-top:12px;color:#999;font-size:14px}

/* 非微信提示 */
.not-wechat{display:none;text-align:center;padding:80px 40px}
.not-wechat img{width:80px;margin-bottom:20px}
.not-wechat h3{font-size:18px;color:#333;margin-bottom:10px}
.not-wechat p{font-size:14px;color:#999}

/* 过期提示 / 解除关联页面 */
.expired{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px 60px;background:linear-gradient(180deg,#f0faf4 0%,#f5f5f5 40%)}
.expired .rescan-card{width:100%;max-width:360px;background:#fff;border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.06);padding:40px 28px 32px;text-align:center;animation:rescanFadeIn .5s ease}
@keyframes rescanFadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.expired .rescan-icon{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#07c160,#05a34a);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px;color:#fff;box-shadow:0 4px 16px rgba(7,193,96,.3)}
.expired .rescan-title{font-size:22px;font-weight:700;color:#222;margin-bottom:8px;line-height:1.3}
.expired .rescan-subtitle{font-size:15px;color:#666;margin-bottom:16px;line-height:1.5}
.expired .rescan-divider{width:48px;height:3px;background:linear-gradient(90deg,#07c160,#5be08b);border-radius:2px;margin:20px auto 22px}
.expired .rescan-hint{font-size:15px;color:#555;line-height:1.7;margin-bottom:6px}
.expired .rescan-hint em{font-style:normal;color:#07c160;font-weight:600}

/* 头部 */
.header{background:linear-gradient(135deg,#07c160,#06ad56);color:#fff;padding:20px 16px 60px;text-align:center;position:relative}
.header .store-name{font-size:12px;opacity:.75;margin-bottom:6px;letter-spacing:1px}
.header h2{font-size:18px;font-weight:500;margin-bottom:4px}
.header p{font-size:13px;opacity:.8}
.header .my-orders-btn{position:absolute;top:50%;right:6px;transform:translateY(-50%);writing-mode:vertical-rl;text-orientation:upright;letter-spacing:2px;display:flex;align-items:center;gap:0;background:rgba(255,255,255,.18);color:#fff;border:none;padding:10px 5px;border-radius:14px;font-size:11px;cursor:pointer;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:2;line-height:1}
.header .my-orders-btn:active{background:rgba(255,255,255,.35)}
.header .my-orders-btn .badge{position:absolute;top:-4px;right:-4px;display:none;min-width:16px;height:16px;line-height:16px;text-align:center;background:#ff4d4f;color:#fff;border-radius:9px;font-size:10px;padding:0 4px;writing-mode:horizontal-tb}

/* 成片网格 */
.pick-section{margin:-40px 12px 0;position:relative;z-index:1}
.pick-count{background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.pick-count .total{font-size:14px;color:#666}
.pick-count .selected{font-size:14px;color:#07c160;font-weight:600}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:100px}
.grid-item{position:relative;border-radius:8px;overflow:hidden;background:#eee;aspect-ratio:3/4}
.grid-item .thumb{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;-webkit-touch-callout:none}
.grid-item .overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2}
.grid-item .check{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;z-index:3;background:rgba(0,0,0,.3);transition:all .2s}
.grid-item .check.active{background:#07c160;border-color:#07c160}
.grid-item .check svg{width:14px;height:14px;fill:#fff;opacity:0;transition:opacity .2s}
.grid-item .check.active svg{opacity:1}
.grid-item .type-badge{position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,.5);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;z-index:3}
.grid-item .zoom-btn{position:absolute;bottom:6px;right:6px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.45);border:none;color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;z-index:4;cursor:pointer;-webkit-tap-highlight-color:transparent}
.grid-item .zoom-btn:active{background:rgba(0,0,0,.7)}

/* 全选按钮 */
.select-all-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:16px;border:1.5px solid #ddd;font-size:13px;color:#666;background:#fff;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.select-all-btn.active{border-color:#07c160;color:#07c160;background:#f0faf4}
.select-all-btn svg{width:16px;height:16px;fill:currentColor}


/* 不是我的照片按钮 */
.not-my-entry{margin:20px 12px 120px;text-align:center}
.not-my-entry-btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#ff9500,#f08300);color:#fff;border:none;padding:14px 36px;border-radius:28px;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(255,149,0,.3);transition:all .2s;-webkit-tap-highlight-color:transparent}
.not-my-entry-btn:active{transform:scale(.96);opacity:.85}

/* 我要重拍按钮 */
.retake-btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#07c160,#06ad56);color:#fff;border:none;padding:14px 36px;border-radius:28px;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(7,193,96,.3);transition:all .2s;-webkit-tap-highlight-color:transparent;margin-top:14px}
.retake-btn:active{transform:scale(.96);opacity:.85}

/* 重拍弹层 */
.retake-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);z-index:500;display:none;align-items:center;justify-content:center}
.retake-overlay.show{display:flex}
.retake-card{background:#fff;border-radius:16px;padding:32px 28px 24px;text-align:center;max-width:300px;width:85%;box-shadow:0 8px 30px rgba(0,0,0,.15);position:relative;animation:followFadeIn .35s ease}
.retake-card .retake-close{position:absolute;top:12px;right:14px;width:32px;height:32px;border-radius:50%;background:#f5f5f5;border:none;color:#999;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.retake-card .retake-close:active{background:#eee}
.retake-card .retake-title{font-size:18px;font-weight:600;color:#333;margin-bottom:6px}
.retake-card .retake-subtitle{font-size:13px;color:#999;margin-bottom:20px}
.retake-card .retake-options{display:flex;gap:12px;margin-bottom:10px}
.retake-card .retake-option{flex:1;background:#f5f7fa;border:2px solid #e8ecf1;border-radius:12px;padding:20px 10px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:8px;-webkit-tap-highlight-color:transparent}
.retake-card .retake-option:active{background:#e8f5e9;border-color:#07c160;transform:scale(.97)}
.retake-card .retake-option .retake-option-icon{font-size:32px;line-height:1}
.retake-card .retake-option .retake-option-label{font-size:14px;font-weight:500;color:#333}
.retake-card .retake-uploading{display:none;flex-direction:column;align-items:center;gap:12px;padding:20px 0}
.retake-card .retake-uploading .spinner{width:32px;height:32px;border:3px solid #eee;border-top-color:#07c160;border-radius:50%;animation:spin .8s linear infinite}
.retake-card .retake-uploading p{font-size:14px;color:#666}
.retake-card .retake-error{font-size:12px;color:#e64340;margin-top:8px;display:none}
/* 底部浮动栏 */
.bottom-bar{position:fixed;bottom:0;left:0;width:100%;background:#fff;box-shadow:0 -2px 10px rgba(0,0,0,.08);z-index:100;display:none}
.bar-guide{padding:8px 16px;background:#fff9ed;font-size:12px;color:#ff9500;line-height:1.4}
.bar-content{display:flex;align-items:center;padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom))}
.bar-info{flex:1;min-width:0}
.bar-info .price-row{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
.bar-info .price{font-size:22px;font-weight:700;color:#e64340}
.bar-info .price-orig{font-size:13px;color:#bbb;text-decoration:line-through}
.bar-info .desc{font-size:11px;color:#999;margin-top:2px}
.bar-btn{background:linear-gradient(135deg,#07c160,#06ad56);color:#fff;border:none;padding:12px 24px;border-radius:24px;font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap;min-width:120px;text-align:center}
.bar-btn:active{opacity:.8}
.bar-btn:disabled{background:#ccc}

/* 分区标题 */
.section-header{background:#fff;border-radius:12px;padding:12px 16px;margin:16px 0 12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.section-title{font-size:15px;font-weight:600;color:#333}
.section-desc{font-size:12px;color:#999;margin-left:8px}

/* 空状态 */
.empty{text-align:center;padding:60px 20px}
.empty p{font-size:14px;color:#999}

/* 我的订单面板 */
.orders-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:500;display:none;opacity:0;transition:opacity .25s}
.orders-overlay.show{display:block;opacity:1}
.orders-panel{position:fixed;top:0;right:-100%;width:100%;max-width:380px;height:100%;background:#f5f5f5;z-index:501;transition:right .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.orders-panel.show{right:0}
.orders-panel .panel-header{background:linear-gradient(135deg,#07c160,#06ad56);color:#fff;padding:16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.orders-panel .panel-close{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.orders-panel .panel-close:active{background:rgba(255,255,255,.35)}
.orders-panel .panel-title{font-size:17px;font-weight:600;flex:1}
.orders-panel .panel-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}
.orders-panel .order-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.05);display:flex;gap:12px;cursor:pointer;transition:transform .15s}
.orders-panel .order-card:active{transform:scale(.98)}
.orders-panel .order-cover{width:64px;height:80px;border-radius:8px;object-fit:cover;background:#eee;flex-shrink:0}
.orders-panel .order-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between}
.orders-panel .order-top{display:flex;align-items:center;justify-content:space-between}
.orders-panel .order-pkg{font-size:14px;font-weight:600;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px}
.orders-panel .order-status{font-size:11px;padding:2px 8px;border-radius:10px;flex-shrink:0}
.orders-panel .order-status.paid{background:#e8f5e9;color:#2e7d32}
.orders-panel .order-status.completed{background:#e3f2fd;color:#1565c0}
.orders-panel .order-meta{font-size:12px;color:#999;display:flex;align-items:center;gap:8px}
.orders-panel .order-bottom{display:flex;align-items:center;justify-content:space-between}
.orders-panel .order-amount{font-size:16px;font-weight:700;color:#e64340}
.orders-panel .order-download{font-size:12px;color:#07c160;font-weight:500}
.orders-panel .orders-empty{text-align:center;padding:60px 20px}
.orders-panel .orders-empty .empty-icon{font-size:48px;margin-bottom:12px}
.orders-panel .orders-empty p{font-size:14px;color:#999}
.orders-panel .orders-loading{text-align:center;padding:40px 20px}
.orders-panel .orders-loading .spinner{width:28px;height:28px;border:3px solid #eee;border-top-color:#07c160;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
.orders-panel .orders-loading p{margin-top:8px;font-size:13px;color:#999}

/* Lightbox */
.lightbox-mask{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);z-index:600;display:none;flex-direction:column;align-items:center;justify-content:center}
.lightbox-mask.show{display:flex}
.lightbox-close{position:absolute;top:12px;right:14px;width:36px;height:36px;background:rgba(255,255,255,.15);border:none;border-radius:50%;color:#fff;font-size:20px;cursor:pointer;z-index:602;display:flex;align-items:center;justify-content:center}
.lightbox-close:active{background:rgba(255,255,255,.3)}
.lightbox-img-wrap{flex:1;width:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:50px 8px 100px}
.lightbox-img-wrap img{max-width:100%;max-height:100%;object-fit:contain;pointer-events:none;-webkit-touch-callout:none}
.lightbox-img-wrap video{max-width:100%;max-height:100%;object-fit:contain}
.lightbox-arrow{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:60px;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:22px;cursor:pointer;z-index:602;border-radius:6px;display:flex;align-items:center;justify-content:center}
.lightbox-arrow:active{background:rgba(255,255,255,.25)}
.lightbox-arrow.left{left:4px}
.lightbox-arrow.right{right:4px}
.lightbox-footer{position:absolute;bottom:0;left:0;width:100%;background:linear-gradient(transparent,rgba(0,0,0,.7));padding:16px 16px calc(16px + env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:space-between;z-index:602}
.lightbox-counter{color:rgba(255,255,255,.7);font-size:13px}
.lightbox-select-btn{background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.4);padding:8px 20px;border-radius:20px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px}
.lightbox-select-btn.active{background:#07c160;border-color:#07c160}
.lightbox-select-btn:active{opacity:.8}

/* 水印Canvas层 */
.lightbox-img-wrap canvas{max-width:100%;max-height:100%;object-fit:contain;-webkit-touch-callout:none}
.lightbox-loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:10px;z-index:3}
.lightbox-loading .spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
.lightbox-loading p{color:rgba(255,255,255,.7);font-size:13px}
/* 缩放容器 */
.wm-zoom-wrap{width:100%;height:100%;overflow:hidden;touch-action:none;position:relative;display:flex;align-items:center;justify-content:center}
.wm-zoom-wrap canvas{transform-origin:0 0;will-change:transform}

/* 关注引导弹层 */
.follow-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);z-index:500;display:none;align-items:center;justify-content:center}
.follow-overlay.show{display:flex}
.follow-card{background:#fff;border-radius:16px;padding:32px 28px 24px;text-align:center;max-width:300px;width:85%;box-shadow:0 8px 30px rgba(0,0,0,.15);position:relative;animation:followFadeIn .35s ease}
@keyframes followFadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.follow-card .follow-close{position:absolute;top:12px;right:14px;width:32px;height:32px;border-radius:50%;background:#f5f5f5;border:none;color:#999;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.follow-card .follow-close:active{background:#eee}
.follow-card .follow-title{font-size:18px;font-weight:600;color:#333;margin-bottom:6px}
.follow-card .follow-subtitle{font-size:13px;color:#999;margin-bottom:20px}
.follow-card .follow-qr-wrap{width:180px;height:180px;margin:0 auto 14px;border-radius:12px;overflow:hidden;background:#f9f9f9;display:flex;align-items:center;justify-content:center}
.follow-card .follow-qr-wrap img{width:100%;height:100%;object-fit:contain}
.follow-card .follow-mp-name{font-size:14px;color:#666;margin-bottom:4px}
.follow-card .follow-tip{font-size:12px;color:#bbb;margin-bottom:20px}
.follow-card .follow-btn{display:block;width:100%;background:linear-gradient(135deg,#07c160,#06ad56);color:#fff;border:none;padding:13px 0;border-radius:24px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:10px;transition:all .2s}
.follow-card .follow-btn:active{opacity:.8;transform:scale(.98)}
.follow-card .follow-btn:disabled{background:#ccc;transform:none}
.follow-card .follow-btn.loading{background:#ccc;pointer-events:none}
.follow-card .follow-skip{font-size:13px;color:#aaa;background:none;border:none;cursor:pointer;padding:6px 12px}
.follow-card .follow-skip:active{color:#666}
.follow-card .follow-error{font-size:12px;color:#e64340;margin-bottom:8px;display:none}
</style>
</head>
<body>

<!-- 加载遮罩 -->
<div class="loading-mask" id="loadingMask">
  <div class="spinner"></div>
  <p>加载中...</p>
</div>

<!-- 非微信提示 -->
<div class="not-wechat" id="notWechat">
  <h3>请使用微信扫码打开</h3>
  <p>该页面仅支持在微信客户端中访问</p>
</div>

<!-- 过期提示 -->
<div class="expired" id="expiredTip">
  <h3>二维码已过期</h3>
  <p id="expiredMsg">请联系商家重新生成</p>
</div>

<!-- 通用错误提示 -->
<div class="expired" id="errorTip" style="display:none">
  <h3 style="color:#999">加载失败</h3>
  <p id="errorMsg">请稍后重试</p>
</div>

<!-- 主内容 -->
<div id="mainContent" style="display:none">
  <div class="header">
    <button class="my-orders-btn" id="myOrdersBtn" onclick="openMyOrders()">
      <span class="badge" id="ordersBadge"></span>
      我的订单
    </button>
    <div class="store-name" id="storeName" style="display:none"></div>
    <h2>📸 选择你喜欢的照片</h2>
    <p>浏览成片，勾选心仪照片后付费下载原片</p>
  </div>

  <div class="pick-section">
    <div class="pick-count">
      <span class="total">共 <strong id="totalCount">0</strong> 张成片</span>
      <span style="display:flex;align-items:center;gap:10px">
        <span class="selected">已选 <strong id="selectedCount">0</strong> 张</span>
        <span class="select-all-btn" id="selectAllBtn" onclick="toggleSelectAll()">
          <svg viewBox="0 0 24 24"><path d="M18 7l-1.41-1.41-6.34 6.34 1.41 1.41L18 7zm4.24-1.41L11.66 16.17 7.48 12l-1.41 1.41L11.66 19l12-12-1.42-1.41zM.41 13.41L6 19l1.41-1.41L1.83 12 .41 13.41z"/></svg>
          全选
        </span>
      </span>
    </div>

    <div class="grid" id="photoGrid"></div>
    <div class="empty" id="emptyTip" style="display:none"><p>暂无成片，请稍候...</p></div>

    <!-- 不是我的照片 -->
    <div class="not-my-entry">
      <button class="not-my-entry-btn" onclick="notMyPhotos()">🙋 不是我的照片? 点击解除</button>
      <br>
      <button class="retake-btn" onclick="openRetakeModal()">📷 我要重拍</button>
    </div>

    <!-- 更多推荐成片区域 -->
    <div id="similarSection" style="display:none">
      <div class="section-header">
        <span class="section-title">🔍 更多与你相似的成片</span>
        <span class="section-desc" id="similarDesc"></span>
      </div>

      <div class="grid" id="similarGrid"></div>
    </div>
  </div>
</div>

<!-- 我的订单遮罩 -->
<div class="orders-overlay" id="ordersOverlay" onclick="closeMyOrders()"></div>

<!-- 我的订单侧滑面板 -->
<div class="orders-panel" id="ordersPanel">
  <div class="panel-header">
    <button class="panel-close" onclick="closeMyOrders()">✕</button>
    <div class="panel-title">我的订单</div>
  </div>
  <div class="panel-body" id="ordersList">
    <div class="orders-loading" id="ordersLoading">
      <div class="spinner"></div>
      <p>加载中...</p>
    </div>
  </div>
</div>

<!-- 底部浮动栏 -->
<div class="bottom-bar" id="bottomBar">
  <div class="bar-guide" id="barGuide"></div>
  <div class="bar-content">
    <div class="bar-info">
      <div class="price-row">
        <span class="price">¥<span id="barPrice">0</span></span>
        <span class="price-orig" id="barOrigPrice" style="display:none">¥<span id="barOrigPriceVal">0</span></span>
      </div>
      <div class="desc" id="barDesc"></div>
    </div>

  <div class="retake-card">
    <button class="retake-close" onclick="closeRetakeModal()">✕</button>

        <div class="retake-option-icon">📸</div>
        <div class="retake-option-label">相机自拍</div>

<input type="file" id="retakeFileInput" accept="image/jpeg,image/png" style="display:none" onchange="handleRetakeFileSelect(event)">

<script>
// 全局状态
var APP = {
  qr: '', aid: 0, bid: 0, portraitId: 0, qrcodeId: 0, openid: '',
  results: [], similarResults: [], allResults: [], selectedIds: [],
  packages: [], singlePrice: 0,
  recommendData: null, selectedPackageId: 0,
  paying: false,
  apiBase: '/index.php?s=/api/ai_travel_photo/pick/',
  faceWatermarkEnabled: 0,
  mpNickname: '',
  // 门店模式
  storeMode: false,
  mdid: 0,
  portraitIds: [],
  // 免费选片模式
  freePick: false,
  // 关注状态
  isSubscribed: true,
  mpQrcode: '',
  mpNameForSubscribe: ''
};

// 初始化
(function init() {
  var params = new URLSearchParams(window.location.search);
  var mode = params.get('mode') || '';
  APP.qr = params.get('qr') || '';

  // 门店模式：用户重复扫码时直接展示所有成片
  if (mode === 'store') {
    APP.storeMode = true;
    APP.bid = parseInt(params.get('bid')) || 0;
    APP.mdid = parseInt(params.get('mdid')) || 0;
    if (!APP.bid || !APP.mdid) {
      showError('缺少门店参数');
      return;
    }
  } else {
    if (!APP.qr) {
      showError('缺少二维码参数');
      return;
    }
  }

  // 检测微信浏览器
  var ua = navigator.userAgent.toLowerCase();
  if (ua.indexOf('micromessenger') === -1) {
    document.getElementById('loadingMask').style.display = 'none';
    document.getElementById('notWechat').style.display = 'block';
    return;
  }

  if (APP.storeMode) {
    storeInit();
  } else {
    qrInit();
  }
})();

// 门店模式初始化
function storeInit() {
  fetchApi('store_index', {bid: APP.bid, mdid: APP.mdid}, 'GET', function(res) {
    if (res.code === 302 && res.data && res.data.need_auth) {
      storeStartOAuth();
      return;
    }
    if (res.code !== 200) {
      showError(res.msg || '加载失败');
      return;
    }
    APP.portraitIds = res.data.portrait_ids || [];
    APP.aid = res.data.aid;
    APP.bid = res.data.bid;
    APP.mdid = res.data.mdid;
    APP.openid = res.data.openid || '';
    APP.faceWatermarkEnabled = res.data.face_watermark_enabled || 0;
    APP.mpNickname = res.data.mp_nickname || '';
    APP.freePick = res.data.is_free_pick ? 1 : 0;
    APP.isSubscribed = res.data.is_subscribed ? true : false;
    APP.mpQrcode = res.data.mp_qrcode || '';
    APP.mpNameForSubscribe = res.data.mp_nickname_for_subscribe || '';
    // 门店模式用第一个portrait_id作为主人像ID
    APP.portraitId = APP.portraitIds.length > 0 ? APP.portraitIds[0] : 0;

    var bName = res.data.business_name || '';
    var sName = res.data.store_name || '';
    if (bName) {
      var nameEl = document.getElementById('storeName');
      nameEl.textContent = sName ? (bName + ' · ' + sName) : bName;
      nameEl.style.display = 'block';
    }

    if (res.data.total_results === 0) {
      // 无成片，显示空状态
      document.getElementById('loadingMask').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      document.getElementById('emptyTip').style.display = 'block';
      return;
    }

    spreadFollowOverlay();

    storeLoadResults();
  });
}

function storeStartOAuth() {
  window.location.href = window.location.origin + APP.apiBase + 'start_oauth&mode=store&bid=' + APP.bid + '&mdid=' + APP.mdid;
}

// ========== 关注引导弹层 ==========

function spreadFollowOverlay() {
  // 已关注，跳过
  if (APP.isSubscribed) return;

  // 更新弹层内容
  var qrImg = document.getElementById('followQrImg');
  if (APP.mpQrcode) {
    qrImg.src = APP.mpQrcode;
  }
  var mpNameEl = document.getElementById('followMpName');
  if (APP.mpNameForSubscribe) {
    mpNameEl.textContent = APP.mpNameForSubscribe;
  } else {
    mpNameEl.textContent = '关注后即可开始选片';
  }

  // 显示弹层
  document.getElementById('followOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function hideFollowOverlay() {
  document.getElementById('followOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

function checkFollowAndContinue() {
  var btn = document.getElementById('followBtn');
  var errEl = document.getElementById('followError');
  errEl.style.display = 'none';
  btn.textContent = '正在检测...';
  btn.disabled = true;
  btn.classList.add('loading');

  fetchApi('check_subscribe', {aid: APP.aid}, 'POST', function(res) {
    btn.classList.remove('loading');
    btn.disabled = false;
    btn.textContent = '我已关注，开始选片';

    if (res.code === 200 && res.data && res.data.is_subscribed) {
      APP.isSubscribed = true;
      hideFollowOverlay();
    } else {
      errEl.textContent = res.msg || '暂未检测到关注，请扫码关注后再试';
      errEl.style.display = 'block';
    }
  });
}

function skipFollow() {
  hideFollowOverlay();
}

function storeLoadResults() {
  fetchApi('store_results', {bid: APP.bid, mdid: APP.mdid}, 'GET', function(res) {
    document.getElementById('loadingMask').style.display = 'none';
    if (res.code !== 200) { showError(res.msg); return; }

    APP.results = res.data.results || [];
    APP.similarResults = [];
    APP.allResults = APP.results;
    APP.portraitIds = res.data.portrait_ids || APP.portraitIds;

    var totalAll = APP.results.length;
    document.getElementById('totalCount').textContent = totalAll;

    if (totalAll === 0) {
      document.getElementById('mainContent').style.display = 'block';
      document.getElementById('emptyTip').style.display = 'block';
      return;
    }

    renderGrid();
    document.getElementById('mainContent').style.display = 'block';

    // 预加载套餐信息
    fetchApi('packages', {bid: APP.bid}, 'GET', function(pkgRes) {
      if (pkgRes.code === 200) {
        APP.packages = pkgRes.data || [];
      }
    });
  });
}

// QR模式初始化（原有逻辑）
function qrInit() {
  // 请求入口接口
  fetchApi('index', {qr: APP.qr}, 'GET', function(res) {
    if (res.code === 302 && res.data && res.data.need_auth) {
      startOAuth();
      return;
    }
    if (res.code === 200) {
      APP.portraitId = res.data.portrait_id;
      APP.portraitIds = res.data.portrait_ids || [APP.portraitId];
      APP.aid = res.data.aid;
      APP.bid = res.data.bid;
      APP.mdid = res.data.mdid || 0;
      APP.qrcodeId = res.data.qrcode_id;
      APP.openid = res.data.openid || '';
      APP.freePick = res.data.is_free_pick == 1;

      // 人脸水印配置
      APP.faceWatermarkEnabled = res.data.face_watermark_enabled || 0;
      APP.mpNickname = res.data.mp_nickname || '';

      // 关注状态
      APP.isSubscribed = res.data.is_subscribed ? true : false;
      APP.mpQrcode = res.data.mp_qrcode || '';
      APP.mpNameForSubscribe = res.data.mp_nickname_for_subscribe || '';

      // 展示商家/门店名称
      var bName = res.data.business_name || '';
      var sName = res.data.store_name || '';
      if (bName) {
        var nameEl = document.getElementById('storeName');
        nameEl.textContent = sName ? (bName + ' · ' + sName) : bName;
        nameEl.style.display = 'block';
      }

      spreadFollowOverlay();

      loadResults();
    } else {
      if (res.msg && res.msg.indexOf('过期') > -1) {
        document.getElementById('loadingMask').style.display = 'none';
        document.getElementById('expiredTip').style.display = 'block';
        document.getElementById('expiredMsg').textContent = res.msg;
      } else {
        showError(res.msg || '加载失败');
      }
    }
  });
}

function startOAuth() {
  window.location.href = window.location.origin + APP.apiBase + 'start_oauth&qr=' + APP.qr;
}

function loadResults() {
  var params = {portrait_id: APP.portraitId, bid: APP.bid, aid: APP.aid};
  // 如果有同门店关联的其他人像，传递聚合 portrait_ids
  if (APP.portraitIds && APP.portraitIds.length > 1) {
    params.portrait_ids = JSON.stringify(APP.portraitIds);
  }
  fetchApi('results', params, 'GET', function(res) {
    document.getElementById('loadingMask').style.display = 'none';
    if (res.code !== 200) { showError(res.msg); return; }

    APP.results = res.data.results || [];
    APP.similarResults = res.data.similar_results || [];
    APP.allResults = APP.results.concat(APP.similarResults);

    // 更新聚合 portrait_ids
    if (res.data.portrait_ids) {
      APP.portraitIds = res.data.portrait_ids;
    }

    var totalAll = APP.results.length + APP.similarResults.length;
    document.getElementById('totalCount').textContent = totalAll;

    if (APP.results.length === 0 && APP.similarResults.length === 0) {
      document.getElementById('mainContent').style.display = 'block';
      document.getElementById('emptyTip').style.display = 'block';
      return;
    }

    renderGrid();
    renderSimilarGrid();
    document.getElementById('mainContent').style.display = 'block';

    // 预加载套餐信息
    fetchApi('packages', {bid: APP.bid}, 'GET', function(pkgRes) {
      if (pkgRes.code === 200) {
        APP.packages = pkgRes.data || [];
      }
    });
  });
}

function renderSimilarGrid() {
  if (APP.similarResults.length === 0) return;
  document.getElementById('similarSection').style.display = 'block';
  document.getElementById('similarDesc').textContent = '共' + APP.similarResults.length + '张';
  var grid = document.getElementById('similarGrid');
  var html = '';
  var offset = APP.results.length; // 全局偏移量
  for (var i = 0; i < APP.similarResults.length; i++) {
    var r = APP.similarResults[i];
    var globalIdx = offset + i;
    var isSelected = APP.selectedIds.indexOf(r.id) > -1;
    var typeText = r.type === 19 ? '视频' : '';
    html += '<div class="grid-item" data-id="' + r.id + '" onclick="toggleSelect(' + r.id + ')">' +
      '<div style="width:100%;height:100%;background:url(\'' + r.thumbnail_url + '\') center/cover no-repeat" class="thumb"></div>' +
      '<div class="overlay"></div>' +
      '<div class="check ' + (isSelected ? 'active' : '') + '" id="check_' + r.id + '">' +
        '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>' +
      '</div>' +
      (typeText ? '<span class="type-badge">' + typeText + '</span>' : '') +
      '<button class="zoom-btn" onclick="event.stopPropagation();openLightbox(' + globalIdx + ')">🔍</button>' +
    '</div>';
  }
  grid.innerHTML = html;
}

function renderGrid() {
  var grid = document.getElementById('photoGrid');
  var html = '';
  for (var i = 0; i < APP.results.length; i++) {
    var r = APP.results[i];
    var isSelected = APP.selectedIds.indexOf(r.id) > -1;
    var typeText = r.type === 19 ? '视频' : '';
    html += '<div class="grid-item" data-id="' + r.id + '" onclick="toggleSelect(' + r.id + ')">' +
      '<div style="width:100%;height:100%;background:url(\'' + r.thumbnail_url + '\') center/cover no-repeat" class="thumb"></div>' +
      '<div class="overlay"></div>' +
      '<div class="check ' + (isSelected ? 'active' : '') + '" id="check_' + r.id + '">' +
        '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>' +
      '</div>' +
      (typeText ? '<span class="type-badge">' + typeText + '</span>' : '') +
      '<button class="zoom-btn" onclick="event.stopPropagation();openLightbox(' + i + ')">🔍</button>' +
    '</div>';
  }
  grid.innerHTML = html;
}

// ========== 选片操作 ==========

function toggleSelect(id) {
  var idx = APP.selectedIds.indexOf(id);
  if (idx > -1) {
    APP.selectedIds.splice(idx, 1);
  } else {
    APP.selectedIds.push(id);
  }
  var el = document.getElementById('check_' + id);
  if (el) el.classList.toggle('active');
  onSelectionChanged();
}

function toggleSelectAll() {
  var allItems = APP.allResults;
  var isAllSelected = APP.selectedIds.length === allItems.length;
  if (isAllSelected) {
    // 取消全选
    APP.selectedIds = [];
  } else {
    // 全选（包含我的成片 + 推荐成片）
    APP.selectedIds = allItems.map(function(r) { return r.id; });
  }
  // 更新所有勾选框
  for (var i = 0; i < allItems.length; i++) {
    var el = document.getElementById('check_' + allItems[i].id);
    if (el) {
      if (APP.selectedIds.indexOf(allItems[i].id) > -1) {
        el.classList.add('active');
      } else {
        el.classList.remove('active');
      }
    }
  }
  onSelectionChanged();
}

function onSelectionChanged() {
  var count = APP.selectedIds.length;
  document.getElementById('selectedCount').textContent = count;

  // 更新全选按钮状态
  var allBtn = document.getElementById('selectAllBtn');
  if (count === APP.allResults.length && count > 0) {
    allBtn.classList.add('active');
  } else {
    allBtn.classList.remove('active');
  }

  if (count > 0) {
    document.getElementById('bottomBar').style.display = 'block';
    updatePricing();
  } else {
    document.getElementById('bottomBar').style.display = 'none';
  }
}

// ========== 自动价格计算 ==========

function updatePricing() {
  var count = APP.selectedIds.length;
  fetchApi('recommend', {selected_count: count, video_count: 0, bid: APP.bid}, 'POST', function(res) {
    if (res.code !== 200) return;
    APP.recommendData = res.data;
    APP.singlePrice = res.data.single_price || 0;

    var guide = document.getElementById('barGuide');
    var priceEl = document.getElementById('barPrice');
    var origPriceWrap = document.getElementById('barOrigPrice');
    var origPriceVal = document.getElementById('barOrigPriceVal');
    var desc = document.getElementById('barDesc');
    var btn = document.getElementById('barBtn');

    var singleTotal = res.data.single_total; // 原价（按单张价格×数量）
    var finalPrice = singleTotal;
    var unitPrice = res.data.single_price;
    var descText = count + '张 × ¥' + res.data.single_price + '/张';
    var showOrig = false;

    // 如果有推荐档位
    if (res.data.recommended) {
      var pkg = res.data.recommended;
      APP.selectedPackageId = pkg.id;

      // 检查是否为无上限档位（max_num=0）
      if (pkg.is_unlimited || (pkg.max_num !== undefined && pkg.max_num == 0)) {
        // 无上限档位：按单价 × 数量计费
        unitPrice = parseFloat(pkg.unit_price) || 0;
        finalPrice = Math.round(unitPrice * count * 100) / 100;
      } else {
        // 有上限档位：直接使用档位固定价格
        finalPrice = parseFloat(pkg.price);
        finalPrice = Math.round(finalPrice * 100) / 100;
        unitPrice = Math.round(finalPrice / count * 100) / 100;
      }
      
      // 如果后端已经计算好 final_price，直接使用
      if (pkg.final_price !== undefined) {
        finalPrice = parseFloat(pkg.final_price);
        unitPrice = Math.round(finalPrice / count * 100) / 100;
      }
      
      // 展示档位名称
      var tierName = pkg.tier_name || pkg.name || '';
      descText = '折合¥' + unitPrice + '/张 · ' + tierName;

      if (singleTotal > finalPrice) {
        showOrig = true;
      }
    } else {
      APP.selectedPackageId = 0;
    }

    // 免费模式：价格归零
    if (APP.freePick) {
      finalPrice = 0;
      unitPrice = 0;
      showOrig = false;
      descText = '免费选片（' + count + '张）';
    }

    // 更新UI
    priceEl.textContent = finalPrice.toFixed(2);
    if (showOrig) {
      origPriceVal.textContent = singleTotal.toFixed(2);
      origPriceWrap.style.display = 'inline';
    } else {
      origPriceWrap.style.display = 'none';
    }
    desc.textContent = descText;

    guide.textContent = res.data.guide_text || '';
    guide.style.display = res.data.guide_text ? 'block' : 'none';

    btn.textContent = APP.freePick ? '免费下载(' + count + '张)' : ('立即支付 ¥' + finalPrice.toFixed(2));
    if (!APP.paying) {
      btn.disabled = false;
    }
  });
}

// ========== 下单支付 ==========

function submitOrder() {
  if (APP.selectedIds.length === 0) { alert('请至少选择一张照片'); return; }
  if (APP.paying) return;
  APP.paying = true;

  var btn = document.getElementById('barBtn');
  btn.disabled = true;
  btn.textContent = '创建订单中...';

  fetchApi('order', {
    portrait_id: APP.portraitId,
    portrait_ids: APP.storeMode ? APP.portraitIds : undefined,
    result_ids: APP.selectedIds,
    package_id: APP.selectedPackageId,
    aid: APP.aid,
    bid: APP.bid,
    qrcode_id: APP.qrcodeId,
    mdid: APP.mdid
  }, 'POST', function(res) {
    if (res.code !== 200) {
      alert(res.msg || '下单失败');
      resetPayBtn();
      return;
    }
    // 免费模式：跳过支付，直接跳转下载页
    if (res.data && res.data.is_free) {
      btn.textContent = '免费下载中...';
      window.location.href = window.location.origin + '/public/pick/download.html?order_no=' + encodeURIComponent(res.data.order_no);
      return;
    }
    startPay(res.data.order_no);
  });
}

function startPay(orderNo) {
  var btn = document.getElementById('barBtn');
  btn.textContent = '跳转支付中...';

  // 跳转到 /h5/ 目录下的收银台页面（在已注册的微信JSAPI支付授权目录 https://ai.eivie.cn/h5/ 下）
  var qrOrStore = APP.storeMode ? ('mode=store&bid=' + APP.bid + '&mdid=' + APP.mdid) : ('qr=' + encodeURIComponent(APP.qr));
  var cashierUrl = '/h5/cashier.html?order_no=' + encodeURIComponent(orderNo) + '&' + qrOrStore;
  window.location.href = cashierUrl;
}

function resetPayBtn() {
  APP.paying = false;
  var btn = document.getElementById('barBtn');
  btn.disabled = false;
  var price = document.getElementById('barPrice').textContent;
  btn.textContent = APP.freePick ? '免费下载(' + APP.selectedIds.length + '张)' : ('立即支付 ¥' + price);
}

function pollPayStatus(orderNo) {
  var attempts = 0;
  var maxAttempts = 30;
  var timer = setInterval(function() {
    attempts++;
    fetchApi('pay_status', {order_no: orderNo}, 'GET', function(res) {
      if (res.code === 200 && res.data.status === 'paid') {
        clearInterval(timer);
        window.location.href = window.location.origin + '/public/pick/download.html?order_no=' + orderNo;
      }
    });
    if (attempts >= maxAttempts) {
      clearInterval(timer);
      window.location.href = window.location.origin + '/public/pick/download.html?order_no=' + orderNo;
    }
  }, 2000);
}

function showError(msg) {
  document.getElementById('loadingMask').style.display = 'none';
  document.getElementById('errorTip').style.display = 'block';
  document.getElementById('errorMsg').textContent = msg || '加载失败';
}

// API请求工具
function fetchApi(action, params, method, callback) {
  var url = APP.apiBase + action;
  var xhr = new XMLHttpRequest();

  if (method === 'GET') {
    var qs = Object.keys(params).map(function(k) { return k + '=' + encodeURIComponent(params[k]); }).join('&');
    if (qs) url += '&' + qs;
    xhr.open('GET', url, true);
    xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');
    xhr.onload = function() {
      try { callback(JSON.parse(xhr.responseText)); } catch(e) { callback({code:500,msg:'解析失败'}); }
    };
    xhr.onerror = function() { callback({code:500,msg:'网络错误'}); };
    xhr.send();
  } else {
    xhr.open('POST', url, true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');
    xhr.onload = function() {
      try { callback(JSON.parse(xhr.responseText)); } catch(e) { callback({code:500,msg:'解析失败'}); }
    };
    xhr.onerror = function() { callback({code:500,msg:'网络错误'}); };
    xhr.send(JSON.stringify(params));
  }
}

// ========== Lightbox 放大预览 ==========
var LB = { index: 0, open: false, touchStartX: 0, touchStartY: 0, wmCache: {}, faceApiReady: false, faceApiLoading: false };

// ========== face-api.js 加载和人脸检测水印 ==========
var FACE_API_CDN = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js';
var FACE_MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights/';

function loadFaceApi(cb) {
  if (LB.faceApiReady) { cb && cb(); return; }
  if (LB.faceApiLoading) { var t = setInterval(function(){ if(LB.faceApiReady){clearInterval(t);cb&&cb();} }, 200); return; }
  LB.faceApiLoading = true;
  var s = document.createElement('script');
  s.src = FACE_API_CDN;
  s.onload = function() {
    faceapi.nets.tinyFaceDetector.loadFromUri(FACE_MODEL_URL).then(function() {
      LB.faceApiReady = true;
      LB.faceApiLoading = false;
      cb && cb();
    }).catch(function() {
      LB.faceApiLoading = false;
      cb && cb();
    });
  };
  s.onerror = function() { LB.faceApiLoading = false; cb && cb(); };
  document.head.appendChild(s);
}

function drawWatermarkCanvas(imgSrc, itemId, callback) {
  // 检查缓存
  if (LB.wmCache[itemId]) { callback(LB.wmCache[itemId]); return; }

  var img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    var canvas = document.createElement('canvas');
    var cw = img.naturalWidth, ch = img.naturalHeight;
    canvas.width = cw; canvas.height = ch;
    var ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, cw, ch);

    // 检测人脸
    if (!LB.faceApiReady || typeof faceapi === 'undefined') {
      applyTextWatermark(ctx, cw, ch, []);
      LB.wmCache[itemId] = canvas;
      callback(canvas);
      return;
    }

    var options = new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.35 });
    faceapi.detectAllFaces(canvas, options).then(function(detections) {
      var faceRects = detections.map(function(d) {
        var b = d.box;
        // 扩大人脸区域30%作为保护区
        var pad = Math.max(b.width, b.height) * 0.3;
        return {
          x: Math.max(0, b.x - pad),
          y: Math.max(0, b.y - pad),
          w: Math.min(cw, b.width + pad * 2),
          h: Math.min(ch, b.height + pad * 2)
        };
      });
      applyTextWatermark(ctx, cw, ch, faceRects);
      LB.wmCache[itemId] = canvas;
      callback(canvas);
    }).catch(function() {
      applyTextWatermark(ctx, cw, ch, []);
      LB.wmCache[itemId] = canvas;
      callback(canvas);
    });
  };
  img.onerror = function() { callback(null); };
  img.src = imgSrc;
}

function applyTextWatermark(ctx, cw, ch, faceRects) {
  var text = APP.mpNickname || '版权保护';
  // 密集水印网格
  var fontSize = Math.max(14, Math.round(Math.min(cw, ch) * 0.028));
  ctx.save();
  ctx.font = fontSize + 'px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  var spacing = fontSize * 5;
  var angle = -Math.PI / 6; // -30度

  // 计算对角线长度确保覆盖旋转后的区域
  var diag = Math.sqrt(cw * cw + ch * ch);

  for (var y = -diag; y < diag * 2; y += spacing) {
    for (var x = -diag; x < diag * 2; x += spacing) {
      // 计算旋转后的实际坐标
      var rx = x * Math.cos(angle) - y * Math.sin(angle);
      var ry = x * Math.sin(angle) + y * Math.cos(angle);

      // 检查是否在人脸保护区内
      if (isInFaceRect(rx, ry, faceRects)) continue;

      ctx.save();
      ctx.translate(rx, ry);
      ctx.rotate(angle);
      ctx.fillText(text, 0, 0);
      ctx.restore();
    }
  }
  ctx.restore();
}

function isInFaceRect(x, y, rects) {
  for (var i = 0; i < rects.length; i++) {
    var r = rects[i];
    if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) return true;
  }
  return false;
}

function openLightbox(idx) {
  if (APP.allResults.length === 0) return;
  LB.index = Math.max(0, Math.min(idx, APP.allResults.length - 1));
  LB.open = true;
  renderLightbox();
  document.getElementById('lightboxMask').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  LB.open = false;
  document.getElementById('lightboxMask').classList.remove('show');
  document.body.style.overflow = '';
  // 停止视频播放并清理内容
  var wrap = document.getElementById('lightboxImgWrap');
  var vid = wrap.querySelector('video');
  if (vid) vid.pause();
  wrap.innerHTML = '';
}

function lightboxNav(dir) {
  var newIdx = LB.index + dir;
  if (newIdx < 0 || newIdx >= APP.allResults.length) return;
  LB.index = newIdx;
  renderLightbox();
}

function renderLightbox() {
  var item = APP.allResults[LB.index];
  var wrap = document.getElementById('lightboxImgWrap');
  var previewUrl = item.preview_url || item.thumbnail_url || '';
  var isVideo = (item.type === 19) && previewUrl && (/\.(mp4|webm|mov)/i.test(previewUrl) || previewUrl.indexOf('video') > -1);

  if (isVideo) {
    wrap.innerHTML = '<video src="' + previewUrl + '" autoplay muted loop playsinline style="max-width:100%;max-height:100%;object-fit:contain"></video>';
  } else if (APP.faceWatermarkEnabled && !isVideo) {
    // 水印模式：显示loading→检测人脸→绘制水印canvas→允许缩放
    wrap.innerHTML = '<div class="lightbox-loading" id="wmLoading"><div class="spinner"></div><p>正在加载高清预览...</p></div>';
    loadFaceApi(function() {
      // 确保没有切换到其他图片
      if (APP.allResults[LB.index] !== item) return;
      drawWatermarkCanvas(previewUrl, item.id, function(canvas) {
        if (APP.allResults[LB.index] !== item) return;
        if (!canvas) {
          wrap.innerHTML = '<img src="' + previewUrl + '" alt="">';
          return;
        }
        // 可缩放容器
        wrap.innerHTML = '';
        var zoomWrap = document.createElement('div');
        zoomWrap.className = 'wm-zoom-wrap';
        zoomWrap.id = 'wmZoomWrap';
        // 设置 canvas 显示尺寸自适应
        var maxW = wrap.clientWidth - 16;
        var maxH = wrap.clientHeight;
        var ratio = Math.min(maxW / canvas.width, maxH / canvas.height, 1);
        canvas.style.width = Math.round(canvas.width * ratio) + 'px';
        canvas.style.height = Math.round(canvas.height * ratio) + 'px';
        canvas.id = 'wmCanvas';
        zoomWrap.appendChild(canvas);
        wrap.appendChild(zoomWrap);
        initCanvasZoom(zoomWrap, canvas, ratio);
      });
    });
  } else {
    wrap.innerHTML = '<img src="' + previewUrl + '" alt="">';
  }

  // 更新计数器
  document.getElementById('lightboxCounter').textContent = (LB.index + 1) + ' / ' + APP.allResults.length;

  // 更新箭头显隐
  document.getElementById('lightboxPrev').style.display = LB.index > 0 ? 'flex' : 'none';
  document.getElementById('lightboxNext').style.display = LB.index < APP.allResults.length - 1 ? 'flex' : 'none';

  // 更新勾选按钮状态
  var isSelected = APP.selectedIds.indexOf(item.id) > -1;
  var selectBtn = document.getElementById('lightboxSelectBtn');
  selectBtn.className = 'lightbox-select-btn' + (isSelected ? ' active' : '');
  selectBtn.innerHTML = (isSelected ? '✔ 已选' : '✔ 选片');
}

// ========== Canvas 缩放交互（双击缩放 + 双指缩放 + 平移） ==========
function initCanvasZoom(container, canvas, initRatio) {
  var state = { scale: 1, minScale: 1, maxScale: 4, tx: 0, ty: 0, dragging: false, lastX: 0, lastY: 0 };
  var pinch = { active: false, startDist: 0, startScale: 1 };
  var lastTap = 0;

  function clampTranslate() {
    var cw = parseFloat(canvas.style.width) * state.scale;
    var ch = parseFloat(canvas.style.height) * state.scale;
    var ww = container.clientWidth;
    var wh = container.clientHeight;
    if (cw <= ww) { state.tx = (ww - cw) / 2; }
    else { state.tx = Math.min(0, Math.max(ww - cw, state.tx)); }
    if (ch <= wh) { state.ty = (wh - ch) / 2; }
    else { state.ty = Math.min(0, Math.max(wh - ch, state.ty)); }
  }

  function applyTransform() {
    canvas.style.transform = 'translate(' + state.tx + 'px,' + state.ty + 'px) scale(' + state.scale + ')';
  }

  // 初始居中
  clampTranslate();
  applyTransform();

  // 双击缩放
  container.addEventListener('touchstart', function(e) {
    if (e.touches.length === 2) {
      pinch.active = true;
      pinch.startDist = getTouchDist(e);
      pinch.startScale = state.scale;
      e.preventDefault();
      return;
    }
    var now = Date.now();
    if (now - lastTap < 300) {
      // 双击
      e.preventDefault();
      if (state.scale > 1.1) {
        state.scale = 1; state.tx = 0; state.ty = 0;
      } else {
        state.scale = 2.5;
        // 以触摸点为中心放大
        var rect = container.getBoundingClientRect();
        var px = e.touches[0].clientX - rect.left;
        var py = e.touches[0].clientY - rect.top;
        state.tx = px - px * state.scale;
        state.ty = py - py * state.scale;
      }
      clampTranslate();
      applyTransform();
      lastTap = 0;
      return;
    }
    lastTap = now;

    if (state.scale > 1.05) {
      state.dragging = true;
      state.lastX = e.touches[0].clientX;
      state.lastY = e.touches[0].clientY;
      e.preventDefault();
    }
  }, { passive: false });

  container.addEventListener('touchmove', function(e) {
    if (pinch.active && e.touches.length === 2) {
      var dist = getTouchDist(e);
      var newScale = pinch.startScale * (dist / pinch.startDist);
      state.scale = Math.max(state.minScale, Math.min(state.maxScale, newScale));
      clampTranslate();
      applyTransform();
      e.preventDefault();
      return;
    }
    if (state.dragging) {
      var dx = e.touches[0].clientX - state.lastX;
      var dy = e.touches[0].clientY - state.lastY;
      state.tx += dx;
      state.ty += dy;
      state.lastX = e.touches[0].clientX;
      state.lastY = e.touches[0].clientY;
      clampTranslate();
      applyTransform();
      e.preventDefault();
    }
  }, { passive: false });

  container.addEventListener('touchend', function(e) {
    if (pinch.active && e.touches.length < 2) { pinch.active = false; }
    state.dragging = false;
  }, { passive: true });

  function getTouchDist(e) {
    var dx = e.touches[0].clientX - e.touches[1].clientX;
    var dy = e.touches[0].clientY - e.touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }
}

function lightboxToggleSelect() {
  var item = APP.allResults[LB.index];
  toggleSelect(item.id);
  // 更新Lightbox内的勾选状态
  var isSelected = APP.selectedIds.indexOf(item.id) > -1;
  var selectBtn = document.getElementById('lightboxSelectBtn');

  selectBtn.innerHTML = (isSelected ? '✔ 已选' : '✔ 选片');
}

// Lightbox 键盘事件
document.addEventListener('keydown', function(e) {
  if (!LB.open) return;
  if (e.key === 'Escape') closeLightbox();
  else if (e.key === 'ArrowLeft') lightboxNav(-1);
  else if (e.key === 'ArrowRight') lightboxNav(1);
});

// Lightbox 触屏滑动
(function() {
  var mask = document.getElementById('lightboxMask');
  var imgWrap = document.getElementById('lightboxImgWrap');

  imgWrap.addEventListener('touchstart', function(e) {
    if (document.getElementById('wmZoomWrap')) return; // 缩放模式下不处理滑动切换
    LB.touchStartX = e.touches[0].clientX;
    LB.touchStartY = e.touches[0].clientY;
  }, {passive: true});

  imgWrap.addEventListener('touchend', function(e) {
    if (document.getElementById('wmZoomWrap')) return; // 缩放模式下不处理滑动切换
    var dx = e.changedTouches[0].clientX - LB.touchStartX;
    var dy = e.changedTouches[0].clientY - LB.touchStartY;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
      if (dx < 0) lightboxNav(1);  // 左滑 → 下一张
      else lightboxNav(-1);        // 右滑 → 上一张
    }
  }, {passive: true});

  // 点击遮罩关闭（排除图片、箭头、底栏等）
  mask.addEventListener('click', function(e) {
    if (e.target === mask) closeLightbox();
  });
})();

// 禁止长按保存图片
document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
document.addEventListener('touchstart', function(e) {
  if (e.touches.length > 1) e.preventDefault();
}, {passive: false});

// ========== 我的订单 ==========
var myOrdersLoaded = false;

function openMyOrders() {
  document.getElementById('ordersOverlay').classList.add('show');
  document.getElementById('ordersPanel').classList.add('show');
  document.body.style.overflow = 'hidden';
  if (!myOrdersLoaded) {
    loadMyOrders();
  }
}

function closeMyOrders() {
  document.getElementById('ordersOverlay').classList.remove('show');
  document.getElementById('ordersPanel').classList.remove('show');
  document.body.style.overflow = '';
}

function loadMyOrders() {
  var listEl = document.getElementById('ordersList');
  listEl.innerHTML = '<div class="orders-loading"><div class="spinner"></div><p>加载中...</p></div>';

  fetchApi('my_orders', {}, 'GET', function(res) {
    if (res.code === 401) {
      listEl.innerHTML = '<div class="orders-empty"><div class="empty-icon">🔒</div><p>请先扫码授权后查看</p></div>';
      return;
    }
    if (res.code !== 200) {
      listEl.innerHTML = '<div class="orders-empty"><div class="empty-icon">⚠️</div><p>' + (res.msg || '加载失败') + '</p></div>';
      return;
    }
    var list = res.data || [];
    if (list.length === 0) {
      listEl.innerHTML = '<div class="orders-empty"><div class="empty-icon">📦</div><p>暂无已支付订单</p></div>';
      return;
    }
    // 更新徽章
    var badge = document.getElementById('ordersBadge');
    badge.textContent = list.length;
    badge.style.display = 'inline-block';

    var html = '';
    for (var i = 0; i < list.length; i++) {
      var o = list[i];
      var statusClass = o.status === 2 ? 'completed' : 'paid';
      var coverHtml = o.cover_image
        ? '<img class="order-cover" src="' + o.cover_image + '" alt="">'
        : '<div class="order-cover" style="display:flex;align-items:center;justify-content:center;font-size:24px;background:#f0f0f0">🖼️</div>';
      html += '<div class="order-card" onclick="goOrderDownload(\'' + o.order_no + '\')">' +
        coverHtml +
        '<div class="order-info">' +
          '<div class="order-top">' +
            '<span class="order-pkg">' + o.package_name + '</span>' +
            '<span class="order-status ' + statusClass + '">' + o.status_text + '</span>' +
          '</div>' +
          '<div class="order-meta">' +
            '<span>📷 ' + o.selected_count + '张</span>' +
            '<span>' + o.pay_time + '</span>' +
          '</div>' +
          '<div class="order-bottom">' +
            '<span class="order-amount">¥' + parseFloat(o.actual_amount).toFixed(2) + '</span>' +
            '<span class="order-download">查看下载 ›</span>' +
          '</div>' +
        '</div>' +
      '</div>';
    }
    listEl.innerHTML = html;
    myOrdersLoaded = true;
  });
}

// ========== "不是我的照片" - 解除关联 ==========
function notMyPhotos() {
  if (!confirm('确认这不是您的照片吗？\n\n点击确认后将解除关联，您需要重新扫码才能进入选片中心。')) return;

  fetchApi('not_my_photos', {
    portrait_id: APP.portraitId,
    qr: APP.qr
  }, 'POST', function(res) {
    if (res.code === 200) {
      showRescanPage();
    } else {
      alert(res.msg || '操作失败，请重试');
    }
  });
}

function showRescanPage() {
  // 隐藏主内容和底部栏
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('bottomBar').style.display = 'none';
  document.getElementById('similarSection').style.display = 'none';

  var tip = document.getElementById('rescanTip');
  if (!tip) {
    tip = document.createElement('div');
    tip.id = 'rescanTip';
    tip.className = 'expired';
    tip.style.display = 'flex';
    tip.innerHTML = '<div class="rescan-card">' +
      '<div class="rescan-icon">✓</div>' +
      '<div class="rescan-title">已解除关联</div>' +
      '<div class="rescan-subtitle">请重新扫描您的专属二维码<br>进入选片中心</div>' +
      '<div style="font-size:13px;color:#999;margin-bottom:4px">您可以关闭此页面后重新扫码</div>' +
      '<div class="rescan-divider"></div>' +
      '<div class="rescan-hint">如果在屏幕上没有看到您的头像，<br>点击下方按钮<em>重新拍摄</em>进行旅拍打卡</div>' +
      '<button class="retake-btn" onclick="openRetakeModal()" style="margin-top:18px;padding:16px 40px;font-size:16px;width:100%;justify-content:center">📷 我要重拍</button>' +
      '</div>';
    document.body.appendChild(tip);
  } else {
    tip.style.display = 'flex';
  }
}

// ========== "我要重拍" - 弹窗交互 ==========

// 当前选中的重拍模式
var retakeMode = ''; // 'album' 或 'camera'

function openRetakeModal() {
  document.getElementById('retakeOverlay').classList.add('show');
  document.getElementById('retakeOptions').style.display = 'flex';
  document.getElementById('retakeUploading').style.display = 'none';
  document.getElementById('retakeError').style.display = 'none';
  retakeMode = '';
}

function closeRetakeModal() {
  document.getElementById('retakeOverlay').classList.remove('show');
  // 重置文件input
  var fi = document.getElementById('retakeFileInput');
  fi.value = '';
  retakeMode = '';
}

function retakeFromAlbum() {
  retakeMode = 'album';
  var fi = document.getElementById('retakeFileInput');
  fi.removeAttribute('capture');
  fi.accept = 'image/jpeg,image/png';
  fi.click();
}

function retakeFromCamera() {
  retakeMode = 'camera';
  var fi = document.getElementById('retakeFileInput');
  fi.setAttribute('capture', 'environment');
  fi.accept = 'image/*';
  fi.click();
}

function handleRetakeFileSelect(event) {
  var file = event.target.files[0];
  if (!file) return;

  // 显示上传中状态
  document.getElementById('retakeOptions').style.display = 'none';
  document.getElementById('retakeUploading').style.display = 'flex';
  document.getElementById('retakeError').style.display = 'none';

  // 构建 FormData
  var formData = new FormData();
  formData.append('image', file);
  formData.append('aid', APP.aid);
  formData.append('bid', APP.bid);
  formData.append('mdid', APP.mdid || 0);
  formData.append('portrait_id', APP.portraitId);

  // 使用 XHR 发送 multipart 请求（兼容微信浏览器）
  var url = APP.apiBase + 'retake_upload';
  var xhr = new XMLHttpRequest();
  xhr.open('POST', url, true);
  xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');
  // 不设置 Content-Type，让浏览器自动设置 multipart/form-data 的 boundary

  xhr.onload = function() {
    try {
      var res = JSON.parse(xhr.responseText);
      handleRetakeResponse(res);
    } catch(e) {
      handleRetakeError('服务响应异常，请重试');
    }
  };
  xhr.onerror = function() {
    handleRetakeError('网络错误，请重试');
  };
  xhr.ontimeout = function() {
    handleRetakeError('上传超时，请重试');
  };
  xhr.timeout = 60000; // 60秒超时
  xhr.send(formData);
}

function handleRetakeResponse(res) {
  if (res.code === 200) {
    // 更新当前 portraitId
    APP.portraitId = res.data.portrait_id;
    if (APP.portraitIds && APP.portraitIds.length) {
      APP.portraitIds = [res.data.portrait_id];
    }

    // 关闭弹窗
    document.getElementById('retakeOverlay').classList.remove('show');

    // 显示成功提示
    var successTip = document.createElement('div');
    successTip.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#fff;padding:16px 24px;border-radius:10px;font-size:15px;z-index:9999;text-align:center;white-space:nowrap';
    successTip.textContent = res.msg;
    document.body.appendChild(successTip);
    setTimeout(function() {
      successTip.style.opacity = '0';
      successTip.style.transition = 'opacity .4s';
      setTimeout(function() { document.body.removeChild(successTip); }, 400);
    }, 1500);

    // 刷新选片结果
    setTimeout(function() {
      loadResults();
    }, 800);
  } else {
    handleRetakeError(res.msg || '上传失败，请重试');
  }
}

function handleRetakeError(msg) {
  document.getElementById('retakeOptions').style.display = 'flex';
  document.getElementById('retakeUploading').style.display = 'none';
  var errEl = document.getElementById('retakeError');
  errEl.textContent = msg;
  errEl.style.display = 'block';
}

function goOrderDownload(orderNo) {
  window.location.href = '/public/pick/download.html?order_no=' + encodeURIComponent(orderNo);
}
