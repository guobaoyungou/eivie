<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>测试场景编辑页面</title>
</head>
<body>
    <h1>场景编辑页面语法测试</h1>
    <p>点击下面的按钮测试场景编辑页面是否正常加载</p>
    
    <button onclick="testSceneEdit()">测试场景编辑</button>
    <button onclick="testSceneList()">测试场景列表</button>
    
    <div id="result" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc;"></div>
    
    <script>
    function testSceneEdit() {
        var result = document.getElementById('result');
        result.innerHTML = '正在测试...';
        
        fetch('/?s=/AiTravelPhoto/scene_edit/id/4')
            .then(response => {
                result.innerHTML = '<h3>测试结果：</h3>';
                result.innerHTML += '<p>HTTP状态码: ' + response.status + '</p>';
                
                if (response.status === 500) {
                    result.innerHTML += '<p style="color: red;">✗ 服务器返回500错误，存在语法错误！</p>';
                    return response.text();
                } else if (response.status === 302 || response.status === 200) {
                    result.innerHTML += '<p style="color: green;">✓ 页面响应正常（可能需要登录）</p>';
                    return response.text();
                } else {
                    result.innerHTML += '<p>状态码: ' + response.status + '</p>';
                    return response.text();
                }
            })
            .then(html => {
                if (html.includes('ParseError') || html.includes('syntax error') || html.includes('unexpected')) {
                    result.innerHTML += '<p style="color: red;">✗ 发现语法错误！</p>';
                    result.innerHTML += '<pre style="background: #f5f5f5; padding: 10px; overflow: auto; max-height: 300px;">' + 
                                       html.substring(0, 2000) + '</pre>';
                } else if (html.includes('<title>')) {
                    result.innerHTML += '<p style="color: green;">✓ ✓ ✓ 页面编译成功，没有语法错误！</p>';
                }
            })
            .catch(err => {
                result.innerHTML += '<p style="color: red;">请求失败: ' + err.message + '</p>';
            });
    }
    
    function testSceneList() {
        window.location.href = '/?s=/AiTravelPhoto/scene_list';
    }
    </script>
</body>
</html>
