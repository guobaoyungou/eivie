<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI旅拍 · 自拍找照片</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;}
.page{width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;position:absolute;top:0;left:0;}
.page.active{display:flex;}
/* 加载页 */
#page-loading{background:#000;color:#fff;}
#page-loading .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#page-loading .text{margin-top:15px;font-size:14px;color:#ccc;}
.retry-btn{display:none;margin-top:20px;padding:10px 28px;border-radius:20px;border:1px solid rgba(255,255,255,.4);background:transparent;color:#fff;font-size:14px;cursor:pointer;}
.retry-btn:active{background:rgba(255,255,255,.1);}
/* 摄像头页 */
#page-camera{background:#000;}
#video-container{width:100%;height:100%;position:relative;overflow:hidden;}
#video-container video{width:100%;height:100%;object-fit:cover;}
/* 动态人脸框：圆角矩形 + 呼吸动画 + 平滑跟随 */
.face-guide{position:absolute;pointer-events:none;border:1.5px solid rgba(255,255,255,0.8);border-radius:12px;transition:left .15s ease-out,top .15s ease-out,width .15s ease-out,height .15s ease-out,border-color .3s ease;animation:faceBreath 2.5s ease-in-out infinite;opacity:0;z-index:5;}
.face-guide.detected{border-color:rgba(255,255,255,0.8);opacity:1;}
.face-guide.ready{border-color:rgba(34,217,119,0.75);opacity:1;}
@keyframes faceBreath{0%,100%{transform:scale(1);}50%{transform:scale(1.02);}}
/* 摄像头切换按钮 */
.camera-switch{position:absolute;top:60px;right:20px;width:44px;height:44px;background:rgba(0,0,0,0.25);border-radius:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;transition:transform .15s ease,opacity .3s ease;-webkit-tap-highlight-color:transparent;}
.camera-switch:active{transform:scale(0.9);}
.camera-switch svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
/* 底部渐变遮罩 + 拍摄控制区 */
.bottom-controls{position:absolute;bottom:0;left:0;right:0;height:160px;background:linear-gradient(to top,rgba(0,0,0,0.6),rgba(0,0,0,0));display:flex;align-items:flex-end;justify-content:center;padding-bottom:50px;z-index:10;pointer-events:none;}
.capture-btn{width:72px;height:72px;border-radius:36px;border:2.5px solid #FFFFFF;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:auto;transition:transform .15s ease;-webkit-tap-highlight-color:transparent;}
.capture-btn:active{transform:scale(0.9);}
.capture-btn .inner{width:56px;height:56px;border-radius:28px;background:rgba(255,255,255,0.9);}
.capture-btn.disabled{opacity:0.35;pointer-events:none;}
/* 闪白 */
.flash-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:#fff;opacity:0;pointer-events:none;transition:opacity .1s ease-out;z-index:20;}
.flash-overlay.flash{opacity:0.85;}
/* 预览确认页 */
#page-preview{background:#000;}
#page-preview .preview-container{width:100%;height:100%;position:relative;}
#page-preview .preview-img{width:100%;height:100%;object-fit:cover;}
#page-preview .preview-bottom{position:absolute;bottom:0;left:0;right:0;height:140px;background:linear-gradient(to top,rgba(0,0,0,0.7),rgba(0,0,0,0));display:flex;align-items:center;justify-content:center;gap:40px;padding-bottom:40px;}
#page-preview .preview-btn{display:flex;flex-direction:column;align-items:center;cursor:pointer;-webkit-tap-highlight-color:transparent;}
#page-preview .preview-btn .icon-circle{width:60px;height:60px;border-radius:30px;display:flex;align-items:center;justify-content:center;font-size:24px;transition:transform .15s ease;}
#page-preview .preview-btn .icon-circle:active{transform:scale(0.9);}
#page-preview .preview-btn .btn-label{color:#fff;font-size:13px;margin-top:8px;}
#page-preview .btn-retake .icon-circle{background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.5);}
#page-preview .btn-confirm .icon-circle{background:rgba(34,217,119,0.85);border:1.5px solid rgba(34,217,119,0.95);}
/* 比对中 */
#page-matching{background:rgba(0,0,0,.9);color:#fff;}
#page-matching .icon{font-size:48px;margin-bottom:15px;}
#page-matching .text{font-size:16px;}
/* 结果页 - 未命中 */
#page-nomatch{background:#f5f5f5;color:#333;padding:30px;}
.result-card{background:#fff;border-radius:12px;padding:25px;width:100%;max-width:360px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.1);}
.result-card h3{font-size:18px;margin-bottom:12px;}
.result-card p{font-size:14px;color:#666;margin-bottom:20px;line-height:1.6;}
.btn{display:inline-block;padding:12px 30px;border-radius:25px;font-size:15px;border:none;cursor:pointer;margin:5px;}
.btn-primary{background:linear-gradient(135deg,#1E9FFF,#0078D7);color:#fff;}
.btn-secondary{background:#f0f0f0;color:#666;}
.btn-success{background:linear-gradient(135deg,#4CAF50,#2E7D32);color:#fff;}
/* 等待页 */
#page-waiting{background:#f5f5f5;padding:30px;}
.progress-ring{width:120px;height:120px;margin:0 auto 20px;}
.progress-ring circle{transition:stroke-dashoffset .5s;}
.countdown{font-size:24px;font-weight:bold;color:#1E9FFF;}
.progress-text{font-size:13px;color:#999;margin-top:5px;}
/* 通知注册完成 */
#page-notify-done{background:#f5f5f5;padding:30px;}
.success-icon{font-size:64px;color:#4CAF50;margin-bottom:15px;}
</style>
</head>
<body>

<!-- 页面1：加载中 -->
<div class="page active" id="page-loading">
  <div class="spinner"></div>
  <div class="text">正在启动摄像头...</div>
  <button class="retry-btn" id="retryBtn" onclick="retryInit()">重试</button>
</div>

<!-- 页面2：摄像头预览+人脸检测 -->
<div class="page" id="page-camera">
  <div id="video-container">
    <video id="video" autoplay playsinline muted></video>
    <div class="face-guide" id="faceGuide"></div>
    <div class="flash-overlay" id="flashOverlay"></div>
    <!-- 右上角摄像头切换 -->
    <div class="camera-switch" id="switchCamera" onclick="toggleCamera()">
      <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="14" rx="2" ry="2"/><circle cx="12" cy="13" r="3.5"/><polyline points="7 3 9 6 15 6 17 3"/><path d="M19 10h2M3 10H1"/></svg>
    </div>
    <!-- 底部拍摄控制区 -->
    <div class="bottom-controls">
      <div class="capture-btn" id="captureBtn" onclick="manualCapture()">
        <div class="inner"></div>
      </div>
    </div>
    <!-- 笑脸自动抓拍指示器 -->
    <div id="smileIndicator" style="position:absolute;top:60px;left:20px;padding:5px 12px;background:rgba(34,217,119,0.75);border-radius:14px;font-size:12px;color:#fff;z-index:10;display:none;">😊 笑脸自动抓拍已就绪</div>
  </div>
</div>

<!-- 页面2.5：拍摄预览确认 -->
<div class="page" id="page-preview">
  <div class="preview-container">
    <img id="previewImg" class="preview-img" src="" alt="预览">
    <div class="preview-bottom">
      <div class="preview-btn btn-retake" onclick="retakeCapture()">
        <div class="icon-circle">↺</div>
        <span class="btn-label">重拍</span>
      </div>
      <div class="preview-btn btn-confirm" onclick="confirmCapture()">
        <div class="icon-circle">✓</div>
        <span class="btn-label">确定</span>
      </div>
    </div>
  </div>
</div>

<!-- 页面3：比对中 -->
<div class="page" id="page-matching">
  <div class="spinner"></div>
  <div class="text" style="margin-top:15px;">正在搜索您的旅拍照片...</div>
</div>

<!-- 页面4：未命中 - 选择等待/通知 -->
<div class="page" id="page-nomatch">
  <div class="result-card">
    <h3>📸 照片正在生成中</h3>
    <p>暂未找到您的旅拍成片，系统正在为您生成，预计需要 <span id="estimatedTime">--</span> 秒</p>
    <button class="btn btn-primary" onclick="startWaiting()">继续等待</button>
    <button class="btn btn-secondary" onclick="registerNotify()">找到后通知我</button>
  </div>
</div>

<!-- 页面5：等待合成 -->
<div class="page" id="page-waiting">
  <div class="result-card">
    <h3>⏳ 合成中，请稍候</h3>
    <div class="progress-ring">
      <svg width="120" height="120">
        <circle cx="60" cy="60" r="54" fill="none" stroke="#e0e0e0" stroke-width="6"/>
        <circle id="progressCircle" cx="60" cy="60" r="54" fill="none" stroke="#1E9FFF" stroke-width="6" stroke-linecap="round" stroke-dasharray="339.29" stroke-dashoffset="339.29" transform="rotate(-90 60 60)"/>
      </svg>
    </div>
    <div class="countdown" id="progressPercent">0%</div>
    <div class="progress-text" id="progressDetail">正在处理中...</div>
    <div style="margin-top:20px;">
      <button class="btn btn-secondary" onclick="registerNotify()">找到后通知我</button>
    </div>
  </div>
</div>

<!-- 页面6：通知注册完成 -->
<div class="page" id="page-notify-done">
  <div class="result-card">
    <div class="success-icon">✅</div>
    <h3>通知已注册</h3>
    <p>照片准备好后，我们将通过公众号消息通知您，届时可直接选片付费下载。</p>
    <p style="font-size:12px;color:#999;">您可以关闭此页面</p>
  </div>
</div>

<!-- face-api.js 延迟加载：不在页面初始化时加载，30秒后静默加载 -->
<script>
(function(){
  // ===== 全局状态 =====
  var STATE = {
    aid: 0, bid: 0, mdid: 0,
    openid: '',
    portraitId: 0,
    facingMode: 'user',
    stream: null,
    captured: false,
    pollTimer: null,
    capturedImage: null,
    capturedDescriptor: null,
    // 模型相关状态
    modelsLoaded: false,
    modelsLoading: false,
    detecting: false,
    lastDescriptor: null,
    faceReady: false,
    smileAutoEnabled: false
  };

  var API_BASE = '/index.php?s=/api/ai_travel_photo/selfie/';

  // ===== 工具函数 =====
  function getUrlParam(key) {
    var reg = new RegExp('(^|&)' + key + '=([^&]*)(&|$)');
    var r = window.location.search.substr(1).match(reg);
    return r ? decodeURIComponent(r[2]) : '';
  }

  function showPage(id) {
    document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
  }

  function apiGet(action, params) {
    var qs = '';
    if(params) {
      var arr = [];
      for(var k in params) arr.push(k + '=' + encodeURIComponent(params[k]));
      qs = '&' + arr.join('&');
    }
    return fetch(API_BASE + action + qs, {credentials: 'include'}).then(function(r){return r.json();});
  }

  function apiPost(action, data) {
    return fetch(API_BASE + action, {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      credentials: 'include',
      body: typeof data === 'string' ? data : Object.keys(data).map(function(k){return k+'='+encodeURIComponent(data[k]);}).join('&')
    }).then(function(r){return r.json();});
  }

  // ===== 初始化：立即启动摄像头，不等模型 =====
  function init() {
    STATE.aid = parseInt(getUrlParam('aid')) || 0;
    STATE.bid = parseInt(getUrlParam('bid')) || 0;
    STATE.mdid = parseInt(getUrlParam('mdid')) || 0;

    if(!STATE.aid || !STATE.bid || !STATE.mdid) {
      showError('参数错误，请重新扫码');
      return;
    }

    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showError('您的浏览器不支持摄像头访问，请使用微信打开');
      return;
    }

    // 检查授权
    apiGet('index', {aid: STATE.aid, bid: STATE.bid, mdid: STATE.mdid}).then(function(res){
      if(res.code === 302) {
        window.location.href = API_BASE + 'start_oauth&aid=' + STATE.aid + '&bid=' + STATE.bid + '&mdid=' + STATE.mdid;
        return;
      }
      if(res.code !== 200) {
        showError(res.msg || '加载失败');
        return;
      }
      STATE.openid = res.data.openid;

      // 检查用户是否已有合成完成的成片，有则直接跳转选片页
      if(res.data.has_completed && res.data.store_pick_url) {
        window.location.href = res.data.store_pick_url;
        return;
      }

      // 立即启动摄像头，无需等待模型加载
      startCamera();
      // 30秒后静默加载笑脸检测模型
      setTimeout(function(){ silentLoadModels(); }, 30000);
    }).catch(function(e){
      showError('网络错误，请检查网络后重试', true);
    });
  }

  function showError(msg, showRetry) {
    document.querySelector('#page-loading .text').textContent = msg;
    document.querySelector('#page-loading .spinner').style.display = 'none';
    if(showRetry) document.getElementById('retryBtn').style.display = 'inline-block';
  }

  window.retryInit = function() {
    document.querySelector('#page-loading .spinner').style.display = 'block';
    document.getElementById('retryBtn').style.display = 'none';
    document.querySelector('#page-loading .text').textContent = '正在重新启动...';
    init();
  };

  // ===== 摄像头：立即启动，无需模型 =====
  function startCamera() {
    var constraints = {
      video: {
        facingMode: STATE.facingMode,
        width: {ideal: 4096},
        height: {ideal: 4096}
      },
      audio: false
    };
    navigator.mediaDevices.getUserMedia(constraints).then(function(stream){
      STATE.stream = stream;
      var video = document.getElementById('video');
      video.srcObject = stream;
      video.onloadedmetadata = function(){
        video.play();
        video.style.transform = (STATE.facingMode === 'user') ? 'scaleX(-1)' : 'none';
        showPage('page-camera');
        STATE.captured = false;
        // 手动拍摄按钮立即可用，无需等待模型
        var btn = document.getElementById('captureBtn');
        btn.classList.remove('disabled');
        // 如果模型已加载，启动人脸检测循环
        if(STATE.modelsLoaded) {
          startDetection();
        }
      };
    }).catch(function(e){
      showError('无法访问摄像头，请检查摄像头权限', true);
    });
  }

  window.toggleCamera = function() {
    STATE.facingMode = STATE.facingMode === 'user' ? 'environment' : 'user';
    if(STATE.stream) STATE.stream.getTracks().forEach(function(t){t.stop();});
    STATE.detecting = false;
    STATE.lastDescriptor = null;
    STATE.faceReady = false;
    var switchBtn = document.getElementById('switchCamera');
    switchBtn.style.opacity = '0.5';
    setTimeout(function(){ switchBtn.style.opacity = '1'; }, 400);
    startCamera();
  };

  // ===== 静默加载 face-api.js + 模型（30秒后触发） =====
  function silentLoadModels() {
    if(STATE.modelsLoaded || STATE.modelsLoading) return;
    STATE.modelsLoading = true;
    console.log('[Selfie] 30秒已到，开始静默加载face-api.js...');

    var localSrc = '/static/face-api/face-api.min.js';
    var cdnSrc = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js';

    function loadScript(src, onOk, onErr) {
      var s = document.createElement('script');
      s.src = src; s.onload = onOk; s.onerror = onErr;
      document.head.appendChild(s);
    }

    function onLibLoaded() {
      console.log('[Selfie] face-api.js库加载成功，开始加载模型...');
      loadFaceModels();
    }

    // 本地优先，CDN回退
    loadScript(localSrc, onLibLoaded, function(){
      console.log('[Selfie] 本地face-api.js加载失败，尝试CDN');
      loadScript(cdnSrc, onLibLoaded, function(){
        console.error('[Selfie] face-api.js加载失败');
        STATE.modelsLoading = false;
      });
    });
  }

  function loadFaceModels() {
    var localUrl = '/static/face-api/models';
    var cdnUrl = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights';

    loadModelsFromUrl(localUrl).then(function(){
      console.log('[Selfie] 本地模型加载成功');
      onModelsReady();
    }).catch(function(){
      console.log('[Selfie] 本地模型失败，尝试CDN');
      loadModelsFromUrl(cdnUrl).then(function(){
        console.log('[Selfie] CDN模型加载成功');
        onModelsReady();
      }).catch(function(){
        console.error('[Selfie] 模型加载失败，笑脸检测不可用');
        STATE.modelsLoading = false;
      });
    });
  }

  function loadModelsFromUrl(url) {
    return Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(url),
      faceapi.nets.faceLandmark68Net.loadFromUri(url),
      faceapi.nets.faceRecognitionNet.loadFromUri(url),
      faceapi.nets.faceExpressionNet.loadFromUri(url)  // 笑脸检测需要
    ]);
  }

  // 模型加载完成后的回调
  function onModelsReady() {
    STATE.modelsLoaded = true;
    STATE.modelsLoading = false;
    STATE.smileAutoEnabled = true;
    console.log('[Selfie] 模型就绪，笑脸自动抓拍已启用');
    // 显示笑脸指示器
    var indicator = document.getElementById('smileIndicator');
    if(indicator) {
      indicator.style.display = 'block';
      setTimeout(function(){ indicator.style.display = 'none'; }, 5000);
    }
    // 如果当前在摄像头页面且未拍摄，启动检测
    if(!STATE.captured && document.getElementById('page-camera').classList.contains('active')) {
      startDetection();
    }
  }

  // ===== 人脸检测 + 笑脸自动抓拍（模型加载后才运行） =====
  var guideTarget = { x: 0, y: 0, w: 0, h: 0 };
  var guideCurrent = { x: 0, y: 0, w: 0, h: 0 };
  var guideVisible = false;
  var readyTimer = null;
  var smileCooldown = false;

  function startDetection() {
    if(!STATE.modelsLoaded) return;
    STATE.detecting = true;
    STATE.lastDescriptor = null;
    STATE.faceReady = false;
    detectLoop();
  }

  function detectLoop() {
    if(!STATE.detecting || STATE.captured) return;
    if(!STATE.modelsLoaded) return;

    var video = document.getElementById('video');
    var options = new faceapi.TinyFaceDetectorOptions({inputSize: 320, scoreThreshold: 0.7});

    faceapi.detectSingleFace(video, options)
      .withFaceLandmarks()
      .withFaceDescriptor()
      .withFaceExpressions()
      .then(function(result){
        if(!STATE.detecting || STATE.captured) return;

        var guide = document.getElementById('faceGuide');
        var btn = document.getElementById('captureBtn');

        if(result) {
          var box = result.detection.box;
          var videoEl = video;
          var vpWidth = videoEl.videoWidth || videoEl.clientWidth;
          var vpHeight = videoEl.videoHeight || videoEl.clientHeight;
          var dispWidth = videoEl.clientWidth;
          var dispHeight = videoEl.clientHeight;
          var minFaceSize = vpWidth * 0.15;

          var videoRatio = vpWidth / vpHeight;
          var dispRatio = dispWidth / dispHeight;
          var scaleX, scaleY, offsetX = 0, offsetY = 0;
          if(videoRatio > dispRatio) {
            scaleY = dispHeight / vpHeight; scaleX = scaleY;
            offsetX = (dispWidth - vpWidth * scaleX) / 2;
          } else {
            scaleX = dispWidth / vpWidth; scaleY = scaleX;
            offsetY = (dispHeight - vpHeight * scaleY) / 2;
          }

          var faceX;
          if(STATE.facingMode === 'user') {
            faceX = dispWidth - (box.x + box.width) * scaleX - offsetX;
          } else {
            faceX = box.x * scaleX + offsetX;
          }
          var faceW = box.width * scaleX;
          var faceY = box.y * scaleY + offsetY;
          var faceH = box.height * scaleY;

          var pad = 0.2;
          guideTarget.x = faceX - faceW * pad;
          guideTarget.y = faceY - faceH * pad;
          guideTarget.w = faceW * (1 + pad * 2);
          guideTarget.h = faceH * (1 + pad * 2);

          var lerp = guideVisible ? 0.35 : 1;
          guideCurrent.x += (guideTarget.x - guideCurrent.x) * lerp;
          guideCurrent.y += (guideTarget.y - guideCurrent.y) * lerp;
          guideCurrent.w += (guideTarget.w - guideCurrent.w) * lerp;
          guideCurrent.h += (guideTarget.h - guideCurrent.h) * lerp;
          guideVisible = true;

          guide.style.left = guideCurrent.x + 'px';
          guide.style.top = guideCurrent.y + 'px';
          guide.style.width = guideCurrent.w + 'px';
          guide.style.height = guideCurrent.h + 'px';

          if(box.width >= minFaceSize && result.detection.score >= 0.7) {
            guide.classList.add('detected');
            guide.classList.add('ready');
            STATE.lastDescriptor = result.descriptor;
            STATE.faceReady = true;

            // 笑脸自动抓拍：检测 happy 表情大于 0.7
            if(STATE.smileAutoEnabled && !smileCooldown && result.expressions) {
              var happy = result.expressions.happy || 0;
              if(happy > 0.7) {
                console.log('[Selfie] 笑脸检测触发自动抓拍, happy=' + happy.toFixed(2));
                smileCooldown = true;
                setTimeout(function(){ smileCooldown = false; }, 3000);
                captureAndPreview(result.descriptor);
                return;
              }
            }
          } else {
            guide.classList.add('detected');
            guide.classList.remove('ready');
            STATE.faceReady = false;
            if(readyTimer) { clearTimeout(readyTimer); readyTimer = null; }
          }
        } else {
          guide.classList.remove('detected');
          guide.classList.remove('ready');
          guide.style.opacity = '0';
          guideVisible = false;
          STATE.lastDescriptor = null;
          STATE.faceReady = false;
          if(readyTimer) { clearTimeout(readyTimer); readyTimer = null; }
        }

        requestAnimationFrame(detectLoop);
      }).catch(function(){
        if(STATE.detecting && !STATE.captured) {
          setTimeout(detectLoop, 200);
        }
      });
  }

  // ===== 手动拍摄：立即可用，无需模型 =====
  window.manualCapture = function() {
    if(STATE.captured) return;
    // 如果模型已加载且有人脸特征，携带embedding
    var descriptor = STATE.modelsLoaded && STATE.lastDescriptor ? STATE.lastDescriptor : null;
    captureAndPreview(descriptor);
  };

  // ===== 拍照 → 预览确认 =====
  function captureAndPreview(descriptor) {
    STATE.captured = true;
    STATE.detecting = false;
    STATE.faceReady = false;

    var btn = document.getElementById('captureBtn');
    btn.classList.add('disabled');

    // 快门动效：闪白 + 震动
    var flash = document.getElementById('flashOverlay');
    flash.classList.add('flash');
    setTimeout(function(){ flash.classList.remove('flash'); }, 180);
    if(navigator.vibrate) { try { navigator.vibrate(30); } catch(e){} }

    // 截取画面 - 适配原生相机分辨率，输出不低于1664x2496
    var video = document.getElementById('video');
    var vw = video.videoWidth;
    var vh = video.videoHeight;

    // 最低分辨率要求：短边≥1664，长边≥2496
    var MIN_SHORT = 1664;
    var MIN_LONG = 2496;
    var isPortrait = vh >= vw;
    var minW = isPortrait ? MIN_SHORT : MIN_LONG;
    var minH = isPortrait ? MIN_LONG : MIN_SHORT;

    // 若摄像头原始分辨率低于最低要求，按比例放大至满足
    var scale = Math.max(1, minW / vw, minH / vh);
    var outW = Math.ceil(vw * scale);
    var outH = Math.ceil(vh * scale);

    // 安全上限：防止超大canvas导致低端设备内存溢出
    var MAX_CANVAS = 4096;
    if(outW > MAX_CANVAS || outH > MAX_CANVAS) {
      var capScale = MAX_CANVAS / Math.max(outW, outH);
      outW = Math.round(outW * capScale);
      outH = Math.round(outH * capScale);
    }

    console.log('[Selfie] 摄像头原始: ' + vw + 'x' + vh + ', 输出: ' + outW + 'x' + outH + ', 缩放: ' + scale.toFixed(2));

    var canvas = document.createElement('canvas');
    canvas.width = outW;
    canvas.height = outH;
    var ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(video, 0, 0, outW, outH);
    var imageBase64 = canvas.toDataURL('image/jpeg', 0.92);

    STATE.capturedImage = imageBase64;
    STATE.capturedDescriptor = descriptor; // 可能为null（模型未加载时）

    if(STATE.stream) STATE.stream.getTracks().forEach(function(t){t.stop();});

    var previewImg = document.getElementById('previewImg');
    previewImg.src = imageBase64;
    previewImg.style.transform = (STATE.facingMode === 'user') ? 'scaleX(-1)' : 'none';
    showPage('page-preview');
  }

  // ===== 预览 → 确认提交 =====
  window.confirmCapture = function() {
    if(!STATE.capturedImage) return;

    showPage('page-matching');

    var postData = {
      image: STATE.capturedImage,
      bid: STATE.bid,
      mdid: STATE.mdid
    };

    // 有人脸特征时携带embedding，无则不传（后端兼容处理）
    if(STATE.capturedDescriptor) {
      postData.face_embedding = JSON.stringify(Array.from(STATE.capturedDescriptor));
    }

    apiPost('capture', postData).then(function(res){
      STATE.capturedImage = null;
      STATE.capturedDescriptor = null;

      if(res.code === 302) {
        window.location.href = API_BASE + 'start_oauth&aid=' + STATE.aid + '&bid=' + STATE.bid + '&mdid=' + STATE.mdid;
        return;
      }
      if(res.code !== 200) {
        alert(res.msg || '处理失败');
        showPage('page-camera');
        STATE.captured = false;
        startCamera();
        return;
      }

      if(res.data.matched) {
        window.location.href = res.data.pick_url;
      } else {
        STATE.portraitId = res.data.portrait_id;
        document.getElementById('estimatedTime').textContent = res.data.estimated_seconds || 60;
        showPage('page-nomatch');
      }
    }).catch(function(e){
      STATE.capturedImage = null;
      STATE.capturedDescriptor = null;
      alert('网络错误: ' + e.message);
      showPage('page-camera');
      STATE.captured = false;
      startCamera();
    });
  };

  // ===== 预览 → 重拍 =====
  window.retakeCapture = function() {
    STATE.capturedImage = null;
    STATE.capturedDescriptor = null;
    STATE.captured = false;
    document.getElementById('previewImg').src = '';
    startCamera();
  };

  // ===== 等待模式 =====
  window.startWaiting = function() {
    showPage('page-waiting');
    pollProgress();
  };

  function pollProgress() {
    if(STATE.pollTimer) clearInterval(STATE.pollTimer);
    STATE.pollTimer = setInterval(function(){
      apiGet('progress', {portrait_id: STATE.portraitId}).then(function(res){
        if(res.code !== 200) return;
        var d = res.data;
        var pct = d.progress || 0;
        var circle = document.getElementById('progressCircle');
        var circumference = 339.29;
        circle.style.strokeDashoffset = circumference - (pct / 100 * circumference);
        document.getElementById('progressPercent').textContent = pct + '%';

        if(d.status === 3 && d.pick_url) {
          clearInterval(STATE.pollTimer);
          document.getElementById('progressDetail').textContent = '合成完成！正在跳转...';
          setTimeout(function(){ window.location.href = d.pick_url; }, 1000);
        } else if(d.status === 4) {
          clearInterval(STATE.pollTimer);
          document.getElementById('progressDetail').textContent = '合成失败，请稍后重试';
        } else {
          var detail = '正在处理中...';
          if(d.total && d.total > 0) {
            var done = (d.completed || 0) + (d.failed || 0);
            detail = '已完成 ' + done + '/' + d.total;
            if(d.remaining_seconds > 0) detail += '，预计还需 ' + d.remaining_seconds + ' 秒';
          } else if(d.remaining_seconds > 0) {
            detail = '预计还需 ' + d.remaining_seconds + ' 秒';
          }
          document.getElementById('progressDetail').textContent = detail;
        }
      });
    }, 3000);
  }

  // ===== 通知模式 =====
  window.registerNotify = function() {
    if(STATE.pollTimer) clearInterval(STATE.pollTimer);
    apiPost('notify_me', {
      portrait_id: STATE.portraitId,
      openid: STATE.openid
    }).then(function(res){
      if(res.code === 200) showPage('page-notify-done');
      else alert(res.msg || '注册通知失败');
    }).catch(function(e){
      alert('网络错误');
    });
  };

  // ===== 启动 =====
  if(document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
