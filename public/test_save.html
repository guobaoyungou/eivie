<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>API保存测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; }
        .btn { padding: 12px 24px; background: #1E9FFF; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #0c7cd5; }
        .result { margin-top: 20px; padding: 15px; border-radius: 4px; white-space: pre-wrap; font-family: monospace; font-size: 12px; }
        .success { background: #e7f7ef; color: #27ae60; border: 1px solid #27ae60; }
        .error { background: #fdeaea; color: #e74c3c; border: 1px solid #e74c3c; }
    </style>
</head>
<body>
<div class="container">
    <h1>API保存功能测试</h1>
    <p>点击下方按钮测试保存单个API接口</p>
    
    <button class="btn" onclick="testSave()">测试保存接口</button>
    
    <div id="result"></div>
</div>

<script>
function testSave() {
    // 测试数据
    var testInterface = {
        controller: 'TestController',
        action: 'testMethod',
        name: '测试接口' + Date.now(),
        category: '测试分类',
        method: 'POST',
        path: '/test/testmethod',
        description: '这是一个测试接口',
        auth_required: 0,
        request_params: '',
        response_example: '',
        tags: 'test',
        sort: 0,
        status: 1
    };
    
    var resultDiv = document.getElementById('result');
    resultDiv.innerHTML = '<div class="result">正在发送请求...</div>';
    
    // 发送AJAX请求
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '?s=/ApiManage/savescan', true);
    xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
    
    xhr.onload = function() {
        if (xhr.status === 200) {
            try {
                var response = JSON.parse(xhr.responseText);
                var className = response.status == 1 ? 'success' : 'error';
                resultDiv.innerHTML = '<div class="result ' + className + '">' + 
                    '响应状态: ' + xhr.status + '\n' +
                    '返回数据: ' + JSON.stringify(response, null, 2) + 
                    '</div>';
            } catch (e) {
                resultDiv.innerHTML = '<div class="result error">' +
                    '响应状态: ' + xhr.status + '\n' +
                    '响应内容: ' + xhr.responseText + '\n' +
                    '解析错误: ' + e.message +
                    '</div>';
            }
        } else {
            resultDiv.innerHTML = '<div class="result error">' +
                'HTTP状态: ' + xhr.status + '\n' +
                '响应内容: ' + xhr.responseText +
                '</div>';
        }
    };
    
    xhr.onerror = function() {
        resultDiv.innerHTML = '<div class="result error">请求失败，网络错误</div>';
    };
    
    // 构造POST数据
    var postData = 'interfaces[]=' + encodeURIComponent(JSON.stringify(testInterface));
    xhr.send(postData);
}
</script>
</body>
</html>
