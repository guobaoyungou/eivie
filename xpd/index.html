<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI旅拍选片端</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #000;
            overflow: hidden;
        }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 9999;
        }
        #loading .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ff6b6b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        #loading p {
            margin-top: 20px;
            font-size: 16px;
            color: #999;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>正在加载模板...</p>
    </div>

    <script>
        // 模板路由系统
        (function() {
            // 解析URL参数
            function getQueryParams() {
                const params = {};
                const search = window.location.search.substring(1);
                if (search) {
                    search.split('&').forEach(param => {
                        const [key, value] = param.split('=');
                        params[decodeURIComponent(key)] = decodeURIComponent(value || '');
                    });
                }
                return params;
            }

            // 获取参数
            const params = getQueryParams();
            const aid = params.aid || '';
            const bid = params.bid || '';
            const mdid = params.mdid || '0';
            const template = params.template || 'template_1'; // 从 URL 读取模板参数

            // 参数验证
            if (!aid || !bid) {
                document.getElementById('loading').innerHTML = `
                    <div style="text-align:center; color:#ff6b6b;">
                        <h2 style="font-size:24px; margin-bottom:20px;">参数错误</h2>
                        <p style="font-size:16px;">缺少必要参数 aid 或 bid</p>
                        <p style="font-size:14px; color:#999; margin-top:10px;">请检查访问链接是否正确</p>
                    </div>
                `;
                return;
            }

            // 验证参数为正整数
            if (!/^\d+$/.test(aid) || !/^\d+$/.test(bid) || !/^\d+$/.test(mdid)) {
                document.getElementById('loading').innerHTML = `
                    <div style="text-align:center; color:#ff6b6b;">
                        <h2 style="font-size:24px; margin-bottom:20px;">参数格式错误</h2>
                        <p style="font-size:16px;">参数必须为正整数</p>
                    </div>
                `;
                return;
            }

            // 加载模板
            const templateUrl = `templates/${template}/index.html?aid=${aid}&bid=${bid}&mdid=${mdid}&_t=${Date.now()}`;
            
            // 创建iframe加载模板
            const iframe = document.createElement('iframe');
            iframe.src = templateUrl;
            iframe.style.cssText = 'width:100vw; height:100vh; border:none; display:block;';
            iframe.onload = function() {
                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                }, 500);
            };
            iframe.onerror = function() {
                document.getElementById('loading').innerHTML = `
                    <div style="text-align:center; color:#ff6b6b;">
                        <h2 style="font-size:24px; margin-bottom:20px;">模板加载失败</h2>
                        <p style="font-size:16px;">无法加载模板 ${template}</p>
                    </div>
                `;
            };
            
            document.body.appendChild(iframe);
        })();
    </script>
</body>
</html>
